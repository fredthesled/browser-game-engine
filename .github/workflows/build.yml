# =============================================================================
# .github/workflows/build.yml
# =============================================================================
# Two jobs run on every push to main and on manual dispatch:
#
#   validate  — runs node --check on every authored .js file, then checks that
#               every root-level .js in scripts/ and scenes/ has an entry in
#               its _registry.md. Fails fast on any error.
#               Excludes engine/lib/ (vendored) and build/ (auto-generated).
#
#   build     — assembles each game with a build-manifest.json into a single
#               self-contained HTML file. Blocked until validate passes.
#               Uploads builds as workflow artifacts and commits them to build/.
#               Creates/updates the rolling "latest-build" GitHub Release with
#               permanent public download URLs for every built game.
#
# Permissions required:
#   Settings > Actions > General > Workflow permissions must be set to
#   "Read and write permissions" for the commit-back step to succeed.
#   The upload-artifact step works regardless of that setting.
#
# Adding a new game to the build:
#   Create games/<name>/build-manifest.json following the schema in
#   scripts/build-game.sh. The workflow discovers manifests automatically.
#
# Node.js runtime:
#   FORCE_JAVASCRIPT_ACTIONS_TO_NODE24 opts into Node.js 24 now.
#   Node.js 24 becomes the forced default on June 2, 2026; this env var
#   can be removed after that date without any effect.
# =============================================================================

name: Build Games

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:

  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check JS syntax on all authored source files
        # Runs node --check on every .js file outside engine/lib/ and build/.
        # engine/lib/ contains vendored third-party code (not ours to check).
        # build/ contains auto-generated HTML builds (inlined JS, not checked).
        # Any syntax error prints the file path and line, then blocks the build.
        run: |
          failed=0
          while IFS= read -r file; do
            if ! node --check "$file"; then
              echo "^^^ syntax error in: $file"
              failed=$((failed + 1))
            fi
          done < <(find . -name '*.js' \
            -not -path './engine/lib/*' \
            -not -path './build/*' \
            -not -path './.git/*' \
            | sort)
          if [ "$failed" -gt 0 ]; then
            echo ""
            echo "Syntax errors found in $failed file(s). Build is blocked."
            exit 1
          fi
          echo "All JS files passed syntax check."

      - name: Verify root scripts/ and scenes/ have registry entries
        # Each .js at the top level of scripts/ and scenes/ must appear by
        # filename in that folder's _registry.md. Game-specific subdirectories
        # (games/*/scripts/, games/*/scenes/) are excluded — their authors
        # add entries to the root registries manually as part of each game
        # session. This step catches forgotten entries for shared engine scripts.
        run: |
          failed=0
          for dir in scripts scenes; do
            registry="./$dir/_registry.md"
            while IFS= read -r file; do
              name=$(basename "$file")
              if ! grep -qF "$name" "$registry"; then
                echo "MISSING from $registry: $name"
                failed=$((failed + 1))
              fi
            done < <(find "./$dir" -maxdepth 1 -name '*.js' | sort)
          done
          if [ "$failed" -gt 0 ]; then
            echo ""
            echo "$failed file(s) missing from _registry.md. Add entries and retry."
            exit 1
          fi
          echo "All root scripts/scenes have registry entries."

  build:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build all games that have a build-manifest.json
        run: |
          chmod +x scripts/build-game.sh
          found=0
          while IFS= read -r manifest; do
            echo "=== Building: $manifest ==="
            bash scripts/build-game.sh "$manifest"
            found=$((found + 1))
          done < <(find games -name 'build-manifest.json' | sort)
          if [ "$found" -eq 0 ]; then
            echo "No build-manifest.json files found. Nothing to build."
          else
            echo "Done. Built $found game(s)."
          fi

      - name: Upload builds as downloadable workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: game-builds-${{ github.run_number }}
          path: build/*.html
          if-no-files-found: warn
          retention-days: 90

      # Commits the built HTML files back to build/ in the repo.
      # Requires Settings > Actions > General > Workflow permissions
      # to be set to "Read and write permissions".
      # Pushes made by GITHUB_TOKEN do not retrigger this workflow.
      - name: Commit built files back to repository
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "build: auto-regenerate game builds"
          file_pattern: build/*.html
          commit_user_name: github-actions[bot]
          commit_user_email: 41898282+github-actions[bot]@users.noreply.github.com

      # Publishes a rolling GitHub Release tagged "latest-build" so every game
      # has a permanent, shareable download URL. The old release is deleted and
      # recreated on each push so the tag always points at HEAD.
      - name: Publish builds as rolling GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Remove any existing latest-build release and its tag.
          gh release delete latest-build --yes 2>/dev/null || true
          git push origin :refs/tags/latest-build 2>/dev/null || true
          # Create a fresh release with every built game as an asset.
          gh release create latest-build build/*.html \
            --title "Latest Build" \
            --notes "Self-contained game builds from the latest push to main. Each .html file is a playable game — download and open in any browser, no server needed." \
            --prerelease
