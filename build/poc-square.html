<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>POC: Movable Square</title>
<style>
  html, body { margin: 0; padding: 0; background: #1e1e1e; color: #ddd; font-family: monospace; }
  .info { text-align: center; padding: 12px 0 4px 0; font-size: 13px; }
  #stage { display: block; margin: 12px auto 24px auto; background: #2d2d30; border: 1px solid #444; }
</style>
</head>
<body>
<div class="info">Use the arrow keys to move the square.</div>
<canvas id="stage" width="640" height="360"></canvas>
<script>

// AUTO-GENERATED BUILD. Do not edit this file directly.
// Sources are concatenated in dependency order from:
//   engine/signal-bus.js
//   engine/input.js
//   engine/script.js
//   engine/game-object.js
//   engine/scene.js
//   engine/game.js
//   scripts/rect-renderer.js
//   scripts/keyboard-mover.js
//   scenes/poc-square.js

// =============================================================================

// ----- engine/signal-bus.js -----
var Engine = Engine || {};

class SignalBus {
  constructor() {
    this._listeners = new Map();
  }
  emit(name, payload) {
    const handlers = this._listeners.get(name);
    if (!handlers) return;
    for (const handler of [...handlers]) {
      handler(payload);
    }
  }
  on(name, handler) {
    if (!this._listeners.has(name)) {
      this._listeners.set(name, new Set());
    }
    this._listeners.get(name).add(handler);
    return () => this.off(name, handler);
  }
  off(name, handler) {
    const handlers = this._listeners.get(name);
    if (!handlers) return;
    handlers.delete(handler);
    if (handlers.size === 0) {
      this._listeners.delete(name);
    }
  }
}
Engine.SignalBus = SignalBus;
Engine.signals = new SignalBus();

// ----- engine/input.js -----
class Input {
  constructor(canvas = null) {
    this._down = new Set();
    this._justPressed = new Set();
    this._justReleased = new Set();
    this._pendingPressed = new Set();
    this._pendingReleased = new Set();
    this.mouse = { x: 0, y: 0, left: false, right: false };
    this._canvas = canvas;

    window.addEventListener('keydown', (e) => {
      if (!this._down.has(e.key)) this._pendingPressed.add(e.key);
      this._down.add(e.key);
    });
    window.addEventListener('keyup', (e) => {
      if (this._down.has(e.key)) this._pendingReleased.add(e.key);
      this._down.delete(e.key);
    });

    const moveTarget = canvas || window;
    moveTarget.addEventListener('mousemove', (e) => {
      if (canvas) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        this.mouse.x = (e.clientX - rect.left) * scaleX;
        this.mouse.y = (e.clientY - rect.top) * scaleY;
      } else {
        this.mouse.x = e.clientX;
        this.mouse.y = e.clientY;
      }
    });
    const downTarget = canvas || window;
    downTarget.addEventListener('mousedown', (e) => {
      if (e.button === 0) this.mouse.left = true;
      if (e.button === 2) this.mouse.right = true;
    });
    window.addEventListener('mouseup', (e) => {
      if (e.button === 0) this.mouse.left = false;
      if (e.button === 2) this.mouse.right = false;
    });
  }
  isDown(key) { return this._down.has(key); }
  wasJustPressed(key) { return this._justPressed.has(key); }
  wasJustReleased(key) { return this._justReleased.has(key); }
  update() {
    this._justPressed = this._pendingPressed;
    this._justReleased = this._pendingReleased;
    this._pendingPressed = new Set();
    this._pendingReleased = new Set();
  }
}
Engine.Input = Input;

// ----- engine/script.js -----
class Script {
  constructor(host) { this.host = host; }
  on_enter() {}
  update(_dt) {}
  draw(_ctx) {}
  on_exit() {}
}
Engine.Script = Script;

// ----- engine/game-object.js -----
class GameObject {
  constructor(x = 0, y = 0) {
    this.x = x;
    this.y = y;
    this.rotation = 0;
    this.scale = 1;
    this.scripts = [];
  }
  attach(script) {
    this.scripts.push(script);
    if (typeof script.on_enter === 'function') script.on_enter();
    return script;
  }
  detach(script) {
    const i = this.scripts.indexOf(script);
    if (i === -1) return;
    this.scripts.splice(i, 1);
    if (typeof script.on_exit === 'function') script.on_exit();
  }
  update(dt) {
    for (const s of this.scripts) {
      if (typeof s.update === 'function') s.update(dt);
    }
  }
  draw(ctx) {
    for (const s of this.scripts) {
      if (typeof s.draw === 'function') s.draw(ctx);
    }
  }
}
Engine.GameObject = GameObject;

// ----- engine/scene.js -----
class Scene {
  constructor() { this.objects = []; }
  enter() {}
  exit() {}
  add(obj) { this.objects.push(obj); return obj; }
  remove(obj) {
    const i = this.objects.indexOf(obj);
    if (i !== -1) this.objects.splice(i, 1);
  }
  update(dt) {
    for (const obj of [...this.objects]) obj.update(dt);
  }
  draw(ctx) {
    for (const obj of this.objects) {
      ctx.save();
      ctx.translate(obj.x, obj.y);
      ctx.rotate(obj.rotation);
      ctx.scale(obj.scale, obj.scale);
      obj.draw(ctx);
      ctx.restore();
    }
  }
}
Engine.Scene = Scene;

// ----- engine/game.js -----
class Game {
  constructor(canvas) {
    if (!canvas || typeof canvas.getContext !== 'function') {
      throw new Error('Game requires a canvas element.');
    }
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.currentScene = null;
    this._pendingScene = null;
    this._lastFrameTime = 0;
    this._animationHandle = null;
    this._running = false;
    Engine.input = new Engine.Input(canvas);
  }
  start() {
    if (this._running) return;
    this._running = true;
    this._lastFrameTime = performance.now();
    this._animationHandle = requestAnimationFrame((t) => this._frame(t));
  }
  stop() {
    this._running = false;
    if (this._animationHandle !== null) {
      cancelAnimationFrame(this._animationHandle);
      this._animationHandle = null;
    }
  }
  setScene(scene) { this._pendingScene = scene; }
  _frame(now) {
    if (!this._running) return;
    let dt = (now - this._lastFrameTime) / 1000;
    if (dt > 0.1) dt = 0.1;
    this._lastFrameTime = now;
    if (this._pendingScene) {
      if (this.currentScene) this.currentScene.exit();
      this.currentScene = this._pendingScene;
      this._pendingScene = null;
      this.currentScene.enter();
    }
    Engine.input.update();
    if (this.currentScene) {
      this.currentScene.update(dt);
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      this.currentScene.draw(this.ctx);
    }
    this._animationHandle = requestAnimationFrame((t) => this._frame(t));
  }
}
Engine.Game = Game;

// ----- scripts/rect-renderer.js -----
class RectRenderer extends Engine.Script {
  constructor(host, options = {}) {
    super(host);
    this.width = options.width ?? 32;
    this.height = options.height ?? 32;
    this.color = options.color ?? '#ffffff';
  }
  draw(ctx) {
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
  }
}

// ----- scripts/keyboard-mover.js -----
class KeyboardMover extends Engine.Script {
  constructor(host, options = {}) {
    super(host);
    this.speed = options.speed ?? 200;
  }
  update(dt) {
    const input = Engine.input;
    let dx = 0, dy = 0;
    if (input.isDown('ArrowLeft')) dx -= 1;
    if (input.isDown('ArrowRight')) dx += 1;
    if (input.isDown('ArrowUp')) dy -= 1;
    if (input.isDown('ArrowDown')) dy += 1;
    if (dx !== 0 && dy !== 0) {
      const inv = 1 / Math.sqrt(2);
      dx *= inv;
      dy *= inv;
    }
    this.host.x += dx * this.speed * dt;
    this.host.y += dy * this.speed * dt;
  }
}

// ----- scenes/poc-square.js -----
class POCSquareScene extends Engine.Scene {
  enter() {
    const square = new Engine.GameObject(320, 180);
    square.attach(new RectRenderer(square, { width: 40, height: 40, color: '#4ec9b0' }));
    square.attach(new KeyboardMover(square, { speed: 220 }));
    this.add(square);
  }
}

// ----- bootstrap -----
const canvas = document.getElementById('stage');
const game = new Engine.Game(canvas);
game.setScene(new POCSquareScene());
game.start();
</script>
</body>
</html>
