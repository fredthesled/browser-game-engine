    }
    const fk = this._fullKey(key);
    if (!this._available) { this._fallback.set(fk, serialized); return true; }
    try { window.localStorage.setItem(fk, serialized); return true; }
    catch (e) {
      console.warn(`Engine.storage.save: localStorage.setItem failed for key '${key}':`, e);
      return false;
    }
  }
  load(key, defaultValue = null) {
    const fk = this._fullKey(key);
    let raw;
    if (!this._available) raw = this._fallback.has(fk) ? this._fallback.get(fk) : null;
    else raw = window.localStorage.getItem(fk);
    if (raw === null) return defaultValue;
    try { return JSON.parse(raw); }
    catch (e) {
      console.warn(`Engine.storage.load: cannot parse stored value for key '${key}':`, e);
      return defaultValue;
    }
  }
  has(key) {
    const fk = this._fullKey(key);
    if (!this._available) return this._fallback.has(fk);
    return window.localStorage.getItem(fk) !== null;
  }
  clear(key) {
    const fk = this._fullKey(key);
    if (!this._available) { this._fallback.delete(fk); return; }
    window.localStorage.removeItem(fk);
  }
  clearAll() {
    if (!this._available) {
      if (!this._prefix) { this._fallback.clear(); return; }
      for (const k of [...this._fallback.keys()]) {
        if (k.startsWith(this._prefix)) this._fallback.delete(k);
      }
      return;
    }
    if (!this._prefix) { window.localStorage.clear(); return; }
    const toRemove = [];
    for (let i = 0; i < window.localStorage.length; i++) {
      const k = window.localStorage.key(i);
      if (k && k.startsWith(this._prefix)) toRemove.push(k);
    }
    for (const k of toRemove) window.localStorage.removeItem(k);
  }
  keys() {
    const out = [];
    if (!this._available) {
      for (const k of this._fallback.keys()) {
        if (!this._prefix) { out.push(k); continue; }
        if (k.startsWith(this._prefix)) out.push(k.slice(this._prefix.length));
      }
      return out;
    }
    for (let i = 0; i < window.localStorage.length; i++) {
      const k = window.localStorage.key(i);
      if (k === null) continue;
      if (!this._prefix) { out.push(k); continue; }
      if (k.startsWith(this._prefix)) out.push(k.slice(this._prefix.length));
    }
    return out;
  }
}
Engine.Storage = EngineStorage;


// ============================================================================
// engine/game.js
// ============================================================================

var Engine = Engine || {};

class Game {
  constructor(canvas, options = {}) {
    if (!canvas || typeof canvas.getContext !== 'function') {
      throw new Error('Game requires a canvas element.');
    }
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    this.gameName = options.gameName || '';
    this.currentScene = null;
    this._pendingScene = null;
    this._lastFrameTime = 0;
    this._animationHandle = null;
    this._running = false;
    Engine.input = new Engine.Input(canvas);
    Engine.audio = new Engine.Audio();
    Engine.storage = new Engine.Storage(this.gameName);
  }
  start() {
    if (this._running) return;
    this._running = true;
    this._lastFrameTime = performance.now();
    this._animationHandle = requestAnimationFrame((t) => this._frame(t));
  }
  stop() {
    this._running = false;
    if (this._animationHandle !== null) {
      cancelAnimationFrame(this._animationHandle);
      this._animationHandle = null;
    }
  }
  setScene(scene) { this._pendingScene = scene; }
  _frame(now) {
    if (!this._running) return;
    let dt = (now - this._lastFrameTime) / 1000;
    if (dt > 0.1) dt = 0.1;
    this._lastFrameTime = now;
    if (this._pendingScene) {
      if (this.currentScene) this.currentScene.exit();
      this.currentScene = this._pendingScene;
      this._pendingScene = null;
      this.currentScene.enter();
    }
    Engine.input.update();
    if (this.currentScene) {
      this.currentScene.update(dt);
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      this.currentScene.draw(this.ctx);
    }
    this._animationHandle = requestAnimationFrame((t) => this._frame(t));
  }
}
Engine.Game = Game;

// ===== scripts/rect-renderer.js =====

class RectRenderer extends Engine.Script {
  constructor(host, options = {}) {
    super(host);
    this.width = options.width ?? 32;
    this.height = options.height ?? 32;
    this.color = options.color ?? '#ffffff';
  }
  draw(ctx) {
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
  }
}

// ===== scripts/keyboard-mover.js =====

class KeyboardMover extends Engine.Script {
  constructor(host, options = {}) {
    super(host);
    this.speed = options.speed ?? 200;
  }
  update(dt) {
    const input = Engine.input;
    let dx = 0, dy = 0;
    if (input.isDown('ArrowLeft')) dx -= 1;
    if (input.isDown('ArrowRight')) dx += 1;
    if (input.isDown('ArrowUp')) dy -= 1;
    if (input.isDown('ArrowDown')) dy += 1;
    if (dx !== 0 && dy !== 0) {
      const inv = 1 / Math.sqrt(2);
      dx *= inv;
      dy *= inv;
    }
    this.host.x += dx * this.speed * dt;
    this.host.y += dy * this.speed * dt;
  }
}

// ===== scenes/poc-square.js =====

class POCSquareScene extends Engine.Scene {
  enter() {
    const square = new Engine.GameObject(320, 180);
    square.attach(new RectRenderer(square, { width: 40, height: 40, color: '#4ec9b0' }));
    square.attach(new KeyboardMover(square, { speed: 220 }));
    this.add(square);
  }
}

// ===== bootstrap =====
const canvas = document.getElementById('stage');
const game = new Engine.Game(canvas);
game.setScene(new POCSquareScene());
game.start();
