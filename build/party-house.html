      if (e.button === 2) this.mouse.right = false;

  wasJustPressed(key)   { return this._justPressed.has(key); }

class GameObject {
  constructor(x = 0, y = 0) {
    this.x = x; this.y = y; this.rotation = 0; this.scale = 1;
    this.scripts = [];
  }
  attach(script) {
    this.scripts.push(script);
    if (typeof script.on_enter === 'function') script.on_enter();
    return script;
  }
  detach(script) {
    const i = this.scripts.indexOf(script); if (i === -1) return;
    this.scripts.splice(i, 1);

  }
  update(dt) { for (const s of this.scripts) if (typeof s.update === 'function') s.update(dt); }

// engine/scene.js
class Scene {
  constructor() { this.objects = []; }
  enter() {} exit() {}
  add(obj)    { this.objects.push(obj); return obj; }
  remove(obj) { const i = this.objects.indexOf(obj); if (i !== -1) this.objects.splice(i, 1); }
  update(dt)  { for (const obj of [...this.objects]) obj.update(dt); this._collisionPass(); }
  draw(ctx) {
    for (const obj of this.objects) {
      ctx.save();
      ctx.translate(obj.x, obj.y);
      ctx.rotate(obj.rotation);
      ctx.scale(obj.scale, obj.scale);
      obj.draw(ctx);
      ctx.restore();
    }
  }
  _collisionPass() {
    const colliders = [];
    for (const obj of this.objects) {
      for (const s of obj.scripts) if (s.isCollider) colliders.push(s);
    }
    for (let i = 0; i < colliders.length; i++) {
      const a = colliders[i]; const aBox = a.getAabb();
      for (let j = i + 1; j < colliders.length; j++) {
        const b = colliders[j]; const bBox = b.getAabb();
        if (aBox.x < bBox.x + bBox.w && aBox.x + aBox.w > bBox.x &&
            aBox.y < bBox.y + bBox.h && aBox.y + aBox.h > bBox.y) {
          a.onCollide(b); b.onCollide(a);
        }
      }
    }
  }
}

// engine/audio.js
class EngineAudio {
  constructor() { this._sounds=new Map(); this._cache=new Map(); this._volume=0.5; this._muted=false; }
  register(name, paramsOrPreset) {
    const params = typeof paramsOrPreset==='string' ? jsfxr.sfxr.generate(paramsOrPreset) : paramsOrPreset;
    this._sounds.set(name, params); this._cache.delete(name);
  }
  play(name) {
    if (this._muted) return;
    const params = this._sounds.get(name);
    if (!params) { console.warn(`Engine.audio: unknown sound '${name}'`); return; }
    let audio = this._cache.get(name);
    if (!audio) { audio = jsfxr.sfxr.toAudio(params); this._cache.set(name, audio); }
    audio.setVolume(this._volume); audio.play();
  }
  setVolume(v) { this._volume = Math.max(0, Math.min(1, v)); }
  getVolume()  { return this._volume; }
  setMuted(b)  { this._muted = !!b; }
  isMuted()    { return this._muted; }
}

// engine/storage.js
class EngineStorage {
  constructor(namespace) {
    this._namespace = namespace || '';
    this._prefix = this._namespace ? this._namespace + ':' : '';
    this._available = this._detectAvailable();
    this._fallback = this._available ? null : new Map();
  }
  _detectAvailable() {
    try {
      const probe = '__engine_storage_probe__';
      window.localStorage.setItem(probe, '1');
      window.localStorage.removeItem(probe);
      return true;
    } catch (e) { return false; }
  }
  isAvailable() { return this._available; }
  getNamespace() { return this._namespace; }
  _fullKey(key) { return this._prefix + key; }
  save(key, value) {
    if (value === undefined) {
      console.warn(`Engine.storage.save: refusing to save undefined for key '${key}'.`); return false;
    }
    let serialized;
    try { serialized = JSON.stringify(value); }
    catch (e) { console.warn(`Engine.storage.save: cannot serialize value for key '${key}':`, e); return false; }
    const fk = this._fullKey(key);
    if (!this._available) { this._fallback.set(fk, serialized); return true; }
    try { window.localStorage.setItem(fk, serialized); return true; }
    catch (e) { console.warn(`Engine.storage.save: localStorage.setItem failed for key '${key}':`, e); return false; }
  }
  load(key, defaultValue = null) {
    const fk = this._fullKey(key); let raw;
    if (!this._available) raw = this._fallback.has(fk) ? this._fallback.get(fk) : null;
    else                  raw = window.localStorage.getItem(fk);
    if (raw === null) return defaultValue;
    try { return JSON.parse(raw); }
    catch (e) { console.warn(`Engine.storage.load: cannot parse stored value for key '${key}':`, e); return defaultValue; }
  }
  has(key) {
    const fk = this._fullKey(key);
    if (!this._available) return this._fallback.has(fk);
    return window.localStorage.getItem(fk) !== null;
  }
  clear(key) {
    const fk = this._fullKey(key);
    if (!this._available) { this._fallback.delete(fk); return; }
    window.localStorage.removeItem(fk);
  }
  clearAll() {
    if (!this._available) {
      if (!this._prefix) { this._fallback.clear(); return; }
      for (const k of [...this._fallback.keys()]) if (k.startsWith(this._prefix)) this._fallback.delete(k);
      return;
    }
    if (!this._prefix) { window.localStorage.clear(); return; }
    const toRemove = [];
    for (let i = 0; i < window.localStorage.length; i++) {
      const k = window.localStorage.key(i);
      if (k && k.startsWith(this._prefix)) toRemove.push(k);
    }
    for (const k of toRemove) window.localStorage.removeItem(k);
  }
  keys() {
    const out = [];
    if (!this._available) {
      for (const k of this._fallback.keys()) {
        if (!this._prefix) { out.push(k); continue; }
        if (k.startsWith(this._prefix)) out.push(k.slice(this._prefix.length));
      }
      return out;
    }
    for (let i = 0; i < window.localStorage.length; i++) {
      const k = window.localStorage.key(i);
      if (k === null) continue;
      if (!this._prefix) { out.push(k); continue; }
      if (k.startsWith(this._prefix)) out.push(k.slice(this._prefix.length));
    }
    return out;
  }
}
Engine.Storage = EngineStorage;

// engine/game.js
class Game {
  constructor(canvas, options = {}) {
    if (!canvas || typeof canvas.getContext !== 'function') throw new Error('Game requires a canvas element.');
    this.canvas = canvas; this.ctx = canvas.getContext('2d');
    this.gameName = options.gameName || '';
    this.currentScene = null; this._pendingScene = null;
    this._lastFrameTime = 0; this._animationHandle = null; this._running = false;
    Engine.input   = new Engine.Input(canvas);
    Engine.audio   = new Engine.Audio();
    Engine.storage = new Engine.Storage(this.gameName);
  }
  start() {
    if (this._running) return;
    this._running = true;
    this._lastFrameTime = performance.now();
    this._animationHandle = requestAnimationFrame((t) => this._frame(t));
  }
  stop() {
    this._running = false;
    if (this._animationHandle !== null) { cancelAnimationFrame(this._animationHandle); this._animationHandle = null; }
  }
  setScene(scene) { this._pendingScene = scene; }
  _frame(now) {
    if (!this._running) return;
    let dt = (now - this._lastFrameTime) / 1000;
    if (dt > 0.1) dt = 0.1;
    this._lastFrameTime = now;
    if (this._pendingScene) {
      if (this.currentScene) this.currentScene.exit();
      this.currentScene = this._pendingScene; this._pendingScene = null;
      this.currentScene.enter();
    }
    Engine.input.update();
    if (this.currentScene) {
      this.currentScene.update(dt);
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      this.currentScene.draw(this.ctx);
    }
    this._animationHandle = requestAnimationFrame((t) => this._frame(t));
  }
}
Engine.Game = Game;

class PauseOverlay {
  constructor(game, options = {}) {
    this._game      = game;
    this._paused    = false;
    this._onRestart = options.onRestart ?? null;
    this._onQuit    = options.onQuit    ?? null;
    this._cursor    = 0;
    this._rows      = this._buildRows();
  }
  _buildRows() {
    const rows = [
      { kind: 'resume', label: 'RESUME' },
      { kind: 'volume', label: '' },
    ];
    if (this._onRestart) rows.push({ kind: 'restart', label: 'RESTART' });
    if (this._onQuit)    rows.push({ kind: 'quit',    label: 'QUIT TO MENU' });
    return rows;
  }
  toggle()  { this._paused = !this._paused; if (!this._paused) this._cursor = 0; }
  isPaused() { return this._paused; }
  update(dt) {
    if (Engine.input.wasJustPressed('Escape')) { this.toggle(); return; }
    if (!this._paused) return;
    const n = this._rows.length;
    if (Engine.input.wasJustPressed('ArrowUp'))   this._cursor = (this._cursor - 1 + n) % n;
    if (Engine.input.wasJustPressed('ArrowDown')) this._cursor = (this._cursor + 1) % n;
    const row = this._rows[this._cursor];
    if (row.kind === 'volume') {
      if (Engine.input.wasJustPressed('ArrowLeft'))
        Engine.audio.setVolume(+(Math.max(0, Engine.audio.getVolume() - 0.1)).toFixed(1));
      if (Engine.input.wasJustPressed('ArrowRight'))
        Engine.audio.setVolume(+(Math.min(1, Engine.audio.getVolume() + 0.1)).toFixed(1));
      if (Engine.input.wasJustPressed('m') || Engine.input.wasJustPressed('M'))
        Engine.audio.setMuted(!Engine.audio.isMuted());
    }
    if (Engine.input.wasJustPressed('Enter') || Engine.input.wasJustPressed(' ')) {
      if (row.kind === 'resume')  this.toggle();
      else if (row.kind === 'restart' && this._onRestart) { this._paused = false; this._onRestart(); }
      else if (row.kind === 'quit'    && this._onQuit)    { this._paused = false; this._onQuit();    }
    }
  }
  draw(ctx) {
    if (!this._paused) return;
    const W = ctx.canvas.width, H = ctx.canvas.height;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0, 0, W, H);
    const n = this._rows.length;
    const pw = 420; const ph = 180 + n * 50;
    const px = W / 2 - pw / 2, py = H / 2 - ph / 2 - 16;
    ctx.fillStyle = '#111827'; ctx.fillRect(px, py, pw, ph);
    ctx.strokeStyle = '#374151'; ctx.lineWidth = 2; ctx.strokeRect(px, py, pw, ph);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 40px monospace';
    ctx.fillText('PAUSED', W / 2, py + 44);
    ctx.strokeStyle = '#374151'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px + 20, py + 72); ctx.lineTo(px + pw - 20, py + 72); ctx.stroke();
    const muted = Engine.audio.isMuted();
    const vol   = Math.round(Engine.audio.getVolume() * 10);
    const volStr = muted ? 'AUDIO  [MUTED]' : 'AUDIO  [' + '|'.repeat(vol) + ' '.repeat(10 - vol) + '] ' + vol + '/10';
    for (let i = 0; i < n; i++) {
      const row = this._rows[i]; const ry = py + 106 + i * 50, sel = i === this._cursor;
      if (sel) { ctx.fillStyle = 'rgba(241,196,15,0.10)'; ctx.fillRect(px + 12, ry - 20, pw - 24, 40); }
      ctx.fillStyle = sel ? '#f1c40f' : '#9ca3af';
      ctx.font      = sel ? 'bold 20px monospace' : '18px monospace';
      const label = row.kind === 'volume' ? volStr : row.label;
      ctx.fillText(label, W / 2, ry);
    }
    ctx.fillStyle = '#4b5563'; ctx.font = '11px monospace';
    ctx.fillText('UP/DOWN navigate   LEFT/RIGHT volume   M mute   ESC resume', W / 2, py + ph - 16);
    ctx.restore();
  }
}

class PHMenuScene extends Engine.Scene {

    this._prevMouseLeft = Engine.input.mouse.left;

    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
    this._drawBackgroundGuests(ctx, W, H);
    this._drawHouse(ctx, W / 2, H / 2 - 30);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#f5d76e'; ctx.font = 'bold 60px monospace';
    ctx.fillText('PARTY HOUSE', W / 2, 90);
    ctx.fillStyle = '#c8b8e0'; ctx.font = '16px monospace';
    ctx.fillText('throw the ultimate party within 25 days', W / 2, 130);
    ctx.fillText('four stars at one party wins the night', W / 2, 152);
    const panelY = H / 2 + 110;
    if (this.best.fewestDays !== null || this.best.totalWins > 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(W / 2 - 180, panelY - 28, 360, 70);
      ctx.strokeStyle = '#5a4880'; ctx.lineWidth = 1;
      ctx.strokeRect(W / 2 - 180, panelY - 28, 360, 70);
      ctx.fillStyle = '#f5d76e'; ctx.font = 'bold 14px monospace';
      ctx.fillText('BEST RECORD', W / 2, panelY - 12);
      ctx.fillStyle = '#fff'; ctx.font = '15px monospace';
      const daysTxt = this.best.fewestDays !== null
        ? `fewest days to win: ${this.best.fewestDays}`
        : 'fewest days to win: --';
      ctx.fillText(daysTxt, W / 2, panelY + 10);
      ctx.fillText(`total wins: ${this.best.totalWins || 0}`, W / 2, panelY + 30);
    }
    if (Math.sin(this.t * 4) > 0) {
      ctx.fillStyle = '#fff'; ctx.font = 'bold 18px monospace';
      ctx.fillText('press SPACE to start the night', W / 2, H - 50);
    }
    ctx.fillStyle = '#6a5a8a'; ctx.font = '10px monospace';
    ctx.fillText('a study after UFO 50 #25 - PARTY HOUSE by mossmouth', W / 2, H - 18);
  }
  _drawHouse(ctx, cx, cy) {
    ctx.save();
    ctx.fillStyle = '#3d2a5c'; ctx.fillRect(cx - 70, cy - 30, 140, 90);
    ctx.fillStyle = '#5a3a8a';
    ctx.beginPath();
    ctx.moveTo(cx - 85, cy - 30); ctx.lineTo(cx, cy - 75); ctx.lineTo(cx + 85, cy - 30);
    ctx.closePath(); ctx.fill();
    const doorGlow = 0.6 + 0.3 * Math.sin(this.t * 2);
    ctx.fillStyle = `rgba(245, 215, 110, ${doorGlow})`;
    ctx.fillRect(cx - 14, cy + 10, 28, 50);
    ctx.fillStyle = '#3d2a5c'; ctx.fillRect(cx + 8, cy + 34, 3, 3);
    const winGlow = 0.4 + 0.4 * Math.sin(this.t * 5 + 1);
    ctx.fillStyle = `rgba(180, 120, 220, ${winGlow})`;
    ctx.fillRect(cx - 50, cy - 10, 22, 22);
    ctx.fillRect(cx + 28, cy - 10, 22, 22);
    ctx.fillStyle = '#f5d76e'; ctx.font = '16px monospace';
    for (let i = 0; i < 3; i++) {
      const phase = (this.t * 0.6 + i * 0.5) % 2;
      const ny = cy - 80 - phase * 50;
      const nx = cx - 40 + i * 40 + Math.sin(phase * 4) * 8;
      const alpha = 1 - phase / 2;
      ctx.globalAlpha = alpha;
      ctx.fillText(['\u266a', '\u266b', '\u266a'][i], nx, ny);
    }
    ctx.globalAlpha = 1; ctx.restore();
  }
  _drawBackgroundGuests(ctx, W, H) {
    ctx.save();
    const colors = ['#8896a3', '#c46a6a', '#c9a14a', '#6fa86b', '#9c64a4'];
    for (let i = 0; i < 5; i++) {
      const phase = (this.t * 0.15 + i * 0.2) % 1;
      const gx = phase * W;
      const gy = H - 60 + Math.sin(phase * 8 + i) * 4;
      ctx.fillStyle = colors[i]; ctx.globalAlpha = 0.3;
      ctx.beginPath(); ctx.arc(gx, gy - 12, 6, 0, Math.PI * 2); ctx.fill();
      ctx.fillRect(gx - 6, gy - 6, 12, 16);
    }
    ctx.globalAlpha = 1; ctx.restore();
  }
}

  _updateDayStart(dt) { if (this.phaseTimer > 0.9) { this.phase = 'party'; this.phaseTimer = 0; } }
  _updateParty(dt) {
    if (Engine.input.wasJustPressed(' ') || Engine.input.wasJustPressed('Enter') ||
        this._clickedRect(this._inviteBtnRect())) this._inviteNextGuest();
    if (Engine.input.wasJustPressed('e') || Engine.input.wasJustPressed('E') ||
        this._clickedRect(this._endPartyBtnRect())) this._endPartySuccessfully();
  }
  _inviteNextGuest() {
    if (this.partyDeck.length === 0) { this._flash('Rolodex exhausted'); this._endPartySuccessfully(); return; }
    if (this.inParty.length >= this.houseCapacity) { this._flash('House is full'); this._endPartySuccessfully(); return; }
    const key = this.partyDeck.pop();
    this.inParty.push(key);
    const g = PH_GUESTS[key];
    this.partyPop += g.pop; this.partyCash += g.cash; this.partyTrouble += g.trouble;
    this._log(`${g.name} arrives`);
    if (g.ability === 'removeTrouble' && this.partyTrouble > 0) {
      this.partyTrouble -= 1; this._log(`  ${g.name}: -1 trouble`);
    } else if (g.ability === 'cashPerOldFriend') {
      const count = this.inParty.filter((k, idx) => k === 'OF' && idx !== this.inParty.length - 1).length;
      if (count > 0) { this.partyCash += count; this._log(`  ${g.name}: +${count} cash`); }
    }
    if (g.star) Engine.audio.play('ph-star');
    else if (g.trouble > 0) Engine.audio.play('ph-trouble');
    else if (g.cash > 0 && g.pop === 0) Engine.audio.play('ph-cash');
    else if (g.pop > 0) Engine.audio.play('ph-pop');
    else Engine.audio.play('ph-invite');
    if (this.partyTrouble >= 3) { this._shutdown('Too much trouble. The cops shut it down.'); return; }
    if (this.inParty.length >= this.houseCapacity) this._endPartySuccessfully();
  }
  _endPartySuccessfully() {
    this.popularity = Math.max(0, this.popularity + this.partyPop);
    this.cash       = Math.max(0, this.cash       + this.partyCash);
    const stars = this.inParty.filter(k => PH_GUESTS[k].star).length;
    if (stars >= 4) { this._win(); return; }
    this.phase = 'party-end'; this.phaseTimer = 0;
  }
  _shutdown(reason) {
    this.shutdownReason = reason; this.phase = 'shutdown'; this.phaseTimer = 0;
    Engine.audio.play('ph-shutdown');
  }
  _updateContinue(nextPhase) {
    if (this._mouseClicked || Engine.input.wasJustPressed(' ') || Engine.input.wasJustPressed('Enter')) {
      if (nextPhase === 'ban') {
        const unique = [...new Set(this.inParty)];
        if (unique.length === 0) this._advanceToShop();
        else { this.phase = 'ban'; this.phaseTimer = 0; }
      } else this._advanceToShop();
    }
  }
  _updateBan() {
    const unique = [...new Set(this.inParty)];
    for (let i = 0; i < unique.length; i++) {
      if (this._clickedRect(this._banGuestRect(i, unique.length))) {
        this.bannedType = unique[i];
        this._flash(`Banned ${PH_GUESTS[unique[i]].name} from next party`);
        this._advanceToShop(); return;
      }
    }
    if (Engine.input.wasJustPressed('s') || Engine.input.wasJustPressed('S') ||
        this._clickedRect(this._banSkipRect())) this._advanceToShop();
  }
  _advanceToShop() { this.phase = 'shop'; this.phaseTimer = 0; }
  _updateShop() {
    for (let i = 0; i < PH_SHOP_ORDER.length; i++) {
      if (this._clickedRect(this._shopGuestRect(i))) this._tryBuyGuest(PH_SHOP_ORDER[i]);
    }
    if (this._clickedRect(this._expandBtnRect()) || Engine.input.wasJustPressed('x') || Engine.input.wasJustPressed('X'))
      this._tryExpandHouse();
    if (this._clickedRect(this._continueBtnRect()) || Engine.input.wasJustPressed(' ') || Engine.input.wasJustPressed('Enter'))
      this._nextDay();
  }
  _tryBuyGuest(key) {
    const g = PH_GUESTS[key];
    if (this.bought[key] >= g.max) { this._flash(`Maxed out on ${g.name}`); return; }
    if (this.popularity < g.cost)  { this._flash(`Need ${g.cost} pop`); return; }
    this.popularity -= g.cost; this.bought[key] += 1; this.rolodex.push(key);
    Engine.audio.play('ph-buy'); this._flash(`Added ${g.name} to rolodex`);
  }
  _tryExpandHouse() {
    if (this.cash < this.expandCost) { this._flash(`Need $${this.expandCost}`); return; }
    this.cash -= this.expandCost; this.houseCapacity += 1;
    this.expandCost = Math.min(12, this.expandCost + 1);
    Engine.audio.play('ph-expand'); this._flash(`House expanded to ${this.houseCapacity}`);
  }
  _nextDay() {
    this.day += 1;
    if (this.day > this.maxDays) { this._lose(); return; }
    this._startDay();
  }
  _win() {
    this.phase = 'win'; this.phaseTimer = 0;
    Engine.audio.play('ph-win');
    const best = Engine.storage.load('best', { fewestDays: null, totalWins: 0 });
    if (best.fewestDays === null || this.day < best.fewestDays) { best.fewestDays = this.day; this._newRecord = true; }
    else this._newRecord = false;
    best.totalWins = (best.totalWins || 0) + 1;
    Engine.storage.save('best', best);
    this._savedBest = best;
  }
  _lose() { this.phase = 'lose'; this.phaseTimer = 0; Engine.audio.play('ph-lose'); }
  _updateEnd() {
    if (this.phaseTimer > 0.5 &&
        (this._mouseClicked || Engine.input.wasJustPressed(' ') || Engine.input.wasJustPressed('Enter')))
      this.game.setScene(new PHMenuScene(this.game));
  }
  _clickedRect(r) {
    if (!r || !this._mouseClicked) return false;
    const m = Engine.input.mouse;
    return m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h;
  }
  _flash(msg) { this.message = msg; this.messageTimer = 1.5; }
  _log(msg)   { this.partyLog.push(msg); if (this.partyLog.length > 8) this.partyLog.shift(); }
  _inviteBtnRect()   { return { x: 540, y: 470, w: 180, h: 50 }; }
  _endPartyBtnRect() { return { x: 740, y: 470, w: 180, h: 50 }; }
  _continueBtnRect() { return { x: 740, y: 470, w: 180, h: 50 }; }
  _expandBtnRect()   { return { x: 540, y: 470, w: 180, h: 50 }; }
  _shopGuestRect(i) {
    const col = i % 3, row = Math.floor(i / 3);
    return { x: 40 + col * 160, y: 270 + row * 100, w: 140, h: 80 };
  }
  _banGuestRect(i, n) {
    const slotW = 120, gap = 12;
    const totalW = n * slotW + (n - 1) * gap;
    const startX = (960 - totalW) / 2;
    return { x: startX + i * (slotW + gap), y: 380, w: slotW, h: 80 };
  }
  _banSkipRect() { return { x: 960 / 2 - 80, y: 480, w: 160, h: 36 }; }
  draw(ctx) {
    super.draw(ctx);
    const W = ctx.canvas.width, H = ctx.canvas.height;
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a0d2e'); grad.addColorStop(1, '#2a1547');
    ctx.fillStyle = grad; ctx.fillRect(0, 0, W, H);
    this._drawHeader(ctx, W, H);
    switch (this.phase) {
      case 'day-start': this._drawHouseSlots(ctx, W, H); this._drawDayStart(ctx, W, H); break;
      case 'party':     this._drawHouseSlots(ctx, W, H); this._drawPartyControls(ctx, W, H); break;
      case 'party-end': this._drawHouseSlots(ctx, W, H); this._drawPartyEndOverlay(ctx, W, H); break;
      case 'shutdown':  this._drawHouseSlots(ctx, W, H); this._drawShutdownOverlay(ctx, W, H); break;
      case 'ban':       this._drawBanScreen(ctx, W, H); break;
      case 'shop':      this._drawShop(ctx, W, H); break;
      case 'win':       this._drawHouseSlots(ctx, W, H); this._drawEndOverlay(ctx, W, H, true);  break;
      case 'lose':      this._drawHouseSlots(ctx, W, H); this._drawEndOverlay(ctx, W, H, false); break;
    }
    if (this.message && this.messageTimer > 0) this._drawMessage(ctx, W, H);
    this._pause.draw(ctx);
  }
  _drawHeader(ctx, W, H) {
    ctx.fillStyle = '#0d0820'; ctx.fillRect(0, 0, W, 56);
    ctx.strokeStyle = '#3d2a5c'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, 56); ctx.lineTo(W, 56); ctx.stroke();
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#f5d76e'; ctx.font = 'bold 18px monospace';
    ctx.textAlign = 'left'; ctx.fillText(`DAY ${this.day} / ${this.maxDays}`, 20, 28);
    ctx.textAlign = 'center'; ctx.fillStyle = '#fff'; ctx.font = 'bold 16px monospace';
    ctx.fillText(`POP ${this.popularity}    CASH $${this.cash}`, W / 2, 28);
    const stars = this.inParty.filter(k => PH_GUESTS[k].star).length;
    ctx.textAlign = 'right'; ctx.fillStyle = stars >= 4 ? '#f5d76e' : '#c8b8e0';
    ctx.fillText(`STARS ${stars} / 4`, W - 20, 28);
    const tx = W - 320, ty = 14;
    ctx.textAlign = 'left'; ctx.fillStyle = '#c8b8e0'; ctx.font = '13px monospace';
    ctx.fillText('TROUBLE', tx, 28);
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = i < this.partyTrouble ? '#c46a6a' : '#3d2a5c';
      ctx.fillRect(tx + 78 + i * 20, ty + 4, 16, 18);
      ctx.strokeStyle = '#1a0d2e'; ctx.strokeRect(tx + 78 + i * 20, ty + 4, 16, 18);
    }
  }
  _drawHouseSlots(ctx, W, H) {
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#c8b8e0'; ctx.font = 'bold 14px monospace';
    ctx.fillText(`HOUSE -- capacity ${this.houseCapacity}`, 30, 84);
    ctx.fillStyle = '#9a8cbe'; ctx.font = '12px monospace'; ctx.textAlign = 'right';
    ctx.fillText(`deck: ${this.partyDeck.length}   rolodex: ${this.rolodex.length}`, W - 30, 84);
    const slotW = 80, slotH = 110, gap = 14;
    const totalW = this.houseCapacity * slotW + (this.houseCapacity - 1) * gap;
    const startX = (W - totalW) / 2; const startY = 110;
    for (let i = 0; i < this.houseCapacity; i++) {
      const sx = startX + i * (slotW + gap); const sy = startY;
      const filled = i < this.inParty.length;
      if (filled) { this._drawGuestCard(ctx, sx, sy, slotW, slotH, PH_GUESTS[this.inParty[i]], false); }
      else {
        ctx.fillStyle = 'rgba(0,0,0,0.25)'; ctx.fillRect(sx, sy, slotW, slotH);
        ctx.strokeStyle = '#3d2a5c'; ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]); ctx.strokeRect(sx, sy, slotW, slotH); ctx.setLineDash([]);
      }
    }
    const py = startY + slotH + 18;
    ctx.fillStyle = '#0d0820'; ctx.fillRect(30, py, W - 60, 44);
    ctx.strokeStyle = '#3d2a5c'; ctx.strokeRect(30, py, W - 60, 44);
    ctx.textAlign = 'left'; ctx.fillStyle = '#c8b8e0'; ctx.font = 'bold 13px monospace';
    ctx.fillText('THIS PARTY', 50, py + 22);
    ctx.fillStyle = '#fff'; ctx.font = '14px monospace';
    ctx.fillText(`pop +${this.partyPop}   cash ${this.partyCash >= 0 ? '+' : ''}${this.partyCash}   trouble ${this.partyTrouble}`, 170, py + 22);
    ctx.textAlign = 'right'; ctx.fillStyle = '#9a8cbe'; ctx.font = '11px monospace';
    for (let i = 0; i < this.partyLog.length; i++) {
      const m = this.partyLog[this.partyLog.length - 1 - i];
      ctx.globalAlpha = Math.max(0.25, 1 - i * 0.18);
      ctx.fillText(m, W - 50, py + 22 - i * 14);
    }
    ctx.globalAlpha = 1;
  }
  _drawGuestCard(ctx, x, y, w, h, g, showCost) {
    ctx.fillStyle = g.color; ctx.fillRect(x, y, w, h);
    ctx.strokeStyle = '#1a0d2e'; ctx.lineWidth = 2; ctx.strokeRect(x, y, w, h);
    if (g.star) { ctx.fillStyle = '#f5d76e'; this._drawStar(ctx, x + w - 14, y + 14, 8); }
    ctx.fillStyle = 'rgba(0,0,0,0.35)'; ctx.fillRect(x + 6, y + 6, 24, 20);
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(g.key, x + 10, y + 17);
    ctx.fillStyle = g.text; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
    ctx.fillText(g.name, x + w / 2, y + 38);
    ctx.font = '11px monospace'; ctx.fillStyle = g.text;
    let line = y + 56;
    const stats = [];
    if (g.pop !== 0)     stats.push(`${g.pop > 0 ? '+' : ''}${g.pop} pop`);
    if (g.cash !== 0)    stats.push(`${g.cash > 0 ? '+' : ''}${g.cash} cash`);
    if (g.trouble !== 0) stats.push(`+${g.trouble} trouble`);
    for (const s of stats) { ctx.fillText(s, x + w / 2, line); line += 14; }
    if (g.ability) { ctx.font = 'italic 9px monospace'; ctx.fillText('ability!', x + w / 2, line); }
    if (showCost) {
      ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(x, y + h - 18, w, 18);
      ctx.fillStyle = '#f5d76e'; ctx.font = 'bold 12px monospace'; ctx.textAlign = 'center';
      ctx.fillText(`${g.cost} pop`, x + w / 2, y + h - 9);
    }
  }
  _drawStar(ctx, cx, cy, r) {
    ctx.beginPath();
    for (let i = 0; i < 10; i++) {
      const a  = (i / 10) * Math.PI * 2 - Math.PI / 2;
      const rr = i % 2 === 0 ? r : r * 0.45;
      const px = cx + Math.cos(a) * rr; const py = cy + Math.sin(a) * rr;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.closePath(); ctx.fill();
  }
  _drawDayStart(ctx, W, H) {
    const alpha = Math.min(1, this.phaseTimer * 3);
    ctx.fillStyle = `rgba(13,8,32,${alpha * 0.6})`; ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgba(245,215,110,${alpha})`; ctx.font = 'bold 64px monospace';
    ctx.fillText(`DAY ${this.day}`, W / 2, H / 2);
    if (this.bannedType) {
      ctx.fillStyle = `rgba(255,255,255,${alpha})`; ctx.font = '16px monospace';
      ctx.fillText(`${PH_GUESTS[this.bannedType].name} skips tonight`, W / 2, H / 2 + 60);
    }
  }
  _drawPartyControls(ctx, W, H) {
    this._drawButton(ctx, this._inviteBtnRect(),  '[SPACE] INVITE NEXT', '#3a7a4a', this.partyDeck.length > 0);
    this._drawButton(ctx, this._endPartyBtnRect(), '[E] END PARTY',       '#7a3a4a', true);
    ctx.textAlign = 'center'; ctx.fillStyle = '#9a8cbe'; ctx.font = '11px monospace';
    ctx.fillText('ESC: pause / audio settings / restart / quit', W / 2, H - 12);
  }
  _drawButton(ctx, r, label, color, enabled) {
    ctx.fillStyle = enabled ? color : '#2a2440'; ctx.fillRect(r.x, r.y, r.w, r.h);
    ctx.strokeStyle = enabled ? '#fff' : '#5a4880'; ctx.lineWidth = 2;
    ctx.strokeRect(r.x, r.y, r.w, r.h);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = enabled ? '#fff' : '#7a6aa0'; ctx.font = 'bold 14px monospace';
    ctx.fillText(label, r.x + r.w / 2, r.y + r.h / 2);
  }
  _drawPartyEndOverlay(ctx, W, H) {
    ctx.fillStyle = 'rgba(13,8,32,0.85)'; ctx.fillRect(80, 350, W - 160, 160);
    ctx.strokeStyle = '#5a4880'; ctx.strokeRect(80, 350, W - 160, 160);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#f5d76e'; ctx.font = 'bold 22px monospace';
    ctx.fillText('PARTY ENDED', W / 2, 380);
    ctx.fillStyle = '#fff'; ctx.font = '14px monospace';
    ctx.fillText(`+ ${this.partyPop} pop    + ${this.partyCash} cash`, W / 2, 420);
    const stars = this.inParty.filter(k => PH_GUESTS[k].star).length;
    ctx.fillStyle = '#c8b8e0';
    ctx.fillText(`${stars} star${stars === 1 ? '' : 's'} at the party`, W / 2, 442);
    ctx.fillStyle = '#9a8cbe'; ctx.font = '12px monospace';
    ctx.fillText('click or press SPACE to continue', W / 2, 480);
  }
  _drawShutdownOverlay(ctx, W, H) {
    ctx.fillStyle = 'rgba(40,10,10,0.88)'; ctx.fillRect(80, 350, W - 160, 160);
    ctx.strokeStyle = '#c46a6a'; ctx.lineWidth = 2; ctx.strokeRect(80, 350, W - 160, 160);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#c46a6a'; ctx.font = 'bold 22px monospace';
    ctx.fillText('SHUT DOWN', W / 2, 380);
    ctx.fillStyle = '#fff'; ctx.font = '14px monospace';
    ctx.fillText(this.shutdownReason, W / 2, 410);
    ctx.fillStyle = '#c8b8e0';
    ctx.fillText('no popularity or cash earned this party', W / 2, 432);
    ctx.fillStyle = '#9a8cbe'; ctx.font = '12px monospace';
    ctx.fillText('click or press SPACE to ban a guest', W / 2, 480);
  }
  _drawBanScreen(ctx, W, H) {
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#c46a6a'; ctx.font = 'bold 26px monospace';
    ctx.fillText('PICK A GUEST TO BAN FROM THE NEXT PARTY', W / 2, 110);
    ctx.fillStyle = '#c8b8e0'; ctx.font = '14px monospace';
    ctx.fillText('they keep their rolodex slot, but skip the next night', W / 2, 140);
    const unique = [...new Set(this.inParty)];
    for (let i = 0; i < unique.length; i++) {
      const r = this._banGuestRect(i, unique.length);
      const g = PH_GUESTS[unique[i]];
      const m = Engine.input.mouse;
      const hover = m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h;
      if (hover) { ctx.fillStyle = 'rgba(245,215,110,0.15)'; ctx.fillRect(r.x - 4, r.y - 4, r.w + 8, r.h + 8); }
      this._drawGuestCard(ctx, r.x, r.y, r.w, r.h, g, false);
      const count = this.inParty.filter(k => k === unique[i]).length;
      if (count > 1) {
        ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(r.x + r.w - 26, r.y + r.h - 22, 22, 18);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 11px monospace'; ctx.textAlign = 'center';
        ctx.fillText(`x${count}`, r.x + r.w - 15, r.y + r.h - 13);
      }
    }
    this._drawButton(ctx, this._banSkipRect(), '[S] skip ban', '#3d2a5c', true);
    ctx.fillStyle = '#9a8cbe'; ctx.font = '11px monospace';
    ctx.fillText('click a guest to ban one rolodex copy for one party', W / 2, H - 12);
  }
  _drawShop(ctx, W, H) {
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#f5d76e'; ctx.font = 'bold 28px monospace';
    ctx.fillText('SHOP', W / 2, 92);
    ctx.fillStyle = '#c8b8e0'; ctx.font = '13px monospace';
    ctx.fillText('add guests to your rolodex   |   expand your house', W / 2, 116);
    ctx.textAlign = 'left'; ctx.fillStyle = '#c8b8e0'; ctx.font = 'bold 13px monospace';
    ctx.fillText('AVAILABLE GUESTS', 40, 142);
    for (let i = 0; i < PH_SHOP_ORDER.length; i++) {
      const key = PH_SHOP_ORDER[i]; const g = PH_GUESTS[key];
      const r = this._shopGuestRect(i);
      const owned = this.bought[key]; const maxed = owned >= g.max;
      const afford = this.popularity >= g.cost;
      if (maxed || !afford) ctx.globalAlpha = 0.45;
      const m = Engine.input.mouse;
      const hover = !maxed && afford && m.x >= r.x && m.x <= r.x + r.w && m.y >= r.y && m.y <= r.y + r.h;
      if (hover) { ctx.fillStyle = 'rgba(245,215,110,0.15)'; ctx.fillRect(r.x - 4, r.y - 4, r.w + 8, r.h + 8); }
      ctx.fillStyle = g.color; ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.strokeStyle = '#1a0d2e'; ctx.lineWidth = 2; ctx.strokeRect(r.x, r.y, r.w, r.h);

      ctx.fillStyle = g.text; ctx.textAlign = 'left'; ctx.font = 'bold 12px monospace';
      ctx.fillText(g.name, r.x + 8, r.y + 16);
      ctx.font = '10px monospace';
      const stats = [];
      if (g.pop !== 0)     stats.push(`${g.pop > 0 ? '+' : ''}${g.pop}p`);
      if (g.cash !== 0)    stats.push(`${g.cash > 0 ? '+' : ''}${g.cash}$`);
      if (g.trouble !== 0) stats.push(`+${g.trouble}T`);
      ctx.fillText(stats.join('  '), r.x + 8, r.y + 32);
      if (g.ability) { ctx.font = 'italic 9px monospace'; ctx.fillText(PH_ABILITY_LABEL[g.ability] || 'ability', r.x + 8, r.y + 46); }
      ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(r.x, r.y + r.h - 20, r.w, 20);
      ctx.fillStyle = '#f5d76e'; ctx.font = 'bold 11px monospace';
      ctx.fillText(`${g.cost} pop`, r.x + 8, r.y + r.h - 7);
      ctx.fillStyle = '#fff'; ctx.font = '10px monospace'; ctx.textAlign = 'right';
      ctx.fillText(`${owned} / ${g.max}`, r.x + r.w - 8, r.y + r.h - 7);
      if (maxed) {
        ctx.globalAlpha = 0.85; ctx.fillStyle = '#c46a6a'; ctx.textAlign = 'center';
        ctx.font = 'bold 12px monospace'; ctx.fillText('MAXED', r.x + r.w / 2, r.y + r.h / 2);
      }
      ctx.globalAlpha = 1;
    }
    this._drawButton(ctx, this._expandBtnRect(), `[X] EXPAND $${this.expandCost}`,
                     this.cash >= this.expandCost ? '#3a7a4a' : '#2a2440',
                     this.cash >= this.expandCost);
    this._drawButton(ctx, this._continueBtnRect(), '[SPACE] NEXT DAY', '#5a3a8a', true);
    ctx.textAlign = 'center'; ctx.fillStyle = '#9a8cbe'; ctx.font = '11px monospace';
    ctx.fillText(`ESC: pause   |   POP ${this.popularity}   CASH $${this.cash}   capacity ${this.houseCapacity}`, W / 2, H - 12);
  }
  _drawEndOverlay(ctx, W, H, won) {
    ctx.fillStyle = won ? 'rgba(40,30,10,0.92)' : 'rgba(20,10,30,0.92)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (won) {
      ctx.fillStyle = '#f5d76e'; ctx.font = 'bold 72px monospace';
      ctx.fillText('CHERRY!', W / 2, H / 2 - 100);
      ctx.fillStyle = '#fff'; ctx.font = '20px monospace';
      ctx.fillText('four stars at one party', W / 2, H / 2 - 50);
      ctx.fillText(`cleared in ${this.day} day${this.day === 1 ? '' : 's'}`, W / 2, H / 2 - 20);
      if (this._newRecord) {
        ctx.fillStyle = '#f5d76e'; ctx.font = 'bold 22px monospace';
        ctx.fillText('NEW RECORD', W / 2, H / 2 + 20);
      } else if (this._savedBest && this._savedBest.fewestDays !== null) {
        ctx.fillStyle = '#c8b8e0'; ctx.font = '14px monospace';
        ctx.fillText(`best: ${this._savedBest.fewestDays} days`, W / 2, H / 2 + 20);
      }
      ctx.fillStyle = '#c8b8e0'; ctx.font = '14px monospace';
      ctx.fillText(`total wins: ${(this._savedBest && this._savedBest.totalWins) || 1}`, W / 2, H / 2 + 50);
    } else {
      ctx.fillStyle = '#c46a6a'; ctx.font = 'bold 64px monospace';
      ctx.fillText('THE NIGHTS RAN OUT', W / 2, H / 2 - 60);
      ctx.fillStyle = '#c8b8e0'; ctx.font = '18px monospace';
      ctx.fillText('twenty-five days came and went without four stars at one party', W / 2, H / 2 - 10);
    }
    ctx.fillStyle = '#9a8cbe'; ctx.font = '13px monospace';
    ctx.fillText('click or press SPACE to return to the menu', W / 2, H - 40);
  }
  _drawMessage(ctx, W, H) {
    const alpha = Math.min(1, this.messageTimer);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = `rgba(245,215,110,${alpha})`; ctx.font = 'bold 14px monospace';
    ctx.fillText(this.message, W / 2, 76);
  }
}

  const canvas = document.getElementById('game');
  const game = new Engine.Game(canvas, { gameName: 'party-house' });
  game.setScene(new PHMenuScene(game));
  game.start();
})();
</script>
