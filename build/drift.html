var Engine = Engine || {};

class SignalBus {
  constructor() {
    this._listeners = new Map();
  }

  emit(name, payload) {
    const handlers = this._listeners.get(name);
    if (!handlers) return;
    for (const handler of [...handlers]) {
      handler(payload);
    }
  }

  on(name, handler) {
    if (!this._listeners.has(name)) {
      this._listeners.set(name, new Set());
    }
    this._listeners.get(name).add(handler);
    return () => this.off(name, handler);
  }

  off(name, handler) {
    const handlers = this._listeners.get(name);
    if (!handlers) return;
    handlers.delete(handler);
    if (handlers.size === 0) {
      this._listeners.delete(name);
    }
  }
}

Engine.SignalBus = SignalBus;
Engine.signals = new SignalBus();

var Engine = Engine || {};

class Input {
  constructor(canvas = null) {
    this._down = new Set();
    this._justPressed = new Set();
    this._justReleased = new Set();
    this._pendingPressed = new Set();
    this._pendingReleased = new Set();

    this.mouse = {
      x: 0,
      y: 0,
      left: false,
      right: false
    };

    this._canvas = canvas;

    window.addEventListener('keydown', (e) => {
      if (!this._down.has(e.key)) {
        this._pendingPressed.add(e.key);
      }
      this._down.add(e.key);
    });

    window.addEventListener('keyup', (e) => {
      if (this._down.has(e.key)) {
        this._pendingReleased.add(e.key);
      }
      this._down.delete(e.key);
    });

    const moveTarget = canvas || window;
    moveTarget.addEventListener('mousemove', (e) => {
      if (canvas) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        this.mouse.x = (e.clientX - rect.left) * scaleX;
        this.mouse.y = (e.clientY - rect.top) * scaleY;
      } else {
        this.mouse.x = e.clientX;
        this.mouse.y = e.clientY;
      }
    });

    const downTarget = canvas || window;
    downTarget.addEventListener('mousedown', (e) => {
      if (e.button === 0) this.mouse.left = true;
      if (e.button === 2) this.mouse.right = true;
    });
    window.addEventListener('mouseup', (e) => {
      if (e.button === 0) this.mouse.left = false;
      if (e.button === 2) this.mouse.right = false;
    });
  }

  isDown(key) {
    return this._down.has(key);
  }

  wasJustPressed(key) {
    return this._justPressed.has(key);
  }

  wasJustReleased(key) {
    return this._justReleased.has(key);
  }

  update() {
    this._justPressed = this._pendingPressed;
    this._justReleased = this._pendingReleased;
    this._pendingPressed = new Set();
    this._pendingReleased = new Set();
  }
}

Engine.Input = Input;

var Engine = Engine || {};

class Scene {
  constructor() {
    this.objects = [];
  }

  enter() {}
  exit() {}

  add(obj) {
    this.objects.push(obj);
    return obj;
  }

  remove(obj) {
    const i = this.objects.indexOf(obj);
    if (i !== -1) this.objects.splice(i, 1);
  }

  update(dt) {
    for (const obj of [...this.objects]) {
      obj.update(dt);
    }
    this._collisionPass();
  }

  draw(ctx) {
    for (const obj of this.objects) {
      ctx.save();
      ctx.translate(obj.x, obj.y);
      ctx.rotate(obj.rotation);
      ctx.scale(obj.scale, obj.scale);
      obj.draw(ctx);
      ctx.restore();
    }
  }

  _collisionPass() {
    const colliders = [];
    for (const obj of this.objects) {
      for (const s of obj.scripts) {
        if (s.isCollider) {
          colliders.push(s);
        }
      }
    }
    for (let i = 0; i < colliders.length; i++) {
      const a = colliders[i];
      const aBox = a.getAabb();
      for (let j = i + 1; j < colliders.length; j++) {
        const b = colliders[j];
        const bBox = b.getAabb();
        if (aBox.x < bBox.x + bBox.w && aBox.x + aBox.w > bBox.x &&
            aBox.y < bBox.y + bBox.h && aBox.y + aBox.h > bBox.y) {
          a.onCollide(b);
          b.onCollide(a);
        }
      }
    }
  }
}

      return false;
    }

  getNamespace() { return this._namespace; }

  save(key, value) {
    if (value === undefined) {
      console.warn(`Engine.storage.save: refusing to save undefined for key '${key}'. Use clear(key) instead.`);
      return false;
    }
    let serialized;
    try {
      serialized = JSON.stringify(value);
    } catch (e) {
      console.warn(`Engine.storage.save: cannot serialize value for key '${key}':`, e);
      return false;
    }
    const fk = this._fullKey(key);
    if (!this._available) {
      this._fallback.set(fk, serialized);
      return true;
    }
    try {
      window.localStorage.setItem(fk, serialized);
      return true;
    } catch (e) {
      console.warn(`Engine.storage.save: localStorage.setItem failed for key '${key}':`, e);
      return false;
    }
  }

  load(key, defaultValue = null) {
    const fk = this._fullKey(key);
    let raw;
    if (!this._available) {
      raw = this._fallback.has(fk) ? this._fallback.get(fk) : null;
    } else {
      raw = window.localStorage.getItem(fk);
    }
    if (raw === null) return defaultValue;
    try {
      return JSON.parse(raw);
    } catch (e) {
      console.warn(`Engine.storage.load: cannot parse stored value for key '${key}':`, e);
      return defaultValue;
    }
  }

  has(key) {
    const fk = this._fullKey(key);
    if (!this._available) return this._fallback.has(fk);
    return window.localStorage.getItem(fk) !== null;
  }

  clear(key) {
    const fk = this._fullKey(key);
    if (!this._available) { this._fallback.delete(fk); return; }
    window.localStorage.removeItem(fk);
  }

  clearAll() {
    if (!this._available) {

      window.localStorage.clear();

    const out = [];
    if (!this._available) {
      for (const k of this._fallback.keys()) {
        if (!this._prefix) { out.push(k); continue; }
        if (k.startsWith(this._prefix)) out.push(k.slice(this._prefix.length));

      return out;
    }
    for (let i = 0; i < window.localStorage.length; i++) {
      const k = window.localStorage.key(i);
      if (k === null) continue;
      if (!this._prefix) { out.push(k); continue; }
      if (k.startsWith(this._prefix)) out.push(k.slice(this._prefix.length));

    this._lastFrameTime = now;

    if (this._pendingScene) {
      if (this.currentScene) this.currentScene.exit();
      this.currentScene = this._pendingScene;
      this._pendingScene = null;
      this.currentScene.enter();
    }

    Engine.input.update();

    if (this.currentScene) {
      this.currentScene.update(dt);
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      this.currentScene.draw(this.ctx);
    }

    this._animationHandle = requestAnimationFrame((t) => this._frame(t));
  }
}

Engine.Game = Game;

// engine/narrative.js
// ============================================================================

var Engine = Engine || {};

class Narrative {
  constructor(source, options = {}) {
    if (typeof inkjs === 'undefined') {
      throw new Error(
        'Engine.Narrative requires inkjs to be loaded. Include ' +
        'engine/lib/inkjs.js before the engine bundle in your build. See ADR-0018.'
      );
    }
    if (options.compiled) {
      this._story = new inkjs.Story(source);
    } else {
      this._story = new inkjs.Compiler(source).Compile();
    }
  }

  // Advance the story, collecting every line emitted until the next choice
  // point or story end. Returns an array of { text, tags } objects.
  continue() {
    const lines = [];
    while (this._story.canContinue) {
      const raw = this._story.Continue();
      const text = (typeof raw === 'string' ? raw : '').replace(/\n$/, '');
      const tags = this._story.currentTags ? [...this._story.currentTags] : [];
      lines.push({ text, tags });
    }
    return lines;
  }

  // Available choices at the current story point, or [] if none.
  getChoices() {
    return this._story.currentChoices.map((c) => ({
      index: c.index,
      text: c.text,
      tags: c.tags ? [...c.tags] : []
    }));
  }

  // Select a choice by its index. After this, the story is ready for another
  // continue() call.
  choose(index) {
    this._story.ChooseChoiceIndex(index);
  }

  // Read an ink variable by name. Returns undefined if not declared.
  getVar(name) {
    return this._story.variablesState[name];
  }

  // Write an ink variable. The variable must be declared in the ink source
  // (with VAR) for the write to have effect.
  setVar(name, value) {
    this._story.variablesState[name] = value;
  }

  // Bind a JS function that ink can invoke via an EXTERNAL declaration.
  // The ink script must declare it as: EXTERNAL fn_name(arg1, arg2)
  bindExternal(name, fn) {
    this._story.BindExternalFunction(name, fn);
  }

  // Register a callback that fires when the named ink variable changes.
  // The callback is invoked with the new value.
  observe(name, fn) {
    this._story.ObserveVariable(name, (_varName, value) => fn(value));
  }

  // Jump to a named knot or stitch. Path is a dot-separated string like
  // 'sector_one' or 'sector_one.shop_intro'.
  goTo(path) {
    this._story.ChoosePathString(path);
  }

  // Serialize narrative state to a JSON string suitable for storing via
  // Engine.storage alongside other game state.
  saveState() {
    return this._story.state.toJson();
  }

  // Restore state from a JSON string previously returned by saveState().
  loadState(json) {
    this._story.state.LoadJson(json);
  }

  // True when the story has nothing more to emit and offers no choices.
  get hasEnded() {
    return !this._story.canContinue && this._story.currentChoices.length === 0;
  }

  // Underlying inkjs Story instance. Exposed for advanced uses where the
  // wrapper methods do not cover the required operation.
  get story() {
    return this._story;
  }
}

Engine.Narrative = Narrative;

// ============================================================================
// scripts/bootstrap.js
// ============================================================================
//
// bootstrapGame(options) - canonical game bootstrap helper.
//
// Consolidates the boilerplate that every build/<game>.html's <script> tail
// currently repeats: viewport-aware canvas sizing per ADR-0017, touch
// capability detection, optional context-menu suppression (for right-click
// games), Engine.Game construction with optional gameName for namespaced
// storage, initial scene set via a factory, and game start.
//
// Depends on:
//   Engine.Game (engine/game.js). The engine bundle must be loaded before
//   this script in the build concatenation order.
//
// Depended on by:
//   Game build bootstrap snippets. Replaces the inline IIFE that previously
//   appeared at the end of each build/<game>.html. Adoption is per-build:
//   existing builds continue to work with their inline bootstrap until each
//   is naturally regenerated. Drift v1 is the planned first build to adopt
//   the helper from the start; existing games migrate when next touched.
//
// Usage (Minesweeper-style, current inline form for comparison):
//   (function () {
//     const canvas = document.getElementById('game');
//     const preset = { w: 900, h: 600 };
//     canvas.width = preset.w; canvas.height = preset.h;
//     // fitToViewport, resize listener, canvas.oncontextmenu, etc.
//     const game = new Engine.Game(canvas, { gameName: 'minesweeper' });
//     game.setScene(new MinesweeperMenuScene(game));
//     game.start();
//   })();
//
// Equivalent with bootstrapGame:
//   bootstrapGame({
//     gameName: 'minesweeper',
//     presets: { regular: { w: 900, h: 600 } },
//     initialScene: function (game) { return new MinesweeperMenuScene(game); },
//     suppressContextMenu: true,
//   });
//
// Options:
//   canvasId          string. ID of canvas element. Default 'game'.
//   canvas            DOM element. Overrides canvasId if both provided.
//   gameName          string. Passed to Engine.Game for storage namespacing.
//                     Default '' (no namespace).
//   presets           { regular: {w, h}, compact?: {w, h} }. Required.
//                     If compact is omitted, regular is always used (the
//                     intentional letterbox-on-portrait path per ADR-0017).
//   initialScene      (game) => Scene. Factory required because the Game
//                     instance must exist before the initial Scene's
//                     constructor argument can be passed.
//   suppressContextMenu  bool. Default false. true disables the canvas's
//                     right-click context menu (for games that read
//                     Engine.input.mouse.right; see Minesweeper).
//
// Returns:
//   { game, preset, presetName, isTouch }
//     game         the constructed Engine.Game (already started)
//     preset       the chosen preset object { w, h }
//     presetName   'regular' or 'compact'
//     isTouch      bool. true if touch capability detected per ADR-0017.
//                  Scenes can use this to enlarge hit-target minimums.
//
// Throws if the canvas element is not found, presets.regular is missing, or
// initialScene is not a function. Errors are explicit and actionable.
//
// Preset selection:
//   When both regular and compact are defined, picks whichever aspect ratio
//   is closer (in log space) to the current viewport's. This matches the
//   reference snippet in docs/ARCHITECTURE.md "Logical canvas and viewport
//   bootstrap" and ADR-0017.
// ============================================================================

function bootstrapGame(options) {
  const opts = options || {};

  const canvas = opts.canvas || document.getElementById(opts.canvasId || 'game');
  if (!canvas || typeof canvas.getContext !== 'function') {
    throw new Error(
      "bootstrapGame: canvas element not found (looked for id '" +
      (opts.canvasId || 'game') + "'). Pass options.canvas or options.canvasId."
    );
  }

  const presets = opts.presets;
  if (!presets || !presets.regular) {
    throw new Error('bootstrapGame: options.presets.regular is required (e.g. { regular: { w: 900, h: 600 } }).');
  }

  if (typeof opts.initialScene !== 'function') {
    throw new Error('bootstrapGame: options.initialScene must be a factory function (game) => sceneInstance.');
  }

  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  function pickPreset() {
    if (!presets.compact) return { name: 'regular', preset: presets.regular };
    const va = window.innerWidth / window.innerHeight;
    const ra = presets.regular.w / presets.regular.h;
    const ca = presets.compact.w / presets.compact.h;
    const useCompact = Math.abs(Math.log(va / ca)) < Math.abs(Math.log(va / ra));
    return useCompact
      ? { name: 'compact', preset: presets.compact }
      : { name: 'regular', preset: presets.regular };
  }

  const chosen = pickPreset();
  const preset = chosen.preset;
  canvas.width = preset.w;
  canvas.height = preset.h;

  function fitToViewport() {
    const s = Math.min(window.innerWidth / preset.w, window.innerHeight / preset.h);
    canvas.style.width = (preset.w * s) + 'px';
    canvas.style.height = (preset.h * s) + 'px';
  }
  fitToViewport();
  window.addEventListener('resize', fitToViewport);

  if (opts.suppressContextMenu) {
    canvas.oncontextmenu = function (e) { e.preventDefault(); };
  }

  const game = new Engine.Game(canvas, { gameName: opts.gameName || '' });
  game.setScene(opts.initialScene(game));
  game.start();

  return { game: game, preset: preset, presetName: chosen.name, isTouch: isTouch };
}

// scripts/pause-overlay.js
// Reusable pause overlay utility. Not a Script subclass -- a plain class that
// any scene owns and delegates to. Lives in scripts/ as the closest available
// folder; a utils/ folder may be warranted if more non-Script utilities appear.
//
// Usage in a scene:
//   this._pause = new PauseOverlay(game, {
//     onRestart: () => game.setScene(new MatchScene(game)),  // optional
//     onQuit:    () => game.setScene(new Menu(game)),        // optional
//   });
//   In update(dt): this._pause.update(dt); if (this._pause.isPaused()) return;
//   In draw(ctx): /* game draw */ this._pause.draw(ctx); // last, on top
//
// ESC toggles pause. Row layout (rows present only if their callback is provided):
//   RESUME
//   AUDIO    (volume + mute)
//   RESTART  (only if onRestart)
//   QUIT     (only if onQuit)
//
// Controls when paused:
//   Up/Down       navigate rows
//   Left/Right    adjust volume when on AUDIO row
//   M             toggle mute when on AUDIO row
//   Space/Enter   activate selected row
//   Escape        resume
//
// Depends on: Engine.input, Engine.audio.
// Used by: SurvivorsMatchScene, HTTMatchScene, and any future game scene.

class PauseOverlay {
  constructor(game, options = {}) {
    this._game      = game;
    this._paused    = false;
    this._onRestart = options.onRestart ?? null;
    this._onQuit    = options.onQuit    ?? null;
    this._cursor    = 0;
    this._rows      = this._buildRows();
  }

  /** Build the row layout based on which callbacks were provided. Each row is
   * { kind, label }. The 'volume' row's label is regenerated at draw time. */
  _buildRows() {
    const rows = [
      { kind: 'resume', label: 'RESUME' },
      { kind: 'volume', label: '' }, // regenerated dynamically
    ];
    if (this._onRestart) rows.push({ kind: 'restart', label: 'RESTART' });
    if (this._onQuit)    rows.push({ kind: 'quit',    label: 'QUIT TO MENU' });
    return rows;
  }

  toggle() { this._paused = !this._paused; if (!this._paused) this._cursor = 0; }
  isPaused() { return this._paused; }

  update(dt) {
    if (Engine.input.wasJustPressed('Escape')) { this.toggle(); return; }
    if (!this._paused) return;

    const n = this._rows.length;
    if (Engine.input.wasJustPressed('ArrowUp'))
      this._cursor = (this._cursor - 1 + n) % n;
    if (Engine.input.wasJustPressed('ArrowDown'))
      this._cursor = (this._cursor + 1) % n;

    const row = this._rows[this._cursor];

    if (row.kind === 'volume') {
      if (Engine.input.wasJustPressed('ArrowLeft'))
        Engine.audio.setVolume(+(Math.max(0, Engine.audio.getVolume() - 0.1)).toFixed(1));
      if (Engine.input.wasJustPressed('ArrowRight'))
        Engine.audio.setVolume(+(Math.min(1, Engine.audio.getVolume() + 0.1)).toFixed(1));
      if (Engine.input.wasJustPressed('m') || Engine.input.wasJustPressed('M'))
        Engine.audio.setMuted(!Engine.audio.isMuted());
    }

    if (Engine.input.wasJustPressed('Enter') || Engine.input.wasJustPressed(' ')) {
      if (row.kind === 'resume')  { this.toggle(); }
      else if (row.kind === 'restart' && this._onRestart) { this._paused = false; this._onRestart(); }
      else if (row.kind === 'quit'    && this._onQuit)    { this._paused = false; this._onQuit(); }
    }
  }

  draw(ctx) {
    if (!this._paused) return;
    const W = ctx.canvas.width, H = ctx.canvas.height;
    ctx.save();

    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, W, H);

    // Panel height scales with row count so 4-row layouts don't crowd.
    const n  = this._rows.length;
    const pw = 420;
    const ph = 180 + n * 50;
    const px = W / 2 - pw / 2, py = H / 2 - ph / 2 - 16;
    ctx.fillStyle = '#111827'; ctx.fillRect(px, py, pw, ph);
    ctx.strokeStyle = '#374151'; ctx.lineWidth = 2; ctx.strokeRect(px, py, pw, ph);

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 40px monospace';
    ctx.fillText('PAUSED', W / 2, py + 44);

    ctx.strokeStyle = '#374151'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px + 20, py + 72); ctx.lineTo(px + pw - 20, py + 72); ctx.stroke();

    const muted = Engine.audio.isMuted();
    const vol   = Math.round(Engine.audio.getVolume() * 10);
    const volStr = muted ? 'AUDIO  [MUTED]' : 'AUDIO  [' + '|'.repeat(vol) + ' '.repeat(10 - vol) + '] ' + vol + '/10';

    for (let i = 0; i < n; i++) {
      const row = this._rows[i];
      const ry  = py + 106 + i * 50, sel = i === this._cursor;
      if (sel) { ctx.fillStyle = 'rgba(241,196,15,0.10)'; ctx.fillRect(px + 12, ry - 20, pw - 24, 40); }
      ctx.fillStyle = sel ? '#f1c40f' : '#9ca3af';
      ctx.font      = sel ? 'bold 20px monospace' : '18px monospace';
      const label = row.kind === 'volume' ? volStr : row.label;
      ctx.fillText(label, W / 2, ry);
    }

    ctx.fillStyle = '#4b5563'; ctx.font = '11px monospace';
    ctx.fillText('UP/DOWN navigate   LEFT/RIGHT volume   M mute   ESC resume', W / 2, py + ph - 16);
    ctx.restore();
  }
}

// ============================================================================
// games/drift/encounters/sources.js
// ============================================================================
//
// Build-ready ink encounter sources for Drift v1.
//
// Contains the raw .ink source for each encounter as a JavaScript string
// constant. The canonical authoring source is the matching .ink file in the
// same directory. If you edit a .ink file directly, update the corresponding
// string in DRIFT_ENCOUNTER_SOURCES below to keep them in sync.
//
// Included in the build before match.js so that DRIFT_ENCOUNTER_SOURCES is
// defined when DriftMatchScene references it.
//
// ==========================================================================
// AUTHORING GUIDE — Adding or editing encounters
// ==========================================================================
//
// Each encounter is a self-contained ink story. The game sets ink variables
// before running the story, and the story calls EXTERNAL functions to apply
// outcomes to the game state. Variable values set by the game override the
// defaults declared with VAR in the ink source.
//
// Standard variables (always declared with VAR; set by the game via setVar
// before calling continue() for the first time on each encounter):
//
//   crew_in_helm     — active crew count in the Helm room
//   crew_in_weapons  — active crew count in the Weapons room
//   crew_in_shields  — active crew count in the Shields room
//   crew_in_medical  — active crew count in the Medical Bay
//   crew_in_engines  — active crew count in the Engines room
//   hull             — current hull integrity (integer 0–10)
//   crew_total       — total active crew count
//
// External functions (bound by the game; callable from ink with ~):
//
//   damage_hull(amount)    — reduces hull by amount (integer)
//   heal_hull(amount)      — restores hull by amount (capped at max 10)
//   lose_crew(room_name)   — incapacitates a crew member in that room.
//                            Pass the room id string: "helm", "weapons",
//                            "shields", "medical", or "engines".
//                            If the named room is empty, the game picks
//                            from the nearest occupied room instead.
//   gain_crew()            — adds one crew member to the Medical Bay.
//
// Ink syntax quick reference:
//
//   VAR x = 0                     declare a variable (set defaults here;
//                                 game overrides via setVar before running)
//   EXTERNAL fn(arg)              declare an external function
//   ~ fn(value)                   call an external function
//   ~ x = 5                       assign a variable inline
//   { x >= 2: text | other }      inline conditional
//   { x >= 2:                     block conditional (multi-branch)
//       text A
//   - x == 1:
//       text B
//   - else:
//       text C
//   }
//   * [Choice label]              player choice (label in buttons, NOT
//                                 echoed into the story output)
//     text shown after choosing
//   -> END                        end the story
//   // comment                    ink comment (not shown to the player)
//   and / or / not                logical operators (use these, not &&)
//
// Adding a new encounter:
//   1. Write the .ink file under games/drift/encounters/.
//   2. Add an entry to DRIFT_ENCOUNTER_SOURCES in this file.
//   3. Add the entry to the correct position in the array (sectors are
//      0-indexed; position in the array = sector index).
//   4. Reassemble build/drift.html and upload.
//
// ============================================================================

const DRIFT_ENCOUNTER_SOURCES = [

  // --------------------------------------------------------------------------
  // Sector 0 — Nebula Storm
  // No player choice. crew_in_shields determines outcome.
  // --------------------------------------------------------------------------
  {
    id:     'nebula-storm',
    label:  'Sable Drift Nebula',
    source: `
VAR crew_in_helm = 0
VAR crew_in_weapons = 0
VAR crew_in_shields = 0
VAR crew_in_medical = 0
VAR crew_in_engines = 0
VAR hull = 10
VAR crew_total = 4

EXTERNAL damage_hull(amount)

The Sable Drift nebula was not on the charts.

It materialises across the viewport like a slow bruise — violet and deep amber, beautiful in the way pressure is beautiful just before something gives. The ship's sensors flag ionised particle density at three times safe threshold. Your deflectors have seconds.

{ crew_in_shields >= 1:
    The Shields room responds. Deflectors climb to full, bleeding off the particle surge in a cascade of blue-white light along the hull. You pass through with nothing worse than a good story.

    Beyond the nebula, open space. The sensors clear.
    -> END
- else:
    No one answers from Shields. The deflectors stay cold.

    The nebula hits the hull like static amplified to violence. Lights flicker. Something in the starboard section groans. You make it through — barely — but the ship remembers.

    ~ damage_hull(2)

    Beyond the nebula, open space. The sensors clear, indifferent to what they cost you.
    -> END

`,

  // --------------------------------------------------------------------------

VAR crew_in_medical = 0
VAR crew_in_engines = 0
VAR hull = 10
VAR crew_total = 4

EXTERNAL gain_crew()

The signal is faint and old — a standard distress pulse running on a loop that has probably been broadcasting longer than anyone intended.

Long-range scan resolves the source: a battered hauler, the Yelena's Wake, drifting in a debris field four minutes off your heading. One life sign. Fading.

You have a window.

* [Alter course. Investigate the beacon.]
    You bring the ship around. Four minutes at sustained burn.

    { crew_in_engines >= 1:
        The Engines room runs it clean — steady thrust, efficient correction. The Yelena's Wake comes alongside without drama.

    }

  },

The hail comes in on an unencrypted channel, which is either careless or a deliberate insult.

"Unregistered vessel. You are transiting Consolidated interest space without a clearance bond. Standard bond is one crew transfer or equivalent. Comply and you will not be boarded. Resist and we will take what we came for anyway."

The sender's transponder reads: the Consolidated Salvage Compact. Pirates with a branding budget.

    - else:

After everything — the nebula, the Compact, the Corridor — the station transponder is exactly where the charts said it would be. It answers your approach ping on the first try.

"Unregistered vessel, this is Threshold Station. You are cleared for docking bay seven. Welcome to the Rim."

{ hull >= 8 and crew_total >= 3:

// ============================================================================
// games/drift/scenes/menu.js
// ============================================================================
//
// DriftMenuScene — Title screen for Drift.
//
// Renders a static star field, title, flavor text, and a begin button.
// Transitions to DriftMatchScene on click.
//
// Depends on: Engine.Scene, Engine.audio, Engine.input
// Registered in: scenes/_registry.md
//
// ============================================================================

class DriftMenuScene extends Engine.Scene {
  constructor(game) {
    super();
    this._game      = game;
    this._btnRect   = null;
    this._prevLeft  = false;
    this._prevHover = false;
    this._stars     = [];
  }

  enter() {
    Engine.audio.register('blip',    'blipSelect');
    Engine.audio.register('confirm', 'powerUp');

    // Static star field generated once at scene entry.
    const W = this._game.canvas.width;
    const H = this._game.canvas.height;
    this._stars = [];
    for (let i = 0; i < 140; i++) {
      this._stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.random() < 0.12 ? 1.5 : 0.8,
        a: 0.25 + Math.random() * 0.75,
      });
    }
  }

  exit() {}

  update(dt) {
    super.update(dt);
    const m  = Engine.input.mouse;
    const br = this._btnRect;
    if (!br) return;

    const hover = m.x >= br.x && m.x <= br.x + br.w &&
                  m.y >= br.y && m.y <= br.y + br.h;

    if (hover && !this._prevHover) Engine.audio.play('blip');
    this._prevHover = hover;

    if (hover && m.left && !this._prevLeft) {
      Engine.audio.play('confirm');
      this._game.setScene(new DriftMatchScene(this._game));
    }
    this._prevLeft = m.left;
  }

  draw(ctx) {
    const W = ctx.canvas.width;
    const H = ctx.canvas.height;

    // Background
    ctx.fillStyle = '#08080f';
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (const s of this._stars) {
      ctx.globalAlpha = s.a;
      ctx.fillStyle   = '#c8d0ff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Title
    const titleSize = Math.max(48, Math.floor(H * 0.14));
    ctx.fillStyle    = '#d0d8ff';
    ctx.font         = `bold ${titleSize}px monospace`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('DRIFT', W / 2, H * 0.30);

    // Subtitle
    const subSize = Math.max(12, Math.floor(H * 0.034));
    ctx.fillStyle = '#505075';
    ctx.font      = `${subSize}px monospace`;
    ctx.fillText('survive the crossing', W / 2, H * 0.43);

    // Begin button
    const bw = Math.max(160, Math.floor(W * 0.22));
    const bh = Math.max(36,  Math.floor(H * 0.07));
    const bx = Math.floor(W / 2 - bw / 2);
    const by = Math.floor(H * 0.56);
    this._btnRect = { x: bx, y: by, w: bw, h: bh };

    const hover = Engine.input.mouse.x >= bx && Engine.input.mouse.x <= bx + bw &&
                  Engine.input.mouse.y >= by && Engine.input.mouse.y <= by + bh;

    ctx.fillStyle   = hover ? '#282870' : '#141440';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = hover ? '#8080d0' : '#383870';
    ctx.lineWidth   = 1;
    ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);

    const btnSize = Math.max(12, Math.floor(H * 0.036));
    ctx.fillStyle    = hover ? '#e0e8ff' : '#8888b8';
    ctx.font         = `${btnSize}px monospace`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('BEGIN CROSSING', W / 2, by + bh / 2);

    // Mission summary
    const noteSize = Math.max(10, Math.floor(H * 0.026));
    ctx.fillStyle = '#2a2a42';
    ctx.font      = `${noteSize}px monospace`;
    ctx.fillText('five sectors  ·  four crew  ·  ten hull', W / 2, H * 0.77);

    super.draw(ctx);
  }
}

// ============================================================================
// games/drift/scenes/match.js
// ============================================================================
//
// DriftMatchScene — Primary gameplay scene for Drift.
//
// Layout is fully parametric: all pixel coordinates are computed from canvas
// dimensions at enter(), so the same drawing code serves both regular
// (landscape 900x600) and compact (portrait 540x900) orientations.
//
// State machine: 'traveling' | 'encounter_active'
// Win / loss transition to DriftGameOverScene via a one-frame deferred scene
// swap (_pendingScene) so the final state renders before transitioning.
//
// Crew AI is deferred. In v1 crew are static display elements; outcomes from
// encounter externals (lose_crew, gain_crew) update status immediately.
// See _redistributeCrew() stub for where the AI session's output lands.
//
// Depends on: Engine.Scene, Engine.audio, Engine.input, Engine.Narrative,
//             PauseOverlay, DRIFT_ENCOUNTER_SOURCES (encounters/sources.js)
// Registered in: scenes/_registry.md
//
// ============================================================================

// ----------------------------------------------------------------------------
// Layout builders
// All drawing code reads exclusively from the layout object returned here.
// ----------------------------------------------------------------------------

function _driftBuildLayout(canvas) {
  const W = canvas.width, H = canvas.height;
  return H > W ? _driftLayoutCompact(W, H) : _driftLayoutRegular(W, H);
}

function _driftLayoutRegular(W, H) {
  const sx = Math.floor(W * 0.63);
  return {
    isCompact:      false,
    shipPanel:      { x: 0,  y: 0, w: sx,     h: H },
    encounterPanel: { x: sx, y: 0, w: W - sx, h: H },
    ..._driftShipHorizontal(sx, H),
  };
}

function _driftLayoutCompact(W, H) {
  const sy = Math.floor(H * 0.40);
  return {
    isCompact:      true,
    shipPanel:      { x: 0, y: 0,  w: W, h: sy     },
    encounterPanel: { x: 0, y: sy, w: W, h: H - sy },
    ..._driftShipVertical(W, sy),
  };
}

// Rooms left-to-right: Helm (nose) → Engines (tail).
function _driftShipHorizontal(pw, ph) {
  const IDS    = ['helm','weapons','shields','medical','engines'];
  const LABELS = ['HELM','WEAPONS','SHIELDS','MED BAY','ENGINES'];
  const RW = 78, RH = 112, HW = 16, PAD = 12, CR = 9;
  const bw = IDS.length * RW + (IDS.length - 1) * HW + PAD * 2;
  const bh = RH + PAD * 2;
  const bx = Math.floor((pw - bw) / 2);
  const by = Math.floor(ph / 2 - bh / 2) + 8;
  const rooms = [], halls = [];
  for (let i = 0; i < IDS.length; i++) {
    const rx = bx + PAD + i * (RW + HW), ry = by + PAD;
    rooms.push({ id: IDS[i], label: LABELS[i], rect: { x: rx, y: ry, w: RW, h: RH },
      crewSlots: [{ x: rx + Math.floor(RW*.28), y: ry + Math.floor(RH*.64) },
                  { x: rx + Math.floor(RW*.72), y: ry + Math.floor(RH*.64) }] });
    if (i < IDS.length - 1)
      halls.push({ x: rx + RW, y: ry + Math.floor(RH*.28), w: HW, h: Math.floor(RH*.44) });
  }
  return { bodyRect: { x: bx, y: by, w: bw, h: bh }, rooms, hallways: halls,
    hullBar: { x: bx, y: by - 32, w: bw, h: 18 },
    sectorStrip: { x: bx, y: by + bh + 12, w: bw, h: 20 }, crewRadius: CR };
}

// Rooms top-to-bottom: Helm (nose/top) → Engines (tail/bottom).
function _driftShipVertical(pw, ph) {
  const IDS    = ['helm','weapons','shields','medical','engines'];
  const LABELS = ['HELM','WEAPONS','SHIELDS','MED BAY','ENGINES'];
  const RW = 110, RH = 50, HH = 12, PAD = 10, CR = 8;
  const bw = RW + PAD * 2;
  const bh = IDS.length * RH + (IDS.length - 1) * HH + PAD * 2;
  const bx = Math.floor((pw - bw) / 2);
  const by = Math.floor((ph - bh) / 2) + 12;
  const rooms = [], halls = [];
  for (let i = 0; i < IDS.length; i++) {
    const rx = bx + PAD, ry = by + PAD + i * (RH + HH);
    rooms.push({ id: IDS[i], label: LABELS[i], rect: { x: rx, y: ry, w: RW, h: RH },
      crewSlots: [{ x: rx + Math.floor(RW*.30), y: ry + Math.floor(RH*.62) },
                  { x: rx + Math.floor(RW*.70), y: ry + Math.floor(RH*.62) }] });
    if (i < IDS.length - 1)
      halls.push({ x: rx + Math.floor(RW*.28), y: ry + RH, w: Math.floor(RW*.44), h: HH });
  }
  return { bodyRect: { x: bx, y: by, w: bw, h: bh }, rooms, hallways: halls,
    hullBar: { x: bx, y: by - 26, w: bw, h: 16 },
    sectorStrip: { x: bx, y: by + bh + 8, w: bw, h: 16 }, crewRadius: CR };
}

// ----------------------------------------------------------------------------
// DriftMatchScene
// ----------------------------------------------------------------------------

class DriftMatchScene extends Engine.Scene {
  constructor(game) {
    super();
    this._game   = game;
    this._layout = null;
    this._pause  = null;

    this._hull       = 10;
    this._maxHull    = 10;
    this._totalSectors     = 5;
    this._sectorsCompleted = 0;

    // Crew: one per room except Medical Bay starts empty.
    this._crew = [
      { id: 0, color: '#e05858', roomId: 'helm',    status: 'active' },
      { id: 1, color: '#50d878', roomId: 'weapons', status: 'active' },
      { id: 2, color: '#5090e0', roomId: 'shields', status: 'active' },
      { id: 3, color: '#e0c050', roomId: 'engines', status: 'active' },
    ];

    this._matchState     = 'traveling';
    this._travelTimer    = 0;
    this._travelDuration = 5;

    // Encounter state
    this._narrative      = null;
    this._encLines       = [];
    this._encChoices     = [];
    this._encPhase       = null; // 'reading' | 'choosing' | 'done'
    this._encOutcomes    = [];
    this._encLabel       = '';
    this._choicePrevLeft = false;
    this._choiceHoverIdx = -1;
    this._continueHover  = false;

    this._pendingScene = null;
  }

  enter() {
    this._layout = _driftBuildLayout(this._game.canvas);
    this._pause  = new PauseOverlay(this._game, {
      onQuit: () => this._game.setScene(new DriftMenuScene(this._game)),
    });
    Engine.audio.register('blip',     'blipSelect');
    Engine.audio.register('confirm',  'powerUp');
    Engine.audio.register('damage',   'hitHurt');
    Engine.audio.register('alert',    'laserShoot');
    Engine.audio.register('progress', 'pickupCoin');
  }

  exit() { this._narrative = null; }

  // --------------------------------------------------------------------------
  // Update
  // --------------------------------------------------------------------------

  update(dt) {
    super.update(dt);
    this._pause.update(dt);
    if (this._pause.isPaused()) return;
    if (this._pendingScene) {
      const next = this._pendingScene;
      this._pendingScene = null;
      this._game.setScene(next);
      return;
    }
    if (this._matchState === 'traveling')        this._updateTravel(dt);
    else if (this._matchState === 'encounter_active') this._updateEncounter();
  }

  _updateTravel(dt) {
    this._travelTimer += dt;
    if (this._travelTimer >= this._travelDuration) {
      this._travelTimer = 0;
      this._startEncounter(this._sectorsCompleted);
    }
  }

  // --------------------------------------------------------------------------
  // Encounter lifecycle
  // --------------------------------------------------------------------------

  _startEncounter(idx) {
    const enc = DRIFT_ENCOUNTER_SOURCES[idx];
    if (!enc) return;
    Engine.audio.play('alert');

    this._encLabel    = enc.label;
    this._encLines    = [];
    this._encChoices  = [];
    this._encPhase    = 'reading';
    this._encOutcomes = [];

    this._narrative = new Engine.Narrative(enc.source);

    // Bind all four externals defensively regardless of what this story declares.
    this._narrative.bindExternal('damage_hull', (n) => {
      this._encOutcomes.push({ type: 'damage_hull', amount: n });
    });
    this._narrative.bindExternal('heal_hull', (n) => {
      this._encOutcomes.push({ type: 'heal_hull', amount: n });
    });
    this._narrative.bindExternal('lose_crew', (room) => {
      this._encOutcomes.push({ type: 'lose_crew', roomName: room });
    });
    this._narrative.bindExternal('gain_crew', () => {
      this._encOutcomes.push({ type: 'gain_crew' });
    });

    this._narrative.setVar('crew_in_helm',    this._crewCountIn('helm'));
    this._narrative.setVar('crew_in_weapons', this._crewCountIn('weapons'));
    this._narrative.setVar('crew_in_shields', this._crewCountIn('shields'));
    this._narrative.setVar('crew_in_medical', this._crewCountIn('medical'));
    this._narrative.setVar('crew_in_engines', this._crewCountIn('engines'));
    this._narrative.setVar('hull',            this._hull);
    this._narrative.setVar('crew_total',      this._activeCrewCount());

    this._matchState = 'encounter_active';
    this._advanceNarrative();
  }

  _advanceNarrative() {
    if (!this._narrative) return;
    const lines = this._narrative.continue();
    for (const l of lines) {
      const t = (l.text || '').trim();
      if (t) this._encLines.push(t);
    }
    const choices = this._narrative.getChoices();
    if (choices.length > 0) {
      this._encChoices = choices;
      this._encPhase   = 'choosing';
    } else if (this._narrative.hasEnded) {
      this._encChoices = [];
      this._encPhase   = 'done';
    } else {
      // Ink has more content without a choice gate — continue automatically.
      this._advanceNarrative();
    }
  }

  _resolveEncounter() {
    let tookDamage = false;
    for (const o of this._encOutcomes) {
      if (o.type === 'damage_hull') {
        this._hull = Math.max(0, this._hull - o.amount);
        tookDamage = true;
      } else if (o.type === 'heal_hull') {
        this._hull = Math.min(this._maxHull, this._hull + o.amount);
      } else if (o.type === 'lose_crew') {
        this._loseCrewInRoom(o.roomName);
      } else if (o.type === 'gain_crew') {
        this._gainCrew();
      }
    }
    if (tookDamage) Engine.audio.play('damage');

    this._sectorsCompleted++;
    this._narrative   = null;
    this._encOutcomes = [];

    // ---- CREW AI STUB -------------------------------------------------------
    // Replace with the crew-autonomy AI session's output when implemented.
    // Should inspect room assignments and move crew to critical vacancies.
    // this._redistributeCrew();
    // ---- END STUB -----------------------------------------------------------

    if (this._hull <= 0) {
      this._pendingScene = new DriftGameOverScene(
        this._game, 'loss_hull', this._hull, this._activeCrewCount());
      this._matchState = 'traveling';
      return;
    }
    if (this._activeCrewCount() <= 0) {
      this._pendingScene = new DriftGameOverScene(
        this._game, 'loss_crew', this._hull, 0);
      this._matchState = 'traveling';
      return;
    }
    if (this._sectorsCompleted >= this._totalSectors) {
      Engine.audio.play('progress');
      this._pendingScene = new DriftGameOverScene(
        this._game, 'win', this._hull, this._activeCrewCount());
      this._matchState = 'traveling';
      return;
    }
    Engine.audio.play('progress');
    this._matchState = 'traveling';
  }

  // --------------------------------------------------------------------------
  // Encounter input
  // --------------------------------------------------------------------------

  _updateEncounter() {
    const m    = Engine.input.mouse;
    const ep   = this._layout.encounterPanel;
    const left = m.left;

    if (this._encPhase === 'choosing') {
      const rects    = this._choiceButtonRects(ep);
      let newHoverIdx = -1;
      for (let i = 0; i < rects.length; i++) {
        const br  = rects[i];
        const hit = m.x >= br.x && m.x <= br.x + br.w &&
                    m.y >= br.y && m.y <= br.y + br.h;
        if (hit) {
          newHoverIdx = i;
          if (left && !this._choicePrevLeft) {
            Engine.audio.play('confirm');
            this._narrative.choose(this._encChoices[i].index);
            this._encChoices = []; this._encPhase = 'reading';
            this._choiceHoverIdx = -1;
            this._advanceNarrative();
            this._choicePrevLeft = left;
            return;
          }
        }
      }
      if (newHoverIdx !== this._choiceHoverIdx) {
        if (newHoverIdx >= 0) Engine.audio.play('blip');
        this._choiceHoverIdx = newHoverIdx;
      }

    } else if (this._encPhase === 'done') {
      const br  = this._continueButtonRect(ep);
      const hit = m.x >= br.x && m.x <= br.x + br.w &&
                  m.y >= br.y && m.y <= br.y + br.h;
      if (hit && !this._continueHover) Engine.audio.play('blip');
      this._continueHover = hit;
      if (hit && left && !this._choicePrevLeft) {
        Engine.audio.play('confirm');
        this._resolveEncounter();
      }
    }
    this._choicePrevLeft = left;
  }

  // --------------------------------------------------------------------------
  // Crew helpers
  // --------------------------------------------------------------------------

  _crewCountIn(roomId) {
    return this._crew.filter(c => c.status === 'active' && c.roomId === roomId).length;
  }

  _activeCrewCount() {
    return this._crew.filter(c => c.status === 'active').length;
  }

  // Incapacitates one active crew member in roomName, falling back to the
  // nearest occupied room if that room is empty.
  _loseCrewInRoom(roomName) {
    let t = this._crew.find(c => c.status === 'active' && c.roomId === roomName);
    if (!t) {
      for (const id of ['weapons','shields','helm','engines','medical']) {
        t = this._crew.find(c => c.status === 'active' && c.roomId === id);
        if (t) break;
      }
    }
    if (t) t.status = 'incapacitated';
  }

  // Adds a crew member to Medical Bay, capped at 8 total.
  _gainCrew() {
    if (this._crew.length >= 8) return;
    const EXTRA = ['#e058a0','#a050e0','#50d0d0','#d08050'];
    this._crew.push({
      id: this._crew.length,
      color: EXTRA[(this._crew.length - 4) % EXTRA.length],
      roomId: 'medical', status: 'active',
    });
  }

  // --------------------------------------------------------------------------
  // Draw
  // --------------------------------------------------------------------------

  draw(ctx) {
    ctx.fillStyle = '#08080f';
    ctx.fillRect(0, 0, ctx.canvas.width, ctx.canvas.height);
    this._drawShipPanel(ctx);
    this._drawEncounterPanel(ctx);
    this._drawPanelDivider(ctx);
    this._pause.draw(ctx);
    super.draw(ctx);
  }

  _drawPanelDivider(ctx) {
    const ep = this._layout.encounterPanel;
    ctx.strokeStyle = '#1e1e38'; ctx.lineWidth = 1;
    ctx.beginPath();
    if (this._layout.isCompact) {
      ctx.moveTo(0, ep.y + 0.5); ctx.lineTo(ctx.canvas.width, ep.y + 0.5);
    } else {
      ctx.moveTo(ep.x + 0.5, 0); ctx.lineTo(ep.x + 0.5, ctx.canvas.height);
    }
    ctx.stroke();
  }

  _drawShipPanel(ctx) {
    const layout = this._layout;
    this._drawHullBar(ctx, layout);
    this._drawShipBody(ctx, layout);
    this._drawSectorStrip(ctx, layout);
    if (this._matchState === 'encounter_active') {
      const sp = layout.shipPanel;
      ctx.fillStyle = 'rgba(0,0,8,0.38)';
      ctx.fillRect(sp.x, sp.y, sp.w, sp.h);
    }
  }

  _drawHullBar(ctx, layout) {
    const bar   = layout.hullBar;
    const COUNT = this._maxHull;
    const lblW  = Math.floor(bar.w * 0.10);
    const fs    = Math.max(8, Math.floor(bar.h * 0.70));
    ctx.font = `${fs}px monospace`;
    ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#383858';
    ctx.fillText('HULL', bar.x, bar.y + bar.h / 2);
    const px0  = bar.x + lblW;
    const avail = bar.w - lblW;
    const GAP  = 2;
    const pw   = Math.floor((avail - GAP * (COUNT - 1)) / COUNT);
    const ratio = this._hull / this._maxHull;
    for (let i = 0; i < COUNT; i++) {
      const filled = i < this._hull;
      ctx.fillStyle = !filled ? '#151525'
        : ratio > 0.6 ? '#40d060'
        : ratio > 0.3 ? '#d0b040'
        : '#d04040';
      ctx.fillRect(px0 + i * (pw + GAP), bar.y, pw, bar.h);
    }
  }

  _drawShipBody(ctx, layout) {
    const body = layout.bodyRect;
    ctx.fillStyle = '#10102a';
    ctx.fillRect(body.x, body.y, body.w, body.h);
    ctx.strokeStyle = '#252550'; ctx.lineWidth = 1;
    ctx.strokeRect(body.x + .5, body.y + .5, body.w - 1, body.h - 1);

    for (const hall of layout.hallways) {
      ctx.fillStyle = '#0c0c20';
      ctx.fillRect(hall.x, hall.y, hall.w, hall.h);
      ctx.strokeStyle = '#202045'; ctx.lineWidth = 1;
      ctx.strokeRect(hall.x + .5, hall.y + .5, hall.w - 1, hall.h - 1);
    }

    for (const room of layout.rooms) {
      const r = room.rect;
      ctx.fillStyle = '#0d0d22';
      ctx.fillRect(r.x, r.y, r.w, r.h);
      ctx.strokeStyle = '#2a2a58'; ctx.lineWidth = 1;
      ctx.strokeRect(r.x + .5, r.y + .5, r.w - 1, r.h - 1);
      const fs = Math.max(7, Math.floor(r.h * 0.13));
      ctx.fillStyle = '#404068'; ctx.font = `${fs}px monospace`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.fillText(room.label, r.x + r.w / 2, r.y + Math.floor(r.h * 0.09));
    }
    this._drawCrew(ctx, layout);
  }

  _drawCrew(ctx, layout) {
    const R       = layout.crewRadius;
    const roomMap = Object.fromEntries(layout.rooms.map(r => [r.id, r]));
    const placed  = Object.fromEntries(layout.rooms.map(r => [r.id, 0]));
    for (const crew of this._crew) {
      if (crew.status !== 'active') continue;
      const room = roomMap[crew.roomId];
      if (!room) continue;
      const slot = room.crewSlots[placed[crew.roomId]++ % room.crewSlots.length];
      ctx.beginPath();
      ctx.arc(slot.x, slot.y, R, 0, Math.PI * 2);
      ctx.fillStyle = crew.color; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.18)'; ctx.lineWidth = 1; ctx.stroke();
    }
  }

  _drawSectorStrip(ctx, layout) {
    const strip = layout.sectorStrip;
    const fs    = Math.max(8, Math.floor(strip.h * 0.75));
    ctx.font = `${fs}px monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const mx = strip.x + strip.w / 2, my = strip.y + strip.h / 2;
    if (this._matchState === 'traveling') {
      const prog = Math.min(1, this._travelTimer / this._travelDuration);
      ctx.fillStyle = '#101025'; ctx.fillRect(strip.x, strip.y, strip.w, strip.h);
      ctx.fillStyle = '#1a1a3a'; ctx.fillRect(strip.x, strip.y, Math.floor(strip.w * prog), strip.h);
      ctx.fillStyle = '#383858';
      ctx.fillText(`SECTOR ${this._sectorsCompleted + 1} OF ${this._totalSectors}  \u00b7  TRANSIT`, mx, my);
    } else {
      ctx.fillStyle = '#180d2a'; ctx.fillRect(strip.x, strip.y, strip.w, strip.h);
      ctx.fillStyle = '#583878';
      ctx.fillText(`SECTOR ${this._sectorsCompleted + 1} OF ${this._totalSectors}  \u00b7  ENCOUNTER`, mx, my);
    }
  }

  // --------------------------------------------------------------------------
  // Encounter panel
  // --------------------------------------------------------------------------

  _drawEncounterPanel(ctx) {
    const ep = this._layout.encounterPanel;
    ctx.fillStyle = '#090915';
    ctx.fillRect(ep.x, ep.y, ep.w, ep.h);
    if (this._matchState === 'traveling') this._drawTravelStatus(ctx, ep);
    else                                   this._drawEncounterContent(ctx, ep);
  }

  _drawTravelStatus(ctx, ep) {
    const cx = ep.x + ep.w / 2, cy = ep.y + ep.h / 2;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.font = `${Math.max(10, Math.floor(ep.h * 0.055))}px monospace`;
    ctx.fillStyle = '#282848';
    ctx.fillText(`SECTOR ${this._sectorsCompleted + 1} OF ${this._totalSectors}`, cx, cy - ep.h * 0.07);
    ctx.font = `${Math.max(9, Math.floor(ep.h * 0.038))}px monospace`;
    ctx.fillStyle = '#1e1e38';
    ctx.fillText('TRANSIT  \u00b7  SYSTEMS NOMINAL', cx, cy + ep.h * 0.04);
    const prog = Math.min(1, this._travelTimer / this._travelDuration);
    const N = 5, DR = 3, DG = 14;
    const sx = cx - ((N - 1) * DG) / 2, dy = cy + ep.h * 0.14;
    for (let i = 0; i < N; i++) {
      ctx.beginPath();
      ctx.arc(sx + i * DG, dy, DR, 0, Math.PI * 2);
      ctx.fillStyle = i < Math.floor(prog * N) ? '#383870' : '#141428';
      ctx.fill();
    }
  }

  _drawEncounterContent(ctx, ep) {
    const PAD   = Math.max(10, Math.floor(ep.w * 0.07));
    const textX = ep.x + PAD;
    const textW = ep.w - PAD * 2;

    // Label
    const lfs = Math.max(9, Math.floor(ep.h * 0.040));
    ctx.font = `${lfs}px monospace`;
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';
    ctx.fillStyle = '#505078';
    ctx.fillText(this._encLabel.toUpperCase(), textX, ep.y + PAD);

    // Separator
    const sepY = ep.y + PAD + lfs + 6;
    ctx.strokeStyle = '#1c1c38'; ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(ep.x + PAD, sepY); ctx.lineTo(ep.x + ep.w - PAD, sepY);
    ctx.stroke();

    // Narrative text
    const textTop  = sepY + 8;
    const textBot  = ep.y + ep.h - this._bottomReserve(ep);
    const linefs   = Math.max(9, Math.floor(ep.h * 0.034));
    const lineH    = Math.floor(linefs * 1.60);
    const maxLines = Math.floor((textBot - textTop) / lineH);
    ctx.font = `${linefs}px monospace`;
    ctx.fillStyle = '#9898b8';
    ctx.textAlign = 'left'; ctx.textBaseline = 'top';

    const allWrapped = [];
    for (const raw of this._encLines)
      for (const wl of this._wrapLine(raw, textW, ctx)) allWrapped.push(wl);
    const visible = allWrapped.slice(-maxLines);
    for (let i = 0; i < visible.length; i++)
      ctx.fillText(visible[i], textX, textTop + i * lineH);

    if (this._encPhase === 'choosing') this._drawChoiceButtons(ctx, ep);
    else if (this._encPhase === 'done') this._drawContinueButton(ctx, ep);
  }

  _bottomReserve(ep) { return Math.max(72, Math.floor(ep.h * 0.28)); }

  _choiceButtonRects(ep) {
    const n = this._encChoices.length;
    if (!n) return [];
    const reserve = this._bottomReserve(ep);
    const PAD     = Math.max(8, Math.floor(ep.w * 0.07));
    const top     = ep.y + ep.h - reserve + 6;
    const bw      = ep.w - PAD * 2;
    const bh      = Math.max(26, Math.floor((reserve - 12) / n) - 4);
    return this._encChoices.map((_, i) => ({
      x: ep.x + PAD, y: top + i * (bh + 4), w: bw, h: bh,
    }));
  }

  _continueButtonRect(ep) {
    const reserve = this._bottomReserve(ep);
    const PAD     = Math.max(8, Math.floor(ep.w * 0.07));
    const bw      = ep.w - PAD * 2;
    const bh      = Math.max(26, Math.floor(reserve * 0.44));
    const top     = ep.y + ep.h - reserve + Math.floor((reserve - bh) / 2);
    return { x: ep.x + PAD, y: top, w: bw, h: bh };
  }

  _drawChoiceButtons(ctx, ep) {
    const rects = this._choiceButtonRects(ep);
    const fs    = Math.max(9, Math.floor(ep.h * 0.032));
    ctx.font = `${fs}px monospace`;
    for (let i = 0; i < rects.length; i++) {
      const br    = rects[i];
      const hover = this._choiceHoverIdx === i;
      ctx.fillStyle = hover ? '#1e1e60' : '#0e0e38';
      ctx.fillRect(br.x, br.y, br.w, br.h);
      ctx.strokeStyle = hover ? '#5858c0' : '#282858'; ctx.lineWidth = 1;
      ctx.strokeRect(br.x + .5, br.y + .5, br.w - 1, br.h - 1);
      ctx.fillStyle = hover ? '#c8d0ff' : '#707090';
      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      const label = this._encChoices[i] ? this._encChoices[i].text : '';
      ctx.fillText(label, br.x + 8, br.y + br.h / 2);
    }
  }

  _drawContinueButton(ctx, ep) {
    const br    = this._continueButtonRect(ep);
    const hover = this._continueHover;
    ctx.fillStyle = hover ? '#282870' : '#14143a';
    ctx.fillRect(br.x, br.y, br.w, br.h);
    ctx.strokeStyle = hover ? '#8080d0' : '#383870'; ctx.lineWidth = 1;
    ctx.strokeRect(br.x + .5, br.y + .5, br.w - 1, br.h - 1);
    const fs = Math.max(9, Math.floor(ep.h * 0.036));
    ctx.font = `${fs}px monospace`;
    ctx.fillStyle = hover ? '#e0e8ff' : '#8888b8';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('[ CONTINUE ]', br.x + br.w / 2, br.y + br.h / 2);
  }

  // Simple word-wrap. Splits text into lines not exceeding maxW pixels.
  // Font must be set on ctx before calling (used for measureText).
  _wrapLine(text, maxW, ctx) {
    const words = text.split(' ');
    const lines = [];
    let cur = '';
    for (const w of words) {
      const test = cur ? `${cur} ${w}` : w;
      if (ctx.measureText(test).width > maxW && cur) { lines.push(cur); cur = w; }
      else cur = test;
    }
    if (cur) lines.push(cur);
    return lines.length ? lines : [''];
  }
}

/* ==== games/drift/scenes/game-over.js ==== */
// ============================================================================
// games/drift/scenes/game-over.js
// ============================================================================
//
// DriftGameOverScene — Win or loss screen shown at the end of a run.
//
// Constructor args:
//   game       — the Engine.Game instance
//   outcome    — 'win' | 'loss_hull' | 'loss_crew'
//   finalHull  — hull integrity at run end (integer 0–10)
//   finalCrew  — active crew count at run end (integer 0–8)
//
// Depends on: Engine.Scene, Engine.audio, Engine.input
// Registered in: scenes/_registry.md
//
// ============================================================================

class DriftGameOverScene extends Engine.Scene {
  constructor(game, outcome, finalHull, finalCrew) {
    super();
    this._game      = game;
    this._outcome   = outcome;   // 'win' | 'loss_hull' | 'loss_crew'
    this._hull      = finalHull;
    this._crew      = finalCrew;
    this._btnRect   = null;
    this._prevLeft  = false;
    this._prevHover = false;
  }

  enter() {
    Engine.audio.register('blip',    'blipSelect');
    Engine.audio.register('confirm', 'powerUp');
  }

  exit() {}

  update(dt) {
    super.update(dt);
    const m  = Engine.input.mouse;
    const br = this._btnRect;
    if (!br) return;

    const hover = m.x >= br.x && m.x <= br.x + br.w &&
                  m.y >= br.y && m.y <= br.y + br.h;

    if (hover && !this._prevHover) Engine.audio.play('blip');
    this._prevHover = hover;

    if (hover && m.left && !this._prevLeft) {
      Engine.audio.play('confirm');
      this._game.setScene(new DriftMenuScene(this._game));
    }
    this._prevLeft = m.left;
  }

  draw(ctx) {
    const W   = ctx.canvas.width;
    const H   = ctx.canvas.height;
    const win = this._outcome === 'win';

    // Background
    ctx.fillStyle = '#08080f';
    ctx.fillRect(0, 0, W, H);

    // Outcome header
    const headSize = Math.max(28, Math.floor(H * 0.09));
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.font         = `bold ${headSize}px monospace`;

    if (win) {
      ctx.fillStyle = '#48c870';
      ctx.fillText('THRESHOLD REACHED', W / 2, H * 0.27);
    } else {
      ctx.fillStyle = '#c84040';
      const msg = this._outcome === 'loss_crew' ? 'NO CREW REMAINING' : 'HULL BREACH';
      ctx.fillText(msg, W / 2, H * 0.27);
    }

    // Final stats
    const statSize = Math.max(12, Math.floor(H * 0.036));
    ctx.font      = `${statSize}px monospace`;
    ctx.fillStyle = '#606075';
    ctx.fillText(`hull integrity  ${this._hull} / 10`, W / 2, H * 0.44);
    ctx.fillText(`crew remaining  ${this._crew} / 4`,  W / 2, H * 0.52);

    // Flavor line
    const flavorSize = Math.max(10, Math.floor(H * 0.026));
    ctx.font      = `${flavorSize}px monospace`;
    ctx.fillStyle = '#303045';
    const flavor  = win
      ? 'the Rim remembers those who arrive'
      : 'the crossing does not forgive every mistake';
    ctx.fillText(flavor, W / 2, H * 0.62);

    // Return button
    const bw = Math.max(160, Math.floor(W * 0.26));
    const bh = Math.max(36,  Math.floor(H * 0.07));
    const bx = Math.floor(W / 2 - bw / 2);
    const by = Math.floor(H * 0.72);
    this._btnRect = { x: bx, y: by, w: bw, h: bh };

    const hover = Engine.input.mouse.x >= bx && Engine.input.mouse.x <= bx + bw &&
                  Engine.input.mouse.y >= by && Engine.input.mouse.y <= by + bh;

    ctx.fillStyle   = hover ? '#282870' : '#141440';
    ctx.fillRect(bx, by, bw, bh);
    ctx.strokeStyle = hover ? '#8080d0' : '#383870';
    ctx.lineWidth   = 1;
    ctx.strokeRect(bx + 0.5, by + 0.5, bw - 1, bh - 1);

    const btnSize    = Math.max(12, Math.floor(H * 0.036));
    ctx.font         = `${btnSize}px monospace`;
    ctx.fillStyle    = hover ? '#e0e8ff' : '#8888b8';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('RETURN TO MENU', W / 2, by + bh / 2);

    super.draw(ctx);
  }
}

bootstrapGame({ canvasId: 'game', gameName: 'drift', presets: { regular: { w: 900, h: 600 }, compact: { w: 540, h: 900 } }, initialScene: (g) => new DriftMenuScene(g), suppressContextMenu: false });
</script>
