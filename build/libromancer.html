Params.prototype.random = function () {

/*** Simpler namespaced functional API ***/

};

sfxr.toWebAudio = function(synthdef, audiocontext) {
  var sfx = new SoundEffect(synthdef);
  var buffer = sfx.getRawBuffer()["normalized"];
  if (audiocontext) {
    var buff = audiocontext.createBuffer(1, buffer.length, sfx.sampleRate);
    var nowBuffering = buff.getChannelData(0);
    for (var i = 0; i < buffer.length; i++) {
      nowBuffering[i] = buffer[i];
    }
    var proc = audiocontext.createBufferSource();
    proc.buffer = buff;
    return proc;
  }

  return (new SoundEffect(synthdef)).generate();
};

    } else {
      var val = (decoded[offset] | (decoded[offset + 1] << 8) | (decoded[offset + 2] << 16) | (decoded[offset + 3] << 24));

sfxr.generate = function(algorithm, options) {

/*** Main entry point ***/

function SoundEffect(ps) {
  if (typeof(ps) == "string") {
    var PARAMS = new Params();
    if (ps.indexOf("#") == 0) {
      ps = ps.slice(1);
    }
    ps = PARAMS.fromB58(ps);
  }
  this.init(ps);
}

SoundEffect.prototype.init = function (ps) {
  this.parameters = ps;
  this.initForRepeat();  // First time through, this is a bit of a misnomer

  // Waveform shape
  this.waveShape = parseInt(ps.wave_type);

  // Filter
  this.fltw = Math.pow(ps.p_lpf_freq, 3) * 0.1;
  this.enableLowPassFilter = (ps.p_lpf_freq != 1);
  this.fltw_d = 1 + ps.p_lpf_ramp * 0.0001;
  this.fltdmp = 5 / (1 + Math.pow(ps.p_lpf_resonance, 2) * 20) *
    (0.01 + this.fltw);
  if (this.fltdmp > 0.8) this.fltdmp=0.8;
  this.flthp = Math.pow(ps.p_hpf_freq, 2) * 0.1;
  this.flthp_d = 1 + ps.p_hpf_ramp * 0.0003;

  // Vibrato
  this.vibratoSpeed = Math.pow(ps.p_vib_speed, 2) * 0.01;
  this.vibratoAmplitude = ps.p_vib_strength * 0.5;

  // Envelope
  this.envelopeLength = [
    Math.floor(ps.p_env_attack * ps.p_env_attack * 100000),
    Math.floor(ps.p_env_sustain * ps.p_env_sustain * 100000),
    Math.floor(ps.p_env_decay * ps.p_env_decay * 100000)
  ];
  this.envelopePunch = ps.p_env_punch;

  // Flanger
  this.flangerOffset = Math.pow(ps.p_pha_offset, 2) * 1020;
  if (ps.p_pha_offset < 0) this.flangerOffset = -this.flangerOffset;
  this.flangerOffsetSlide = Math.pow(ps.p_pha_ramp, 2) * 1;
  if (ps.p_pha_ramp < 0) this.flangerOffsetSlide = -this.flangerOffsetSlide;

  // Repeat
  this.repeatTime = Math.floor(Math.pow(1 - ps.p_repeat_speed, 2) * 20000
                               + 32);
  if (ps.p_repeat_speed === 0)
    this.repeatTime = 0;

  this.gain = Math.exp(ps.sound_vol) - 1;

  this.sampleRate = ps.sample_rate;
  this.bitsPerChannel = ps.sample_size;
}

SoundEffect.prototype.initForRepeat = function() {
  var ps = this.parameters;
  this.elapsedSinceRepeat = 0;

  this.period = 100 / (ps.p_base_freq * ps.p_base_freq + 0.001);
  this.periodMax = 100 / (ps.p_freq_limit * ps.p_freq_limit + 0.001);
  this.enableFrequencyCutoff = (ps.p_freq_limit > 0);
  this.periodMult = 1 - Math.pow(ps.p_freq_ramp, 3) * 0.01;
  this.periodMultSlide = -Math.pow(ps.p_freq_dramp, 3) * 0.000001;

  this.dutyCycle = 0.5 - ps.p_duty * 0.5;
  this.dutyCycleSlide = -ps.p_duty_ramp * 0.00005;

  if (ps.p_arp_mod >= 0)
    this.arpeggioMultiplier = 1 - Math.pow(ps.p_arp_mod, 2) * .9;
  else
    this.arpeggioMultiplier = 1 + Math.pow(ps.p_arp_mod, 2) * 10;
  this.arpeggioTime = Math.floor(Math.pow(1 - ps.p_arp_speed, 2) * 20000 + 32);
  if (ps.p_arp_speed === 1)
    this.arpeggioTime = 0;
}

SoundEffect.prototype.getRawBuffer = function () {
  var fltp = 0;
  var fltdp = 0;
  var fltphp = 0;

  var noise_buffer = Array(32);
  for (var i = 0; i < 32; ++i)
    noise_buffer[i] = Math.random() * 2 - 1;

  var envelopeStage = 0;
  var envelopeElapsed = 0;

  var vibratoPhase = 0;

  var phase = 0;
  var ipp = 0;
  var flanger_buffer = Array(1024);
  for (var i = 0; i < 1024; ++i)
    flanger_buffer[i] = 0;

  var num_clipped = 0;

  var buffer = [];
  var normalized = [];

  var sample_sum = 0;
  var num_summed = 0;
  var summands = Math.floor(44100 / this.sampleRate);

  for(var t = 0; ; ++t) {

    // Repeats
    if (this.repeatTime != 0 && ++this.elapsedSinceRepeat >= this.repeatTime)
      this.initForRepeat();

    // Arpeggio (single)
    if(this.arpeggioTime != 0 && t >= this.arpeggioTime) {
      this.arpeggioTime = 0;
      this.period *= this.arpeggioMultiplier;
    }

    // Frequency slide, and frequency slide slide!
    this.periodMult += this.periodMultSlide;
    this.period *= this.periodMult;
    if(this.period > this.periodMax) {
      this.period = this.periodMax;
      if (this.enableFrequencyCutoff)
        break;
    }

    // Vibrato
    var rfperiod = this.period;
    if (this.vibratoAmplitude > 0) {
      vibratoPhase += this.vibratoSpeed;
      rfperiod = this.period * (1 + Math.sin(vibratoPhase) * this.vibratoAmplitude);
    }
    var iperiod = Math.floor(rfperiod);
    if (iperiod < OVERSAMPLING) iperiod = OVERSAMPLING;

    // Square wave duty cycle
    this.dutyCycle += this.dutyCycleSlide;
    if (this.dutyCycle < 0) this.dutyCycle = 0;
    if (this.dutyCycle > 0.5) this.dutyCycle = 0.5;

    // Volume envelope
    if (++envelopeElapsed > this.envelopeLength[envelopeStage]) {
      envelopeElapsed = 0;
      if (++envelopeStage > 2)
        break;
    }
    var env_vol;
    var envf = envelopeElapsed / this.envelopeLength[envelopeStage];
    if (envelopeStage === 0) {         // Attack
      env_vol = envf;
    } else if (envelopeStage === 1) {  // Sustain
      env_vol = 1 + (1 - envf) * 2 * this.envelopePunch;
    } else {                           // Decay
      env_vol = 1 - envf;
    }

    // Flanger step
    this.flangerOffset += this.flangerOffsetSlide;
    var iphase = Math.abs(Math.floor(this.flangerOffset));
    if (iphase > 1023) iphase = 1023;

    if (this.flthp_d != 0) {
      this.flthp *= this.flthp_d;
      if (this.flthp < 0.00001)
        this.flthp = 0.00001;
      if (this.flthp > 0.1)
        this.flthp = 0.1;
    }

    // 8x oversampling
    var sample = 0;
    for (var si = 0; si < OVERSAMPLING; ++si) {
      var sub_sample = 0;
      phase++;
      if (phase >= iperiod) {
        phase %= iperiod;
        if (this.waveShape === NOISE)
          for(var i = 0; i < 32; ++i)
            noise_buffer[i] = Math.random() * 2 - 1;
      }

      // Base waveform
      var fp = phase / iperiod;
      if (this.waveShape === SQUARE) {
        if (fp < this.dutyCycle)
          sub_sample=0.5;
        else
          sub_sample=-0.5;
      } else if (this.waveShape === SAWTOOTH) {
        if (fp < this.dutyCycle)
          sub_sample = -1 + 2 * fp/this.dutyCycle;
        else
          sub_sample = 1 - 2 * (fp-this.dutyCycle)/(1-this.dutyCycle);
      } else if (this.waveShape === SINE) {
        sub_sample = Math.sin(fp * 2 * Math.PI);
      } else if (this.waveShape === NOISE) {
        sub_sample = noise_buffer[Math.floor(phase * 32 / iperiod)];
      } else {
        throw "ERROR: Bad wave type: " + this.waveShape;
      }

      // Low-pass filter
      var pp = fltp;
      this.fltw *= this.fltw_d;
      if (this.fltw < 0) this.fltw = 0;
      if (this.fltw > 0.1) this.fltw = 0.1;
      if (this.enableLowPassFilter) {
        fltdp += (sub_sample - fltp) * this.fltw;
        fltdp -= fltdp * this.fltdmp;
      } else {
        fltp = sub_sample;
        fltdp = 0;
      }
      fltp += fltdp;

      // High-pass filter
      fltphp += fltp - pp;
      fltphp -= fltphp * this.flthp;
      sub_sample = fltphp;

      // Flanger
      flanger_buffer[ipp & 1023] = sub_sample;
      sub_sample += flanger_buffer[(ipp - iphase + 1024) & 1023];
      ipp = (ipp + 1) & 1023;

      // final accumulation and envelope application
      sample += sub_sample * env_vol;
    }

    // Accumulate samples appropriately for sample rate
    sample_sum += sample;
    if (++num_summed >= summands) {
      num_summed = 0;
      sample = sample_sum / summands;
      sample_sum = 0;
    } else {
      continue;
    }

    sample = sample / OVERSAMPLING * masterVolume;
    sample *= this.gain;

    // store the original normalized floating point sample
    normalized.push(sample);

    if (this.bitsPerChannel === 8) {
      // Rescale [-1, 1) to [0, 256)
      sample = Math.floor((sample + 1) * 128);
      if (sample > 255) {
        sample = 255;
        ++num_clipped;
      } else if (sample < 0) {
        sample = 0;
        ++num_clipped;
      }
      buffer.push(sample);
    } else {
      // Rescale [-1, 1) to [-32768, 32768)
      sample = Math.floor(sample * (1<<15));
      if (sample >= (1<<15)) {
        sample = (1 << 15)-1;
        ++num_clipped;
      } else if (sample < -(1<<15)) {
        sample = -(1 << 15);
        ++num_clipped;
      }
      buffer.push(sample & 0xFF);
      buffer.push((sample >> 8) & 0xFF);
    }
  }
  
  return {
    "buffer": buffer,
    "normalized": normalized,
    "clipped": num_clipped,
  }
}

SoundEffect.prototype.generate = function() {
  var rendered = this.getRawBuffer();
  var wave = new RIFFWAVE();
  wave.header.sampleRate = this.sampleRate;
  wave.header.bitsPerSample = this.bitsPerChannel;
  wave.Make(rendered.buffer);
  wave.clipping = rendered.clipped;
  wave.buffer = rendered.normalized;
  wave.getAudio = _sfxr_getAudioFn(wave);
  return wave;
}

var _actx = null;
var _sfxr_getAudioFn = function(wave) {
  return function() {
    // check for procedural audio
    var actx = null;
    if (!_actx) {
      if ('AudioContext' in window) {
        _actx = new AudioContext();
      } else if ('webkitAudioContext' in window) {
        _actx = new webkitAudioContext();
      }
    }
    actx = _actx;
    
    if (actx) {
      var buff = actx.createBuffer(1, wave.buffer.length, wave.header.sampleRate);
      var nowBuffering = buff.getChannelData(0);
      for (var i=0;i<wave.buffer.length;i++) {
        nowBuffering[i] = wave.buffer[i];
      }
      var volume = 1.0;
      var obj = {
        "channels": [],
        "setVolume": function(v) { volume = v; return obj; },
        "play": function() {
          var proc = actx.createBufferSource();
          proc.buffer = buff;
          var gainNode = actx.createGain()
          gainNode.gain.value = volume;
          gainNode.connect(actx.destination)
          proc.connect(gainNode);
          if (proc["start"]) {
            proc.start();
          } else if (proc["noteOn"]) {
            proc.noteOn(0);
          }
          this.channels.push(proc);
          return proc;
        }
      };
      return obj;
    } else {
      var audio = new Audio();
      audio.src = wave.dataURI;
      return audio;
    }
  };
};

// engine/signal-bus.js
// Global pub/sub for decoupled engine and game events.
// Depends on: nothing.
// Used by: any module that needs to emit or listen for named events.

var Engine = Engine || {};

class SignalBus {
  constructor() {
    this._listeners = new Map();
  }

  /** Fire a named signal with an optional payload. */
  emit(name, payload) {
    const handlers = this._listeners.get(name);
    if (!handlers) return;
    // Snapshot so handlers that unregister during dispatch do not corrupt iteration.
    for (const handler of [...handlers]) {
      handler(payload);
    }
  }

  /** Register a listener for a named signal. Returns an unregister function. */
  on(name, handler) {
    if (!this._listeners.has(name)) {
      this._listeners.set(name, new Set());
    }
    this._listeners.get(name).add(handler);
    return () => this.off(name, handler);
  }

  /** Remove a listener for a named signal. */
  off(name, handler) {
    const handlers = this._listeners.get(name);
    if (!handlers) return;
    handlers.delete(handler);
    if (handlers.size === 0) {
      this._listeners.delete(name);
    }
  }
}

// engine/input.js
// Latched keyboard and mouse state, queried per frame by the active scene.
// Depends on: nothing (uses DOM APIs directly).
// Used by: scripts and scenes that need to read user input. The Game class
// constructs the singleton instance and assigns it to Engine.input.

var Engine = Engine || {};

class Input {
  constructor(canvas = null) {
    this._down = new Set();          // keys currently held down
    this._justPressed = new Set();   // keys pressed this frame
    this._justReleased = new Set();  // keys released this frame
    this._pendingPressed = new Set();
    this._pendingReleased = new Set();

    this.mouse = {
      x: 0,
      y: 0,
      left: false,
      right: false
    };

    this._canvas = canvas;

    window.addEventListener('keydown', (e) => {
      if (!this._down.has(e.key)) {
        this._pendingPressed.add(e.key);
      }
      this._down.add(e.key);
    });

    window.addEventListener('keyup', (e) => {
      if (this._down.has(e.key)) {
        this._pendingReleased.add(e.key);
      }
      this._down.delete(e.key);
    });

    // Mouse coordinates are computed relative to the canvas if one was provided,
    // accounting for any CSS scaling between the canvas's display size and its drawing buffer.
    const moveTarget = canvas || window;
    moveTarget.addEventListener('mousemove', (e) => {
      if (canvas) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        this.mouse.x = (e.clientX - rect.left) * scaleX;
        this.mouse.y = (e.clientY - rect.top) * scaleY;
      } else {
        this.mouse.x = e.clientX;
        this.mouse.y = e.clientY;
      }
    });

    // Mousedown attaches to the canvas (or window fallback). Mouseup attaches to window
    // so a button held outside the canvas still releases properly.
    const downTarget = canvas || window;
    downTarget.addEventListener('mousedown', (e) => {
      if (e.button === 0) this.mouse.left = true;
      if (e.button === 2) this.mouse.right = true;
    });
    window.addEventListener('mouseup', (e) => {
      if (e.button === 0) this.mouse.left = false;
      if (e.button === 2) this.mouse.right = false;
    });
  }

  isDown(key) {
    return this._down.has(key);
  }

  /** True only on the frame the key transitioned from up to down. */
  wasJustPressed(key) {
    return this._justPressed.has(key);
  }

  /** True only on the frame the key transitioned from down to up. */
  wasJustReleased(key) {
    return this._justReleased.has(key);
  }

  /** Called once per frame by Game. Advances "just pressed/released" tracking. */
  update() {
    this._justPressed = this._pendingPressed;
    this._justReleased = this._pendingReleased;
    this._pendingPressed = new Set();
    this._pendingReleased = new Set();
  }
}

// engine/game-object.js
// Transform host. Owns a list of attached Scripts and delegates lifecycle to them.
// Depends on: Script (only as a contract; not a hard import).
// Used by: Scene, which contains GameObjects; game code, which instantiates them.

    this.scripts.push(script);

  update(dt) {
    for (const s of this.scripts) {

// engine/scene.js
// Owns a collection of GameObjects, provides lifecycle hooks, applies per-object
// transforms during draw, and runs a pairwise AABB collision pass after object updates.
// Depends on: GameObject, Collider scripts (only by duck-typing the isCollider marker).
// Used by: Game, which holds the active scene; game code, which subclasses Scene to define each scene.

  constructor() {
    this.objects = [];
  }

  /** Called by Game when this scene becomes active. Subclasses populate the scene here. */
  enter() {}

  /** Called by Game when this scene is being replaced. Subclasses tear down here. */
  exit() {}

  /** Add a GameObject to the scene. Returns the object for chaining. */
  add(obj) {
    this.objects.push(obj);
    return obj;
  }

  /** Remove a GameObject from the scene. */
  remove(obj) {
    const i = this.objects.indexOf(obj);
    if (i !== -1) this.objects.splice(i, 1);
  }

  /** Iterate GameObjects, update each, then run the collision pass.
   *  Subclasses may override but should call super.update(dt). */
  update(dt) {
    // Snapshot so objects added or removed during update do not corrupt iteration.
    for (const obj of [...this.objects]) {
      obj.update(dt);
    }
    this._collisionPass();
  }

  /** Iterate GameObjects, apply each transform, draw each. Subclasses may override but
   * should call super.draw(ctx) to retain default per-object rendering. */
  draw(ctx) {
    for (const obj of this.objects) {
      ctx.save();
      ctx.translate(obj.x, obj.y);
      ctx.rotate(obj.rotation);
      ctx.scale(obj.scale, obj.scale);
      obj.draw(ctx);
      ctx.restore();
    }
  }

  /** Find all Collider scripts (duck-typed via isCollider) and run pairwise AABB checks.
   *  Each colliding pair invokes a.onCollide(b) and b.onCollide(a) once per frame.
   *  Broad-phase is O(N^2). Acceptable for hobby-scale games (N < 20 or so).
   *  When a game outgrows this, spatial partitioning can replace this method. */
  _collisionPass() {
    const colliders = [];
    for (const obj of this.objects) {
      for (const s of obj.scripts) {
        if (s.isCollider) {
          colliders.push(s);
        }
      }
    }
    for (let i = 0; i < colliders.length; i++) {
      const a = colliders[i];
      const aBox = a.getAabb();
      for (let j = i + 1; j < colliders.length; j++) {
        const b = colliders[j];
        const bBox = b.getAabb();
        if (aBox.x < bBox.x + bBox.w && aBox.x + aBox.w > bBox.x &&
            aBox.y < bBox.y + bBox.h && aBox.y + aBox.h > bBox.y) {
          a.onCollide(b);
          b.onCollide(a);
        }
      }
    }
  }
}

      console.warn(`Engine.storage.save: refusing to save undefined for key '${key}'. Use clear(key) instead.`);
      return false;
    }

    try {
      serialized = JSON.stringify(value);
    } catch (e) {
      console.warn(`Engine.storage.save: cannot serialize value for key '${key}':`, e);
      return false;

      this._fallback.set(fk, serialized);
      return true;

      window.localStorage.setItem(fk, serialized);

    } else {
      raw = window.localStorage.getItem(fk);

      if (!this._prefix) { out.push(k); continue; }

    let dt = (now - this._lastFrameTime) / 1000;
    if (dt > 0.1) dt = 0.1; // clamp to avoid huge jumps after tab inactivity or breakpoints
    this._lastFrameTime = now;

    // Apply pending scene transition before any per-frame work.
    if (this._pendingScene) {
      if (this.currentScene) this.currentScene.exit();
      this.currentScene = this._pendingScene;
      this._pendingScene = null;
      this.currentScene.enter();
    }

    // Advance input "just pressed/released" tracking before scene reads it.
    Engine.input.update();

    if (this.currentScene) {
      this.currentScene.update(dt);
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      this.currentScene.draw(this.ctx);
    }

    this._animationHandle = requestAnimationFrame((t) => this._frame(t));
  }
}

Engine.Game = Game;

// engine/narrative.js
// ============================================================================

// ============================================================================
// engine/narrative.js
// ============================================================================
//
// Engine.Narrative is a thin wrapper around an inkjs Story, exposing a small
// JS-side surface for game scenes to drive branching narrative content
// authored in inkle's ink scripting language.
//
// Depends on:
//   inkjs (global). Must be loaded before any Engine.Narrative instance is
//   constructed. Vendored at engine/lib/inkjs.js but, per ADR-0018,
//   intentionally NOT included in engine/engine.bundle.js because it is
//   large (~250 KB) and game-specific. Games that use narrative include the
//   vendored library separately in their build, before the engine bundle.
//
// Depended on by:
//   Per-game encounter scripts and scenes that drive ink content. No other
//   engine module depends on Narrative.
//
// Usage:
//   const n = new Engine.Narrative(inkSourceString);
//   n.bindExternal('start_combat', (enemyId) => { ... });
//   n.observe('scrap', (value) => updateHud(value));
//   n.setVar('hull', ship.hull);
//   const lines = n.continue();        // [{text, tags}, ...]
//   const choices = n.getChoices();    // [{index, text, tags}, ...]
//   n.choose(0);
//   if (n.hasEnded) { ... }
// ============================================================================

var Engine = Engine || {};

class Narrative {
  constructor(source, options = {}) {
    if (typeof inkjs === 'undefined') {
      throw new Error(
        'Engine.Narrative requires inkjs to be loaded. Include ' +
        'engine/lib/inkjs.js before the engine bundle in your build. See ADR-0018.'
      );
    }
    if (options.compiled) {
      this._story = new inkjs.Story(source);
    } else {
      this._story = new inkjs.Compiler(source).Compile();
    }
  }

  // Advance the story, collecting every line emitted until the next choice
  // point or story end. Returns an array of { text, tags } objects.
  continue() {
    const lines = [];
    while (this._story.canContinue) {
      const raw = this._story.Continue();
      const text = (typeof raw === 'string' ? raw : '').replace(/\n$/, '');
      const tags = this._story.currentTags ? [...this._story.currentTags] : [];
      lines.push({ text, tags });
    }
    return lines;
  }

  // Available choices at the current story point, or [] if none.
  getChoices() {
    return this._story.currentChoices.map((c) => ({
      index: c.index,
      text: c.text,
      tags: c.tags ? [...c.tags] : []
    }));
  }

  // Select a choice by its index. After this, the story is ready for another
  // continue() call.
  choose(index) {
    this._story.ChooseChoiceIndex(index);
  }

  // Read an ink variable by name. Returns undefined if not declared.
  getVar(name) {
    return this._story.variablesState[name];
  }

  // Write an ink variable. The variable must be declared in the ink source
  // (with VAR) for the write to have effect.
  setVar(name, value) {
    this._story.variablesState[name] = value;
  }

  // Bind a JS function that ink can invoke via an EXTERNAL declaration.
  // The ink script must declare it as: EXTERNAL fn_name(arg1, arg2)
  bindExternal(name, fn) {
    this._story.BindExternalFunction(name, fn);
  }

  // Register a callback that fires when the named ink variable changes.
  // The callback is invoked with the new value.
  observe(name, fn) {
    this._story.ObserveVariable(name, (_varName, value) => fn(value));
  }

  // Jump to a named knot or stitch. Path is a dot-separated string like
  // 'sector_one' or 'sector_one.shop_intro'.
  goTo(path) {
    this._story.ChoosePathString(path);
  }

  // Serialize narrative state to a JSON string suitable for storing via
  // Engine.storage alongside other game state.
  saveState() {
    return this._story.state.toJson();
  }

  // Restore state from a JSON string previously returned by saveState().
  loadState(json) {
    this._story.state.LoadJson(json);
  }

  // True when the story has nothing more to emit and offers no choices.
  get hasEnded() {
    return !this._story.canContinue && this._story.currentChoices.length === 0;
  }

  // Underlying inkjs Story instance. Exposed for advanced uses where the
  // wrapper methods do not cover the required operation.
  get story() {
    return this._story;
  }
}

Engine.Narrative = Narrative;

// ============================================================================
// engine/balance.js
// ============================================================================
// Tunable balance primitives: parameterized difficulty curves and cost
// scaling. Pure, stateless functions under Engine.Balance. Default constants
// follow the values supported by docs/resources/balance.md (see ADR-0020).
//
// Depends on: nothing (pure math).
// Depended on by: game-specific scripts/scenes that ramp difficulty or price
//   upgrades. NOT used by the engine core; opt-in per game.
// ============================================================================

var Engine = Engine || {};

const Balance = {
  // --- Difficulty curves ----------------------------------------------------
  // difficulty(t, opts): difficulty/intensity as a function of progress t.
  // t is caller-defined (elapsed seconds, wave index, level, etc).
  // opts.type selects the family; default 'logistic' (slow start, steep
  // middle, bounded plateau), the general-purpose pacing curve.
  // For logistic, set opts.t0 to the progress midpoint; the default of 0
  // is structural only (it places you at L/2 at t=0).
  difficulty(t, opts = {}) {
    const type = opts.type || 'logistic';
    switch (type) {
      case 'linear':       // d0 + m*t
        return (opts.d0 ?? 0) + (opts.m ?? 1) * t;
      case 'exponential':  // d0 * r^t
        return (opts.d0 ?? 1) * Math.pow(opts.r ?? 1.1, t);
      case 'logarithmic':  // d0 + k*ln(1+t); rises to a soft max then flattens
        return (opts.d0 ?? 0) + (opts.k ?? 1) * Math.log(1 + t);
      case 'logistic':     // L / (1 + e^(-k*(t - t0)))
        return (opts.L ?? 1) / (1 + Math.exp(-(opts.k ?? 1) * (t - (opts.t0 ?? 0))));
      default:
        throw new Error(`Engine.Balance.difficulty: unknown curve type '${type}'`);
    }
  },

  // --- Cost scaling ---------------------------------------------------------
  // cost(n, opts): price of a purchase when you already own n units, base*rate^n.
  // So the first unit (n=0) costs base. rate in [1.07, 1.15] is the documented
  // band; default 1.10. Use ~1.15 for short sessions, ~1.07 for long-haul games.
  cost(n, opts = {}) {
    return (opts.base ?? 1) * Math.pow(opts.rate ?? 1.1, n);
  },

  // bulkCost(owned, count, opts): closed-form total to buy `count` units from
  // `owned`. Exact for fixed rate; replaces a loop.
  bulkCost(owned, count, opts = {}) {
    const base = opts.base ?? 1;
    const rate = opts.rate ?? 1.1;
    if (count <= 0) return 0;
    if (rate === 1) return base * count;
    return base * (Math.pow(rate, owned) * (Math.pow(rate, count) - 1)) / (rate - 1);
  },

  // maxAffordable(owned, currency, opts): how many units `currency` buys from
  // `owned`. Closed-form inverse of bulkCost.
  maxAffordable(owned, currency, opts = {}) {
    const base = opts.base ?? 1;
    const rate = opts.rate ?? 1.1;
    if (currency <= 0) return 0;
    if (rate === 1) return Math.floor(currency / base);
    const n = Math.log((currency * (rate - 1)) / (base * Math.pow(rate, owned)) + 1) / Math.log(rate);
    return Math.max(0, Math.floor(n));
  }
};

Engine.Balance = Balance;


// ============================================================================
// engine/prng.js
// ============================================================================

// ============================================================================
// engine/prng.js
// ============================================================================
//
// Engine.PRNG: seeded pseudo-random number generator.
//
// Algorithm: SFC32 (Small Fast Counting) by Chris Doty-Humphrey. 128-bit
// state (four 32-bit words); period ≥ 2^64; passes PractRand at 32 TB.
// String seeds are hashed to a 128-bit initial state by cyrb128 (bryc, CC0).
// See ADR-0026.
//
// Depends on: nothing.
// Depended on by: game scripts and scenes that need deterministic randomness
//   (procedural levels, daily seeds, replay systems). Not used by the engine
//   core; opt-in per game.
//
// Usage:
//   const rng = new Engine.PRNG('level-1');
//   rng.float()              // [0, 1), like Math.random()
//   rng.int(1, 6)            // integer in [1, 6] inclusive
//   rng.pick(['a','b','c'])  // random element from array
//   rng.shuffle(array)       // Fisher-Yates in place, returns array
// ============================================================================

var Engine = Engine || {};

class PRNG {
  constructor(seed) {
    let a, b, c, d;
    if (typeof seed === 'string') {
      [a, b, c, d] = PRNG._cyrb128(seed);
    } else {
      // Expand a single 32-bit integer to four words via a LCG.
      a = seed >>> 0;
      b = (a * 1664525 + 1013904223) >>> 0;
      c = (b * 1664525 + 1013904223) >>> 0;
      d = 1;
    }
    this._a = a; this._b = b; this._c = c; this._d = d;
    // Discard first 15 outputs so low-entropy seeds (e.g. 0) reach a
    // well-mixed state before callers draw values.
    for (let i = 0; i < 15; i++) this._step();
  }

  // [0, 1) float, the Math.random() analogue.
  float() {
    return (this._step() >>> 0) / 0x100000000;
  }

  // Integer in [min, max] inclusive.
  int(min, max) {
    return min + (this._step() % (max - min + 1));
  }

  // Random element from array. Throws if array is empty.
  pick(arr) {
    if (!arr.length) throw new Error('Engine.PRNG.pick: empty array');
    return arr[this._step() % arr.length];
  }

  // Fisher-Yates shuffle in place. Returns the same array.
  shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = this._step() % (i + 1);
      const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  // SFC32 step: updates state and returns a 32-bit unsigned integer.
  _step() {
    const t = (this._a + this._b + this._d++) >>> 0;
    this._a = (this._b ^ (this._b >>> 9)) >>> 0;
    this._b = (this._c + (this._c << 3)) >>> 0;
    this._c = ((this._c << 21) | (this._c >>> 11)) >>> 0;
    this._c = (this._c + t) >>> 0;
    return t;
  }

  // cyrb128 by bryc (CC0). Hashes a string to four 32-bit seed words.
  static _cyrb128(str) {
    let h1 = 1779033703, h2 = 3144134277, h3 = 1013904242, h4 = 2773480762;
    for (let i = 0; i < str.length; i++) {
      const k = str.charCodeAt(i);
      h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
      h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
      h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
      h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
    }
    h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
    h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
    h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
    h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
    h1 ^= (h2 ^ h3 ^ h4); h2 ^= h1; h3 ^= h1; h4 ^= h1;
    return [h1 >>> 0, h2 >>> 0, h3 >>> 0, h4 >>> 0];
  }
}

Engine.PRNG = PRNG;

/* ==== scripts/bootstrap.js ==== */
// ============================================================================
// scripts/bootstrap.js
// ============================================================================
//
// bootstrapGame(options) - canonical game bootstrap helper.
//
// Consolidates the boilerplate that every build/<game>.html's <script> tail
// currently repeats: viewport-aware canvas sizing per ADR-0017, touch
// capability detection, optional context-menu suppression (for right-click
// games), Engine.Game construction with optional gameName for namespaced
// storage, initial scene set via a factory, and game start.
//
// Depends on:
//   Engine.Game (engine/game.js). The engine bundle must be loaded before
//   this script in the build concatenation order.
//
// Depended on by:
//   Game build bootstrap snippets. Replaces the inline IIFE that previously
//   appeared at the end of each build/<game>.html. Adoption is per-build:
//   existing builds continue to work with their inline bootstrap until each
//   is naturally regenerated. Drift v1 is the planned first build to adopt
//   the helper from the start; existing games migrate when next touched.
//
// Usage (Minesweeper-style, current inline form for comparison):
//   (function () {
//     const canvas = document.getElementById('game');
//     const preset = { w: 900, h: 600 };
//     canvas.width = preset.w; canvas.height = preset.h;
//     // fitToViewport, resize listener, canvas.oncontextmenu, etc.
//     const game = new Engine.Game(canvas, { gameName: 'minesweeper' });
//     game.setScene(new MinesweeperMenuScene(game));
//     game.start();
//   })();
//
// Equivalent with bootstrapGame:
//   bootstrapGame({
//     gameName: 'minesweeper',
//     presets: { regular: { w: 900, h: 600 } },
//     initialScene: function (game) { return new MinesweeperMenuScene(game); },
//     suppressContextMenu: true,
//   });
//
// Options:
//   canvasId          string. ID of canvas element. Default 'game'.
//   canvas            DOM element. Overrides canvasId if both provided.
//   gameName          string. Passed to Engine.Game for storage namespacing.
//                     Default '' (no namespace).
//   presets           { regular: {w, h}, compact?: {w, h} }. Required.
//                     If compact is omitted, regular is always used (the
//                     intentional letterbox-on-portrait path per ADR-0017).
//   initialScene      (game) => Scene. Factory required because the Game
//                     instance must exist before the initial Scene's
//                     constructor argument can be passed.
//   suppressContextMenu  bool. Default false. true disables the canvas's
//                     right-click context menu (for games that read
//                     Engine.input.mouse.right; see Minesweeper).
//
// Returns:
//   { game, preset, presetName, isTouch }
//     game         the constructed Engine.Game (already started)
//     preset       the chosen preset object { w, h }
//     presetName   'regular' or 'compact'
//     isTouch      bool. true if touch capability detected per ADR-0017.
//                  Scenes can use this to enlarge hit-target minimums.
//
// Throws if the canvas element is not found, presets.regular is missing, or
// initialScene is not a function. Errors are explicit and actionable.
//
// Preset selection:
//   When both regular and compact are defined, picks whichever aspect ratio
//   is closer (in log space) to the current viewport's. This matches the
//   reference snippet in docs/ARCHITECTURE.md "Logical canvas and viewport
//   bootstrap" and ADR-0017.
// ============================================================================

function bootstrapGame(options) {
  const opts = options || {};

  const canvas = opts.canvas || document.getElementById(opts.canvasId || 'game');
  if (!canvas || typeof canvas.getContext !== 'function') {
    throw new Error(
      "bootstrapGame: canvas element not found (looked for id '" +
      (opts.canvasId || 'game') + "'). Pass options.canvas or options.canvasId."
    );
  }

  const presets = opts.presets;
  if (!presets || !presets.regular) {
    throw new Error('bootstrapGame: options.presets.regular is required (e.g. { regular: { w: 900, h: 600 } }).');
  }

  if (typeof opts.initialScene !== 'function') {
    throw new Error('bootstrapGame: options.initialScene must be a factory function (game) => sceneInstance.');
  }

  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  function pickPreset() {
    if (!presets.compact) return { name: 'regular', preset: presets.regular };
    const va = window.innerWidth / window.innerHeight;
    const ra = presets.regular.w / presets.regular.h;
    const ca = presets.compact.w / presets.compact.h;
    const useCompact = Math.abs(Math.log(va / ca)) < Math.abs(Math.log(va / ra));
    return useCompact
      ? { name: 'compact', preset: presets.compact }
      : { name: 'regular', preset: presets.regular };
  }

  const chosen = pickPreset();
  const preset = chosen.preset;
  canvas.width = preset.w;
  canvas.height = preset.h;

  function fitToViewport() {
    const s = Math.min(window.innerWidth / preset.w, window.innerHeight / preset.h);
    canvas.style.width = (preset.w * s) + 'px';
    canvas.style.height = (preset.h * s) + 'px';
  }
  fitToViewport();
  window.addEventListener('resize', fitToViewport);

  if (opts.suppressContextMenu) {
    canvas.oncontextmenu = function (e) { e.preventDefault(); };
  }

  const game = new Engine.Game(canvas, { gameName: opts.gameName || '' });
  game.setScene(opts.initialScene(game));
  game.start();

  return { game: game, preset: preset, presetName: chosen.name, isTouch: isTouch };
}

/* ==== scripts/pause-overlay.js ==== */
// scripts/pause-overlay.js
// Reusable pause overlay utility. Not a Script subclass -- a plain class that
// any scene owns and delegates to. Lives in scripts/ as the closest available
// folder; a utils/ folder may be warranted if more non-Script utilities appear.
//
// Usage in a scene:
//   this._pause = new PauseOverlay(game, {
//     onRestart: () => game.setScene(new MatchScene(game)),  // optional
//     onQuit:    () => game.setScene(new Menu(game)),        // optional
//   });
//   In update(dt): this._pause.update(dt); if (this._pause.isPaused()) return;
//   In draw(ctx): /* game draw */ this._pause.draw(ctx); // last, on top
//
// ESC toggles pause. Row layout (rows present only if their callback is provided):
//   RESUME
//   AUDIO    (volume + mute)
//   RESTART  (only if onRestart)
//   QUIT     (only if onQuit)
//
// Controls when paused:
//   Up/Down       navigate rows
//   Left/Right    adjust volume when on AUDIO row
//   M             toggle mute when on AUDIO row
//   Space/Enter   activate selected row
//   Escape        resume
//
// Depends on: Engine.input, Engine.audio.
// Used by: SurvivorsMatchScene, HTTMatchScene, and any future game scene.

class PauseOverlay {
  constructor(game, options = {}) {
    this._game      = game;
    this._paused    = false;
    this._onRestart = options.onRestart ?? null;
    this._onQuit    = options.onQuit    ?? null;
    this._cursor    = 0;
    this._rows      = this._buildRows();
  }

  /** Build the row layout based on which callbacks were provided. Each row is
   * { kind, label }. The 'volume' row's label is regenerated at draw time. */
  _buildRows() {
    const rows = [
      { kind: 'resume', label: 'RESUME' },
      { kind: 'volume', label: '' }, // regenerated dynamically
    ];
    if (this._onRestart) rows.push({ kind: 'restart', label: 'RESTART' });
    if (this._onQuit)    rows.push({ kind: 'quit',    label: 'QUIT TO MENU' });
    return rows;
  }

  toggle() { this._paused = !this._paused; if (!this._paused) this._cursor = 0; }
  isPaused() { return this._paused; }

  update(dt) {
    if (Engine.input.wasJustPressed('Escape')) { this.toggle(); return; }
    if (!this._paused) return;

    const n = this._rows.length;
    if (Engine.input.wasJustPressed('ArrowUp'))
      this._cursor = (this._cursor - 1 + n) % n;
    if (Engine.input.wasJustPressed('ArrowDown'))
      this._cursor = (this._cursor + 1) % n;

    const row = this._rows[this._cursor];

    if (row.kind === 'volume') {
      if (Engine.input.wasJustPressed('ArrowLeft'))
        Engine.audio.setVolume(+(Math.max(0, Engine.audio.getVolume() - 0.1)).toFixed(1));
      if (Engine.input.wasJustPressed('ArrowRight'))
        Engine.audio.setVolume(+(Math.min(1, Engine.audio.getVolume() + 0.1)).toFixed(1));
      if (Engine.input.wasJustPressed('m') || Engine.input.wasJustPressed('M'))
        Engine.audio.setMuted(!Engine.audio.isMuted());
    }

    if (Engine.input.wasJustPressed('Enter') || Engine.input.wasJustPressed(' ')) {
      if (row.kind === 'resume')  { this.toggle(); }
      else if (row.kind === 'restart' && this._onRestart) { this._paused = false; this._onRestart(); }
      else if (row.kind === 'quit'    && this._onQuit)    { this._paused = false; this._onQuit(); }
    }
  }

  draw(ctx) {
    if (!this._paused) return;
    const W = ctx.canvas.width, H = ctx.canvas.height;
    ctx.save();

    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, W, H);

    // Panel height scales with row count so 4-row layouts don't crowd.
    const n  = this._rows.length;
    const pw = 420;
    const ph = 180 + n * 50;
    const px = W / 2 - pw / 2, py = H / 2 - ph / 2 - 16;
    ctx.fillStyle = '#111827'; ctx.fillRect(px, py, pw, ph);
    ctx.strokeStyle = '#374151'; ctx.lineWidth = 2; ctx.strokeRect(px, py, pw, ph);

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 40px monospace';
    ctx.fillText('PAUSED', W / 2, py + 44);

    ctx.strokeStyle = '#374151'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px + 20, py + 72); ctx.lineTo(px + pw - 20, py + 72); ctx.stroke();

    const muted = Engine.audio.isMuted();
    const vol   = Math.round(Engine.audio.getVolume() * 10);
    const volStr = muted ? 'AUDIO  [MUTED]' : 'AUDIO  [' + '|'.repeat(vol) + ' '.repeat(10 - vol) + '] ' + vol + '/10';

    for (let i = 0; i < n; i++) {
      const row = this._rows[i];
      const ry  = py + 106 + i * 50, sel = i === this._cursor;
      if (sel) { ctx.fillStyle = 'rgba(241,196,15,0.10)'; ctx.fillRect(px + 12, ry - 20, pw - 24, 40); }
      ctx.fillStyle = sel ? '#f1c40f' : '#9ca3af';
      ctx.font      = sel ? 'bold 20px monospace' : '18px monospace';
      const label = row.kind === 'volume' ? volStr : row.label;
      ctx.fillText(label, W / 2, ry);
    }

    ctx.fillStyle = '#4b5563'; ctx.font = '11px monospace';
    ctx.fillText('UP/DOWN navigate   LEFT/RIGHT volume   M mute   ESC resume', W / 2, py + ph - 16);
    ctx.restore();
  }
}

/* ==== games/libromancer/data/spells.js ==== */
// games/libromancer/data/spells.js
// ----------------------------------------------------------------
// Spell definitions for Libromancer.
// Depends on: nothing
// Used by: LibromancerCombatScene.js
//
// Each spell:
//   id          string  unique identifier (also the key in the object)
//   name        string  display name (keep under 14 chars for card legibility)
//   starter     bool    part of the base set; in the deck from run one
//   description string  1-2 lines of effect text (newline-separated)
//   effect      function(state) => result
//
// state = {
//   playerHp, playerMaxHp, playerBlock,
//   enemyHp, enemyMaxHp, enemyBlock,
//   cardsPlayedThisCombat
// }
//
// result (all fields optional, omit means 0 / no effect) = {
//   damage       number  dealt to enemy before their block is applied
//   block        number  added to player block this turn
//   heal         number  restored to player HP (capped at maxHp)
//   stripBlock   number  strip this many points from enemy block immediately
//   applyFray    number  add this many stacks of Fray to enemy
//   drawBonus    number  draw this many extra cards at the start of next turn
// }
// ----------------------------------------------------------------

var LIBROMANCER_SPELLS = {

  // --- Starter spells (always in the deck) ---

  quill_strike: {
    id: 'quill_strike',
    name: 'Quill Strike',
    starter: true,
    description: 'Deal 4 damage.',
    effect: function(state) { return { damage: 4 }; }
  },

  vellum_shield: {
    id: 'vellum_shield',
    name: 'Vellum Shield',
    starter: true,
    description: 'Gain 5 block.',
    effect: function(state) { return { block: 5 }; }
  },

  ink_splash: {

/* ==== games/libromancer/scenes/LibromancerMenuScene.js ==== */
// games/libromancer/scenes/LibromancerMenuScene.js
// ----------------------------------------------------------------
// Main menu for Libromancer.
// Depends on: Engine, LIBROMANCER_SPELLS, LibromancerCombatScene
// Used by: LibromancerCombatScene (back-navigation from game over / victory)
// ----------------------------------------------------------------

class LibromancerMenuScene extends Engine.Scene {
  constructor(game, preset) {
    super();
    this._game = game;
    this._preset = preset;
    this._W = preset.w;
    this._H = preset.h;

    this._unlocks = [];
    this._runs = 0;
    this._best = 0;

    this._startBtn = null;
    this._btnHover = false;
    this._wasMouseDown = false;
  }

  enter() {
    this._unlocks = Engine.storage.load('unlocks', []);
    this._runs   = Engine.storage.load('runs', 0);
    this._best   = Engine.storage.load('best', 0);
    this._buildLayout();
    // Consume any lingering mouse-down from previous scene transition.
    this._wasMouseDown = Engine.input.mouse.left;
  }

  _buildLayout() {
    const W = this._W, H = this._H;
    const btnW = Math.min(260, W * 0.5);
    const btnH = 50;
    this._startBtn = {
      x: W / 2 - btnW / 2,
      y: H * 0.6,
      w: btnW,
      h: btnH
    };
  }

  update(dt) {
    super.update(dt);
    const mouse = Engine.input.mouse;
    const justClicked = mouse.left && !this._wasMouseDown;
    this._wasMouseDown = mouse.left;

    const btn = this._startBtn;
    this._btnHover = mouse.x >= btn.x && mouse.x <= btn.x + btn.w &&
                     mouse.y >= btn.y && mouse.y <= btn.y + btn.h;

    if (justClicked && this._btnHover) {
      this._beginRun();
    }
  }

  _beginRun() {
    Engine.storage.save('runs', this._runs + 1);

    // Deck = all starter spells + permanently unlocked spells.
    const deck = Object.values(LIBROMANCER_SPELLS)
      .filter(function(s) {
        return s.starter || this._unlocks.indexOf(s.id) !== -1;
      }, this)
      .map(function(s) { return s.id; });

    const runState = {
      hp: 22,
      maxHp: 22,
      encounterIndex: 0,
      deck: deck
    };

    this._game.setScene(new LibromancerCombatScene(this._game, this._preset, runState));
  }

  draw(ctx) {
    super.draw(ctx);
    const W = this._W, H = this._H;

    // Background.
    ctx.fillStyle = '#1a1510';
    ctx.fillRect(0, 0, W, H);

    // Subtle shelf lines.
    ctx.strokeStyle = '#231a10';
    ctx.lineWidth = 1;
    for (let y = 70; y < H; y += 55) {
      ctx.beginPath();
      ctx.moveTo(0, y);
      ctx.lineTo(W, y);
      ctx.stroke();
    }

    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Title.
    ctx.fillStyle = '#c4a862';
    ctx.font = 'bold ' + Math.floor(H * 0.085) + 'px serif';
    ctx.fillText('LIBROMANCER', W / 2, H * 0.2);

    // Subtitle.
    ctx.fillStyle = '#6a5a3a';
    ctx.font = Math.floor(H * 0.035) + 'px serif';
    ctx.fillText('a card game in an abandoned library', W / 2, H * 0.31);

    // Stats row (only once a run has been started).
    if (this._runs > 0) {
      ctx.fillStyle = '#4a3a22';
      ctx.font = Math.floor(H * 0.028) + 'px monospace';
      ctx.fillText(
        'Runs: ' + this._runs + '   Best: enc ' + this._best + '/5   Spells: ' +
        (this._unlocks.length + 5) + ' known',
        W / 2, H * 0.43
      );
    }

    // Unlocked spell list.
    if (this._unlocks.length > 0) {
      var names = this._unlocks
        .filter(function(id) { return LIBROMANCER_SPELLS[id]; })
        .map(function(id) { return LIBROMANCER_SPELLS[id].name; });
      ctx.fillStyle = '#3a2e18';
      ctx.font = Math.floor(H * 0.024) + 'px monospace';
      ctx.fillText('Discovered: ' + names.join(', '), W / 2, H * 0.51);
    }

    // Begin Run button.
    var btn = this._startBtn;
    ctx.fillStyle = this._btnHover ? '#3e3328' : '#2a2218';
    ctx.strokeStyle = this._btnHover ? '#c4a862' : '#6a5428';
    ctx.lineWidth = this._btnHover ? 2 : 1;
    ctx.beginPath();
    ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 4);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = this._btnHover ? '#e8d5a3' : '#c4a862';
    ctx.font = 'bold ' + Math.floor(btn.h * 0.42) + 'px serif';
    ctx.fillText('Begin Run', W / 2, btn.y + btn.h / 2);

    // Hint.
    ctx.fillStyle = '#2e2518';
    ctx.font = Math.floor(H * 0.024) + 'px monospace';
    ctx.fillText('Five encounters. Survive them all.', W / 2, H * 0.83);
  }
}

/* ==== games/libromancer/scenes/LibromancerCombatScene.js ==== */
// games/libromancer/scenes/LibromancerCombatScene.js
// ----------------------------------------------------------------
// All combat, between-encounter transitions, game over, and victory
// for Libromancer. Handles all five encounters within a single run
// without a scene change; HP carries across encounters.
//
// Depends on: Engine, PauseOverlay, LIBROMANCER_SPELLS, LIBROMANCER_ENCOUNTERS,
//             LibromancerMenuScene
// Used by: LibromancerMenuScene
//
// State machine:
//   PLAYER_TURN  -> player clicks a card or Rest  -> ANIMATING
//   ANIMATING    -> 0.4s delay                    -> ENEMY_TURN (or ENCOUNTER_WIN/GAME_OVER)
//   ENEMY_TURN   -> 0.4s delay                    -> PLAYER_TURN (via _beginPlayerTurn)
//   ENCOUNTER_WIN -> player clicks                -> next encounter or VICTORY
//   GAME_OVER    -> player clicks                 -> LibromancerMenuScene
//   VICTORY      -> player clicks                 -> LibromancerMenuScene
//
// Status effects:
//   fray  (on enemy) - enemy takes [fray] damage at start of each enemy turn;
//                      fray decreases by 1 each tick
//   dust  (on player) - player takes +1 damage per stack; dust decreases by 1
//                       at the start of each player turn
//
// Balance notes:
//   - Enemy block resets at the start of each enemy turn (defend protects one
//     round only, symmetric with player block)
//   - Player may Rest once per turn: skips card play, heals 3 HP
//   - Player heals up to 5 HP between encounter clears
//   - Intent box shows next two scheduled enemy actions
// ----------------------------------------------------------------

class LibromancerCombatScene extends Engine.Scene {
  constructor(game, preset, runState) {
    super();
    this._game    = game;
    this._preset  = preset;
    this._W       = preset.w;
    this._H       = preset.h;
    this._run     = runState;

    this._encounterIdx  = runState.encounterIndex;
    this._encounter     = LIBROMANCER_ENCOUNTERS[this._encounterIdx];

    // Combat state.
    this._playerHp    = runState.hp;
    this._playerMaxHp = runState.maxHp;
    this._playerBlock = 0;
    this._enemyHp     = 0;
    this._enemyBlock  = 0;
    this._fray        = 0;
    this._dust        = 0;
    this._drawBonus   = 0;
    this._cardsPlayed = 0;
    this._actionIdx   = 0;

    // Deck state.
    this._deck    = [];
    this._discard = [];
    this._hand    = [];

    // UI state.
    this._state        = 'PLAYER_TURN';
    this._animTimer    = 0;
    this._cardHoverIdx = -1;
    this._wasMouseDown = false;
    this._log          = [];
    this._unlockText   = null;
    this._restoreText  = null;

    this._pause = new PauseOverlay(game, {
      onQuit: function() {
        game.setScene(new LibromancerMenuScene(game, preset));
      }
    });

    this._restUsed     = false;
    this._restBtnHover = false;
    this._layout = this._buildLayout();
  }

  _buildLayout() {
    const H = this._H, W = this._W;
    const cardH = Math.min(120, H * 0.19);
    const cardW = Math.min(200, (W - 50) / 4);
    const cardY = H - cardH - 46;   // shifted up to make room for rest button
    const restBtnW = 150;
    const restBtnH = 26;
    return {
      logY:    H * 0.42,
      cardH:   cardH,
      cardW:   cardW,
      cardY:   cardY,
      playerY: cardY - 60,
      restBtn: { x: W / 2 - restBtnW / 2, y: H - restBtnH - 8, w: restBtnW, h: restBtnH }
    };
  }

  // ----------------------------------------------------------------
  // Lifecycle
  // ----------------------------------------------------------------

  enter() {
    this._wasMouseDown = Engine.input.mouse.left;
    this._initCombat();
  }

  _initCombat() {
    this._encounter  = LIBROMANCER_ENCOUNTERS[this._encounterIdx];
    this._enemyHp    = this._encounter.hp;
    this._enemyBlock = 0;
    this._playerBlock = 0;
    this._fray       = 0;
    this._dust       = 0;
    this._cardsPlayed = 0;
    this._actionIdx  = 0;
    this._unlockText  = null;
    this._restoreText = null;
    this._log        = [
      'You face: ' + this._encounter.name + '.',
      this._encounter.flavor
    ];

    this._deck    = this._shuffle([].concat(this._run.deck));
    this._discard = [];
    this._hand    = [];
    this._beginPlayerTurn();
  }

  _shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  // ----------------------------------------------------------------
  // Turn flow
  // ----------------------------------------------------------------

  _beginPlayerTurn() {
    this._restUsed = false;
    this._playerBlock = 0;
    if (this._dust > 0) this._dust--;
    const count = 3 + this._drawBonus;
    this._drawBonus = 0;
    // Discard remaining hand.
    for (let i = 0; i < this._hand.length; i++) this._discard.push(this._hand[i]);
    this._hand = [];
    this._drawCards(count);
    this._state = 'PLAYER_TURN';
  }

  _drawCards(n) {
    for (let i = 0; i < n; i++) {
      if (this._deck.length === 0) {
        if (this._discard.length === 0) break;
        this._deck    = this._shuffle([].concat(this._discard));
        this._discard = [];
      }
      this._hand.push(this._deck.shift());
    }
  }

  _playCard(handIdx) {
    const spellId = this._hand[handIdx];
    const spell   = LIBROMANCER_SPELLS[spellId];
    if (!spell) return;

    this._hand.splice(handIdx, 1);
    this._discard.push(spellId);
    this._cardsPlayed++;

    const result = spell.effect({
      playerHp:              this._playerHp,
      playerMaxHp:           this._playerMaxHp,
      playerBlock:           this._playerBlock,
      enemyHp:               this._enemyHp,
      enemyMaxHp:            this._encounter.maxHp,
      enemyBlock:            this._enemyBlock,
      cardsPlayedThisCombat: this._cardsPlayed
    });

    // Apply block.
    if (result.block) {
      this._playerBlock += result.block;
    }

    // Apply heal.
    if (result.heal) {
      const prev = this._playerHp;
      this._playerHp = Math.min(this._playerMaxHp, this._playerHp + result.heal);
      const gained = this._playerHp - prev;
      if (gained > 0) this._log2('Recovered ' + gained + ' HP.');
    }

    // Strip enemy block (Ink Splash).
    if (result.stripBlock && this._enemyBlock > 0) {
      const stripped = Math.min(this._enemyBlock, result.stripBlock);
      this._enemyBlock = Math.max(0, this._enemyBlock - result.stripBlock);
      if (stripped > 0) this._log2('Stripped ' + stripped + ' block.');
    }

    // Apply damage to enemy.
    if (result.damage) {
      const absorbed = Math.min(result.damage, this._enemyBlock);
      this._enemyBlock = Math.max(0, this._enemyBlock - absorbed);
      const dealt = result.damage - absorbed;
      this._enemyHp -= dealt;
      var dmgMsg = spell.name + ': ' + dealt + ' damage';
      if (absorbed > 0) dmgMsg += ' (' + absorbed + ' blocked)';
      dmgMsg += '.';
      this._log2(dmgMsg);
    }

    // Apply Fray.
    if (result.applyFray) {
      this._fray += result.applyFray;
      this._log2('Fray ' + this._fray + ' applied to ' + this._encounter.name + '.');
    }

    // Draw bonus for next turn.
    if (result.drawBonus) {
      this._drawBonus += result.drawBonus;
    }

    // Check enemy death.
    if (this._enemyHp <= 0) {
      this._enemyHp = 0;
      this._resolveEncounterWin();
      return;
    }

    this._state     = 'ANIMATING';
    this._animTimer = 0;
  }

  _resolveEnemyTurn() {
    // Enemy block resets each turn. Defend actions protect for one round only,
    // not indefinitely. This mirrors the player's block behaviour.
    this._enemyBlock = 0;

    const enc    = this._encounter;
    const action = enc.actions[this._actionIdx % enc.actions.length];
    this._actionIdx++;

    // Fray tick before enemy acts.
    if (this._fray > 0) {
      this._enemyHp -= this._fray;
      this._log2('Fray: ' + this._fray + ' damage to ' + enc.name + '.');
      this._fray--;
      if (this._enemyHp <= 0) {
        this._enemyHp = 0;
        this._resolveEncounterWin();
        return;
      }
    }

    // Resolve action.
    if (action.type === 'attack' || action.type === 'attack_status' || action.type === 'attack_variable') {
      let rawDmg;
      if (action.type === 'attack_variable') {
        rawDmg = Math.max(1, 10 - Math.floor(this._playerHp / 2));
      } else {
        rawDmg = action.value;
      }
      const total    = rawDmg + this._dust;
      const taken    = Math.max(0, total - this._playerBlock);
      const absorbed = Math.min(this._playerBlock, total);
      this._playerBlock = Math.max(0, this._playerBlock - total);
      this._playerHp   -= taken;
      var atkMsg = enc.name + ': ' + taken + ' damage';
      if (absorbed > 0) atkMsg += ' (' + absorbed + ' blocked)';
      atkMsg += '.';
      this._log2(atkMsg);

      if (action.type === 'attack_status' && action.statusType === 'fray') {
        // Archivist's Redact: attack + strip player block as secondary effect.
        this._playerBlock = Math.max(0, this._playerBlock - action.statusStacks * 2);
        this._log2('Redact strips ' + (action.statusStacks * 2) + ' player block.');
      }
    } else if (action.type === 'defend') {
      this._enemyBlock += action.value;
      this._log2(enc.name + ' gains ' + action.value + ' block.');
    } else if (action.type === 'status_dust') {
      this._dust += action.statusStacks;
      this._log2(enc.name + ' applies Dust x' + action.statusStacks + '. Total: ' + this._dust + '.');
    }

    // Check player death.
    if (this._playerHp <= 0) {
      this._playerHp = 0;
      this._log2('You collapse among the stacks.');
      this._state = 'GAME_OVER';
      return;
    }

    this._state     = 'ENEMY_TURN';
    this._animTimer = 0;
  }

  _resolveEncounterWin() {
    const cleared = this._encounterIdx + 1;
    const prev    = Engine.storage.load('best', 0);
    if (cleared > prev) Engine.storage.save('best', cleared);

    // Permanent spell unlock.
    const unlockId = this._encounter.unlocks;
    if (unlockId && LIBROMANCER_SPELLS[unlockId]) {
      const unlocks = Engine.storage.load('unlocks', []);
      if (unlocks.indexOf(unlockId) === -1) {
        unlocks.push(unlockId);
        Engine.storage.save('unlocks', unlocks);
        // Also add to this run's deck for remaining encounters.
        this._run.deck.push(unlockId);
        this._unlockText = 'Discovered: ' + LIBROMANCER_SPELLS[unlockId].name;
      }
    }

    // Restore HP between encounters (not after the final one).
    if (this._encounterIdx + 1 < LIBROMANCER_ENCOUNTERS.length) {
      const restore = Math.min(5, this._playerMaxHp - this._playerHp);
      this._playerHp += restore;
      this._restoreText = restore > 0 ? 'You rest. Recovered ' + restore + ' HP.' : null;
    }

    this._log2(this._encounter.name + ' defeated.');
    this._state = 'ENCOUNTER_WIN';
  }

  _advanceEncounter() {
    const nextIdx = this._encounterIdx + 1;
    if (nextIdx >= LIBROMANCER_ENCOUNTERS.length) {
      this._state = 'VICTORY';
      return;
    }
    // Carry HP forward.
    this._run.hp             = this._playerHp;
    this._run.encounterIndex = nextIdx;
    this._encounterIdx       = nextIdx;
    this._initCombat();
  }

  _log2(msg) {
    this._log.push(msg);
    if (this._log.length > 6) this._log.shift();
  }

  _rest() {
    const healed = Math.min(3, this._playerMaxHp - this._playerHp);
    this._playerHp += healed;
    this._restUsed = true;
    this._log2('You rest.' + (healed > 0 ? ' Recovered ' + healed + ' HP.' : ' Already at full HP.'));
    this._state     = 'ANIMATING';
    this._animTimer = 0;
  }

  // ----------------------------------------------------------------
  // Update
  // ----------------------------------------------------------------

  update(dt) {
    super.update(dt);

    const mouse = Engine.input.mouse;
    const justClicked  = mouse.left && !this._wasMouseDown;
    this._wasMouseDown = mouse.left;

    // Pause only applies during active combat states.
    if (this._state !== 'GAME_OVER' && this._state !== 'VICTORY') {
      this._pause.update(dt);
      if (this._pause.isPaused()) return;
    }

    const L = this._layout;

    // Hover detection for card hand and rest button.
    this._cardHoverIdx = -1;
    this._restBtnHover = false;
    if (this._state === 'PLAYER_TURN') {
      const rb = L.restBtn;
      if (mouse.x >= rb.x && mouse.x <= rb.x + rb.w &&
          mouse.y >= rb.y && mouse.y <= rb.y + rb.h) {
        this._restBtnHover = true;
      }
      if (this._hand.length > 0) {
        const n      = this._hand.length;
        const totalW = n * L.cardW + (n - 1) * 10;
        const startX = this._W / 2 - totalW / 2;
        for (let i = 0; i < n; i++) {
          const cx = startX + i * (L.cardW + 10);
          if (mouse.x >= cx && mouse.x <= cx + L.cardW &&
              mouse.y >= L.cardY && mouse.y <= L.cardY + L.cardH) {
            this._cardHoverIdx = i;
          }
        }
      }
    }

    // Click handling.
    if (justClicked) {
      if (this._state === 'PLAYER_TURN' && this._cardHoverIdx >= 0) {
        this._playCard(this._cardHoverIdx);
      } else if (this._state === 'PLAYER_TURN' && this._restBtnHover && !this._restUsed) {
        this._rest();
      } else if (this._state === 'ENCOUNTER_WIN') {
        this._advanceEncounter();
      } else if (this._state === 'GAME_OVER' || this._state === 'VICTORY') {
        this._game.setScene(new LibromancerMenuScene(this._game, this._preset));
      }
    }

    // Animation timers.
    if (this._state === 'ANIMATING') {
      this._animTimer += dt;
      if (this._animTimer >= 0.4) this._resolveEnemyTurn();
    } else if (this._state === 'ENEMY_TURN') {
      this._animTimer += dt;
      if (this._animTimer >= 0.4) this._beginPlayerTurn();
    }
  }

  // ----------------------------------------------------------------
  // Draw
  // ----------------------------------------------------------------

  draw(ctx) {
    super.draw(ctx);
    const W = this._W, H = this._H;

    ctx.fillStyle = '#1a1510';
    ctx.fillRect(0, 0, W, H);

    if (this._state === 'GAME_OVER') { this._drawGameOver(ctx); return; }
    if (this._state === 'VICTORY')   { this._drawVictory(ctx); return; }
    if (this._state === 'ENCOUNTER_WIN') {
      this._drawEncounterWin(ctx);
      this._pause.draw(ctx);
      return;
    }

    this._drawHeader(ctx);
    this._drawEnemy(ctx);
    this._drawLog(ctx);
    this._drawPlayerStats(ctx);
    this._drawHand(ctx);
    this._pause.draw(ctx);
  }

  _drawHeader(ctx) {
    const W = this._W;
    ctx.fillStyle = '#231a0e';
    ctx.fillRect(0, 0, W, 40);
    ctx.strokeStyle = '#3a2a18';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0, 39); ctx.lineTo(W, 39); ctx.stroke();
    ctx.fillStyle = '#6a5430';
    ctx.font = '13px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(
      'Encounter ' + (this._encounterIdx + 1) + ' of ' + LIBROMANCER_ENCOUNTERS.length +
      '   |   HP: ' + this._playerHp + '/' + this._playerMaxHp +
      '   |   Turn ' + this._cardsPlayed,
      W / 2, 20
    );
  }

  _drawEnemy(ctx) {
    const W = this._W;
    const enc = this._encounter;

    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#c4a862';
    ctx.font = 'bold 22px serif';
    ctx.fillText(enc.name, W / 2, 52);

    // HP bar.
    const barW = Math.min(280, W * 0.48);
    const barH = 11;
    const barX = W / 2 - barW / 2;
    const barY = 83;
    const ratio = Math.max(0, this._enemyHp / enc.maxHp);
    ctx.fillStyle = '#2a1f14';
    ctx.fillRect(barX, barY, barW, barH);
    ctx.fillStyle = ratio > 0.5 ? '#44aa66' : ratio > 0.25 ? '#cc9922' : '#cc4433';
    ctx.fillRect(barX, barY, barW * ratio, barH);
    ctx.strokeStyle = '#3a2a18';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);

    ctx.fillStyle = '#7a6a4a';
    ctx.font = '12px monospace';
    ctx.fillText('HP ' + this._enemyHp + ' / ' + enc.maxHp, W / 2, 98);

    // Block and fray indicators.
    let tagLine = '';
    if (this._enemyBlock > 0) tagLine += 'Block: ' + this._enemyBlock + '  ';
    if (this._fray > 0)       tagLine += 'Fray: ' + this._fray;
    if (tagLine) {
      ctx.fillStyle = '#4488cc';
      ctx.fillText(tagLine.trim(), W / 2, 113);
    }

    // Intent box: show next two scheduled actions.
    const action  = enc.actions[this._actionIdx % enc.actions.length];
    const action2 = enc.actions[(this._actionIdx + 1) % enc.actions.length];
    ctx.fillStyle = '#2e2014';
    ctx.strokeStyle = '#4a3020';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(W / 2 - 155, 126, 310, 44, 3);
    ctx.fill();
    ctx.stroke();
    ctx.font = '13px monospace';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#e8c860';
    ctx.fillText('Now: ' + action.intent, W / 2, 138);
    ctx.fillStyle = '#6a5a30';
    ctx.font = '11px monospace';
    ctx.fillText('Then: ' + action2.intent, W / 2, 156);

    this._drawEnemySprite(ctx, W / 2, 215, enc.id);
  }

  _drawEnemySprite(ctx, cx, cy, id) {
    ctx.save();
    ctx.translate(cx, cy);
    const t  = Date.now() / 1000;
    const fl = Math.sin(t * 2.5) * 0.5 + 0.5;

    if (id === 'bookworm') {
      ctx.strokeStyle = '#c8b060';
      ctx.lineWidth = 14;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.beginPath();
      for (let i = 0; i <= 5; i++) {
        const ox = Math.sin(t * 2.2 + i * 0.9) * 9;
        const oy = Math.cos(t * 1.8 + i * 0.7) * 4;
        if (i === 0) ctx.moveTo(-30 + i * 13 + ox, oy);
        else         ctx.lineTo(-30 + i * 13 + ox, oy);
      }
      ctx.stroke();
      ctx.fillStyle = '#e8d060';
      ctx.beginPath();
      ctx.arc(35 + Math.sin(t * 2.2) * 9, 0, 11, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a1510';
      ctx.beginPath();
      ctx.arc(38 + Math.sin(t * 2.2) * 9, -2, 3, 0, Math.PI * 2);
      ctx.fill();

    } else if (id === 'dust_mite') {
      ctx.fillStyle = 'rgba(180,160,110,' + (0.3 + fl * 0.25) + ')';
      for (let i = 0; i < 10; i++) {
        const a = i / 10 * Math.PI * 2 + t;
        ctx.beginPath();
        ctx.arc(Math.cos(a) * (16 + fl * 4), Math.sin(a) * (10 + fl * 3), 6, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#c0a850';
      ctx.beginPath();
      ctx.arc(0, 0, 16, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a1510';
      ctx.beginPath();
      ctx.arc(-5, -4, 3, 0, Math.PI * 2);
      ctx.arc(5, -4, 3, 0, Math.PI * 2);
      ctx.fill();

    } else if (id === 'shelf_spirit') {
      const ghost = 0.5 + fl * 0.3;
      ctx.fillStyle = 'rgba(90,110,170,' + ghost + ')';
      ctx.strokeStyle = 'rgba(130,150,220,' + ghost + ')';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(-24, -40, 48, 70, [4, 4, 16, 16]);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = 'rgba(220,230,255,' + ghost + ')';
      ctx.fillRect(-14, -22, 9, 14);
      ctx.fillRect(5, -22, 9, 14);

    } else if (id === 'forbidden_tome') {
      const bob = Math.sin(t * 1.4) * 6;
      ctx.fillStyle = '#2a1008';
      ctx.strokeStyle = '#c4a040';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.roundRect(-30, -22 + bob, 60, 44, 2);
      ctx.fill();
      ctx.stroke();
      ctx.strokeStyle = '#706030';
      ctx.lineWidth = 1;
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(i * 10, -22 + bob);
        ctx.lineTo(i * 12, -44);
        ctx.stroke();
      }
      ctx.fillStyle = '#cc3300';
      ctx.beginPath();
      ctx.arc(0, -2 + bob, 8, 0, Math.PI * 2);
      ctx.fill();

    } else if (id === 'the_archivist') {
      const sw = Math.sin(t * 0.8) * 5;
      ctx.fillStyle = '#180c04';
      ctx.beginPath();
      ctx.moveTo(-22 + sw * 0.3, -40);
      ctx.lineTo(22 + sw * 0.3, -40);
      ctx.lineTo(30 + sw * 0.3, 36);
      ctx.lineTo(-30 + sw * 0.3, 36);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#100800';
      ctx.beginPath();
      ctx.arc(sw * 0.5, -50, 20, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(200,160,60,' + (0.5 + fl * 0.4) + ')';
      ctx.beginPath();
      ctx.arc(-7 + sw * 0.4, -50, 5, 0, Math.PI * 2);
      ctx.arc(7 + sw * 0.4, -50, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#240e04';
      ctx.lineWidth = 9;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-22 + sw * 0.3, -20);
      ctx.lineTo(-50 + sw, 5);
      ctx.moveTo(22 + sw * 0.3, -20);
      ctx.lineTo(50 + sw, 5);
      ctx.stroke();
    }

    ctx.restore();
  }

  _truncateLine(ctx, text, maxWidth) {
    if (ctx.measureText(text).width <= maxWidth) return text;
    let t = text;
    while (t.length > 0) {
      const sp = t.lastIndexOf(' ');
      t = sp > 0 ? t.slice(0, sp) : t.slice(0, t.length - 1);
      if (ctx.measureText(t + '...').width <= maxWidth) return t + '...';
    }
    return '...';
  }

  _drawLog(ctx) {
    const W = this._W;
    const logY = this._layout.logY;
    const recent = this._log.slice(-3);
    const maxW = W * 0.88;

    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.font = '13px monospace';

    for (let i = 0; i < recent.length; i++) {
      const alpha = 0.3 + ((i + 1) / recent.length) * 0.7;
      ctx.fillStyle = 'rgba(200,185,140,' + alpha + ')';
      ctx.fillText(this._truncateLine(ctx, recent[i], maxW), W / 2, logY + i * 21);
    }
  }

  _drawPlayerStats(ctx) {
    const W = this._W;
    const y = this._layout.playerY;
    const barW = Math.min(200, W * 0.38);
    const barH = 10;
    const barX = W / 2 - barW / 2;
    const ratio = Math.max(0, this._playerHp / this._playerMaxHp);

    ctx.fillStyle = '#2a1f14';
    ctx.fillRect(barX, y, barW, barH);
    ctx.fillStyle = ratio > 0.5 ? '#44aa66' : ratio > 0.25 ? '#cc9922' : '#cc4433';
    ctx.fillRect(barX, y, barW * ratio, barH);
    ctx.strokeStyle = '#3a2a18';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, y, barW, barH);

    let line = 'HP: ' + this._playerHp + '/' + this._playerMaxHp;
    if (this._playerBlock > 0) line += '   Block: ' + this._playerBlock;
    if (this._dust > 0)        line += '   Dust: ' + this._dust + ' (+' + this._dust + ' dmg)';

    ctx.fillStyle = '#7a6a4a';
    ctx.font = '12px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(line, W / 2, y + 13);
  }

  _drawHand(ctx) {
    const L = this._layout;
    const n = this._hand.length;
    const W = this._W;

    if (n === 0) {
      ctx.fillStyle = '#2e2518';
      ctx.font = '13px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('No cards', W / 2, L.cardY + L.cardH / 2);
    } else {
      const totalW = n * L.cardW + (n - 1) * 10;
      const startX = W / 2 - totalW / 2;
      for (let i = 0; i < n; i++) {
        const spell  = LIBROMANCER_SPELLS[this._hand[i]];
        if (!spell) continue;
        const x      = startX + i * (L.cardW + 10);
        const hover  = this._cardHoverIdx === i && this._state === 'PLAYER_TURN';
        const dimmed = this._state !== 'PLAYER_TURN';
        this._drawCard(ctx, x, L.cardY, L.cardW, L.cardH, spell, hover, dimmed);
      }
    }

    // Deck/discard counts.
    ctx.fillStyle = '#3a2e1a';
    ctx.font = '11px monospace';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillText('deck:' + this._deck.length + ' disc:' + this._discard.length, W - 10, this._H - 5);

    // Rest button.
    const rb      = L.restBtn;
    const canRest = this._state === 'PLAYER_TURN' && !this._restUsed;
    const rbHover = this._restBtnHover && canRest;
    ctx.globalAlpha = canRest ? 1.0 : 0.35;
    ctx.fillStyle   = rbHover ? '#2e2a1e' : '#1e1a10';
    ctx.strokeStyle = rbHover ? '#c4a862' : '#4a3820';
    ctx.lineWidth   = 1;
    ctx.beginPath();
    ctx.roundRect(rb.x, rb.y, rb.w, rb.h, 3);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle    = rbHover ? '#e8d5a0' : '#8a7040';
    ctx.font         = '12px monospace';
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Rest  (+3 HP, skip turn)', rb.x + rb.w / 2, rb.y + rb.h / 2);
    ctx.globalAlpha  = 1.0;
  }

  _drawCard(ctx, x, y, w, h, spell, hover, dimmed) {
    ctx.save();
    ctx.globalAlpha = dimmed ? 0.45 : 1.0;

    // Background and border drawn before clipping so border is fully visible.
    ctx.fillStyle = hover ? '#3e3228' : '#2a1e12';
    ctx.strokeStyle = hover ? '#c4a862' : '#5a4220';
    ctx.lineWidth = hover ? 2 : 1;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, 5);
    ctx.fill();
    ctx.stroke();

    // Clip all subsequent text to the card interior.
    ctx.beginPath();
    ctx.rect(x + 4, y + 4, w - 8, h - 8);
    ctx.clip();

    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = hover ? '#e8d5a0' : '#c4a862';
    ctx.font = 'bold ' + Math.floor(h * 0.17) + 'px serif';
    ctx.fillText(spell.name, x + w / 2, y + 9);

    ctx.strokeStyle = '#3a2c18';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(x + 10, y + Math.floor(h * 0.32));
    ctx.lineTo(x + w - 10, y + Math.floor(h * 0.32));
    ctx.stroke();

    ctx.fillStyle = '#8a7a52';
    ctx.font = Math.floor(h * 0.13) + 'px monospace';
    const lines = spell.description.split('\n');
    const lineH = h * 0.155;
    for (let i = 0; i < Math.min(lines.length, 3); i++) {
      ctx.fillText(lines[i], x + w / 2, y + h * 0.38 + i * lineH);
    }

    ctx.globalAlpha = 1.0;
    ctx.restore();
  }

  // ----------------------------------------------------------------
  // Terminal / transition screens
  // ----------------------------------------------------------------

  _drawEncounterWin(ctx) {
    const W = this._W, H = this._H;
    ctx.fillStyle = 'rgba(10,7,4,0.88)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    ctx.fillStyle = '#c4a862';
    ctx.font = 'bold 26px serif';
    ctx.fillText(this._encounter.name + ' defeated.', W / 2, H * 0.3);

    if (this._unlockText) {
      ctx.fillStyle = '#44aa66';
      ctx.font = '17px serif';
      ctx.fillText(this._unlockText, W / 2, H * 0.4);
    }
    if (this._restoreText) {
      ctx.fillStyle = '#6699aa';
      ctx.font = '14px monospace';
      ctx.fillText(this._restoreText, W / 2, H * 0.49);
    }

    const more = this._encounterIdx + 1 < LIBROMANCER_ENCOUNTERS.length;
    ctx.fillStyle = '#7a6a4a';
    ctx.font = '15px monospace';
    ctx.fillText(
      more ? 'Continue deeper.' : 'Only the inner sanctum remains.',
      W / 2, H * 0.57
    );

    ctx.fillStyle = '#1e1810';
    ctx.strokeStyle = '#c4a862';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(W / 2 - 110, H * 0.66, 220, 44, 4);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#c4a862';
    ctx.font = 'bold 17px serif';
    ctx.fillText('Continue', W / 2, H * 0.66 + 22);
  }

  _drawGameOver(ctx) {
    const W = this._W, H = this._H;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#cc4433';
    ctx.font = 'bold 30px serif';
    ctx.fillText('You Perished', W / 2, H * 0.28);
    ctx.fillStyle = '#7a6a4a';
    ctx.font = '17px serif';
    ctx.fillText('Lost in encounter ' + (this._encounterIdx + 1) + ':', W / 2, H * 0.39);
    ctx.font = '15px serif';
    ctx.fillText(this._encounter.name, W / 2, H * 0.47);
    ctx.fillStyle = '#1e1810';
    ctx.strokeStyle = '#5a4220';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(W / 2 - 120, H * 0.59, 240, 44, 4);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#c4a862';
    ctx.font = 'bold 17px serif';
    ctx.fillText('Return to Menu', W / 2, H * 0.59 + 22);
  }

  _drawVictory(ctx) {
    const W = this._W, H = this._H;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#c4a862';
    ctx.font = 'bold 28px serif';
    ctx.fillText('The Library is Yours', W / 2, H * 0.24);
    ctx.fillStyle = '#7a6a4a';
    ctx.font = '17px serif';
    ctx.fillText('You catalogued all five encounters.', W / 2, H * 0.36);
    ctx.fillText('The Archivist sleeps.', W / 2, H * 0.45);
    const unlocks = Engine.storage.load('unlocks', []);
    if (unlocks.length > 0) {
      var names = unlocks
        .filter(function(id) { return LIBROMANCER_SPELLS[id]; })
        .map(function(id) { return LIBROMANCER_SPELLS[id].name; });
      ctx.fillStyle = '#44aa66';
      ctx.font = '14px monospace';
      ctx.fillText('Collection: ' + names.join(', '), W / 2, H * 0.56);
    }
    ctx.fillStyle = '#1e1810';
    ctx.strokeStyle = '#c4a862';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.roundRect(W / 2 - 120, H * 0.66, 240, 44, 4);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#c4a862';
    ctx.font = 'bold 17px serif';
    ctx.fillText('Return to Menu', W / 2, H * 0.66 + 22);
  }
}

bootstrapGame({ canvasId: 'game', presets: { regular: { w: 900, h: 600 }, compact: { w: 600, h: 800 } }, gameName: 'libromancer', initialScene: function(game) { var p = { w: game.canvas.width, h: game.canvas.height }; return new LibromancerMenuScene(game, p); }, suppressContextMenu: true });
</script>
</body>
