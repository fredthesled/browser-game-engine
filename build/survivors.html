Params.prototype.random = function () {

/*** Simpler namespaced functional API ***/

};

sfxr.toWebAudio = function(synthdef, audiocontext) {
  var sfx = new SoundEffect(synthdef);
  var buffer = sfx.getRawBuffer()["normalized"];
  if (audiocontext) {
    var buff = audiocontext.createBuffer(1, buffer.length, sfx.sampleRate);
    var nowBuffering = buff.getChannelData(0);
    for (var i = 0; i < buffer.length; i++) {
      nowBuffering[i] = buffer[i];
    }
    var proc = audiocontext.createBufferSource();
    proc.buffer = buff;
    return proc;
  }

  return (new SoundEffect(synthdef)).generate();
};

    } else {
      var val = (decoded[offset] | (decoded[offset + 1] << 8) | (decoded[offset + 2] << 16) | (decoded[offset + 3] << 24));

sfxr.generate = function(algorithm, options) {

/*** Main entry point ***/

function SoundEffect(ps) {
  if (typeof(ps) == "string") {
    var PARAMS = new Params();
    if (ps.indexOf("#") == 0) {
      ps = ps.slice(1);
    }
    ps = PARAMS.fromB58(ps);
  }
  this.init(ps);
}

SoundEffect.prototype.init = function (ps) {
  this.parameters = ps;
  this.initForRepeat();  // First time through, this is a bit of a misnomer

  // Waveform shape
  this.waveShape = parseInt(ps.wave_type);

  // Filter
  this.fltw = Math.pow(ps.p_lpf_freq, 3) * 0.1;
  this.enableLowPassFilter = (ps.p_lpf_freq != 1);
  this.fltw_d = 1 + ps.p_lpf_ramp * 0.0001;
  this.fltdmp = 5 / (1 + Math.pow(ps.p_lpf_resonance, 2) * 20) *
    (0.01 + this.fltw);
  if (this.fltdmp > 0.8) this.fltdmp=0.8;
  this.flthp = Math.pow(ps.p_hpf_freq, 2) * 0.1;
  this.flthp_d = 1 + ps.p_hpf_ramp * 0.0003;

  // Vibrato
  this.vibratoSpeed = Math.pow(ps.p_vib_speed, 2) * 0.01;
  this.vibratoAmplitude = ps.p_vib_strength * 0.5;

  // Envelope
  this.envelopeLength = [
    Math.floor(ps.p_env_attack * ps.p_env_attack * 100000),
    Math.floor(ps.p_env_sustain * ps.p_env_sustain * 100000),
    Math.floor(ps.p_env_decay * ps.p_env_decay * 100000)
  ];
  this.envelopePunch = ps.p_env_punch;

  // Flanger
  this.flangerOffset = Math.pow(ps.p_pha_offset, 2) * 1020;
  if (ps.p_pha_offset < 0) this.flangerOffset = -this.flangerOffset;
  this.flangerOffsetSlide = Math.pow(ps.p_pha_ramp, 2) * 1;
  if (ps.p_pha_ramp < 0) this.flangerOffsetSlide = -this.flangerOffsetSlide;

  // Repeat
  this.repeatTime = Math.floor(Math.pow(1 - ps.p_repeat_speed, 2) * 20000
                               + 32);
  if (ps.p_repeat_speed === 0)
    this.repeatTime = 0;

  this.gain = Math.exp(ps.sound_vol) - 1;

  this.sampleRate = ps.sample_rate;
  this.bitsPerChannel = ps.sample_size;
}

SoundEffect.prototype.initForRepeat = function() {
  var ps = this.parameters;
  this.elapsedSinceRepeat = 0;

  this.period = 100 / (ps.p_base_freq * ps.p_base_freq + 0.001);
  this.periodMax = 100 / (ps.p_freq_limit * ps.p_freq_limit + 0.001);
  this.enableFrequencyCutoff = (ps.p_freq_limit > 0);
  this.periodMult = 1 - Math.pow(ps.p_freq_ramp, 3) * 0.01;
  this.periodMultSlide = -Math.pow(ps.p_freq_dramp, 3) * 0.000001;

  this.dutyCycle = 0.5 - ps.p_duty * 0.5;
  this.dutyCycleSlide = -ps.p_duty_ramp * 0.00005;

  if (ps.p_arp_mod >= 0)
    this.arpeggioMultiplier = 1 - Math.pow(ps.p_arp_mod, 2) * .9;
  else
    this.arpeggioMultiplier = 1 + Math.pow(ps.p_arp_mod, 2) * 10;
  this.arpeggioTime = Math.floor(Math.pow(1 - ps.p_arp_speed, 2) * 20000 + 32);
  if (ps.p_arp_speed === 1)
    this.arpeggioTime = 0;
}

SoundEffect.prototype.getRawBuffer = function () {
  var fltp = 0;
  var fltdp = 0;
  var fltphp = 0;

  var noise_buffer = Array(32);
  for (var i = 0; i < 32; ++i)
    noise_buffer[i] = Math.random() * 2 - 1;

  var envelopeStage = 0;
  var envelopeElapsed = 0;

  var vibratoPhase = 0;

  var phase = 0;
  var ipp = 0;
  var flanger_buffer = Array(1024);
  for (var i = 0; i < 1024; ++i)
    flanger_buffer[i] = 0;

  var num_clipped = 0;

  var buffer = [];
  var normalized = [];

  var sample_sum = 0;
  var num_summed = 0;
  var summands = Math.floor(44100 / this.sampleRate);

  for(var t = 0; ; ++t) {

    // Repeats
    if (this.repeatTime != 0 && ++this.elapsedSinceRepeat >= this.repeatTime)
      this.initForRepeat();

    // Arpeggio (single)
    if(this.arpeggioTime != 0 && t >= this.arpeggioTime) {
      this.arpeggioTime = 0;
      this.period *= this.arpeggioMultiplier;
    }

    // Frequency slide, and frequency slide slide!
    this.periodMult += this.periodMultSlide;
    this.period *= this.periodMult;
    if(this.period > this.periodMax) {
      this.period = this.periodMax;
      if (this.enableFrequencyCutoff)
        break;
    }

    // Vibrato
    var rfperiod = this.period;
    if (this.vibratoAmplitude > 0) {
      vibratoPhase += this.vibratoSpeed;
      rfperiod = this.period * (1 + Math.sin(vibratoPhase) * this.vibratoAmplitude);
    }
    var iperiod = Math.floor(rfperiod);
    if (iperiod < OVERSAMPLING) iperiod = OVERSAMPLING;

    // Square wave duty cycle
    this.dutyCycle += this.dutyCycleSlide;
    if (this.dutyCycle < 0) this.dutyCycle = 0;
    if (this.dutyCycle > 0.5) this.dutyCycle = 0.5;

    // Volume envelope
    if (++envelopeElapsed > this.envelopeLength[envelopeStage]) {
      envelopeElapsed = 0;
      if (++envelopeStage > 2)
        break;
    }
    var env_vol;
    var envf = envelopeElapsed / this.envelopeLength[envelopeStage];
    if (envelopeStage === 0) {         // Attack
      env_vol = envf;
    } else if (envelopeStage === 1) {  // Sustain
      env_vol = 1 + (1 - envf) * 2 * this.envelopePunch;
    } else {                           // Decay
      env_vol = 1 - envf;
    }

    // Flanger step
    this.flangerOffset += this.flangerOffsetSlide;
    var iphase = Math.abs(Math.floor(this.flangerOffset));
    if (iphase > 1023) iphase = 1023;

    if (this.flthp_d != 0) {
      this.flthp *= this.flthp_d;
      if (this.flthp < 0.00001)
        this.flthp = 0.00001;
      if (this.flthp > 0.1)
        this.flthp = 0.1;
    }

    // 8x oversampling
    var sample = 0;
    for (var si = 0; si < OVERSAMPLING; ++si) {
      var sub_sample = 0;
      phase++;
      if (phase >= iperiod) {
        phase %= iperiod;
        if (this.waveShape === NOISE)
          for(var i = 0; i < 32; ++i)
            noise_buffer[i] = Math.random() * 2 - 1;
      }

      // Base waveform
      var fp = phase / iperiod;
      if (this.waveShape === SQUARE) {
        if (fp < this.dutyCycle)
          sub_sample=0.5;
        else
          sub_sample=-0.5;
      } else if (this.waveShape === SAWTOOTH) {
        if (fp < this.dutyCycle)
          sub_sample = -1 + 2 * fp/this.dutyCycle;
        else
          sub_sample = 1 - 2 * (fp-this.dutyCycle)/(1-this.dutyCycle);
      } else if (this.waveShape === SINE) {
        sub_sample = Math.sin(fp * 2 * Math.PI);
      } else if (this.waveShape === NOISE) {
        sub_sample = noise_buffer[Math.floor(phase * 32 / iperiod)];
      } else {
        throw "ERROR: Bad wave type: " + this.waveShape;
      }

      // Low-pass filter
      var pp = fltp;
      this.fltw *= this.fltw_d;
      if (this.fltw < 0) this.fltw = 0;
      if (this.fltw > 0.1) this.fltw = 0.1;
      if (this.enableLowPassFilter) {
        fltdp += (sub_sample - fltp) * this.fltw;
        fltdp -= fltdp * this.fltdmp;
      } else {
        fltp = sub_sample;
        fltdp = 0;
      }
      fltp += fltdp;

      // High-pass filter
      fltphp += fltp - pp;
      fltphp -= fltphp * this.flthp;
      sub_sample = fltphp;

      // Flanger
      flanger_buffer[ipp & 1023] = sub_sample;
      sub_sample += flanger_buffer[(ipp - iphase + 1024) & 1023];
      ipp = (ipp + 1) & 1023;

      // final accumulation and envelope application
      sample += sub_sample * env_vol;
    }

    // Accumulate samples appropriately for sample rate
    sample_sum += sample;
    if (++num_summed >= summands) {
      num_summed = 0;
      sample = sample_sum / summands;
      sample_sum = 0;
    } else {
      continue;
    }

    sample = sample / OVERSAMPLING * masterVolume;
    sample *= this.gain;

    // store the original normalized floating point sample
    normalized.push(sample);

    if (this.bitsPerChannel === 8) {
      // Rescale [-1, 1) to [0, 256)
      sample = Math.floor((sample + 1) * 128);
      if (sample > 255) {
        sample = 255;
        ++num_clipped;
      } else if (sample < 0) {
        sample = 0;
        ++num_clipped;
      }
      buffer.push(sample);
    } else {
      // Rescale [-1, 1) to [-32768, 32768)
      sample = Math.floor(sample * (1<<15));
      if (sample >= (1<<15)) {
        sample = (1 << 15)-1;
        ++num_clipped;
      } else if (sample < -(1<<15)) {
        sample = -(1 << 15);
        ++num_clipped;
      }
      buffer.push(sample & 0xFF);
      buffer.push((sample >> 8) & 0xFF);
    }
  }
  
  return {
    "buffer": buffer,
    "normalized": normalized,
    "clipped": num_clipped,
  }
}

SoundEffect.prototype.generate = function() {
  var rendered = this.getRawBuffer();
  var wave = new RIFFWAVE();
  wave.header.sampleRate = this.sampleRate;
  wave.header.bitsPerSample = this.bitsPerChannel;
  wave.Make(rendered.buffer);
  wave.clipping = rendered.clipped;
  wave.buffer = rendered.normalized;
  wave.getAudio = _sfxr_getAudioFn(wave);
  return wave;
}

var _actx = null;
var _sfxr_getAudioFn = function(wave) {
  return function() {
    // check for procedural audio
    var actx = null;
    if (!_actx) {
      if ('AudioContext' in window) {
        _actx = new AudioContext();
      } else if ('webkitAudioContext' in window) {
        _actx = new webkitAudioContext();
      }
    }
    actx = _actx;
    
    if (actx) {
      var buff = actx.createBuffer(1, wave.buffer.length, wave.header.sampleRate);
      var nowBuffering = buff.getChannelData(0);
      for (var i=0;i<wave.buffer.length;i++) {
        nowBuffering[i] = wave.buffer[i];
      }
      var volume = 1.0;
      var obj = {
        "channels": [],
        "setVolume": function(v) { volume = v; return obj; },
        "play": function() {
          var proc = actx.createBufferSource();
          proc.buffer = buff;
          var gainNode = actx.createGain()
          gainNode.gain.value = volume;
          gainNode.connect(actx.destination)
          proc.connect(gainNode);
          if (proc["start"]) {
            proc.start();
          } else if (proc["noteOn"]) {
            proc.noteOn(0);
          }
          this.channels.push(proc);
          return proc;
        }
      };
      return obj;
    } else {
      var audio = new Audio();
      audio.src = wave.dataURI;
      return audio;
    }
  };
};

// engine/signal-bus.js
// Global pub/sub for decoupled engine and game events.
// Depends on: nothing.
// Used by: any module that needs to emit or listen for named events.

var Engine = Engine || {};

class SignalBus {
  constructor() {
    this._listeners = new Map();
  }

  /** Fire a named signal with an optional payload. */
  emit(name, payload) {
    const handlers = this._listeners.get(name);
    if (!handlers) return;
    // Snapshot so handlers that unregister during dispatch do not corrupt iteration.
    for (const handler of [...handlers]) {
      handler(payload);
    }
  }

  /** Register a listener for a named signal. Returns an unregister function. */
  on(name, handler) {
    if (!this._listeners.has(name)) {
      this._listeners.set(name, new Set());
    }
    this._listeners.get(name).add(handler);
    return () => this.off(name, handler);
  }

  /** Remove a listener for a named signal. */
  off(name, handler) {
    const handlers = this._listeners.get(name);
    if (!handlers) return;
    handlers.delete(handler);
    if (handlers.size === 0) {
      this._listeners.delete(name);
    }
  }
}

// engine/input.js
// Latched keyboard and mouse state, queried per frame by the active scene.
// Depends on: nothing (uses DOM APIs directly).
// Used by: scripts and scenes that need to read user input. The Game class
// constructs the singleton instance and assigns it to Engine.input.

var Engine = Engine || {};

class Input {
  constructor(canvas = null) {
    this._down = new Set();          // keys currently held down
    this._justPressed = new Set();   // keys pressed this frame
    this._justReleased = new Set();  // keys released this frame
    this._pendingPressed = new Set();
    this._pendingReleased = new Set();

    this.mouse = {
      x: 0,
      y: 0,
      left: false,
      right: false
    };

    this._canvas = canvas;

    window.addEventListener('keydown', (e) => {
      if (!this._down.has(e.key)) {
        this._pendingPressed.add(e.key);
      }
      this._down.add(e.key);
    });

    window.addEventListener('keyup', (e) => {
      if (this._down.has(e.key)) {
        this._pendingReleased.add(e.key);
      }
      this._down.delete(e.key);
    });

    // Mouse coordinates are computed relative to the canvas if one was provided,
    // accounting for any CSS scaling between the canvas's display size and its drawing buffer.
    const moveTarget = canvas || window;
    moveTarget.addEventListener('mousemove', (e) => {
      if (canvas) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        this.mouse.x = (e.clientX - rect.left) * scaleX;
        this.mouse.y = (e.clientY - rect.top) * scaleY;
      } else {
        this.mouse.x = e.clientX;
        this.mouse.y = e.clientY;
      }
    });

    // Mousedown attaches to the canvas (or window fallback). Mouseup attaches to window
    // so a button held outside the canvas still releases properly.
    const downTarget = canvas || window;
    downTarget.addEventListener('mousedown', (e) => {
      if (e.button === 0) this.mouse.left = true;
      if (e.button === 2) this.mouse.right = true;
    });
    window.addEventListener('mouseup', (e) => {
      if (e.button === 0) this.mouse.left = false;
      if (e.button === 2) this.mouse.right = false;
    });
  }

  isDown(key) {
    return this._down.has(key);
  }

  /** True only on the frame the key transitioned from up to down. */
  wasJustPressed(key) {
    return this._justPressed.has(key);
  }

  /** True only on the frame the key transitioned from down to up. */
  wasJustReleased(key) {
    return this._justReleased.has(key);
  }

  /** Called once per frame by Game. Advances "just pressed/released" tracking. */
  update() {
    this._justPressed = this._pendingPressed;
    this._justReleased = this._pendingReleased;
    this._pendingPressed = new Set();
    this._pendingReleased = new Set();
  }
}

// engine/game-object.js
// Transform host. Owns a list of attached Scripts and delegates lifecycle to them.
// Depends on: Script (only as a contract; not a hard import).
// Used by: Scene, which contains GameObjects; game code, which instantiates them.

    this.scripts.push(script);

  update(dt) {
    for (const s of this.scripts) {

// engine/scene.js
// Owns a collection of GameObjects, provides lifecycle hooks, applies per-object
// transforms during draw, and runs a pairwise AABB collision pass after object updates.
// Depends on: GameObject, Collider scripts (only by duck-typing the isCollider marker).
// Used by: Game, which holds the active scene; game code, which subclasses Scene to define each scene.

  constructor() {
    this.objects = [];
  }

  /** Called by Game when this scene becomes active. Subclasses populate the scene here. */
  enter() {}

  /** Called by Game when this scene is being replaced. Subclasses tear down here. */
  exit() {}

  /** Add a GameObject to the scene. Returns the object for chaining. */
  add(obj) {
    this.objects.push(obj);
    return obj;
  }

  /** Remove a GameObject from the scene. */
  remove(obj) {
    const i = this.objects.indexOf(obj);
    if (i !== -1) this.objects.splice(i, 1);
  }

  /** Iterate GameObjects, update each, then run the collision pass.
   *  Subclasses may override but should call super.update(dt). */
  update(dt) {
    // Snapshot so objects added or removed during update do not corrupt iteration.
    for (const obj of [...this.objects]) {
      obj.update(dt);
    }
    this._collisionPass();
  }

  /** Iterate GameObjects, apply each transform, draw each. Subclasses may override but
   * should call super.draw(ctx) to retain default per-object rendering. */
  draw(ctx) {
    for (const obj of this.objects) {
      ctx.save();
      ctx.translate(obj.x, obj.y);
      ctx.rotate(obj.rotation);
      ctx.scale(obj.scale, obj.scale);
      obj.draw(ctx);
      ctx.restore();
    }
  }

  /** Find all Collider scripts (duck-typed via isCollider) and run pairwise AABB checks.
   *  Each colliding pair invokes a.onCollide(b) and b.onCollide(a) once per frame.
   *  Broad-phase is O(N^2). Acceptable for hobby-scale games (N < 20 or so).
   *  When a game outgrows this, spatial partitioning can replace this method. */
  _collisionPass() {
    const colliders = [];
    for (const obj of this.objects) {
      for (const s of obj.scripts) {
        if (s.isCollider) {
          colliders.push(s);
        }
      }
    }
    for (let i = 0; i < colliders.length; i++) {
      const a = colliders[i];
      const aBox = a.getAabb();
      for (let j = i + 1; j < colliders.length; j++) {
        const b = colliders[j];
        const bBox = b.getAabb();
        if (aBox.x < bBox.x + bBox.w && aBox.x + aBox.w > bBox.x &&
            aBox.y < bBox.y + bBox.h && aBox.y + aBox.h > bBox.y) {
          a.onCollide(b);
          b.onCollide(a);
        }
      }
    }
  }
}

      console.warn(`Engine.storage.save: refusing to save undefined for key '${key}'. Use clear(key) instead.`);
      return false;
    }

    try {
      serialized = JSON.stringify(value);
    } catch (e) {
      console.warn(`Engine.storage.save: cannot serialize value for key '${key}':`, e);
      return false;

      this._fallback.set(fk, serialized);
      return true;

      window.localStorage.setItem(fk, serialized);

    } else {
      raw = window.localStorage.getItem(fk);

      if (!this._prefix) { out.push(k); continue; }

    let dt = (now - this._lastFrameTime) / 1000;
    if (dt > 0.1) dt = 0.1; // clamp to avoid huge jumps after tab inactivity or breakpoints
    this._lastFrameTime = now;

    // Apply pending scene transition before any per-frame work.
    if (this._pendingScene) {
      if (this.currentScene) this.currentScene.exit();
      this.currentScene = this._pendingScene;
      this._pendingScene = null;
      this.currentScene.enter();
    }

    // Advance input "just pressed/released" tracking before scene reads it.
    Engine.input.update();

    if (this.currentScene) {
      this.currentScene.update(dt);
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      this.currentScene.draw(this.ctx);
    }

    this._animationHandle = requestAnimationFrame((t) => this._frame(t));
  }
}

Engine.Game = Game;

// engine/narrative.js
// ============================================================================

// ============================================================================
// engine/narrative.js
// ============================================================================
//
// Engine.Narrative is a thin wrapper around an inkjs Story, exposing a small
// JS-side surface for game scenes to drive branching narrative content
// authored in inkle's ink scripting language.
//
// Depends on:
//   inkjs (global). Must be loaded before any Engine.Narrative instance is
//   constructed. Vendored at engine/lib/inkjs.js but, per ADR-0018,
//   intentionally NOT included in engine/engine.bundle.js because it is
//   large (~250 KB) and game-specific. Games that use narrative include the
//   vendored library separately in their build, before the engine bundle.
//
// Depended on by:
//   Per-game encounter scripts and scenes that drive ink content. No other
//   engine module depends on Narrative.
//
// Usage:
//   const n = new Engine.Narrative(inkSourceString);
//   n.bindExternal('start_combat', (enemyId) => { ... });
//   n.observe('scrap', (value) => updateHud(value));
//   n.setVar('hull', ship.hull);
//   const lines = n.continue();        // [{text, tags}, ...]
//   const choices = n.getChoices();    // [{index, text, tags}, ...]
//   n.choose(0);
//   if (n.hasEnded) { ... }
// ============================================================================

var Engine = Engine || {};

class Narrative {
  constructor(source, options = {}) {
    if (typeof inkjs === 'undefined') {
      throw new Error(
        'Engine.Narrative requires inkjs to be loaded. Include ' +
        'engine/lib/inkjs.js before the engine bundle in your build. See ADR-0018.'
      );
    }
    if (options.compiled) {
      this._story = new inkjs.Story(source);
    } else {
      this._story = new inkjs.Compiler(source).Compile();
    }
  }

  // Advance the story, collecting every line emitted until the next choice
  // point or story end. Returns an array of { text, tags } objects.
  continue() {
    const lines = [];
    while (this._story.canContinue) {
      const raw = this._story.Continue();
      const text = (typeof raw === 'string' ? raw : '').replace(/\n$/, '');
      const tags = this._story.currentTags ? [...this._story.currentTags] : [];
      lines.push({ text, tags });
    }
    return lines;
  }

  // Available choices at the current story point, or [] if none.
  getChoices() {
    return this._story.currentChoices.map((c) => ({
      index: c.index,
      text: c.text,
      tags: c.tags ? [...c.tags] : []
    }));
  }

  // Select a choice by its index. After this, the story is ready for another
  // continue() call.
  choose(index) {
    this._story.ChooseChoiceIndex(index);
  }

  // Read an ink variable by name. Returns undefined if not declared.
  getVar(name) {
    return this._story.variablesState[name];
  }

  // Write an ink variable. The variable must be declared in the ink source
  // (with VAR) for the write to have effect.
  setVar(name, value) {
    this._story.variablesState[name] = value;
  }

  // Bind a JS function that ink can invoke via an EXTERNAL declaration.
  // The ink script must declare it as: EXTERNAL fn_name(arg1, arg2)
  bindExternal(name, fn) {
    this._story.BindExternalFunction(name, fn);
  }

  // Register a callback that fires when the named ink variable changes.
  // The callback is invoked with the new value.
  observe(name, fn) {
    this._story.ObserveVariable(name, (_varName, value) => fn(value));
  }

  // Jump to a named knot or stitch. Path is a dot-separated string like
  // 'sector_one' or 'sector_one.shop_intro'.
  goTo(path) {
    this._story.ChoosePathString(path);
  }

  // Serialize narrative state to a JSON string suitable for storing via
  // Engine.storage alongside other game state.
  saveState() {
    return this._story.state.toJson();
  }

  // Restore state from a JSON string previously returned by saveState().
  loadState(json) {
    this._story.state.LoadJson(json);
  }

  // True when the story has nothing more to emit and offers no choices.
  get hasEnded() {
    return !this._story.canContinue && this._story.currentChoices.length === 0;
  }

  // Underlying inkjs Story instance. Exposed for advanced uses where the
  // wrapper methods do not cover the required operation.
  get story() {
    return this._story;
  }
}

Engine.Narrative = Narrative;

// ============================================================================
// engine/balance.js
// ============================================================================
// Tunable balance primitives: parameterized difficulty curves and cost
// scaling. Pure, stateless functions under Engine.Balance. Default constants
// follow the values supported by docs/resources/balance.md (see ADR-0020).
//
// Depends on: nothing (pure math).
// Depended on by: game-specific scripts/scenes that ramp difficulty or price
//   upgrades. NOT used by the engine core; opt-in per game.
// ============================================================================

var Engine = Engine || {};

const Balance = {
  // --- Difficulty curves ----------------------------------------------------
  // difficulty(t, opts): difficulty/intensity as a function of progress t.
  // t is caller-defined (elapsed seconds, wave index, level, etc).
  // opts.type selects the family; default 'logistic' (slow start, steep
  // middle, bounded plateau), the general-purpose pacing curve.
  // For logistic, set opts.t0 to the progress midpoint; the default of 0
  // is structural only (it places you at L/2 at t=0).
  difficulty(t, opts = {}) {
    const type = opts.type || 'logistic';
    switch (type) {
      case 'linear':       // d0 + m*t
        return (opts.d0 ?? 0) + (opts.m ?? 1) * t;
      case 'exponential':  // d0 * r^t
        return (opts.d0 ?? 1) * Math.pow(opts.r ?? 1.1, t);
      case 'logarithmic':  // d0 + k*ln(1+t); rises to a soft max then flattens
        return (opts.d0 ?? 0) + (opts.k ?? 1) * Math.log(1 + t);
      case 'logistic':     // L / (1 + e^(-k*(t - t0)))
        return (opts.L ?? 1) / (1 + Math.exp(-(opts.k ?? 1) * (t - (opts.t0 ?? 0))));
      default:
        throw new Error(`Engine.Balance.difficulty: unknown curve type '${type}'`);
    }
  },

  // --- Cost scaling ---------------------------------------------------------
  // cost(n, opts): price of a purchase when you already own n units, base*rate^n.
  // So the first unit (n=0) costs base. rate in [1.07, 1.15] is the documented
  // band; default 1.10. Use ~1.15 for short sessions, ~1.07 for long-haul games.
  cost(n, opts = {}) {
    return (opts.base ?? 1) * Math.pow(opts.rate ?? 1.1, n);
  },

  // bulkCost(owned, count, opts): closed-form total to buy `count` units from
  // `owned`. Exact for fixed rate; replaces a loop.
  bulkCost(owned, count, opts = {}) {
    const base = opts.base ?? 1;
    const rate = opts.rate ?? 1.1;
    if (count <= 0) return 0;
    if (rate === 1) return base * count;
    return base * (Math.pow(rate, owned) * (Math.pow(rate, count) - 1)) / (rate - 1);
  },

  // maxAffordable(owned, currency, opts): how many units `currency` buys from
  // `owned`. Closed-form inverse of bulkCost.
  maxAffordable(owned, currency, opts = {}) {
    const base = opts.base ?? 1;
    const rate = opts.rate ?? 1.1;
    if (currency <= 0) return 0;
    if (rate === 1) return Math.floor(currency / base);
    const n = Math.log((currency * (rate - 1)) / (base * Math.pow(rate, owned)) + 1) / Math.log(rate);
    return Math.max(0, Math.floor(n));
  }
};

Engine.Balance = Balance;


// ============================================================================
// engine/prng.js
// ============================================================================

// ============================================================================
// engine/prng.js
// ============================================================================
//
// Engine.PRNG: seeded pseudo-random number generator.
//
// Algorithm: SFC32 (Small Fast Counting) by Chris Doty-Humphrey. 128-bit
// state (four 32-bit words); period ≥ 2^64; passes PractRand at 32 TB.
// String seeds are hashed to a 128-bit initial state by cyrb128 (bryc, CC0).
// See ADR-0026.
//
// Depends on: nothing.
// Depended on by: game scripts and scenes that need deterministic randomness
//   (procedural levels, daily seeds, replay systems). Not used by the engine
//   core; opt-in per game.
//
// Usage:
//   const rng = new Engine.PRNG('level-1');
//   rng.float()              // [0, 1), like Math.random()
//   rng.int(1, 6)            // integer in [1, 6] inclusive
//   rng.pick(['a','b','c'])  // random element from array
//   rng.shuffle(array)       // Fisher-Yates in place, returns array
// ============================================================================

var Engine = Engine || {};

class PRNG {
  constructor(seed) {
    let a, b, c, d;
    if (typeof seed === 'string') {
      [a, b, c, d] = PRNG._cyrb128(seed);
    } else {
      // Expand a single 32-bit integer to four words via a LCG.
      a = seed >>> 0;
      b = (a * 1664525 + 1013904223) >>> 0;
      c = (b * 1664525 + 1013904223) >>> 0;
      d = 1;
    }
    this._a = a; this._b = b; this._c = c; this._d = d;
    // Discard first 15 outputs so low-entropy seeds (e.g. 0) reach a
    // well-mixed state before callers draw values.
    for (let i = 0; i < 15; i++) this._step();
  }

  // [0, 1) float, the Math.random() analogue.
  float() {
    return (this._step() >>> 0) / 0x100000000;
  }

  // Integer in [min, max] inclusive.
  int(min, max) {
    return min + (this._step() % (max - min + 1));
  }

  // Random element from array. Throws if array is empty.
  pick(arr) {
    if (!arr.length) throw new Error('Engine.PRNG.pick: empty array');
    return arr[this._step() % arr.length];
  }

  // Fisher-Yates shuffle in place. Returns the same array.
  shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = this._step() % (i + 1);
      const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  // SFC32 step: updates state and returns a 32-bit unsigned integer.
  _step() {
    const t = (this._a + this._b + this._d++) >>> 0;
    this._a = (this._b ^ (this._b >>> 9)) >>> 0;
    this._b = (this._c + (this._c << 3)) >>> 0;
    this._c = ((this._c << 21) | (this._c >>> 11)) >>> 0;
    this._c = (this._c + t) >>> 0;
    return t;
  }

  // cyrb128 by bryc (CC0). Hashes a string to four 32-bit seed words.
  static _cyrb128(str) {
    let h1 = 1779033703, h2 = 3144134277, h3 = 1013904242, h4 = 2773480762;
    for (let i = 0; i < str.length; i++) {
      const k = str.charCodeAt(i);
      h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
      h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
      h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
      h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
    }
    h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
    h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
    h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
    h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
    h1 ^= (h2 ^ h3 ^ h4); h2 ^= h1; h3 ^= h1; h4 ^= h1;
    return [h1 >>> 0, h2 >>> 0, h3 >>> 0, h4 >>> 0];
  }
}

Engine.PRNG = PRNG;

/* ==== scripts/bootstrap.js ==== */
// ============================================================================
// scripts/bootstrap.js
// ============================================================================
//
// bootstrapGame(options) - canonical game bootstrap helper.
//
// Consolidates the boilerplate that every build/<game>.html's <script> tail
// currently repeats: viewport-aware canvas sizing per ADR-0017, touch
// capability detection, optional context-menu suppression (for right-click
// games), Engine.Game construction with optional gameName for namespaced
// storage, initial scene set via a factory, and game start.
//
// Depends on:
//   Engine.Game (engine/game.js). The engine bundle must be loaded before
//   this script in the build concatenation order.
//
// Depended on by:
//   Game build bootstrap snippets. Replaces the inline IIFE that previously
//   appeared at the end of each build/<game>.html. Adoption is per-build:
//   existing builds continue to work with their inline bootstrap until each
//   is naturally regenerated. Drift v1 is the planned first build to adopt
//   the helper from the start; existing games migrate when next touched.
//
// Usage (Minesweeper-style, current inline form for comparison):
//   (function () {
//     const canvas = document.getElementById('game');
//     const preset = { w: 900, h: 600 };
//     canvas.width = preset.w; canvas.height = preset.h;
//     // fitToViewport, resize listener, canvas.oncontextmenu, etc.
//     const game = new Engine.Game(canvas, { gameName: 'minesweeper' });
//     game.setScene(new MinesweeperMenuScene(game));
//     game.start();
//   })();
//
// Equivalent with bootstrapGame:
//   bootstrapGame({
//     gameName: 'minesweeper',
//     presets: { regular: { w: 900, h: 600 } },
//     initialScene: function (game) { return new MinesweeperMenuScene(game); },
//     suppressContextMenu: true,
//   });
//
// Options:
//   canvasId          string. ID of canvas element. Default 'game'.
//   canvas            DOM element. Overrides canvasId if both provided.
//   gameName          string. Passed to Engine.Game for storage namespacing.
//                     Default '' (no namespace).
//   presets           { regular: {w, h}, compact?: {w, h} }. Required.
//                     If compact is omitted, regular is always used (the
//                     intentional letterbox-on-portrait path per ADR-0017).
//   initialScene      (game) => Scene. Factory required because the Game
//                     instance must exist before the initial Scene's
//                     constructor argument can be passed.
//   suppressContextMenu  bool. Default false. true disables the canvas's
//                     right-click context menu (for games that read
//                     Engine.input.mouse.right; see Minesweeper).
//
// Returns:
//   { game, preset, presetName, isTouch }
//     game         the constructed Engine.Game (already started)
//     preset       the chosen preset object { w, h }
//     presetName   'regular' or 'compact'
//     isTouch      bool. true if touch capability detected per ADR-0017.
//                  Scenes can use this to enlarge hit-target minimums.
//
// Throws if the canvas element is not found, presets.regular is missing, or
// initialScene is not a function. Errors are explicit and actionable.
//
// Preset selection:
//   When both regular and compact are defined, picks whichever aspect ratio
//   is closer (in log space) to the current viewport's. This matches the
//   reference snippet in docs/ARCHITECTURE.md "Logical canvas and viewport
//   bootstrap" and ADR-0017.
// ============================================================================

function bootstrapGame(options) {
  const opts = options || {};

  const canvas = opts.canvas || document.getElementById(opts.canvasId || 'game');
  if (!canvas || typeof canvas.getContext !== 'function') {
    throw new Error(
      "bootstrapGame: canvas element not found (looked for id '" +
      (opts.canvasId || 'game') + "'). Pass options.canvas or options.canvasId."
    );
  }

  const presets = opts.presets;
  if (!presets || !presets.regular) {
    throw new Error('bootstrapGame: options.presets.regular is required (e.g. { regular: { w: 900, h: 600 } }).');
  }

  if (typeof opts.initialScene !== 'function') {
    throw new Error('bootstrapGame: options.initialScene must be a factory function (game) => sceneInstance.');
  }

  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  function pickPreset() {
    if (!presets.compact) return { name: 'regular', preset: presets.regular };
    const va = window.innerWidth / window.innerHeight;
    const ra = presets.regular.w / presets.regular.h;
    const ca = presets.compact.w / presets.compact.h;
    const useCompact = Math.abs(Math.log(va / ca)) < Math.abs(Math.log(va / ra));
    return useCompact
      ? { name: 'compact', preset: presets.compact }
      : { name: 'regular', preset: presets.regular };
  }

  const chosen = pickPreset();
  const preset = chosen.preset;
  canvas.width = preset.w;
  canvas.height = preset.h;

  function fitToViewport() {
    const s = Math.min(window.innerWidth / preset.w, window.innerHeight / preset.h);
    canvas.style.width = (preset.w * s) + 'px';
    canvas.style.height = (preset.h * s) + 'px';
  }
  fitToViewport();
  window.addEventListener('resize', fitToViewport);

  if (opts.suppressContextMenu) {
    canvas.oncontextmenu = function (e) { e.preventDefault(); };
  }

  const game = new Engine.Game(canvas, { gameName: opts.gameName || '' });
  game.setScene(opts.initialScene(game));
  game.start();

  return { game: game, preset: preset, presetName: chosen.name, isTouch: isTouch };
}

/* ==== scripts/pause-overlay.js ==== */
// scripts/pause-overlay.js
// Reusable pause overlay utility. Not a Script subclass -- a plain class that
// any scene owns and delegates to. Lives in scripts/ as the closest available
// folder; a utils/ folder may be warranted if more non-Script utilities appear.
//
// Usage in a scene:
//   this._pause = new PauseOverlay(game, {
//     onRestart: () => game.setScene(new MatchScene(game)),  // optional
//     onQuit:    () => game.setScene(new Menu(game)),        // optional
//   });
//   In update(dt): this._pause.update(dt); if (this._pause.isPaused()) return;
//   In draw(ctx): /* game draw */ this._pause.draw(ctx); // last, on top
//
// ESC toggles pause. Row layout (rows present only if their callback is provided):
//   RESUME
//   AUDIO    (volume + mute)
//   RESTART  (only if onRestart)
//   QUIT     (only if onQuit)
//
// Controls when paused:
//   Up/Down       navigate rows
//   Left/Right    adjust volume when on AUDIO row
//   M             toggle mute when on AUDIO row
//   Space/Enter   activate selected row
//   Escape        resume
//
// Depends on: Engine.input, Engine.audio.
// Used by: SurvivorsMatchScene, HTTMatchScene, and any future game scene.

class PauseOverlay {
  constructor(game, options = {}) {
    this._game      = game;
    this._paused    = false;
    this._onRestart = options.onRestart ?? null;
    this._onQuit    = options.onQuit    ?? null;
    this._cursor    = 0;
    this._rows      = this._buildRows();
  }

  /** Build the row layout based on which callbacks were provided. Each row is
   * { kind, label }. The 'volume' row's label is regenerated at draw time. */
  _buildRows() {
    const rows = [
      { kind: 'resume', label: 'RESUME' },
      { kind: 'volume', label: '' }, // regenerated dynamically
    ];
    if (this._onRestart) rows.push({ kind: 'restart', label: 'RESTART' });
    if (this._onQuit)    rows.push({ kind: 'quit',    label: 'QUIT TO MENU' });
    return rows;
  }

  toggle() { this._paused = !this._paused; if (!this._paused) this._cursor = 0; }
  isPaused() { return this._paused; }

  update(dt) {
    if (Engine.input.wasJustPressed('Escape')) { this.toggle(); return; }
    if (!this._paused) return;

    const n = this._rows.length;
    if (Engine.input.wasJustPressed('ArrowUp'))
      this._cursor = (this._cursor - 1 + n) % n;
    if (Engine.input.wasJustPressed('ArrowDown'))
      this._cursor = (this._cursor + 1) % n;

    const row = this._rows[this._cursor];

    if (row.kind === 'volume') {
      if (Engine.input.wasJustPressed('ArrowLeft'))
        Engine.audio.setVolume(+(Math.max(0, Engine.audio.getVolume() - 0.1)).toFixed(1));
      if (Engine.input.wasJustPressed('ArrowRight'))
        Engine.audio.setVolume(+(Math.min(1, Engine.audio.getVolume() + 0.1)).toFixed(1));
      if (Engine.input.wasJustPressed('m') || Engine.input.wasJustPressed('M'))
        Engine.audio.setMuted(!Engine.audio.isMuted());
    }

    if (Engine.input.wasJustPressed('Enter') || Engine.input.wasJustPressed(' ')) {
      if (row.kind === 'resume')  { this.toggle(); }
      else if (row.kind === 'restart' && this._onRestart) { this._paused = false; this._onRestart(); }
      else if (row.kind === 'quit'    && this._onQuit)    { this._paused = false; this._onQuit(); }
    }
  }

  draw(ctx) {
    if (!this._paused) return;
    const W = ctx.canvas.width, H = ctx.canvas.height;
    ctx.save();

    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, W, H);

    // Panel height scales with row count so 4-row layouts don't crowd.
    const n  = this._rows.length;
    const pw = 420;
    const ph = 180 + n * 50;
    const px = W / 2 - pw / 2, py = H / 2 - ph / 2 - 16;
    ctx.fillStyle = '#111827'; ctx.fillRect(px, py, pw, ph);
    ctx.strokeStyle = '#374151'; ctx.lineWidth = 2; ctx.strokeRect(px, py, pw, ph);

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 40px monospace';
    ctx.fillText('PAUSED', W / 2, py + 44);

    ctx.strokeStyle = '#374151'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px + 20, py + 72); ctx.lineTo(px + pw - 20, py + 72); ctx.stroke();

    const muted = Engine.audio.isMuted();
    const vol   = Math.round(Engine.audio.getVolume() * 10);
    const volStr = muted ? 'AUDIO  [MUTED]' : 'AUDIO  [' + '|'.repeat(vol) + ' '.repeat(10 - vol) + '] ' + vol + '/10';

    for (let i = 0; i < n; i++) {
      const row = this._rows[i];
      const ry  = py + 106 + i * 50, sel = i === this._cursor;
      if (sel) { ctx.fillStyle = 'rgba(241,196,15,0.10)'; ctx.fillRect(px + 12, ry - 20, pw - 24, 40); }
      ctx.fillStyle = sel ? '#f1c40f' : '#9ca3af';
      ctx.font      = sel ? 'bold 20px monospace' : '18px monospace';
      const label = row.kind === 'volume' ? volStr : row.label;
      ctx.fillText(label, W / 2, ry);
    }

    ctx.fillStyle = '#4b5563'; ctx.font = '11px monospace';
    ctx.fillText('UP/DOWN navigate   LEFT/RIGHT volume   M mute   ESC resume', W / 2, py + ph - 16);
    ctx.restore();
  }
}

/* ==== scripts/rect-renderer.js ==== */
// scripts/rect-renderer.js
// Draws a filled rectangle centered at the host GameObject's position.
// Depends on: Engine.Script.
// Used by: any GameObject that should render as a colored rectangle.

class RectRenderer extends Engine.Script {
  constructor(host, options = {}) {
    super(host);
    this.width = options.width ?? 32;
    this.height = options.height ?? 32;
    this.color = options.color ?? '#ffffff';
  }

  draw(ctx) {
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.width / 2, -this.height / 2, this.width, this.height);
  }
}

/* ==== scripts/collider.js ==== */
// scripts/collider.js
// Axis-aligned bounding box collision detection.
// Width and height define the box centered on the host's position.
// Detected collisions invoke onCollide(other) on each Collider in the pair.
// Subclass to override onCollide, or pass an onCollide callback in options.
// Depends on: Engine.Script. Engine.Scene runs the pairwise check via duck-typing on isCollider.
// Used by: any GameObject that should participate in collision detection.

class Collider extends Engine.Script {
  constructor(host, options = {}) {
    super(host);
    this.width = options.width ?? 32;
    this.height = options.height ?? 32;
    this.tag = options.tag ?? '';        // game-defined string for filtering, e.g., 'ball', 'paddle', 'wall'
    this.isCollider = true;               // duck-type marker for Scene to find us
    this._onCollideCallback = options.onCollide ?? null;
  }

  /** Get the AABB in world-space, centered on the host's position. */
  getAabb() {
    return {
      x: this.host.x - this.width / 2,
      y: this.host.y - this.height / 2,
      w: this.width,
      h: this.height
    };
  }

  /** Called by Scene when this Collider overlaps another.
   *  Default: invoke the onCollide callback if one was provided.
   *  Subclasses may override this directly. */
  onCollide(other) {
    if (this._onCollideCallback) {
      this._onCollideCallback(other);
    }
  }
}

/* ==== games/survivors/scripts/coin.js ==== */
// games/survivors/scripts/coin.js
// Coin dropped by enemies on death. Stationary, 10-second lifetime.
// Fades to half opacity in the last 3 seconds as a pickup warning.
// 16x16 AABB around 8x8 visual for forgiving collection.
// ADR-0010 extension contract: isCollider + getAabb + onCollide.
// Depends on: Engine.Script, Engine.signals.
// Used by: SurvivorsMatchScene (spawns on enemy death).

class SurvivorsCoin extends Engine.Script {
  constructor(host, options = {}) {
    super(host);
    this.value      = options.value ?? 1;
    this._lifetime  = 10;  // 10 seconds; fades to half at < 3s
    this._dead      = false;
    this.isCollider = true;
    this.tag        = 'coin';
  }

  getAabb() {
    return { x: this.host.x - 8, y: this.host.y - 8, w: 16, h: 16 };
  }

  onCollide(other) {
    if (this._dead) return;
    if (other.tag === 'player') {
      this._dead = true;
      Engine.signals.emit('survivors_coin_collected', { value: this.value });
      Engine.signals.emit('survivors_remove', { obj: this.host });
    }
  }

  update(dt) {
    if (this._dead) return;
    this._lifetime -= dt;
    if (this._lifetime <= 0) {
      this._dead = true;
      Engine.signals.emit('survivors_remove', { obj: this.host });
    }
  }

  draw(ctx) {
    if (this._dead) return;
    // Above 3s: fully opaque. Last 3s: eases from 1.0 to 0.5 (stays visible, signals urgency).
    const alpha = this._lifetime < 3 ? 0.5 + 0.5 * (this._lifetime / 3.0) : 1.0;
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#f1c40f';
    ctx.fillRect(-4, -4, 8, 8);
    ctx.fillStyle = 'rgba(255,255,200,0.55)';
    ctx.fillRect(-2, -2, 4, 4);
    ctx.restore();
  }
}

/* ==== games/survivors/scripts/enemy.js ==== */
// games/survivors/scripts/enemy.js
// Enemy for Survivors. Approaches player via 'straight' or 'sine' pattern.
// Carries a coinValue that the projectile includes in survivors_enemy_died so
// the match scene can drop a coin at the death position.
// Damage from projectiles is handled entirely in SurvivorsProjectile.onCollide.
// Depends on: Engine.Script, Engine.signals.
// Used by: SurvivorsMatchScene.

class SurvivorsEnemy extends Engine.Script {
  constructor(host, options = {}) {
    super(host);
    this.speed      = options.speed      ?? 80;
    this.maxHealth  = options.maxHealth  ?? 40;
    this.health     = this.maxHealth;
    this.damage     = options.damage     ?? 10;
    this.size       = options.size       ?? 18;
    this.color      = options.color      ?? '#e74c3c';
    this.xp         = options.xp         ?? 1;
    this.coinValue  = options.coinValue  ?? 3;   // coins dropped on death
    this.pattern    = options.pattern    ?? 'straight';
    this._player         = options.player ?? null;
    this._sinePhase      = 0;
    this._damageCooldown = 0;
    this._dead     = false;
    this.isCollider = true;
    this.tag        = 'enemy';
  }

  getAabb() {
    return { x: this.host.x - this.size / 2, y: this.host.y - this.size / 2, w: this.size, h: this.size };
  }

  onCollide(other) {
    if (this._dead) return;
    if (other.tag === 'player' && this._damageCooldown <= 0) {
      Engine.signals.emit('survivors_player_hit', { damage: this.damage });
      this._damageCooldown = 0.6;
    }
    // Projectile damage handled by SurvivorsProjectile.onCollide.
  }

  update(dt) {
    if (this._dead) return;
    if (this._damageCooldown > 0) this._damageCooldown -= dt;
    if (!this._player) return;
    const dx = this._player.x - this.host.x, dy = this._player.y - this.host.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 1) return;
    let nx = dx / len, ny = dy / len;
    if (this.pattern === 'sine') {
      this._sinePhase += dt * 3.5;
      const px = -ny, py = nx, amp = Math.sin(this._sinePhase) * 0.65;
      nx += px * amp; ny += py * amp;
      const l2 = Math.sqrt(nx * nx + ny * ny);
      if (l2 > 0.001) { nx /= l2; ny /= l2; }
    }
    this.host.x += nx * this.speed * dt;
    this.host.y += ny * this.speed * dt;
  }

  draw(ctx) {
    if (this._dead) return;
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
    if (this.health < this.maxHealth) {
      const bw = this.size + 6, bh = 4, bx = -bw / 2, by = -this.size / 2 - 8;
      ctx.fillStyle = '#4b0000'; ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = '#e74c3c'; ctx.fillRect(bx, by, bw * Math.max(0, this.health / this.maxHealth), bh);
    }
  }
}

/* ==== games/survivors/scripts/projectile.js ==== */
// games/survivors/scripts/projectile.js
// Projectile for Survivors. Handles all enemy damage in onCollide (order-
// independent design -- see file header of the previous version for the
// ordering rationale). Now also passes coinValue through survivors_enemy_died
// so the match scene can spawn a coin at the enemy's last position.
// ADR-0010 extension contract: isCollider + getAabb + onCollide.
// Depends on: Engine.Script, Engine.signals.
// Used by: SurvivorsPlayerController (spawns), SurvivorsMatchScene (removes).

class SurvivorsProjectile extends Engine.Script {
  constructor(host, options = {}) {
    super(host);
    this._vx      = options.vx      ?? 0;
    this._vy      = options.vy      ?? 0;
    this.damage   = options.damage  ?? 25;
    this.size     = options.size    ?? 6;
    this._canvasW = options.canvasW ?? 800;
    this._canvasH = options.canvasH ?? 600;
    this._dead    = false;
    this.isCollider = true;
    this.tag        = 'projectile';
  }

  getAabb() {
    return { x: this.host.x - this.size / 2, y: this.host.y - this.size / 2, w: this.size, h: this.size };
  }

  onCollide(other) {
    if (this._dead) return;
    if (other.tag !== 'enemy' || other._dead) return;
    this._dead   = true;
    other.health -= this.damage;
    if (other.health <= 0) {
      other._dead = true;
      Engine.signals.emit('survivors_enemy_died', {
        obj:       other.host,
        xp:        other.xp,
        coinValue: other.coinValue ?? 0,
      });
      Engine.signals.emit('survivors_remove', { obj: other.host });
    }
    Engine.signals.emit('survivors_remove', { obj: this.host });
  }

  update(dt) {
    if (this._dead) return;
    this.host.x += this._vx * dt;
    this.host.y += this._vy * dt;
    const m = 24;
    if (this.host.x < -m || this.host.x > this._canvasW + m ||
        this.host.y < -m || this.host.y > this._canvasH + m) {
      this._dead = true;
      Engine.signals.emit('survivors_remove', { obj: this.host });
    }
  }

  draw(ctx) {
    if (this._dead) return;
    ctx.fillStyle = '#f1c40f';
    ctx.fillRect(-this.size / 2, -this.size / 2, this.size, this.size);
  }
}

/* ==== games/survivors/scripts/player-controller.js ==== */
// games/survivors/scripts/player-controller.js
// Player movement (WASD/arrows, normalized diagonal) and auto-fire.
// Only fires at enemies within stats.range (shooting range).
// Draws two subtle indicator circles:
//   white  - shooting range (stats.range)
//   yellow - coin magnet range (stats.magnetRange, hidden if 0)
// MULTI-SHOT fires an odd-count fan so a center-aimed shot always exists.
// Depends on: Engine.Script, Engine.input.
//   SurvivorsProjectile must be defined before this file in the build.
// Used by: SurvivorsMatchScene.

class SurvivorsPlayerController extends Engine.Script {
  constructor(host, options = {}) {
    super(host);
    this._stats        = options.stats;
    this._scene        = options.scene;
    this._enemies      = options.enemies;
    this._fireCooldown = 0;
  }

  update(dt) {
    const input = Engine.input;
    let dx = 0, dy = 0;
    if (input.isDown('ArrowLeft')  || input.isDown('a') || input.isDown('A')) dx -= 1;
    if (input.isDown('ArrowRight') || input.isDown('d') || input.isDown('D')) dx += 1;
    if (input.isDown('ArrowUp')    || input.isDown('w') || input.isDown('W')) dy -= 1;
    if (input.isDown('ArrowDown')  || input.isDown('s') || input.isDown('S')) dy += 1;
    if (dx !== 0 && dy !== 0) { const inv = 1 / Math.sqrt(2); dx *= inv; dy *= inv; }

    const s = this._stats;
    this.host.x = Math.max(s.playerSize / 2, Math.min(s.canvasW - s.playerSize / 2, this.host.x + dx * s.speed * dt));
    this.host.y = Math.max(s.playerSize / 2, Math.min(s.canvasH - s.playerSize / 2, this.host.y + dy * s.speed * dt));

    this._fireCooldown -= dt;
    if (this._fireCooldown <= 0) {
      const target = this._nearestInRange();
      if (target) {
        this._fireAt(target);
        this._fireCooldown = 1 / s.fireRate;
      }
    }
  }

  _nearestInRange() {
    let nearest = null, bestSq = Infinity;
    const rangeSq = this._stats.range * this._stats.range;
    for (const e of this._enemies) {
      const dx = e.x - this.host.x, dy = e.y - this.host.y;
      const sq = dx * dx + dy * dy;
      if (sq <= rangeSq && sq < bestSq) { bestSq = sq; nearest = e; }
    }
    return nearest;
  }

  _fireAt(target) {
    const dx = target.x - this.host.x, dy = target.y - this.host.y;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 0.01) return;
    const s = this._stats, count = s.projectileCount;
    const spread = (count - 1) * 0.14, base = Math.atan2(dy, dx);
    for (let i = 0; i < count; i++) {
      const angle = base + (count > 1 ? -spread / 2 + (spread / (count - 1)) * i : 0);
      const proj  = new Engine.GameObject(this.host.x, this.host.y);
      proj.attach(new SurvivorsProjectile(proj, {
        vx: Math.cos(angle) * 400, vy: Math.sin(angle) * 400,
        damage: s.damage, size: s.projectileSize, canvasW: s.canvasW, canvasH: s.canvasH,
      }));
      this._scene.add(proj);
    }
  }

  draw(ctx) {
    // Shooting range: white, barely visible.
    ctx.beginPath();
    ctx.arc(0, 0, this._stats.range, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(255, 255, 255, 0.10)';
    ctx.lineWidth   = 1;
    ctx.stroke();

    // Coin magnet range: yellow, barely visible. Hidden when magnetRange is 0.
    const mr = this._stats.magnetRange || 0;
    if (mr > 0) {
      ctx.beginPath();
      ctx.arc(0, 0, mr, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(255, 220, 0, 0.15)';
      ctx.lineWidth   = 1;
      ctx.stroke();
    }
  }
}

/* ==== games/survivors/scenes/survivors-menu.js ==== */
// games/survivors/scenes/survivors-menu.js
// Title screen for Survivors. Creates fresh stats on each new game.
// Fades in on enter; fades out before handing off to the match scene.
// Depends on: Engine.Scene, Engine.input.
//   SurvivorsMatchScene must be defined in build (transition target).
// Used by: Survivors bootstrap; SurvivorsMatchScene (back on death/quit).

class SurvivorsMenuScene extends Engine.Scene {
  constructor(game) {
    super();
    this._game     = game;
    this._fadeIn   = 1.0;
    this._pendingOut    = null;
    this._fadeOutTimer  = 0;
  }

  enter() {
    this._fadeIn        = 1.0;
    this._pendingOut    = null;
    this._fadeOutTimer  = 0;
  }
  exit() {}

  update(dt) {
    // Fade-out to next scene takes priority.
    if (this._pendingOut) {
      this._fadeOutTimer += dt;
      if (this._fadeOutTimer >= 0.35) this._game.setScene(this._pendingOut);
      return;
    }

    // Fade-in: decrement but don't block input (player may press immediately).
    if (this._fadeIn > 0) this._fadeIn = Math.max(0, this._fadeIn - dt * 2.5);

    if (Engine.input.wasJustPressed(' ') || Engine.input.wasJustPressed('Enter')) {
      this._pendingOut = new SurvivorsMatchScene(this._game, {
        level: 1,
        stats: {
          maxHealth:      100,
          currentHealth:  100,
          speed:          180,
          fireRate:       1.5,
          damage:         25,
          projectileCount:1,
          projectileSize: 6,
          playerSize:     20,
          canvasW:        800,
          canvasH:        600,
          range:          200,
          coins:          0,
          upgradeLevels:  {},
          magnetRange:    0,
        },
      });
    }
  }

  draw(ctx) {
    const W = ctx.canvas.width, H = ctx.canvas.height;
    ctx.fillStyle = '#050510'; ctx.fillRect(0, 0, W, H);
    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#2ecc71'; ctx.font = 'bold 72px monospace';
    ctx.fillText('SURVIVORS', W / 2, H / 2 - 90);
    ctx.fillStyle = '#ffffff'; ctx.font = '22px monospace';
    ctx.fillText('PRESS SPACE OR ENTER TO PLAY', W / 2, H / 2 - 10);
    ctx.fillStyle = '#666666'; ctx.font = '15px monospace';
    ctx.fillText('WASD or ARROW KEYS to move', W / 2, H / 2 + 44);
    ctx.fillText('Auto-shoots enemies within range', W / 2, H / 2 + 68);
    ctx.fillText('Collect coins, spend them in the shop', W / 2, H / 2 + 92);
    ctx.fillText('ESC to pause', W / 2, H / 2 + 116);
    ctx.restore();

    // Fade-in overlay
    if (this._fadeIn > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this._fadeIn})`;
      ctx.fillRect(0, 0, W, H);
    }
    // Fade-out overlay
    if (this._pendingOut) {
      const a = Math.min(1, this._fadeOutTimer / 0.35);
      ctx.fillStyle = `rgba(0,0,0,${a})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
}

/* ==== games/survivors/scenes/survivors-match.js ==== */
// games/survivors/scenes/survivors-match.js
// Core gameplay scene for Survivors.
//
// Wave completion model:
//   Enemies spawn for WAVE_DURATION seconds, then _spawningDone = true.
//   The shop transition only fires when _spawningDone && _enemies.length === 0.
//   This lets the player feel like they finished the wave rather than being cut
//   off mid-fight at the timer expiry.
//
// Fade transitions: _fadeIn counts down from 1.0 on enter (black overlay).
//   _pendingOut holds the queued next scene; a 0.35s fade-to-black runs before
//   setScene() is called. All transitions (wave complete, death, quit) use this.
//
// Coin magnet: _applyMagnet(dt) runs after super.update() each frame. It pulls
//   any SurvivorsCoin objects within stats.magnetRange toward the player at
//   220 px/s. No structural change to the coin script required.
//
// Swarm clustering: when _spawnEnemy() rolls a 'swarm' type, it spawns three
//   enemies at the chosen edge point with a small random offset on the second
//   and third, so they read as one group. Each spawn tick still counts as a
//   single tick for cadence purposes; the cluster simply produces 3 enemies
//   instead of 1. Swarm is in the level-1 pool, so this applies from wave 1.
//
// Signals (all 'survivors_' prefixed):
//   survivors_remove      { obj }               remove a GameObject
//   survivors_enemy_died  { obj, xp, coinValue } increment kills, spawn coin
//   survivors_player_hit  { damage }             reduce player health
//   survivors_coin_collected { value }           add to stats.coins
//
// Depends on: Engine.Scene, Engine.GameObject, Engine.signals, Engine.input,
//   RectRenderer, Collider, PauseOverlay,
//   SurvivorsPlayerController, SurvivorsProjectile, SurvivorsEnemy,
//   SurvivorsCoin, SurvivorsMenuScene, SurvivorsShopScene.
// Used by: SurvivorsMenuScene, SurvivorsShopScene.

class SurvivorsMatchScene extends Engine.Scene {
  constructor(game, options = {}) {
    super();
    this._game  = game;
    this._level = options.level ?? 1;
    this._stats = options.stats ?? {
      maxHealth:100, currentHealth:100, speed:180, fireRate:1.5,
      damage:25, projectileCount:1, projectileSize:6,
      playerSize:20, canvasW:800, canvasH:600,
      range:200, coins:0, upgradeLevels:{}, magnetRange:0,
    };
    this.WAVE_DURATION  = 30;
    this._playerHealth  = 0;
    this._kills         = 0;
    this._waveTimer     = this.WAVE_DURATION;
    this._spawningDone  = false;
    this._spawnTimer    = 1.0;
    this._enemies       = [];
    this._playerObj     = null;
    this._state         = 'playing';
    this._deadTimer     = 3.0;
    this._pause         = null;
    this._unsubscribers = [];
    this._fadeIn        = 1.0;
    this._pendingOut    = null;
    this._fadeOutTimer  = 0;
  }

  _getSpawnInterval() {
    return Math.max(0.22, 1.2 - (this._level - 1) * 0.12);
  }

  _getEnemyTypePool() {
    const pool = ['basic', 'basic', 'swarm'];
    if (this._level >= 2) pool.push('swarm');
    if (this._level >= 3) pool.push('sine',  'swarm');
    if (this._level >= 4) pool.push('tank');
    if (this._level >= 5) pool.push('swarm', 'swarm', 'sine');
    if (this._level >= 7) pool.push('tank',  'sine');
    return pool;
  }

  _getEnemyConfig(type) {
    const hm = 1 + (this._level - 1) * 0.10;
    const sm = 1 + (this._level - 1) * 0.04;
    const base = {
      basic: { speed:82,  maxHealth:45,  size:18, damage:10, color:'#e74c3c', xp:1, pattern:'straight', coinValue:3 },
      swarm: { speed:155, maxHealth:14,  size:10, damage:7,  color:'#e67e22', xp:1, pattern:'straight', coinValue:1 },
      tank:  { speed:48,  maxHealth:240, size:32, damage:22, color:'#8e44ad', xp:3, pattern:'straight', coinValue:8 },
      sine:  { speed:98,  maxHealth:32,  size:14, damage:9,  color:'#3498db', xp:1, pattern:'sine',     coinValue:2 },
    };
    const cfg = { ...(base[type] || base.basic) };
    cfg.maxHealth = Math.round(cfg.maxHealth * hm);
    cfg.speed     = Math.round(cfg.speed     * sm);
    return cfg;
  }

  _spawnEnemy() {
    const { canvasW, canvasH } = this._stats, m = 40;
    const side = Math.floor(Math.random() * 4);
    let x, y;
    switch (side) {
      case 0: x = Math.random() * canvasW; y = -m;          break;
      case 1: x = canvasW + m;             y = Math.random() * canvasH; break;
      case 2: x = Math.random() * canvasW; y = canvasH + m; break;
      default: x = -m;                    y = Math.random() * canvasH;
    }
    const pool  = this._getEnemyTypePool();
    const type  = pool[Math.floor(Math.random() * pool.length)];
    // Swarm rolls spawn as a cluster of three. The first is at the anchor
    // point; the next two get a small random offset so they don't overlap.
    const count = type === 'swarm' ? 3 : 1;
    for (let i = 0; i < count; i++) {
      const cfg   = this._getEnemyConfig(type);
      const ox    = i === 0 ? 0 : (Math.random() - 0.5) * 36;
      const oy    = i === 0 ? 0 : (Math.random() - 0.5) * 36;
      const enemy = new Engine.GameObject(x + ox, y + oy);
      enemy.attach(new SurvivorsEnemy(enemy, { ...cfg, player: this._playerObj }));
      this._enemies.push(enemy);
      this.add(enemy);
    }
  }

  // Pulls coins within stats.magnetRange toward the player at 220 px/s.
  _applyMagnet(dt) {
    const mr = this._stats.magnetRange || 0;
    if (mr <= 0 || !this._playerObj) return;
    const px = this._playerObj.x, py = this._playerObj.y;
    const PULL_SPEED = 220;
    for (const obj of this.objects) {
      for (const s of obj.scripts) {
        if (s.tag === 'coin' && !s._dead) {
          const dx = px - obj.x, dy = py - obj.y;
          const distSq = dx * dx + dy * dy;
          if (distSq < mr * mr && distSq > 1) {
            const dist = Math.sqrt(distSq);
            obj.x += (dx / dist) * PULL_SPEED * dt;
            obj.y += (dy / dist) * PULL_SPEED * dt;
          }
        }
      }
    }
  }

  enter() {
    this._playerHealth = this._stats.currentHealth;
    this._kills        = 0;
    this._waveTimer    = this.WAVE_DURATION;
    this._spawningDone = false;
    this._spawnTimer   = 1.0;
    this._enemies      = [];
    this._state        = 'playing';
    this._deadTimer    = 3.0;
    this._fadeIn       = 1.0;
    this._pendingOut   = null;
    this._fadeOutTimer = 0;

    const { canvasW, canvasH, playerSize } = this._stats;
    this._playerObj = new Engine.GameObject(canvasW / 2, canvasH / 2);
    this._playerObj.attach(new RectRenderer(this._playerObj, { width:playerSize, height:playerSize, color:'#2ecc71' }));
    this._playerObj.attach(new SurvivorsPlayerController(this._playerObj, { stats:this._stats, scene:this, enemies:this._enemies }));
    this._playerObj.attach(new Collider(this._playerObj, { width:playerSize, height:playerSize, tag:'player' }));
    this.add(this._playerObj);

    this._pause = new PauseOverlay(this._game, { onQuit: () => {
      this._pendingOut   = new SurvivorsMenuScene(this._game);
      this._fadeOutTimer = 0;
    }});

    this._unsubscribers.push(
      Engine.signals.on('survivors_remove', ({ obj }) => {
        const idx = this._enemies.indexOf(obj); if (idx !== -1) this._enemies.splice(idx, 1);
        this.remove(obj);
      }),
      Engine.signals.on('survivors_enemy_died', ({ obj, coinValue }) => {
        this._kills++;
        if ((coinValue || 0) > 0) {
          const coin = new Engine.GameObject(obj.x, obj.y);
          coin.attach(new SurvivorsCoin(coin, { value: coinValue }));
          this.add(coin);
        }
      }),
      Engine.signals.on('survivors_player_hit', ({ damage }) => {
        if (this._state !== 'playing') return;
        this._playerHealth = Math.max(0, this._playerHealth - damage);
        this._stats.currentHealth = this._playerHealth;
        if (this._playerHealth <= 0) this._state = 'dead';
      }),
      Engine.signals.on('survivors_coin_collected', ({ value }) => {
        this._stats.coins = (this._stats.coins || 0) + value;
      }),
    );
  }

  exit() {
    for (const unsub of this._unsubscribers) unsub();
    this._unsubscribers = []; this.objects.length = 0; this._enemies = [];
  }

  update(dt) {
    // Fade-in (visual only, doesn't block logic).
    if (this._fadeIn > 0) this._fadeIn = Math.max(0, this._fadeIn - dt * 2.5);

    // Fade-out to queued next scene.
    if (this._pendingOut) {
      this._fadeOutTimer += dt;
      if (this._fadeOutTimer >= 0.35) this._game.setScene(this._pendingOut);
      return;
    }

    this._pause.update(dt);
    if (this._pause.isPaused()) return;

    if (this._state === 'dead') {
      this._deadTimer -= dt;
      if (this._deadTimer <= 0 || Engine.input.wasJustPressed('Enter') || Engine.input.wasJustPressed(' ')) {
        this._pendingOut   = new SurvivorsMenuScene(this._game);
        this._fadeOutTimer = 0;
      }
      return;
    }

    // Wave timer: spawn until WAVE_DURATION, then stop.
    if (!this._spawningDone) {
      this._waveTimer -= dt;
      if (this._waveTimer <= 0) {
        this._waveTimer    = 0;
        this._spawningDone = true;
      } else {
        this._spawnTimer -= dt;
        if (this._spawnTimer <= 0) {
          this._spawnEnemy();
          if (this._level >= 5 && Math.random() < 0.25) this._spawnEnemy();
          this._spawnTimer = this._getSpawnInterval();
        }
      }
    }

    // Wave complete: all enemies cleared after spawning stopped.
    if (this._spawningDone && this._enemies.length === 0) {
      this._stats.currentHealth = this._playerHealth;
      this._pendingOut   = new SurvivorsShopScene(this._game, {
        level: this._level, stats: this._stats, kills: this._kills,
      });
      this._fadeOutTimer = 0;
      return;
    }

    super.update(dt);
    this._applyMagnet(dt);
  }

  _bgColor() {
    const p = ['#050510','#051005','#100505','#050a10','#0d0510','#051010'];
    return p[(this._level - 1) % p.length];
  }

  draw(ctx) {
    const W = this._stats.canvasW, H = this._stats.canvasH;
    ctx.fillStyle = this._bgColor(); ctx.fillRect(0, 0, W, H);
    super.draw(ctx);
    this._drawHUD(ctx);

    if (this._state === 'dead') {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H);
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle='#e74c3c'; ctx.font='bold 62px monospace'; ctx.fillText('GAME OVER', W/2, H/2-44);
      ctx.fillStyle='#aaaaaa'; ctx.font='20px monospace'; ctx.fillText('Level '+this._level+'   Kills: '+this._kills, W/2, H/2+14);
      ctx.fillStyle='#666666'; ctx.font='16px monospace'; ctx.fillText('SPACE or ENTER to continue', W/2, H/2+54);
      ctx.restore();
    }

    this._pause.draw(ctx);

    // Fade-in overlay (clears as scene opens)
    if (this._fadeIn > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this._fadeIn})`;
      ctx.fillRect(0, 0, W, H);
    }
    // Fade-out overlay (builds as scene closes)
    if (this._pendingOut) {
      const a = Math.min(1, this._fadeOutTimer / 0.35);
      ctx.fillStyle = `rgba(0,0,0,${a})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  _drawHUD(ctx) {
    const W = this._stats.canvasW, H = this._stats.canvasH;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.45)'; ctx.fillRect(0, 0, W, 28);
    ctx.fillStyle = '#dddddd'; ctx.font = '14px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    const timerPart = this._spawningDone
      ? '   DEFEAT ALL! (' + this._enemies.length + ' left)'
      : '   ' + Math.ceil(Math.max(0, this._waveTimer)) + 's';
    ctx.fillText(
      'LEVEL ' + this._level + timerPart +
      '   KILLS: ' + this._kills +
      '   COINS: ' + (this._stats.coins || 0),
      W / 2, 7
    );
    const bw=220, bh=12, bx=W/2-bw/2, by=H-22;
    const ratio = Math.max(0, this._playerHealth / this._stats.maxHealth);
    ctx.fillStyle='#222'; ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle=ratio>0.5?'#2ecc71':ratio>0.25?'#f39c12':'#e74c3c';
    ctx.fillRect(bx, by, bw*ratio, bh);
    ctx.fillStyle='#888'; ctx.font='10px monospace';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText(Math.ceil(this._playerHealth)+' / '+this._stats.maxHealth, W/2, by+bh/2);
    ctx.fillStyle='#333'; ctx.font='11px monospace';
    ctx.textAlign='right'; ctx.textBaseline='bottom';
    ctx.fillText('ESC: pause', W-6, H-4);
    ctx.restore();
  }
}

/* ==== games/survivors/scenes/survivors-shop.js ==== */
// games/survivors/scenes/survivors-shop.js
// Between-wave shop for Survivors.
// Fades in on entry; fades out before transitioning to the next match.
// Upgrade prices: basePrice + purchaseCount * priceInc.
// 8 upgrades shown simultaneously (all available at once, prices visible).
// Navigation: ArrowUp/Down or W/S; confirm with Enter/Space.
// Depends on: Engine.Scene, Engine.input.
//   SurvivorsMatchScene must be defined in build (transition target).
// Used by: SurvivorsMatchScene (on wave completion).

class SurvivorsShopScene extends Engine.Scene {
  constructor(game, options = {}) {
    super();
    this._game   = game;
    this._level  = options.level ?? 1;
    this._stats  = options.stats;
    this._kills  = options.kills ?? 0;
    this._cursor = 0;
    this._fade   = 1.0;   // fade-in
    this._pendingOut   = null;
    this._fadeOutTimer = 0;
    this._flashMsg     = '';
    this._flashTimer   = 0;
  }

  _nextBgColor() {
    const p = ['#050510','#051005','#100505','#050a10','#0d0510','#051010'];
    return p[this._level % p.length];
  }

  // MULTI-SHOT adds 2 (not 1) to keep projectileCount odd (center shot always present).
  _upgradePool() {
    const ul = this._stats.upgradeLevels || {};
    const defs = [
      { id:'maxHealth', label:'MAX HEALTH +25',    desc:'Increase max HP and fully heal.',         basePrice:20, priceInc:15, apply:(s)=>{ s.maxHealth+=25; s.currentHealth=s.maxHealth; } },
      { id:'speed',     label:'SPEED +30',          desc:'Move faster.',                             basePrice:22, priceInc:18, apply:(s)=>{ s.speed+=30; } },
      { id:'fireRate',  label:'FIRE RATE +20%',     desc:'Shoot more frequently.',                   basePrice:28, priceInc:22, apply:(s)=>{ s.fireRate=+(s.fireRate*1.2).toFixed(3); } },
      { id:'damage',    label:'DAMAGE +10',          desc:'More damage per projectile.',              basePrice:24, priceInc:18, apply:(s)=>{ s.damage+=10; } },
      { id:'range',     label:'RANGE +60',           desc:'Expand shooting range.',                   basePrice:18, priceInc:14, apply:(s)=>{ s.range+=60; } },
      { id:'magnet',    label:'COIN MAGNET +80px',   desc:'Auto-attract nearby coins.',               basePrice:30, priceInc:22, apply:(s)=>{ s.magnetRange=(s.magnetRange||0)+80; } },
      { id:'multiShot', label:'MULTI-SHOT (+2)',      desc:'Two more projectiles, always symmetric.',  basePrice:45, priceInc:35, apply:(s)=>{ s.projectileCount+=2; } },
      { id:'projSize',  label:'PROJECTILE SIZE +2',  desc:'Larger projectile hitbox.',                basePrice:14, priceInc:10, apply:(s)=>{ s.projectileSize+=2; } },
    ];
    return defs.map(u => ({ ...u, price: u.basePrice + (ul[u.id] || 0) * u.priceInc }));
  }

  _getItems() {
    return [
      ...this._upgradePool(),
      { id:'continue', label:'CONTINUE TO NEXT WAVE', desc:'Proceed with current loadout.', price:0 },
    ];
  }

  enter() {
    this._fade         = 1.0;
    this._cursor       = 0;
    this._pendingOut   = null;
    this._fadeOutTimer = 0;
    this._flashMsg     = '';
    this._flashTimer   = 0;
  }
  exit() {}

  update(dt) {
    // Fade-out to next scene.
    if (this._pendingOut) {
      this._fadeOutTimer += dt;
      if (this._fadeOutTimer >= 0.35) this._game.setScene(this._pendingOut);
      return;
    }

    // Fade-in: block interaction while black overlay is still substantial.
    if (this._fade > 0) { this._fade = Math.max(0, this._fade - dt * 2.5); return; }

    if (this._flashTimer > 0) this._flashTimer -= dt;

    const items = this._getItems();
    // Accept arrow keys and WASD, matching the player-controller pattern.
    if (Engine.input.wasJustPressed('ArrowUp')   || Engine.input.wasJustPressed('w') || Engine.input.wasJustPressed('W'))
      this._cursor = (this._cursor - 1 + items.length) % items.length;
    if (Engine.input.wasJustPressed('ArrowDown') || Engine.input.wasJustPressed('s') || Engine.input.wasJustPressed('S'))
      this._cursor = (this._cursor + 1) % items.length;

    if (Engine.input.wasJustPressed('Enter') || Engine.input.wasJustPressed(' ')) {
      const sel = items[this._cursor];
      const ul  = this._stats.upgradeLevels;

      if (sel.id === 'continue') {
        this._pendingOut = new SurvivorsMatchScene(this._game, {
          level: this._level + 1, stats: this._stats,
        });
      } else if (this._stats.coins >= sel.price) {
        this._stats.coins  -= sel.price;
        ul[sel.id]          = (ul[sel.id] || 0) + 1;
        sel.apply(this._stats);
        this._flashMsg   = 'Purchased!';
        this._flashTimer = 1.2;
      } else {
        this._flashMsg   = 'Not enough coins.';
        this._flashTimer = 1.2;
      }
    }
  }

  draw(ctx) {
    const W = ctx.canvas.width, H = ctx.canvas.height;
    ctx.fillStyle = this._nextBgColor(); ctx.fillRect(0, 0, W, H);

    // Fade-in: draw background + black overlay, skip UI content.
    if (this._fade > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this._fade})`; ctx.fillRect(0, 0, W, H); return;
    }

    ctx.save();
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';

    // Header
    ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 26px monospace';
    ctx.fillText('LEVEL ' + this._level + ' COMPLETE  --  SHOP', W / 2, 22);
    ctx.fillStyle = '#f1c40f'; ctx.font = 'bold 20px monospace';
    ctx.fillText('COINS: ' + this._stats.coins, W / 2, 50);

    ctx.strokeStyle = '#2a3040'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(30, 64); ctx.lineTo(W - 30, 64); ctx.stroke();

    const items  = this._getItems();
    const startY = 68, rowH = 44;

    for (let i = 0; i < items.length; i++) {
      const item   = items[i];
      const cy     = startY + i * rowH + rowH / 2;
      const sel    = i === this._cursor;
      const isCont = item.id === 'continue';
      const afford = isCont || this._stats.coins >= item.price;

      if (sel) {
        ctx.fillStyle = 'rgba(241,196,15,0.10)';
        ctx.fillRect(28, startY + i * rowH + 2, W - 56, rowH - 4);
      }

      ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillStyle = isCont
        ? (sel ? '#ffffff' : '#888888')
        : (sel ? '#f1c40f' : (afford ? '#cccccc' : '#555555'));
      ctx.font = sel ? 'bold 17px monospace' : '16px monospace';
      ctx.fillText((sel ? '> ' : '  ') + item.label, 36, cy);

      if (!isCont) {
        ctx.textAlign = 'right'; ctx.textBaseline = 'middle';
        ctx.fillStyle = afford ? (sel ? '#f1c40f' : '#888888') : '#c0392b';
        ctx.font = '14px monospace';
        ctx.fillText(item.price + ' coins', W - 36, cy);
      } else if (sel) {
        ctx.textAlign = 'right';
        ctx.fillStyle = '#4ade80'; ctx.font = '14px monospace';
        ctx.fillText('ENTER', W - 36, cy);
      }
    }

    const listBottom = startY + items.length * rowH;
    ctx.strokeStyle = '#2a3040';
    ctx.beginPath(); ctx.moveTo(30, listBottom + 4); ctx.lineTo(W - 30, listBottom + 4); ctx.stroke();

    // Flash message or selected item description
    const feedbackY = listBottom + 22;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (this._flashTimer > 0) {
      ctx.fillStyle = this._flashMsg === 'Purchased!' ? '#4ade80' : '#e74c3c';
      ctx.font = 'bold 14px monospace';
      ctx.fillText(this._flashMsg, W / 2, feedbackY);
    } else {
      const selItem = items[this._cursor];
      if (selItem && selItem.desc) {
        ctx.fillStyle = '#666666'; ctx.font = '13px monospace';
        ctx.fillText(selItem.desc, W / 2, feedbackY);
      }
    }

    // Current stats summary
    const s = this._stats;
    ctx.fillStyle = '#3a4a5a'; ctx.font = '12px monospace';
    const magnetStr = s.magnetRange > 0 ? '  MAGNET ' + s.magnetRange + 'px' : '';
    ctx.fillText(
      'HP ' + Math.ceil(s.currentHealth) + '/' + s.maxHealth +
      '  SPD ' + s.speed + '  DMG ' + s.damage +
      '  RATE ' + s.fireRate.toFixed(1) + '/s' +
      '  RNG ' + s.range + '  SHOTS ' + s.projectileCount + magnetStr,
      W / 2, listBottom + 42
    );

    ctx.fillStyle = '#3a4a5a'; ctx.font = '11px monospace';
    ctx.fillText('UP/DOWN or W/S navigate   ENTER buy or continue', W / 2, H - 12);

    ctx.restore();

    // Fade-out overlay (drawn over all UI content)
    if (this._pendingOut) {
      const a = Math.min(1, this._fadeOutTimer / 0.35);
      ctx.fillStyle = `rgba(0,0,0,${a})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
}

bootstrapGame({ canvasId: 'game', gameName: 'survivors', presets: { regular: { w: 800, h: 600 } }, initialScene: (g) => new SurvivorsMenuScene(g), suppressContextMenu: false });
</script>
