Params.prototype.random = function () {

/*** Simpler namespaced functional API ***/

};

sfxr.toWebAudio = function(synthdef, audiocontext) {
  var sfx = new SoundEffect(synthdef);
  var buffer = sfx.getRawBuffer()["normalized"];
  if (audiocontext) {
    var buff = audiocontext.createBuffer(1, buffer.length, sfx.sampleRate);
    var nowBuffering = buff.getChannelData(0);
    for (var i = 0; i < buffer.length; i++) {
      nowBuffering[i] = buffer[i];
    }
    var proc = audiocontext.createBufferSource();
    proc.buffer = buff;
    return proc;
  }

  return (new SoundEffect(synthdef)).generate();
};

    } else {
      var val = (decoded[offset] | (decoded[offset + 1] << 8) | (decoded[offset + 2] << 16) | (decoded[offset + 3] << 24));

sfxr.generate = function(algorithm, options) {

/*** Main entry point ***/

function SoundEffect(ps) {
  if (typeof(ps) == "string") {
    var PARAMS = new Params();
    if (ps.indexOf("#") == 0) {
      ps = ps.slice(1);
    }
    ps = PARAMS.fromB58(ps);
  }
  this.init(ps);
}

SoundEffect.prototype.init = function (ps) {
  this.parameters = ps;
  this.initForRepeat();  // First time through, this is a bit of a misnomer

  // Waveform shape
  this.waveShape = parseInt(ps.wave_type);

  // Filter
  this.fltw = Math.pow(ps.p_lpf_freq, 3) * 0.1;
  this.enableLowPassFilter = (ps.p_lpf_freq != 1);
  this.fltw_d = 1 + ps.p_lpf_ramp * 0.0001;
  this.fltdmp = 5 / (1 + Math.pow(ps.p_lpf_resonance, 2) * 20) *
    (0.01 + this.fltw);
  if (this.fltdmp > 0.8) this.fltdmp=0.8;
  this.flthp = Math.pow(ps.p_hpf_freq, 2) * 0.1;
  this.flthp_d = 1 + ps.p_hpf_ramp * 0.0003;

  // Vibrato
  this.vibratoSpeed = Math.pow(ps.p_vib_speed, 2) * 0.01;
  this.vibratoAmplitude = ps.p_vib_strength * 0.5;

  // Envelope
  this.envelopeLength = [
    Math.floor(ps.p_env_attack * ps.p_env_attack * 100000),
    Math.floor(ps.p_env_sustain * ps.p_env_sustain * 100000),
    Math.floor(ps.p_env_decay * ps.p_env_decay * 100000)
  ];
  this.envelopePunch = ps.p_env_punch;

  // Flanger
  this.flangerOffset = Math.pow(ps.p_pha_offset, 2) * 1020;
  if (ps.p_pha_offset < 0) this.flangerOffset = -this.flangerOffset;
  this.flangerOffsetSlide = Math.pow(ps.p_pha_ramp, 2) * 1;
  if (ps.p_pha_ramp < 0) this.flangerOffsetSlide = -this.flangerOffsetSlide;

  // Repeat
  this.repeatTime = Math.floor(Math.pow(1 - ps.p_repeat_speed, 2) * 20000
                               + 32);
  if (ps.p_repeat_speed === 0)
    this.repeatTime = 0;

  this.gain = Math.exp(ps.sound_vol) - 1;

  this.sampleRate = ps.sample_rate;
  this.bitsPerChannel = ps.sample_size;
}

SoundEffect.prototype.initForRepeat = function() {
  var ps = this.parameters;
  this.elapsedSinceRepeat = 0;

  this.period = 100 / (ps.p_base_freq * ps.p_base_freq + 0.001);
  this.periodMax = 100 / (ps.p_freq_limit * ps.p_freq_limit + 0.001);
  this.enableFrequencyCutoff = (ps.p_freq_limit > 0);
  this.periodMult = 1 - Math.pow(ps.p_freq_ramp, 3) * 0.01;
  this.periodMultSlide = -Math.pow(ps.p_freq_dramp, 3) * 0.000001;

  this.dutyCycle = 0.5 - ps.p_duty * 0.5;
  this.dutyCycleSlide = -ps.p_duty_ramp * 0.00005;

  if (ps.p_arp_mod >= 0)
    this.arpeggioMultiplier = 1 - Math.pow(ps.p_arp_mod, 2) * .9;
  else
    this.arpeggioMultiplier = 1 + Math.pow(ps.p_arp_mod, 2) * 10;
  this.arpeggioTime = Math.floor(Math.pow(1 - ps.p_arp_speed, 2) * 20000 + 32);
  if (ps.p_arp_speed === 1)
    this.arpeggioTime = 0;
}

SoundEffect.prototype.getRawBuffer = function () {
  var fltp = 0;
  var fltdp = 0;
  var fltphp = 0;

  var noise_buffer = Array(32);
  for (var i = 0; i < 32; ++i)
    noise_buffer[i] = Math.random() * 2 - 1;

  var envelopeStage = 0;
  var envelopeElapsed = 0;

  var vibratoPhase = 0;

  var phase = 0;
  var ipp = 0;
  var flanger_buffer = Array(1024);
  for (var i = 0; i < 1024; ++i)
    flanger_buffer[i] = 0;

  var num_clipped = 0;

  var buffer = [];
  var normalized = [];

  var sample_sum = 0;
  var num_summed = 0;
  var summands = Math.floor(44100 / this.sampleRate);

  for(var t = 0; ; ++t) {

    // Repeats
    if (this.repeatTime != 0 && ++this.elapsedSinceRepeat >= this.repeatTime)
      this.initForRepeat();

    // Arpeggio (single)
    if(this.arpeggioTime != 0 && t >= this.arpeggioTime) {
      this.arpeggioTime = 0;
      this.period *= this.arpeggioMultiplier;
    }

    // Frequency slide, and frequency slide slide!
    this.periodMult += this.periodMultSlide;
    this.period *= this.periodMult;
    if(this.period > this.periodMax) {
      this.period = this.periodMax;
      if (this.enableFrequencyCutoff)
        break;
    }

    // Vibrato
    var rfperiod = this.period;
    if (this.vibratoAmplitude > 0) {
      vibratoPhase += this.vibratoSpeed;
      rfperiod = this.period * (1 + Math.sin(vibratoPhase) * this.vibratoAmplitude);
    }
    var iperiod = Math.floor(rfperiod);
    if (iperiod < OVERSAMPLING) iperiod = OVERSAMPLING;

    // Square wave duty cycle
    this.dutyCycle += this.dutyCycleSlide;
    if (this.dutyCycle < 0) this.dutyCycle = 0;
    if (this.dutyCycle > 0.5) this.dutyCycle = 0.5;

    // Volume envelope
    if (++envelopeElapsed > this.envelopeLength[envelopeStage]) {
      envelopeElapsed = 0;
      if (++envelopeStage > 2)
        break;
    }
    var env_vol;
    var envf = envelopeElapsed / this.envelopeLength[envelopeStage];
    if (envelopeStage === 0) {         // Attack
      env_vol = envf;
    } else if (envelopeStage === 1) {  // Sustain
      env_vol = 1 + (1 - envf) * 2 * this.envelopePunch;
    } else {                           // Decay
      env_vol = 1 - envf;
    }

    // Flanger step
    this.flangerOffset += this.flangerOffsetSlide;
    var iphase = Math.abs(Math.floor(this.flangerOffset));
    if (iphase > 1023) iphase = 1023;

    if (this.flthp_d != 0) {
      this.flthp *= this.flthp_d;
      if (this.flthp < 0.00001)
        this.flthp = 0.00001;
      if (this.flthp > 0.1)
        this.flthp = 0.1;
    }

    // 8x oversampling
    var sample = 0;
    for (var si = 0; si < OVERSAMPLING; ++si) {
      var sub_sample = 0;
      phase++;
      if (phase >= iperiod) {
        phase %= iperiod;
        if (this.waveShape === NOISE)
          for(var i = 0; i < 32; ++i)
            noise_buffer[i] = Math.random() * 2 - 1;
      }

      // Base waveform
      var fp = phase / iperiod;
      if (this.waveShape === SQUARE) {
        if (fp < this.dutyCycle)
          sub_sample=0.5;
        else
          sub_sample=-0.5;
      } else if (this.waveShape === SAWTOOTH) {
        if (fp < this.dutyCycle)
          sub_sample = -1 + 2 * fp/this.dutyCycle;
        else
          sub_sample = 1 - 2 * (fp-this.dutyCycle)/(1-this.dutyCycle);
      } else if (this.waveShape === SINE) {
        sub_sample = Math.sin(fp * 2 * Math.PI);
      } else if (this.waveShape === NOISE) {
        sub_sample = noise_buffer[Math.floor(phase * 32 / iperiod)];
      } else {
        throw "ERROR: Bad wave type: " + this.waveShape;
      }

      // Low-pass filter
      var pp = fltp;
      this.fltw *= this.fltw_d;
      if (this.fltw < 0) this.fltw = 0;
      if (this.fltw > 0.1) this.fltw = 0.1;
      if (this.enableLowPassFilter) {
        fltdp += (sub_sample - fltp) * this.fltw;
        fltdp -= fltdp * this.fltdmp;
      } else {
        fltp = sub_sample;
        fltdp = 0;
      }
      fltp += fltdp;

      // High-pass filter
      fltphp += fltp - pp;
      fltphp -= fltphp * this.flthp;
      sub_sample = fltphp;

      // Flanger
      flanger_buffer[ipp & 1023] = sub_sample;
      sub_sample += flanger_buffer[(ipp - iphase + 1024) & 1023];
      ipp = (ipp + 1) & 1023;

      // final accumulation and envelope application
      sample += sub_sample * env_vol;
    }

    // Accumulate samples appropriately for sample rate
    sample_sum += sample;
    if (++num_summed >= summands) {
      num_summed = 0;
      sample = sample_sum / summands;
      sample_sum = 0;
    } else {
      continue;
    }

    sample = sample / OVERSAMPLING * masterVolume;
    sample *= this.gain;

    // store the original normalized floating point sample
    normalized.push(sample);

    if (this.bitsPerChannel === 8) {
      // Rescale [-1, 1) to [0, 256)
      sample = Math.floor((sample + 1) * 128);
      if (sample > 255) {
        sample = 255;
        ++num_clipped;
      } else if (sample < 0) {
        sample = 0;
        ++num_clipped;
      }
      buffer.push(sample);
    } else {
      // Rescale [-1, 1) to [-32768, 32768)
      sample = Math.floor(sample * (1<<15));
      if (sample >= (1<<15)) {
        sample = (1 << 15)-1;
        ++num_clipped;
      } else if (sample < -(1<<15)) {
        sample = -(1 << 15);
        ++num_clipped;
      }
      buffer.push(sample & 0xFF);
      buffer.push((sample >> 8) & 0xFF);
    }
  }
  
  return {
    "buffer": buffer,
    "normalized": normalized,
    "clipped": num_clipped,
  }
}

SoundEffect.prototype.generate = function() {
  var rendered = this.getRawBuffer();
  var wave = new RIFFWAVE();
  wave.header.sampleRate = this.sampleRate;
  wave.header.bitsPerSample = this.bitsPerChannel;
  wave.Make(rendered.buffer);
  wave.clipping = rendered.clipped;
  wave.buffer = rendered.normalized;
  wave.getAudio = _sfxr_getAudioFn(wave);
  return wave;
}

var _actx = null;
var _sfxr_getAudioFn = function(wave) {
  return function() {
    // check for procedural audio
    var actx = null;
    if (!_actx) {
      if ('AudioContext' in window) {
        _actx = new AudioContext();
      } else if ('webkitAudioContext' in window) {
        _actx = new webkitAudioContext();
      }
    }
    actx = _actx;
    
    if (actx) {
      var buff = actx.createBuffer(1, wave.buffer.length, wave.header.sampleRate);
      var nowBuffering = buff.getChannelData(0);
      for (var i=0;i<wave.buffer.length;i++) {
        nowBuffering[i] = wave.buffer[i];
      }
      var volume = 1.0;
      var obj = {
        "channels": [],
        "setVolume": function(v) { volume = v; return obj; },
        "play": function() {
          var proc = actx.createBufferSource();
          proc.buffer = buff;
          var gainNode = actx.createGain()
          gainNode.gain.value = volume;
          gainNode.connect(actx.destination)
          proc.connect(gainNode);
          if (proc["start"]) {
            proc.start();
          } else if (proc["noteOn"]) {
            proc.noteOn(0);
          }
          this.channels.push(proc);
          return proc;
        }
      };
      return obj;
    } else {
      var audio = new Audio();
      audio.src = wave.dataURI;
      return audio;
    }
  };
};

// engine/signal-bus.js
// Global pub/sub for decoupled engine and game events.
// Depends on: nothing.
// Used by: any module that needs to emit or listen for named events.

var Engine = Engine || {};

class SignalBus {
  constructor() {
    this._listeners = new Map();
  }

  /** Fire a named signal with an optional payload. */
  emit(name, payload) {
    const handlers = this._listeners.get(name);
    if (!handlers) return;
    // Snapshot so handlers that unregister during dispatch do not corrupt iteration.
    for (const handler of [...handlers]) {
      handler(payload);
    }
  }

  /** Register a listener for a named signal. Returns an unregister function. */
  on(name, handler) {
    if (!this._listeners.has(name)) {
      this._listeners.set(name, new Set());
    }
    this._listeners.get(name).add(handler);
    return () => this.off(name, handler);
  }

  /** Remove a listener for a named signal. */
  off(name, handler) {
    const handlers = this._listeners.get(name);
    if (!handlers) return;
    handlers.delete(handler);
    if (handlers.size === 0) {
      this._listeners.delete(name);
    }
  }
}

// engine/input.js
// Latched keyboard and mouse state, queried per frame by the active scene.
// Depends on: nothing (uses DOM APIs directly).
// Used by: scripts and scenes that need to read user input. The Game class
// constructs the singleton instance and assigns it to Engine.input.

var Engine = Engine || {};

class Input {
  constructor(canvas = null) {
    this._down = new Set();          // keys currently held down
    this._justPressed = new Set();   // keys pressed this frame
    this._justReleased = new Set();  // keys released this frame
    this._pendingPressed = new Set();
    this._pendingReleased = new Set();

    this.mouse = {
      x: 0,
      y: 0,
      left: false,
      right: false
    };

    this._canvas = canvas;

    window.addEventListener('keydown', (e) => {
      if (!this._down.has(e.key)) {
        this._pendingPressed.add(e.key);
      }
      this._down.add(e.key);
    });

    window.addEventListener('keyup', (e) => {
      if (this._down.has(e.key)) {
        this._pendingReleased.add(e.key);
      }
      this._down.delete(e.key);
    });

    // Mouse coordinates are computed relative to the canvas if one was provided,
    // accounting for any CSS scaling between the canvas's display size and its drawing buffer.
    const moveTarget = canvas || window;
    moveTarget.addEventListener('mousemove', (e) => {
      if (canvas) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        this.mouse.x = (e.clientX - rect.left) * scaleX;
        this.mouse.y = (e.clientY - rect.top) * scaleY;
      } else {
        this.mouse.x = e.clientX;
        this.mouse.y = e.clientY;
      }
    });

    // Mousedown attaches to the canvas (or window fallback). Mouseup attaches to window
    // so a button held outside the canvas still releases properly.
    const downTarget = canvas || window;
    downTarget.addEventListener('mousedown', (e) => {
      if (e.button === 0) this.mouse.left = true;
      if (e.button === 2) this.mouse.right = true;
    });
    window.addEventListener('mouseup', (e) => {
      if (e.button === 0) this.mouse.left = false;
      if (e.button === 2) this.mouse.right = false;
    });
  }

  isDown(key) {
    return this._down.has(key);
  }

  /** True only on the frame the key transitioned from up to down. */
  wasJustPressed(key) {
    return this._justPressed.has(key);
  }

  /** True only on the frame the key transitioned from down to up. */
  wasJustReleased(key) {
    return this._justReleased.has(key);
  }

  /** Called once per frame by Game. Advances "just pressed/released" tracking. */
  update() {
    this._justPressed = this._pendingPressed;
    this._justReleased = this._pendingReleased;
    this._pendingPressed = new Set();
    this._pendingReleased = new Set();
  }
}

// engine/game-object.js
// Transform host. Owns a list of attached Scripts and delegates lifecycle to them.
// Depends on: Script (only as a contract; not a hard import).
// Used by: Scene, which contains GameObjects; game code, which instantiates them.

    this.scripts.push(script);

  update(dt) {
    for (const s of this.scripts) {

// engine/scene.js
// Owns a collection of GameObjects, provides lifecycle hooks, applies per-object
// transforms during draw, and runs a pairwise AABB collision pass after object updates.
// Depends on: GameObject, Collider scripts (only by duck-typing the isCollider marker).
// Used by: Game, which holds the active scene; game code, which subclasses Scene to define each scene.

  constructor() {
    this.objects = [];
  }

  /** Called by Game when this scene becomes active. Subclasses populate the scene here. */
  enter() {}

  /** Called by Game when this scene is being replaced. Subclasses tear down here. */
  exit() {}

  /** Add a GameObject to the scene. Returns the object for chaining. */
  add(obj) {
    this.objects.push(obj);
    return obj;
  }

  /** Remove a GameObject from the scene. */
  remove(obj) {
    const i = this.objects.indexOf(obj);
    if (i !== -1) this.objects.splice(i, 1);
  }

  /** Iterate GameObjects, update each, then run the collision pass.
   *  Subclasses may override but should call super.update(dt). */
  update(dt) {
    // Snapshot so objects added or removed during update do not corrupt iteration.
    for (const obj of [...this.objects]) {
      obj.update(dt);
    }
    this._collisionPass();
  }

  /** Iterate GameObjects, apply each transform, draw each. Subclasses may override but
   * should call super.draw(ctx) to retain default per-object rendering. */
  draw(ctx) {
    for (const obj of this.objects) {
      ctx.save();
      ctx.translate(obj.x, obj.y);
      ctx.rotate(obj.rotation);
      ctx.scale(obj.scale, obj.scale);
      obj.draw(ctx);
      ctx.restore();
    }
  }

  /** Find all Collider scripts (duck-typed via isCollider) and run pairwise AABB checks.
   *  Each colliding pair invokes a.onCollide(b) and b.onCollide(a) once per frame.
   *  Broad-phase is O(N^2). Acceptable for hobby-scale games (N < 20 or so).
   *  When a game outgrows this, spatial partitioning can replace this method. */
  _collisionPass() {
    const colliders = [];
    for (const obj of this.objects) {
      for (const s of obj.scripts) {
        if (s.isCollider) {
          colliders.push(s);
        }
      }
    }
    for (let i = 0; i < colliders.length; i++) {
      const a = colliders[i];
      const aBox = a.getAabb();
      for (let j = i + 1; j < colliders.length; j++) {
        const b = colliders[j];
        const bBox = b.getAabb();
        if (aBox.x < bBox.x + bBox.w && aBox.x + aBox.w > bBox.x &&
            aBox.y < bBox.y + bBox.h && aBox.y + aBox.h > bBox.y) {
          a.onCollide(b);
          b.onCollide(a);
        }
      }
    }
  }
}

      console.warn(`Engine.storage.save: refusing to save undefined for key '${key}'. Use clear(key) instead.`);
      return false;
    }

    try {
      serialized = JSON.stringify(value);
    } catch (e) {
      console.warn(`Engine.storage.save: cannot serialize value for key '${key}':`, e);
      return false;

      this._fallback.set(fk, serialized);
      return true;

      window.localStorage.setItem(fk, serialized);

    } else {
      raw = window.localStorage.getItem(fk);

      if (!this._prefix) { out.push(k); continue; }

    let dt = (now - this._lastFrameTime) / 1000;
    if (dt > 0.1) dt = 0.1; // clamp to avoid huge jumps after tab inactivity or breakpoints
    this._lastFrameTime = now;

    // Apply pending scene transition before any per-frame work.
    if (this._pendingScene) {
      if (this.currentScene) this.currentScene.exit();
      this.currentScene = this._pendingScene;
      this._pendingScene = null;
      this.currentScene.enter();
    }

    // Advance input "just pressed/released" tracking before scene reads it.
    Engine.input.update();

    if (this.currentScene) {
      this.currentScene.update(dt);
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      this.currentScene.draw(this.ctx);
    }

    this._animationHandle = requestAnimationFrame((t) => this._frame(t));
  }
}

Engine.Game = Game;

// ============================================================================
// engine/narrative.js
// ============================================================================
//
// Engine.Narrative is a thin wrapper around an inkjs Story, exposing a small
// JS-side surface for game scenes to drive branching narrative content
// authored in inkle's ink scripting language.
//
// Depends on:
//   inkjs (global). Must be loaded before any Engine.Narrative instance is
//   constructed. Vendored at engine/lib/inkjs.js but, per ADR-0018,
//   intentionally NOT included in engine/engine.bundle.js because it is
//   large (~250 KB) and game-specific. Games that use narrative include the
//   vendored library separately in their build, before the engine bundle.
//
// Depended on by:
//   Per-game encounter scripts and scenes that drive ink content. No other
//   engine module depends on Narrative.
//
// Usage:
//   const n = new Engine.Narrative(inkSourceString);
//   n.bindExternal('start_combat', (enemyId) => { ... });
//   n.observe('scrap', (value) => updateHud(value));
//   n.setVar('hull', ship.hull);
//   const lines = n.continue();        // [{text, tags}, ...]
//   const choices = n.getChoices();    // [{index, text, tags}, ...]
//   n.choose(0);
//   if (n.hasEnded) { ... }
// ============================================================================

var Engine = Engine || {};

class Narrative {
  constructor(source, options = {}) {
    if (typeof inkjs === 'undefined') {
      throw new Error(
        'Engine.Narrative requires inkjs to be loaded. Include ' +
        'engine/lib/inkjs.js before the engine bundle in your build. See ADR-0018.'
      );
    }
    if (options.compiled) {
      this._story = new inkjs.Story(source);
    } else {
      this._story = new inkjs.Compiler(source).Compile();
    }
  }

  // Advance the story, collecting every line emitted until the next choice
  // point or story end. Returns an array of { text, tags } objects.
  continue() {
    const lines = [];
    while (this._story.canContinue) {
      const raw = this._story.Continue();
      const text = (typeof raw === 'string' ? raw : '').replace(/\n$/, '');
      const tags = this._story.currentTags ? [...this._story.currentTags] : [];
      lines.push({ text, tags });
    }
    return lines;
  }

  // Available choices at the current story point, or [] if none.
  getChoices() {
    return this._story.currentChoices.map((c) => ({
      index: c.index,
      text: c.text,
      tags: c.tags ? [...c.tags] : []
    }));
  }

  // Select a choice by its index. After this, the story is ready for another
  // continue() call.
  choose(index) {
    this._story.ChooseChoiceIndex(index);
  }

  // Read an ink variable by name. Returns undefined if not declared.
  getVar(name) {
    return this._story.variablesState[name];
  }

  // Write an ink variable. The variable must be declared in the ink source
  // (with VAR) for the write to have effect.
  setVar(name, value) {
    this._story.variablesState[name] = value;
  }

  // Bind a JS function that ink can invoke via an EXTERNAL declaration.
  // The ink script must declare it as: EXTERNAL fn_name(arg1, arg2)
  bindExternal(name, fn) {
    this._story.BindExternalFunction(name, fn);
  }

  // Register a callback that fires when the named ink variable changes.
  // The callback is invoked with the new value.
  observe(name, fn) {
    this._story.ObserveVariable(name, (_varName, value) => fn(value));
  }

  // Jump to a named knot or stitch. Path is a dot-separated string like
  // 'sector_one' or 'sector_one.shop_intro'.
  goTo(path) {
    this._story.ChoosePathString(path);
  }

  // Serialize narrative state to a JSON string suitable for storing via
  // Engine.storage alongside other game state.
  saveState() {
    return this._story.state.toJson();
  }

  // Restore state from a JSON string previously returned by saveState().
  loadState(json) {
    this._story.state.LoadJson(json);
  }

  // True when the story has nothing more to emit and offers no choices.
  get hasEnded() {
    return !this._story.canContinue && this._story.currentChoices.length === 0;
  }

  // Underlying inkjs Story instance. Exposed for advanced uses where the
  // wrapper methods do not cover the required operation.
  get story() {
    return this._story;
  }
}

Engine.Narrative = Narrative;

// ============================================================================
// engine/balance.js
// ============================================================================
// Tunable balance primitives: parameterized difficulty curves and cost
// scaling. Pure, stateless functions under Engine.Balance. Default constants
// follow the values supported by docs/resources/balance.md (see ADR-0020).
//
// Depends on: nothing (pure math).
// Depended on by: game-specific scripts/scenes that ramp difficulty or price
//   upgrades. NOT used by the engine core; opt-in per game.
// ============================================================================

var Engine = Engine || {};

const Balance = {
  // --- Difficulty curves ----------------------------------------------------
  // difficulty(t, opts): difficulty/intensity as a function of progress t.
  // t is caller-defined (elapsed seconds, wave index, level, etc).
  // opts.type selects the family; default 'logistic' (slow start, steep
  // middle, bounded plateau), the general-purpose pacing curve.
  // For logistic, set opts.t0 to the progress midpoint; the default of 0
  // is structural only (it places you at L/2 at t=0).
  difficulty(t, opts = {}) {
    const type = opts.type || 'logistic';
    switch (type) {
      case 'linear':       // d0 + m*t
        return (opts.d0 ?? 0) + (opts.m ?? 1) * t;
      case 'exponential':  // d0 * r^t
        return (opts.d0 ?? 1) * Math.pow(opts.r ?? 1.1, t);
      case 'logarithmic':  // d0 + k*ln(1+t); rises to a soft max then flattens
        return (opts.d0 ?? 0) + (opts.k ?? 1) * Math.log(1 + t);
      case 'logistic':     // L / (1 + e^(-k*(t - t0)))
        return (opts.L ?? 1) / (1 + Math.exp(-(opts.k ?? 1) * (t - (opts.t0 ?? 0))));
      default:
        throw new Error(`Engine.Balance.difficulty: unknown curve type '${type}'`);
    }
  },

  // --- Cost scaling ---------------------------------------------------------
  // cost(n, opts): price of a purchase when you already own n units, base*rate^n.
  // So the first unit (n=0) costs base. rate in [1.07, 1.15] is the documented
  // band; default 1.10. Use ~1.15 for short sessions, ~1.07 for long-haul games.
  cost(n, opts = {}) {
    return (opts.base ?? 1) * Math.pow(opts.rate ?? 1.1, n);
  },

  // bulkCost(owned, count, opts): closed-form total to buy `count` units from
  // `owned`. Exact for fixed rate; replaces a loop.
  bulkCost(owned, count, opts = {}) {
    const base = opts.base ?? 1;
    const rate = opts.rate ?? 1.1;
    if (count <= 0) return 0;
    if (rate === 1) return base * count;
    return base * (Math.pow(rate, owned) * (Math.pow(rate, count) - 1)) / (rate - 1);
  },

  // maxAffordable(owned, currency, opts): how many units `currency` buys from
  // `owned`. Closed-form inverse of bulkCost.
  maxAffordable(owned, currency, opts = {}) {
    const base = opts.base ?? 1;
    const rate = opts.rate ?? 1.1;
    if (currency <= 0) return 0;
    if (rate === 1) return Math.floor(currency / base);
    const n = Math.log((currency * (rate - 1)) / (base * Math.pow(rate, owned)) + 1) / Math.log(rate);
    return Math.max(0, Math.floor(n));
  }
};

Engine.Balance = Balance;


// ============================================================================
// engine/prng.js
// ============================================================================

// ============================================================================
// engine/prng.js
// ============================================================================
//
// Engine.PRNG: seeded pseudo-random number generator.
//
// Algorithm: SFC32 (Small Fast Counting) by Chris Doty-Humphrey. 128-bit
// state (four 32-bit words); period ≥ 2^64; passes PractRand at 32 TB.
// String seeds are hashed to a 128-bit initial state by cyrb128 (bryc, CC0).
// See ADR-0026.
//
// Depends on: nothing.
// Depended on by: game scripts and scenes that need deterministic randomness
//   (procedural levels, daily seeds, replay systems). Not used by the engine
//   core; opt-in per game.
//
// Usage:
//   const rng = new Engine.PRNG('level-1');
//   rng.float()              // [0, 1), like Math.random()
//   rng.int(1, 6)            // integer in [1, 6] inclusive
//   rng.pick(['a','b','c'])  // random element from array
//   rng.shuffle(array)       // Fisher-Yates in place, returns array
// ============================================================================

var Engine = Engine || {};

class PRNG {
  constructor(seed) {
    let a, b, c, d;
    if (typeof seed === 'string') {
      [a, b, c, d] = PRNG._cyrb128(seed);
    } else {
      // Expand a single 32-bit integer to four words via a LCG.
      a = seed >>> 0;
      b = (a * 1664525 + 1013904223) >>> 0;
      c = (b * 1664525 + 1013904223) >>> 0;
      d = 1;
    }
    this._a = a; this._b = b; this._c = c; this._d = d;
    // Discard first 15 outputs so low-entropy seeds (e.g. 0) reach a
    // well-mixed state before callers draw values.
    for (let i = 0; i < 15; i++) this._step();
  }

  // [0, 1) float, the Math.random() analogue.
  float() {
    return (this._step() >>> 0) / 0x100000000;
  }

  // Integer in [min, max] inclusive.
  int(min, max) {
    return min + (this._step() % (max - min + 1));
  }

  // Random element from array. Throws if array is empty.
  pick(arr) {
    if (!arr.length) throw new Error('Engine.PRNG.pick: empty array');
    return arr[this._step() % arr.length];
  }

  // Fisher-Yates shuffle in place. Returns the same array.
  shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = this._step() % (i + 1);
      const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  // SFC32 step: updates state and returns a 32-bit unsigned integer.
  _step() {
    const t = (this._a + this._b + this._d++) >>> 0;
    this._a = (this._b ^ (this._b >>> 9)) >>> 0;
    this._b = (this._c + (this._c << 3)) >>> 0;
    this._c = ((this._c << 21) | (this._c >>> 11)) >>> 0;
    this._c = (this._c + t) >>> 0;
    return t;
  }

  // cyrb128 by bryc (CC0). Hashes a string to four 32-bit seed words.
  static _cyrb128(str) {
    let h1 = 1779033703, h2 = 3144134277, h3 = 1013904242, h4 = 2773480762;
    for (let i = 0; i < str.length; i++) {
      const k = str.charCodeAt(i);
      h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
      h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
      h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
      h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
    }
    h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
    h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
    h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
    h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
    h1 ^= (h2 ^ h3 ^ h4); h2 ^= h1; h3 ^= h1; h4 ^= h1;
    return [h1 >>> 0, h2 >>> 0, h3 >>> 0, h4 >>> 0];
  }
}

Engine.PRNG = PRNG;

/* ==== scripts/bootstrap.js ==== */
// ============================================================================
// scripts/bootstrap.js
// ============================================================================
//
// bootstrapGame(options) - canonical game bootstrap helper.
//
// Consolidates the boilerplate that every build/<game>.html's <script> tail
// currently repeats: viewport-aware canvas sizing per ADR-0017, touch
// capability detection, optional context-menu suppression (for right-click
// games), Engine.Game construction with optional gameName for namespaced
// storage, initial scene set via a factory, and game start.
//
// Depends on:
//   Engine.Game (engine/game.js). The engine bundle must be loaded before
//   this script in the build concatenation order.
//
// Depended on by:
//   Game build bootstrap snippets. Replaces the inline IIFE that previously
//   appeared at the end of each build/<game>.html. Adoption is per-build:
//   existing builds continue to work with their inline bootstrap until each
//   is naturally regenerated. Drift v1 is the planned first build to adopt
//   the helper from the start; existing games migrate when next touched.
//
// Usage (Minesweeper-style, current inline form for comparison):
//   (function () {
//     const canvas = document.getElementById('game');
//     const preset = { w: 900, h: 600 };
//     canvas.width = preset.w; canvas.height = preset.h;
//     // fitToViewport, resize listener, canvas.oncontextmenu, etc.
//     const game = new Engine.Game(canvas, { gameName: 'minesweeper' });
//     game.setScene(new MinesweeperMenuScene(game));
//     game.start();
//   })();
//
// Equivalent with bootstrapGame:
//   bootstrapGame({
//     gameName: 'minesweeper',
//     presets: { regular: { w: 900, h: 600 } },
//     initialScene: function (game) { return new MinesweeperMenuScene(game); },
//     suppressContextMenu: true,
//   });
//
// Options:
//   canvasId          string. ID of canvas element. Default 'game'.
//   canvas            DOM element. Overrides canvasId if both provided.
//   gameName          string. Passed to Engine.Game for storage namespacing.
//                     Default '' (no namespace).
//   presets           { regular: {w, h}, compact?: {w, h} }. Required.
//                     If compact is omitted, regular is always used (the
//                     intentional letterbox-on-portrait path per ADR-0017).
//   initialScene      (game) => Scene. Factory required because the Game
//                     instance must exist before the initial Scene's
//                     constructor argument can be passed.
//   suppressContextMenu  bool. Default false. true disables the canvas's
//                     right-click context menu (for games that read
//                     Engine.input.mouse.right; see Minesweeper).
//
// Returns:
//   { game, preset, presetName, isTouch }
//     game         the constructed Engine.Game (already started)
//     preset       the chosen preset object { w, h }
//     presetName   'regular' or 'compact'
//     isTouch      bool. true if touch capability detected per ADR-0017.
//                  Scenes can use this to enlarge hit-target minimums.
//
// Throws if the canvas element is not found, presets.regular is missing, or
// initialScene is not a function. Errors are explicit and actionable.
//
// Preset selection:
//   When both regular and compact are defined, picks whichever aspect ratio
//   is closer (in log space) to the current viewport's. This matches the
//   reference snippet in docs/ARCHITECTURE.md "Logical canvas and viewport
//   bootstrap" and ADR-0017.
// ============================================================================

function bootstrapGame(options) {
  const opts = options || {};

  const canvas = opts.canvas || document.getElementById(opts.canvasId || 'game');
  if (!canvas || typeof canvas.getContext !== 'function') {
    throw new Error(
      "bootstrapGame: canvas element not found (looked for id '" +
      (opts.canvasId || 'game') + "'). Pass options.canvas or options.canvasId."
    );
  }

  const presets = opts.presets;
  if (!presets || !presets.regular) {
    throw new Error('bootstrapGame: options.presets.regular is required (e.g. { regular: { w: 900, h: 600 } }).');
  }

  if (typeof opts.initialScene !== 'function') {
    throw new Error('bootstrapGame: options.initialScene must be a factory function (game) => sceneInstance.');
  }

  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  function pickPreset() {
    if (!presets.compact) return { name: 'regular', preset: presets.regular };
    const va = window.innerWidth / window.innerHeight;
    const ra = presets.regular.w / presets.regular.h;
    const ca = presets.compact.w / presets.compact.h;
    const useCompact = Math.abs(Math.log(va / ca)) < Math.abs(Math.log(va / ra));
    return useCompact
      ? { name: 'compact', preset: presets.compact }
      : { name: 'regular', preset: presets.regular };
  }

  const chosen = pickPreset();
  const preset = chosen.preset;
  canvas.width = preset.w;
  canvas.height = preset.h;

  function fitToViewport() {
    const s = Math.min(window.innerWidth / preset.w, window.innerHeight / preset.h);
    canvas.style.width = (preset.w * s) + 'px';
    canvas.style.height = (preset.h * s) + 'px';
  }
  fitToViewport();
  window.addEventListener('resize', fitToViewport);

  if (opts.suppressContextMenu) {
    canvas.oncontextmenu = function (e) { e.preventDefault(); };
  }

  const game = new Engine.Game(canvas, { gameName: opts.gameName || '' });
  game.setScene(opts.initialScene(game));
  game.start();

  return { game: game, preset: preset, presetName: chosen.name, isTouch: isTouch };
}

// games/marginalia/encounters.js
// Encounter definitions for Marginalia.
// Depends on: nothing.
// Required by: match.js
//
// Each encounter:
//   id, name, room, desc, hp, attack, armor
//   healEvery: heal this many HP every N turns (0 = never)
//   healAmount: HP healed per interval
//   altAttackEvery: every N turns, use altAttackDmg instead (0 = never)
//   altAttackDmg: bypasses all player defense
//   altAttackMsg: flavor string for the alternate attack
//   drawFn(ctx, x, y, w, h, t): draws the enemy into the given region.
//     t = total elapsed seconds; use for subtle idle animation.

var ENCOUNTERS = [
  {
    id: 'ghost_reader',
    name: 'The Ghost Reader',
    room: 'The Reading Room',
    desc: 'It turns pages, but nothing is there.',
    hp: 14, attack: 3, armor: 0,
    healEvery: 0, healAmount: 0,
    altAttackEvery: 0, altAttackDmg: 0, altAttackMsg: '',
    drawFn: function(ctx, x, y, w, h, t) {
      var cx = x + w / 2, cy = y + h * 0.42;
      var fl = 0.55 + Math.sin(t * 1.4) * 0.2;
      ctx.save();
      ctx.globalAlpha = fl;
      // Body
      ctx.fillStyle = '#95a5a6';
      ctx.beginPath(); ctx.ellipse(cx, cy, w*0.15, h*0.32, 0, 0, Math.PI*2); ctx.fill();
      // Head
      ctx.beginPath(); ctx.ellipse(cx, cy - h*0.38, w*0.1, h*0.12, 0, 0, Math.PI*2); ctx.fill();
      // Book
      ctx.globalAlpha = fl * 0.7;
      ctx.fillStyle = '#d4b896';
      ctx.fillRect(cx + w*0.08, cy - h*0.06, w*0.2, h*0.16);
      ctx.strokeStyle = '#8a6f4e'; ctx.lineWidth = 0.8;
      ctx.strokeRect(cx + w*0.08, cy - h*0.06, w*0.2, h*0.16);
      // Arms
      ctx.globalAlpha = fl * 0.5;
      ctx.strokeStyle = '#95a5a6'; ctx.lineWidth = 3;
      ctx.beginPath(); ctx.moveTo(cx - w*0.15, cy - h*0.05);
      ctx.lineTo(cx - w*0.04, cy + h*0.05); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(cx + w*0.15, cy - h*0.05);
      ctx.lineTo(cx + w*0.11, cy - h*0.02); ctx.stroke();
      ctx.restore();
    }
  },
  {
    id: 'indexer',
    name: 'The Indexer',
    room: 'The Periodical Archives',
    desc: 'It catalogs everything, including you.',
    hp: 18, attack: 4, armor: 0,
    healEvery: 0, healAmount: 0,
    altAttackEvery: 0, altAttackDmg: 0, altAttackMsg: '',
    drawFn: function(ctx, x, y, w, h, t) {
      var cx = x + w / 2, cy = y + h * 0.5;
      var pulse = Math.floor(t * 2) % 2;
      ctx.save();
      // Grid of card drawers
      var cols = 4, rows = 5;
      var dw = w * 0.15, dh = h * 0.1, gap = 3;
      var gw = cols * (dw + gap) - gap, gh = rows * (dh + gap) - gap;
      var ox = cx - gw/2, oy = cy - gh/2;
      for (var r = 0; r < rows; r++) {
        for (var c = 0; c < cols; c++) {
          var dx = ox + c*(dw+gap), dy = oy + r*(dh+gap);
          var isActive = (pulse === 0 && r === 2 && c === 1) ||
                         (pulse === 1 && r === 0 && c === 3);
          ctx.fillStyle = isActive ? '#d4b896' : '#2c1a0a';
          ctx.fillRect(dx, dy, dw, dh);
          ctx.strokeStyle = '#8a6f4e'; ctx.lineWidth = 0.5;
          ctx.strokeRect(dx, dy, dw, dh);
          if (isActive) {
            ctx.fillStyle = '#1a1008';
            ctx.fillRect(dx+2, dy+2, dw-4, dh-4);
          }
        }
      }
      // "Eye" handle on center drawer
      ctx.fillStyle = '#c0392b';
      ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  },
  {
    id: 'censor',
    name: 'The Censor',
    room: 'The Restricted Collection',

    hp: 22, attack: 4, armor: 2,

    drawFn: function(ctx, x, y, w, h, t) {

      bars.forEach(function(b, i) {
        var ox2 = Math.sin(t * 0.8 + i) * 3;
        ctx.fillRect(cx + w*b[0] + ox2, cy + h*b[1], w*b[2], h*b[3]);
      });
      // Red eyes
      ctx.fillStyle = '#c0392b';
      ctx.beginPath(); ctx.arc(cx - w*0.055, cy - h*0.42, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + w*0.055, cy - h*0.42, 3, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  },
  {
    id: 'archivist',
    name: 'The Archivist',
    room: 'The Special Collections',
    desc: 'It refuses to let anything leave.',
    hp: 26, attack: 5, armor: 0,
    healEvery: 0, healAmount: 0,
    altAttackEvery: 0, altAttackDmg: 0, altAttackMsg: '',
    drawFn: function(ctx, x, y, w, h, t) {
      var cx = x + w/2, cy = y + h*0.5;
      ctx.save();
      // Tall figure made of stacked books
      var bookDefs = [
        {bw:w*0.32,bh:h*0.09,color:'#3d2b1a',oy:-0.36},
        {bw:w*0.28,bh:h*0.09,color:'#2c1a0a',oy:-0.26},
        {bw:w*0.34,bh:h*0.09,color:'#4a3520',oy:-0.16},
        {bw:w*0.3, bh:h*0.09,color:'#2c1a0a',oy:-0.06},
        {bw:w*0.28,bh:h*0.09,color:'#3d2b1a',oy:0.04},
        {bw:w*0.36,bh:h*0.09,color:'#1a0f05',oy:0.14}
      ];
      bookDefs.forEach(function(b, i) {
        var sway = Math.sin(t * 0.5 + i * 0.4) * 2;
        ctx.fillStyle = b.color;
        ctx.fillRect(cx - b.bw/2 + sway, cy + h*b.oy, b.bw, b.bh);
        ctx.strokeStyle = '#8a6f4e'; ctx.lineWidth = 0.5;
        ctx.strokeRect(cx - b.bw/2 + sway, cy + h*b.oy, b.bw, b.bh);
      });
      // Two bright eyes between the stacks
      ctx.fillStyle = '#f39c12';
      ctx.beginPath(); ctx.arc(cx - w*0.06, cy - h*0.06, 3.5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + w*0.06, cy - h*0.06, 3.5, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  },
  {
    id: 'borrower',
    name: 'The Borrower',
    room: 'The Reading Alcove',
    desc: 'It keeps taking without returning.',
    hp: 20, attack: 3, armor: 0,
    healEvery: 2, healAmount: 4,
    altAttackEvery: 0, altAttackDmg: 0, altAttackMsg: '',
    drawFn: function(ctx, x, y, w, h, t) {
      var cx = x + w/2, cy = y + h*0.5;
      ctx.save();
      // Small quick figure with many arms holding books
      ctx.fillStyle = '#7f8c8d';
      ctx.beginPath(); ctx.ellipse(cx, cy, w*0.12, h*0.28, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx, cy - h*0.34, w*0.08, h*0.1, 0, 0, Math.PI*2); ctx.fill();
      // Arms at different heights, each holding a book that bobs
      var arms = [[-0.25,-0.1,0.2,0.08],[-0.22,0.06,0.18,0.08],[0.12,-0.08,0.2,0.08],[0.1,0.1,0.16,0.08]];
      arms.forEach(function(a, i) {
        var bob = Math.sin(t * 1.2 + i * 1.1) * 3;
        ctx.fillStyle = ['#2c1a0a','#3d2b1a','#1a0f05','#4a3520'][i];
        ctx.fillRect(cx+w*a[0], cy+h*a[1]+bob, w*a[2], h*a[3]);
        ctx.strokeStyle = '#8a6f4e'; ctx.lineWidth = 0.4;
        ctx.strokeRect(cx+w*a[0], cy+h*a[1]+bob, w*a[2], h*a[3]);
      });
      ctx.restore();
    }
  },
  {
    id: 'grand_index',
    name: 'The Grand Index',
    room: 'The Catalog',
    desc: 'Everything ever lost is here. So are you.',
    hp: 40, attack: 6, armor: 0,
    healEvery: 0, healAmount: 0,
    altAttackEvery: 3, altAttackDmg: 8,
    altAttackMsg: 'Cross-reference: ignores all defense.',
    drawFn: function(ctx, x, y, w, h, t) {
      var cx = x + w/2, cy = y + h*0.5;
      ctx.save();
      // Rotating outer ring of cards
      var numCards = 8, r = Math.min(w,h)*0.38;
      for (var i = 0; i < numCards; i++) {
        var angle = (i / numCards) * Math.PI * 2 + t * 0.3;
        var px = cx + Math.cos(angle) * r;
        var py = cy + Math.sin(angle) * r;
        ctx.save();
        ctx.translate(px, py);
        ctx.rotate(angle + Math.PI/2);
        ctx.fillStyle = i % 2 === 0 ? '#2c1a0a' : '#1a0f05';
        ctx.fillRect(-7, -10, 14, 20);
        ctx.strokeStyle = '#8a6f4e'; ctx.lineWidth = 0.5;
        ctx.strokeRect(-7, -10, 14, 20);
        ctx.restore();
      }
      // Core: deep pulsing circle
      var pulse = 0.8 + Math.sin(t * 2) * 0.15;
      ctx.globalAlpha = pulse;
      ctx.fillStyle = '#f39c12';
      ctx.beginPath(); ctx.arc(cx, cy, Math.min(w,h)*0.14, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#1a1008';
      ctx.beginPath(); ctx.arc(cx, cy, Math.min(w,h)*0.08, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }
];

// games/marginalia/scenes/menu.js
// LibraryMenuScene: title screen for Marginalia.
// Depends on: Engine (Game, Scene, Input), bootstrapGame result.
// Required by: build manifest.

class LibraryMenuScene extends Engine.Scene {
  constructor(game) {
    super();
    this._game = game;
    this._t = 0;
    this._hovered = false;
    this._clicked = false;
    this._particles = [];
    this._initParticles();
  }

  _initParticles() {
    var canvas = this._game.canvas;
    for (var i = 0; i < 28; i++) {
      this._particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: 1 + Math.random() * 1.5,
        speed: 0.08 + Math.random() * 0.18,
        alpha: 0.2 + Math.random() * 0.5
      });
    }
  }

  enter() {
    this._t = 0;
    this._clicked = false;
  }

  update(dt) {
    this._t += dt;
    var canvas = this._game.canvas;
    // drift particles upward, wrap
    this._particles.forEach(function(p) {
      p.y -= p.speed;
      if (p.y < -4) p.y = canvas.height + 4;
    });
    // mouse hover detection for the begin button
    var mx = Engine.input.mouse.x, my = Engine.input.mouse.y;
    var btn = this._buttonRect();
    this._hovered = mx >= btn.x && mx <= btn.x+btn.w &&
                    my >= btn.y && my <= btn.y+btn.h;

    if (this._clicked) return;
    if ((this._hovered && Engine.input.mouse.left) ||
        Engine.input.wasJustPressed('Enter') ||
        Engine.input.wasJustPressed(' ')) {
      this._clicked = true;
      var game = this._game;
      setTimeout(function() {
        game.setScene(new LibraryDeckSelectScene(game));
      }, 120);
    }
  }

  _buttonRect() {
    var W = this._game.canvas.width, H = this._game.canvas.height;
    var bw = Math.min(220, W * 0.42), bh = 44;
    return { x: W/2 - bw/2, y: H * 0.72, w: bw, h: bh };
  }

  draw(ctx) {
    var W = this._game.canvas.width, H = this._game.canvas.height;
    var t = this._t;

    // Background
    ctx.fillStyle = '#1a1008';
    ctx.fillRect(0, 0, W, H);

    // Floating dust motes
    this._particles.forEach(function(p) {
      ctx.globalAlpha = p.alpha * (0.5 + 0.5 * Math.sin(t * 0.7 + p.x));
      ctx.fillStyle = '#d4b896';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
    });
    ctx.globalAlpha = 1;

    // Title
    var titleSize = Math.min(62, W * 0.1);
    ctx.font = 'italic ' + titleSize + 'px serif';
    ctx.fillStyle = '#d4b896';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Marginalia', W/2, H * 0.3);

    // Subtitle rule lines
    var ruleW = Math.min(280, W * 0.5);
    ctx.strokeStyle = '#8a6f4e'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(W/2 - ruleW/2, H*0.38); ctx.lineTo(W/2 + ruleW/2, H*0.38); ctx.stroke();

    // Tagline
    ctx.font = Math.min(15, W*0.025) + 'px serif';
    ctx.fillStyle = '#8a6f4e';
    ctx.fillText('The library is condemned. Something is still cataloging.', W/2, H*0.44);

    // Stats line
    var unlocks = Engine.storage.load('marginalia_unlocks', []);
    ctx.font = Math.min(13, W*0.022) + 'px serif';
    ctx.fillStyle = '#5a4030';
    ctx.fillText(unlocks.length + ' / ' + UNLOCK_SPELL_IDS.length + ' spells discovered', W/2, H*0.52);

    // Begin button
    var btn = this._buttonRect();
    var lit = this._hovered || this._clicked;
    ctx.fillStyle = lit ? '#2c1a0a' : '#1e1208';
    ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
    ctx.strokeStyle = lit ? '#d4b896' : '#8a6f4e'; ctx.lineWidth = 1;
    ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);
    ctx.fillStyle = lit ? '#d4b896' : '#8a6f4e';
    ctx.font = Math.min(16, W*0.027) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Begin cataloging', btn.x + btn.w/2, btn.y + btn.h/2);

    // Key hint
    ctx.fillStyle = '#3a2518';
    ctx.font = Math.min(11, W*0.018) + 'px serif';
    ctx.fillText('Enter or Space to start', W/2, H * 0.82);
  }
}

// games/marginalia/scenes/deck-select.js
// LibraryDeckSelectScene: pre-run spell selection.
// Player picks exactly 5 spells from their unlocked collection, then begins.
// Depends on: Engine, SPELLS, BASE_SPELL_IDS, UNLOCK_SPELL_IDS, LibraryMatchScene.

class LibraryDeckSelectScene extends Engine.Scene {
  constructor(game) {
    super();
    this._game = game;
    this._t = 0;
    this._selected = new Set();
    this._hoverIdx = -1;
    this._hoverBegin = false;
    this._clickedBegin = false;

    // Build the available pool: base spells + any unlocked extras
    var unlocks = Engine.storage.load('marginalia_unlocks', []);
    this._pool = BASE_SPELL_IDS.concat(
      UNLOCK_SPELL_IDS.filter(function(id) { return unlocks.indexOf(id) !== -1; })
    ).map(function(id) { return SPELLS[id]; }).filter(Boolean);

    // Pre-select the first 5 for convenience
    this._pool.slice(0, 5).forEach(function(s) { this._selected.add(s.id); }, this);
  }

  enter() {
    this._t = 0;
    this._clickedBegin = false;
  }

  update(dt) {
    this._t += dt;
    if (this._clickedBegin) return;

    var mx = Engine.input.mouse.x, my = Engine.input.mouse.y;
    var cards = this._cardRects();

    this._hoverIdx = -1;
    for (var i = 0; i < cards.length; i++) {
      var c = cards[i];
      if (mx >= c.x && mx <= c.x+c.w && my >= c.y && my <= c.y+c.h) {
        this._hoverIdx = i;
        break;
      }
    }

    // Toggle card on click
    if (Engine.input.mouse.left && this._hoverIdx !== -1) {
      // Debounce: only toggle on fresh press via wasJustPressed is tricky for mouse.
      // We track per-card click state instead via a flag.
    }

    var btn = this._beginRect();
    this._hoverBegin = mx >= btn.x && mx <= btn.x+btn.w && my >= btn.y && my <= btn.y+btn.h;

    if (Engine.input.wasJustPressed('MouseLeft') || this._mouseJustClicked()) {
      // handled below
    }
  }

  // Track mouse click with a simple latch
  _prevMouseLeft = false;
  _mouseJustClicked() {
    var cur = Engine.input.mouse.left;
    var just = cur && !this._prevMouseLeft;
    this._prevMouseLeft = cur;
    return just;
  }

  // Separate update with click logic; called from draw-cycle workaround
  _processClick() {
    var mx = Engine.input.mouse.x, my = Engine.input.mouse.y;
    var cards = this._cardRects();

    // Card toggle
    for (var i = 0; i < cards.length; i++) {
      var c = cards[i];
      if (mx >= c.x && mx <= c.x+c.w && my >= c.y && my <= c.y+c.h) {
        var id = this._pool[i].id;
        if (this._selected.has(id)) {
          this._selected.delete(id);
        } else if (this._selected.size < 5) {
          this._selected.add(id);
        }
        return;
      }
    }

    // Begin button
    if (this._selected.size === 5 && !this._clickedBegin) {
      var btn = this._beginRect();
      if (mx >= btn.x && mx <= btn.x+btn.w && my >= btn.y && my <= btn.y+btn.h) {
        this._clickedBegin = true;
        var deck = BASE_SPELL_IDS.concat(UNLOCK_SPELL_IDS)
          .filter(function(id) { return this._selected.has(id); }, this)
          .map(function(id) { return SPELLS[id]; });
        var game = this._game;
        setTimeout(function() {
          game.setScene(new LibraryMatchScene(game, deck));
        }, 100);
      }
    }
  }

  enter() {
    this._t = 0;
    this._clickedBegin = false;
    this._prevMouseLeft = false;
  }

  _cardRects() {
    var W = this._game.canvas.width, H = this._game.canvas.height;
    var cols = Math.min(4, this._pool.length), rows = Math.ceil(this._pool.length / cols);
    var cw = Math.min(145, (W - 40) / cols), ch = Math.min(100, (H * 0.55) / rows);
    var totalW = cols * cw + (cols-1)*8, totalH = rows * ch + (rows-1)*8;
    var ox = W/2 - totalW/2, oy = H * 0.28 - totalH/2;
    var rects = [];
    for (var i = 0; i < this._pool.length; i++) {
      var col = i % cols, row = Math.floor(i / cols);
      rects.push({ x: ox + col*(cw+8), y: oy + row*(ch+8), w: cw, h: ch });
    }
    return rects;
  }

  _beginRect() {
    var W = this._game.canvas.width, H = this._game.canvas.height;
    var bw = Math.min(200, W*0.38), bh = 42;
    return { x: W/2 - bw/2, y: H * 0.85, w: bw, h: bh };
  }

  draw(ctx) {
    // Process clicks here to avoid the one-frame ghost-click issue
    if (this._mouseJustClicked()) this._processClick();

    var W = this._game.canvas.width, H = this._game.canvas.height;

    ctx.fillStyle = '#1a1008';
    ctx.fillRect(0, 0, W, H);

    // Heading
    ctx.font = 'italic ' + Math.min(22, W*0.036) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#d4b896';
    ctx.fillText('Choose five spells for this run', W/2, H * 0.1);

    ctx.font = Math.min(12, W*0.02) + 'px serif';
    ctx.fillStyle = '#5a4030';
    ctx.fillText(this._selected.size + ' / 5 selected', W/2, H * 0.17);

    // Spell cards
    var cards = this._cardRects();
    var pool = this._pool;
    var selected = this._selected;
    var hoverIdx = this._hoverIdx;
    var t = this._t;

    for (var i = 0; i < pool.length; i++) {
      var spell = pool[i];
      var card = cards[i];
      var isSel = selected.has(spell.id);
      var isHov = i === hoverIdx;

      // Card background
      ctx.fillStyle = isSel ? '#2c1a0a' : (isHov ? '#201408' : '#160d05');
      ctx.fillRect(card.x, card.y, card.w, card.h);
      ctx.strokeStyle = isSel ? '#d4b896' : (isHov ? '#8a6f4e' : '#3a2518');
      ctx.lineWidth = isSel ? 1.5 : 1;
      ctx.strokeRect(card.x, card.y, card.w, card.h);

      // Glyph area
      var glyphSize = Math.min(32, card.w * 0.22);
      var glyphX = card.x + 8, glyphY = card.y + 10;
      ctx.save();
      ctx.beginPath();
      ctx.rect(glyphX, glyphY, glyphSize, glyphSize);
      ctx.clip();
      ctx.translate(glyphX, glyphY);
      spell.glyphFn(ctx, glyphSize, glyphSize);
      ctx.restore();

      // Name
      ctx.font = 'bold ' + Math.min(11, card.w*0.08) + 'px serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillStyle = isSel ? '#d4b896' : '#8a6f4e';
      ctx.fillText(spell.name, glyphX + glyphSize + 6, card.y + 10);

      // DMG / DEF
      ctx.font = Math.min(10, card.w*0.072) + 'px serif';
      ctx.fillStyle = '#c0392b';
      ctx.fillText(spell.dmg + ' dmg', glyphX + glyphSize + 6, card.y + 24);
      ctx.fillStyle = '#2980b9';
      ctx.fillText(spell.def + ' def', glyphX + glyphSize + 6, card.y + 36);

      // Cooldown indicator
      if (spell.cooldown > 0) {
        ctx.fillStyle = '#8a6f4e';
        ctx.font = Math.min(9, card.w*0.065) + 'px serif';
        ctx.fillText('cd: ' + spell.cooldown, glyphX + glyphSize + 6, card.y + 48);
      }

      // Desc (truncated)
      ctx.font = Math.min(9, card.w*0.065) + 'px serif';
      ctx.fillStyle = '#3a2518';
      ctx.textBaseline = 'bottom';
      var desc = spell.desc;
      if (desc.length > 32) desc = desc.slice(0, 30) + '...';
      ctx.fillText(desc, card.x + 6, card.y + card.h - 6);

      // Selected checkmark
      if (isSel) {
        ctx.fillStyle = '#27ae60';
        ctx.font = Math.min(12, card.h*0.13) + 'px sans-serif';
        ctx.textAlign = 'right'; ctx.textBaseline = 'top';
        ctx.fillText('✓', card.x + card.w - 6, card.y + 6);
      }
    }

    // Begin button
    var canBegin = this._selected.size === 5;
    var btn = this._beginRect();
    var btnLit = this._hoverBegin && canBegin;
    ctx.fillStyle = canBegin ? (btnLit ? '#2c1a0a' : '#1e1208') : '#110c05';
    ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
    ctx.strokeStyle = canBegin ? (btnLit ? '#d4b896' : '#8a6f4e') : '#2a1a0a';
    ctx.lineWidth = 1;
    ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);
    ctx.font = Math.min(15, W*0.025) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = canBegin ? (btnLit ? '#d4b896' : '#8a6f4e') : '#3a2518';
    ctx.fillText('Enter the stacks', btn.x + btn.w/2, btn.y + btn.h/2);

    // Hint
    ctx.font = Math.min(11, W*0.018) + 'px serif';
    ctx.fillStyle = '#2a1a0a';
    ctx.fillText('Click a spell to select or deselect', W/2, H * 0.93);
  }
}

/* ==== games/marginalia/scenes/game-over.js ==== */
// games/marginalia/scenes/game-over.js
// LibraryGameOverScene: win or loss screen for Marginalia.
// Depends on: Engine, LibraryMenuScene.
// Receives: { outcome: 'win'|'loss', roomsCleared, hpRemaining, turnsTotal }

class LibraryGameOverScene extends Engine.Scene {
  constructor(game, result) {
    super();
    this._game = game;
    this._result = result; // { outcome, roomsCleared, hpRemaining, turnsTotal }
    this._t = 0;
    this._hovered = false;
    this._clicked = false;
  }

  enter() {
    this._t = 0;
    this._clicked = false;
  }

  update(dt) {
    this._t += dt;
    if (this._clicked) return;

    var mx = Engine.input.mouse.x, my = Engine.input.mouse.y;
    var btn = this._buttonRect();
    this._hovered = mx >= btn.x && mx <= btn.x+btn.w &&
                    my >= btn.y && my <= btn.y+btn.h;

    if ((this._hovered && Engine.input.mouse.left) ||
        Engine.input.wasJustPressed('Enter') ||
        Engine.input.wasJustPressed(' ')) {
      this._clicked = true;
      var game = this._game;
      setTimeout(function() {
        game.setScene(new LibraryMenuScene(game));
      }, 120);
    }
  }

  _buttonRect() {
    var W = this._game.canvas.width, H = this._game.canvas.height;
    var bw = Math.min(200, W * 0.4), bh = 40;
    return { x: W/2 - bw/2, y: H * 0.76, w: bw, h: bh };
  }

  draw(ctx) {
    var W = this._game.canvas.width, H = this._game.canvas.height;
    var r = this._result;
    var won = r.outcome === 'win';

    ctx.fillStyle = '#1a1008';
    ctx.fillRect(0, 0, W, H);

    // Outcome heading
    var headSize = Math.min(56, W * 0.09);
    ctx.font = 'italic ' + headSize + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = won ? '#f39c12' : '#c0392b';
    ctx.fillText(won ? 'Cataloged.' : 'Overdue.', W/2, H * 0.26);

    // Rule
    var ruleW = Math.min(260, W * 0.48);
    ctx.strokeStyle = won ? '#8a6f4e' : '#5a1a1a'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(W/2-ruleW/2, H*0.36); ctx.lineTo(W/2+ruleW/2, H*0.36); ctx.stroke();

    // Flavor line
    var flavors = won
      ? ['The Grand Index has been filed.','The margins are silent at last.','Everything accounted for.']
      : ['Some books are never returned.','The catalog grows longer.','Filed under: unfinished business.'];
    ctx.font = Math.min(14, W*0.024) + 'px serif';
    ctx.fillStyle = '#8a6f4e';
    ctx.fillText(flavors[Math.floor(this._t * 0.1) % flavors.length], W/2, H * 0.42);

    // Stats
    var statsSize = Math.min(13, W * 0.022);
    ctx.font = statsSize + 'px serif';
    ctx.fillStyle = '#5a4030';
    var lines = [
      'Rooms cleared: ' + r.roomsCleared + ' / 6',
      'HP remaining: ' + r.hpRemaining,
      'Turns taken: ' + r.turnsTotal
    ];
    lines.forEach(function(line, i) {
      ctx.fillText(line, W/2, H * (0.52 + i * 0.07));
    });

    // Return button
    var btn = this._buttonRect();
    var lit = this._hovered || this._clicked;
    ctx.fillStyle = lit ? '#2c1a0a' : '#1e1208';
    ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
    ctx.strokeStyle = lit ? '#d4b896' : '#8a6f4e'; ctx.lineWidth = 1;
    ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);
    ctx.font = Math.min(15, W*0.025) + 'px serif';
    ctx.fillStyle = lit ? '#d4b896' : '#8a6f4e';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Return to the foyer', btn.x + btn.w/2, btn.y + btn.h/2);
  }
}

/* ==== games/marginalia/scenes/match.js ==== */
// games/marginalia/scenes/match.js
// LibraryMatchScene: combat loop for Marginalia.
// Runs through ENCOUNTER_ORDER (6 encounters) in sequence.
// Player casts from a chosen 5-spell deck; enemy attacks each round.
//
// State machine:
//   PLAYER_TURN -> cast spell or End Turn -> ANIMATING
//   ANIMATING   -> 0.4s delay             -> resolveEnemy -> PLAYER_TURN
//   ENCOUNTER_WIN -> click                -> next encounter (or VICTORY)
//   VICTORY / GAME_OVER -> 0.6s auto      -> LibraryGameOverScene
//
// Spell state fields (passed in effect(state)):
//   playerHp, playerMaxHp, encHpDelta, encAttackModifier, encMarked,
//   encStunned, chainBonus, extraCastThisTurn, encounter.armor,
//   lastCastSpell, log(msg), applySpellEffect(spell, isCitation)
//
// Depends on: Engine, SPELLS, ENCOUNTERS, ENCOUNTER_ORDER, getEncounter,
//             UNLOCK_SPELL_IDS, LibraryGameOverScene

class LibraryMatchScene extends Engine.Scene {
  constructor(game, deck) {
    super();
    this._game = game;
    this._deck = deck; // Array<spell>, length 5

    // Run-level state
    this._encIdx       = 0;
    this._roomsCleared = 0;
    this._turnsTotal   = 0;
    this._playerHp     = 24;
    this._playerMaxHp  = 24;

    // Encounter-level state (reset in _initEncounter)
    this._encHp    = 0;
    this._encArmor = 0;
    this._encTurn  = 0;  // enemy turn counter for heal/alt-attack intervals
    this._encMarked = false;

    // Per-turn accumulators (reset in _beginPlayerTurn)
    this._playerDef     = 0;
    this._chainBonus    = 0;
    this._pendingAtkMod = 0;
    this._encStunned    = false;
    this._castsLeft     = 1;
    this._lastCastSpell = null;

    // Spell cooldowns: { spellId: turnsRemaining }
    this._cooldowns = {};

    // UI
    this._state        = 'PLAYER_TURN';
    this._animTimer    = 0;
    this._hoverIdx     = -1;
    this._hoverEnd     = false;
    this._wasMouseDown = false;
    this._log          = [];
    this._t            = 0;
  }

  enter() {
    this._wasMouseDown = Engine.input.mouse.left;
    this._initEncounter();
  }

  // ── Encounter lifecycle ─────────────────────────────────────────────

  _enc() {
    return getEncounter(ENCOUNTER_ORDER[this._encIdx]);
  }

  _initEncounter() {
    var enc = this._enc();
    this._encHp    = enc.hp;
    this._encArmor = enc.armor || 0;
    this._encTurn  = 0;
    this._encMarked = false;
    // Reset all cooldowns on entering a new encounter
    var cd = this._cooldowns;
    for (var id in cd) cd[id] = 0;
    this._log = [enc.room + '.', enc.name + ' — ' + enc.desc];
    this._beginPlayerTurn();
  }

  _beginPlayerTurn() {
    this._playerDef     = 0;
    this._chainBonus    = 0;
    this._pendingAtkMod = 0;
    this._encStunned    = false;
    this._castsLeft     = 1;
    this._lastCastSpell = null;
    this._state         = 'PLAYER_TURN';
    this._turnsTotal++;
    var cd = this._cooldowns;
    for (var id in cd) { if (cd[id] > 0) cd[id]--; }
  }

  // ── Spell casting ────────────────────────────────────────────────

  _castSpell(spell) {
    if ((this._cooldowns[spell.id] || 0) > 0) return;
    if (this._castsLeft <= 0) return;

    var self = this;
    var state = {
      playerHp:          this._playerHp,
      playerMaxHp:       this._playerMaxHp,
      encHpDelta:        spell.dmg + this._chainBonus,
      encAttackModifier: 0,
      encMarked:         this._encMarked,
      encStunned:        false,
      chainBonus:        0,
      extraCastThisTurn: 0,
      encounter:         { armor: this._encArmor },
      lastCastSpell:     this._lastCastSpell,
      log: function(msg) { self._log2(msg); },
      // Used by citation to repeat a spell's full effect within this turn
      applySpellEffect: function(sp, isCitation) {
        if (!sp || (isCitation && sp.id === 'citation')) return;
        state.encHpDelta += sp.dmg + state.chainBonus;
        self._playerDef  += sp.def;
        if (sp.effect) sp.effect(state);
      }
    };

    if (spell.effect) spell.effect(state);
    this._playerDef += spell.def;

    // Commit turn-state mutations
    this._playerHp   = Math.max(0, Math.min(this._playerMaxHp, state.playerHp));
    this._encMarked  = state.encMarked;
    this._chainBonus += state.chainBonus;
    this._pendingAtkMod += state.encAttackModifier;
    if (state.encStunned) this._encStunned = true;

    // Apply damage to enemy (armor absorbs first)
    var rawDmg   = Math.max(0, state.encHpDelta);
    var absorbed = Math.min(rawDmg, state.encounter.armor);
    this._encArmor = Math.max(0, state.encounter.armor - absorbed);
    var dealt = rawDmg - absorbed;
    this._encHp -= dealt;

    // Log the cast
    var msg = spell.name;
    if (dealt > 0)    msg += ': -' + dealt + ' to enemy';
    if (absorbed > 0) msg += ' (' + absorbed + ' armored)';
    if (spell.def > 0) msg += ', +' + spell.def + ' def';
    this._log2(msg);

    if (spell.cooldown > 0) this._cooldowns[spell.id] = spell.cooldown;
    this._lastCastSpell = spell;

    this._castsLeft--;
    this._castsLeft += state.extraCastThisTurn;

    if (this._encHp <= 0) {
      this._encHp = 0;
      this._resolveEncounterWin();
      return;
    }
    if (this._playerHp <= 0) {
      this._playerHp = 0;
      this._animTimer = 0;
      this._state = 'GAME_OVER';
      return;
    }
    if (this._castsLeft <= 0) {
      this._animTimer = 0;
      this._state = 'ANIMATING';
    }
  }

  _endTurn() {
    if (this._state !== 'PLAYER_TURN') return;
    this._animTimer = 0;
    this._state = 'ANIMATING';
  }

  // ── Enemy turn ───────────────────────────────────────────────────

  _resolveEnemyTurn() {
    var enc = this._enc();
    this._encTurn++;

    // Heal (runs regardless of stun — healing is not an action)
    if (enc.healEvery > 0 && this._encTurn % enc.healEvery === 0) {
      var before = this._encHp;
      this._encHp = Math.min(enc.hp, this._encHp + enc.healAmount);
      var healed = this._encHp - before;
      if (healed > 0) this._log2(enc.name + ' recovers ' + healed + ' HP.');
    }

    if (this._encStunned) {
      this._log2(enc.name + ' is stunned.');
    } else {
      var useAlt = enc.altAttackEvery > 0 && this._encTurn % enc.altAttackEvery === 0;
      if (useAlt) {
        // Alt attack bypasses all player defense
        var altDmg = enc.altAttackDmg;
        this._playerHp = Math.max(0, this._playerHp - altDmg);
        this._log2((enc.altAttackMsg || 'Special') + ': -' + altDmg + ' HP (ignores def).');
      } else {
        var rawAtk  = Math.max(0, enc.attack + this._pendingAtkMod);
        var blocked = Math.min(rawAtk, this._playerDef);
        var taken   = rawAtk - blocked;
        this._playerHp = Math.max(0, this._playerHp - taken);
        var atkMsg = enc.name + ' attacks';
        if (blocked > 0) atkMsg += ' (' + blocked + ' blocked)';
        atkMsg += ': -' + taken + ' HP.';
        this._log2(atkMsg);
      }
    }

    this._encStunned    = false;
    this._pendingAtkMod = 0;
    this._playerDef     = 0;

    if (this._playerHp <= 0) {
      this._playerHp = 0;
      this._animTimer = 0;
      this._state = 'GAME_OVER';
      return;
    }
    this._beginPlayerTurn();
  }

  // ── Encounter win ────────────────────────────────────────────────

  _resolveEncounterWin() {
    var enc = this._enc();
    this._roomsCleared++;
    this._log2(enc.name + ' cataloged.');

    // Unlock the spell associated with this encounter position
    var unlockId = UNLOCK_SPELL_IDS[this._encIdx];
    if (unlockId) {
      var existing = Engine.storage.load('marginalia_unlocks', []);
      if (existing.indexOf(unlockId) === -1) {
        existing.push(unlockId);
        Engine.storage.save('marginalia_unlocks', existing);
        var spl = SPELLS[unlockId];
        this._log2('Discovered: ' + (spl ? spl.name : unlockId) + '.');
      }
    }

    // Minor heal between encounters (not after the final one)
    if (this._encIdx < ENCOUNTER_ORDER.length - 1) {
      var heal = Math.min(4, this._playerMaxHp - this._playerHp);
      if (heal > 0) {
        this._playerHp += heal;
        this._log2('+' + heal + ' HP recovered.');
      }
    }

    this._state = 'ENCOUNTER_WIN';
  }

  _advanceEncounter() {
    var next = this._encIdx + 1;
    if (next >= ENCOUNTER_ORDER.length) {
      this._animTimer = 0;
      this._state = 'VICTORY';
      return;
    }
    this._encIdx = next;
    this._initEncounter();
  }

  // ── Helpers ────────────────────────────────────────────────────────

  _log2(msg) {
    this._log.push(msg);
    if (this._log.length > 5) this._log.shift();
  }

  _cardRects(W, H) {
    var n = this._deck.length;
    var cw = Math.min(130, (W - 40) / n - 8);
    var ch = Math.min(88, H * 0.145);
    var total = n * cw + (n - 1) * 8;
    var ox = W / 2 - total / 2, oy = H * 0.815;
    var rects = [];
    for (var i = 0; i < n; i++) {
      rects.push({ x: ox + i * (cw + 8), y: oy, w: cw, h: ch });
    }
    return rects;
  }

  _endTurnRect(W, H) {
    var bw = 112, bh = 26;
    return { x: W / 2 - bw / 2, y: H * 0.975 - bh, w: bw, h: bh };
  }

  // ── Update ───────────────────────────────────────────────────────────

  update(dt) {
    this._t += dt;
    var mouse = Engine.input.mouse;
    var just = mouse.left && !this._wasMouseDown;
    this._wasMouseDown = mouse.left;

    if (this._state === 'ANIMATING') {
      this._animTimer += dt;
      if (this._animTimer >= 0.4) this._resolveEnemyTurn();
      return;
    }

    if (this._state === 'GAME_OVER' || this._state === 'VICTORY') {
      this._animTimer += dt;
      if (this._animTimer >= 0.65) {
        var won = this._state === 'VICTORY';
        this._game.setScene(new LibraryGameOverScene(this._game, {
          outcome:       won ? 'win' : 'loss',
          roomsCleared:  this._roomsCleared,
          hpRemaining:   this._playerHp,
          turnsTotal:    this._turnsTotal
        }));
      }
      return;
    }

    if (this._state === 'ENCOUNTER_WIN') {
      if (just) this._advanceEncounter();
      return;
    }

    // PLAYER_TURN interaction
    if (this._state === 'PLAYER_TURN') {
      var W = this._game.canvas.width, H = this._game.canvas.height;
      var cards = this._cardRects(W, H);
      var mx = mouse.x, my = mouse.y;
      this._hoverIdx = -1;
      this._hoverEnd = false;

      for (var i = 0; i < cards.length; i++) {
        var c = cards[i];
        if (mx >= c.x && mx <= c.x + c.w && my >= c.y && my <= c.y + c.h) {
          this._hoverIdx = i;
          break;
        }
      }
      var eb = this._endTurnRect(W, H);
      if (mx >= eb.x && mx <= eb.x + eb.w && my >= eb.y && my <= eb.y + eb.h) {
        this._hoverEnd = true;
      }

      if (just) {
        if (this._hoverIdx >= 0) {
          this._castSpell(this._deck[this._hoverIdx]);
        } else if (this._hoverEnd) {
          this._endTurn();
        }
      }
    }
  }

  // ── Draw ──────────────────────────────────────────────────────────────

  draw(ctx) {
    var W = this._game.canvas.width, H = this._game.canvas.height;
    ctx.fillStyle = '#1a1008';
    ctx.fillRect(0, 0, W, H);

    if (this._state === 'GAME_OVER') {
      this._drawTransition(ctx, W, H, false);
      return;
    }
    if (this._state === 'VICTORY') {
      this._drawTransition(ctx, W, H, true);
      return;
    }
    if (this._state === 'ENCOUNTER_WIN') {
      this._drawEncounterWin(ctx, W, H);
      return;
    }

    this._drawHeader(ctx, W, H);
    this._drawEnemy(ctx, W, H);
    this._drawLog(ctx, W, H);
    this._drawTurnState(ctx, W, H);
    this._drawHand(ctx, W, H);
  }

  _drawHeader(ctx, W, H) {
    ctx.fillStyle = '#0f0904';
    ctx.fillRect(0, 0, W, H * 0.08);
    ctx.font = Math.min(13, H * 0.021) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#5a4030';
    var enc = this._enc();
    ctx.fillText(
      enc.room + '   ·   Enc ' + (this._encIdx + 1) + '/' + ENCOUNTER_ORDER.length +
      '   ·   HP ' + this._playerHp + '/' + this._playerMaxHp,
      W / 2, H * 0.04
    );
  }

  _drawEnemy(ctx, W, H) {
    var enc = this._enc();

    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillStyle = '#d4b896';
    ctx.font = 'italic ' + Math.min(20, H * 0.033) + 'px serif';
    ctx.fillText(enc.name, W / 2, H * 0.1);

    // HP bar
    var bw = Math.min(220, W * 0.38), bh = 9;
    var bx = W / 2 - bw / 2, by = H * 0.155;
    var ratio = Math.max(0, this._encHp / enc.hp);
    ctx.fillStyle = '#2a1a08';
    ctx.fillRect(bx, by, bw, bh);
    ctx.fillStyle = ratio > 0.5 ? '#4a8a4a' : ratio > 0.25 ? '#aa8822' : '#882222';
    ctx.fillRect(bx, by, bw * ratio, bh);
    ctx.strokeStyle = '#3a2010'; ctx.lineWidth = 1;
    ctx.strokeRect(bx, by, bw, bh);

    ctx.font = Math.min(11, H * 0.018) + 'px serif';
    ctx.fillStyle = '#8a6f4e';
    var hpLine = 'HP ' + this._encHp + ' / ' + enc.hp;
    if (this._encArmor > 0)  hpLine += '   Armor ' + this._encArmor;
    if (this._encMarked)     hpLine += '   [marked]';
    if (this._encStunned)    hpLine += '   [stunned]';
    ctx.fillText(hpLine, W / 2, by + bh + 3);

    // Enemy sprite
    var sw = Math.min(200, W * 0.36), sh = Math.min(160, H * 0.28);
    ctx.save();
    enc.drawFn(ctx, W / 2 - sw / 2, H * 0.2, sw, sh, this._t);
    ctx.restore();
  }

  _drawLog(ctx, W, H) {
    var lines = this._log.slice(-4);
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    var lh = Math.min(15, H * 0.025);
    ctx.font = Math.min(12, H * 0.02) + 'px serif';
    for (var i = 0; i < lines.length; i++) {
      var alpha = 0.3 + (i + 1) / lines.length * 0.7;
      ctx.fillStyle = 'rgba(180,158,120,' + alpha + ')';
      ctx.fillText(lines[i], W / 2, H * 0.52 + i * lh);
    }
  }

  _drawTurnState(ctx, W, H) {
    var parts = [];
    if (this._playerDef > 0)   parts.push('Def ' + this._playerDef);
    if (this._chainBonus > 0)  parts.push('Chain +' + this._chainBonus + ' dmg');
    if (this._castsLeft > 1)   parts.push('Extra cast!');
    if (parts.length) {
      ctx.textAlign = 'center'; ctx.textBaseline = 'top';
      ctx.font = Math.min(11, H * 0.018) + 'px serif';
      ctx.fillStyle = '#6aaf6a';
      ctx.fillText(parts.join('   '), W / 2, H * 0.73);
    }
  }

  _drawHand(ctx, W, H) {
    var cards = this._cardRects(W, H);
    for (var i = 0; i < this._deck.length; i++) {
      var spell  = this._deck[i];
      var card   = cards[i];
      var onCD   = (this._cooldowns[spell.id] || 0) > 0;
      var active = this._state === 'PLAYER_TURN';
      var hover  = this._hoverIdx === i && active && !onCD;
      var dimmed = onCD || !active;

      ctx.save();
      ctx.globalAlpha = dimmed ? 0.4 : 1;

      ctx.fillStyle   = hover ? '#2c1a0a' : '#160d05';
      ctx.strokeStyle = hover ? '#d4b896' : (onCD ? '#2a1a0a' : '#3a2518');
      ctx.lineWidth   = hover ? 1.5 : 1;
      ctx.beginPath();
      ctx.rect(card.x, card.y, card.w, card.h);
      ctx.fill(); ctx.stroke();

      // Glyph in top-left corner
      var gs = Math.min(26, card.h * 0.29);
      ctx.save();
      ctx.beginPath(); ctx.rect(card.x + 4, card.y + 4, gs, gs); ctx.clip();
      ctx.translate(card.x + 4, card.y + 4);
      spell.glyphFn(ctx, gs, gs);
      ctx.restore();

      // Name
      ctx.font = 'bold ' + Math.min(10, card.w * 0.08) + 'px serif';
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillStyle = hover ? '#d4b896' : '#8a6f4e';
      ctx.fillText(spell.name, card.x + gs + 8, card.y + 5);

      // Stats
      ctx.font = Math.min(9, card.w * 0.072) + 'px serif';
      ctx.fillStyle = '#c0392b';
      ctx.fillText(spell.dmg + ' dmg', card.x + gs + 8, card.y + 18);
      ctx.fillStyle = '#2980b9';
      ctx.fillText(spell.def + ' def', card.x + gs + 8, card.y + 28);

      // Cooldown overlay
      if (onCD) {
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#8a6f4e';
        ctx.font = 'bold ' + Math.min(11, card.h * 0.13) + 'px serif';
        ctx.fillText('cd ' + this._cooldowns[spell.id], card.x + card.w / 2, card.y + card.h * 0.68);
      }

      ctx.restore();
    }

    // End Turn button
    var eb = this._endTurnRect(W, H);
    var active2 = this._state === 'PLAYER_TURN';
    ctx.globalAlpha = active2 ? 1 : 0.35;
    ctx.fillStyle   = this._hoverEnd ? '#2c1a0a' : '#160d05';
    ctx.strokeStyle = this._hoverEnd ? '#d4b896' : '#3a2518';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.rect(eb.x, eb.y, eb.w, eb.h);
    ctx.fill(); ctx.stroke();
    ctx.font = Math.min(11, H * 0.018) + 'px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = this._hoverEnd ? '#d4b896' : '#5a4030';
    ctx.fillText('End Turn', eb.x + eb.w / 2, eb.y + eb.h / 2);
    ctx.globalAlpha = 1;
  }

  // ── Terminal screens ───────────────────────────────────────────────

  _drawEncounterWin(ctx, W, H) {
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#d4b896';
    ctx.font = 'italic ' + Math.min(24, H * 0.04) + 'px serif';
    ctx.fillText(this._enc().name + ' cataloged.', W / 2, H * 0.28);

    ctx.strokeStyle = '#8a6f4e'; ctx.lineWidth = 1;
    var ruleW = Math.min(260, W * 0.48);
    ctx.beginPath();
    ctx.moveTo(W / 2 - ruleW / 2, H * 0.36);
    ctx.lineTo(W / 2 + ruleW / 2, H * 0.36);
    ctx.stroke();

    var msgs = this._log.slice(-3);
    ctx.font = Math.min(13, H * 0.022) + 'px serif';
    for (var i = 0; i < msgs.length; i++) {
      ctx.fillStyle = '#8a6f4e';
      ctx.fillText(msgs[i], W / 2, H * 0.44 + i * H * 0.058);
    }

    var bw = Math.min(200, W * 0.36), bh = 38;
    var bx = W / 2 - bw / 2, by = H * 0.72;
    ctx.fillStyle = '#1e1208';
    ctx.strokeStyle = '#8a6f4e'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.rect(bx, by, bw, bh); ctx.fill(); ctx.stroke();
    ctx.font = Math.min(14, H * 0.023) + 'px serif';
    ctx.fillStyle = '#d4b896';
    ctx.fillText('Continue', W / 2, by + bh / 2);
  }

  // Brief overlay before handing off to LibraryGameOverScene
  _drawTransition(ctx, W, H, won) {
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = won ? '#f39c12' : '#c0392b';
    ctx.font = 'italic ' + Math.min(52, H * 0.086) + 'px serif';
    ctx.fillText(won ? 'Cataloged.' : 'Overdue.', W / 2, H / 2);
  }
}

bootstrapGame({ canvasId: 'game', presets: { regular: { w: 900, h: 620 }, compact: { w: 600, h: 820 } }, gameName: 'marginalia', initialScene: function(game) { return new LibraryMenuScene(game); } });
</script>
