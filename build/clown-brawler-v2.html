        ctx.fillRect(bx, this.FLOOR_MIN - b.h, b.w, b.h);
        ctx.fillStyle = 'rgba(255,240,160,0.18)';
        for (let wy = this.FLOOR_MIN - b.h + 10; wy < this.FLOOR_MIN - 12; wy += 18) {
          for (let wx = bx + 8; wx < bx + b.w - 8; wx += 16) ctx.fillRect(wx, wy, 8, 10);
        }
        ctx.fillStyle = b.dark ? BLDG_COLOR_MID : BLDG_COLOR_FAR;
      }
    }
    const floor = ctx.createLinearGradient(0, this.FLOOR_MIN, 0, H);
    floor.addColorStop(0, '#7c6242'); floor.addColorStop(1, '#5c4830');
    ctx.fillStyle = floor; ctx.fillRect(0, this.FLOOR_MIN, W, H - this.FLOOR_MIN);
    ctx.fillStyle = '#4a3522'; ctx.fillRect(0, this.FLOOR_MIN - 3, W, 5);
    const TILE_W = 80;
    const tileOffset = camX % TILE_W;
    ctx.strokeStyle = 'rgba(255,255,255,0.10)'; ctx.lineWidth = 1;
    for (let kx = -tileOffset; kx < W + TILE_W; kx += TILE_W) {
      ctx.beginPath(); ctx.moveTo(Math.round(kx), this.FLOOR_MIN); ctx.lineTo(Math.round(kx), H); ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    for (let ly = this.FLOOR_MIN + 40; ly < H; ly += 55) {
      ctx.beginPath(); ctx.moveTo(0, ly); ctx.lineTo(W, ly); ctx.stroke();
    }
  }
  _drawHUD(ctx) {
    const W = this.W, H = this.H; ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, 30);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ddd'; ctx.font = '14px monospace';
    const waveLabel = this._state === 'wave_clear' ? 'WAVE ' + this._wave + ' CLEAR!' : 'WAVE ' + this._wave + ' / ' + this.TOTAL_WAVES + '   ENEMIES: ' + this._enemies.length;
    ctx.fillText(waveLabel, W / 2, 15);
    ctx.textAlign = 'right'; ctx.fillStyle = '#555'; ctx.font = '11px monospace';
    ctx.fillText('ESC: pause', W - 6, 22);
    if (this._playerScript) {
      const bw = 200, bh = 14, bx = W / 2 - bw / 2, by = H - 22;
      const ratio = Math.max(0, this._playerScript.health / this._playerScript.maxHealth);
      ctx.fillStyle = '#222'; ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = ratio > 0.5 ? '#4caf50' : ratio > 0.25 ? '#ff9800' : '#f44336';
      ctx.fillRect(bx, by, bw * ratio, bh);
      ctx.fillStyle = '#888'; ctx.font = '10px monospace'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(this._playerScript.health + ' / ' + this._playerScript.maxHealth, W / 2, by + bh / 2);
      ctx.fillStyle = '#aaa'; ctx.textAlign = 'right'; ctx.font = '11px monospace';
      ctx.fillText('HP', bx - 4, by + bh / 2);
    }
    ctx.restore();
  }
  _drawStateOverlay(ctx) {
    const W = this.W, H = this.H;
    if (this._state === 'wave_clear') {
      ctx.save();
      const alpha = Math.min(1, this._waveClearTimer > 1.5 ? (2.5 - this._waveClearTimer) / 1.0 : this._waveClearTimer / 1.0);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = 'rgba(0,0,0,0.55)'; ctx.fillRect(0, H / 2 - 55, W, 110);
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#ffeb3b'; ctx.font = 'bold 52px monospace';
      ctx.fillText('WAVE ' + this._wave + ' CLEAR!', W / 2, H / 2 - 14);
      if (this._wave < this.TOTAL_WAVES) {
        ctx.fillStyle = '#ccc'; ctx.font = '20px monospace';
        ctx.fillText('Wave ' + (this._wave + 1) + ' incoming...', W / 2, H / 2 + 28);
      }
      ctx.restore();
    }
    if (this._state === 'game_over') {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.72)'; ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#f44336'; ctx.font = 'bold 64px monospace';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
      ctx.fillStyle = '#aaa'; ctx.font = '20px monospace';
      ctx.fillText('Wave ' + this._wave + ' of ' + this.TOTAL_WAVES, W / 2, H / 2 + 14);
      ctx.fillStyle = '#666'; ctx.font = '16px monospace';
      ctx.fillText('ENTER or SPACE to return to menu', W / 2, H / 2 + 52);
      ctx.restore();
    }
    if (this._state === 'victory') {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 0, W, H);
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillStyle = '#ffeb3b'; ctx.font = 'bold 64px monospace';
      ctx.fillText('VICTORY!', W / 2, H / 2 - 50);
      ctx.fillStyle = '#ce93d8'; ctx.font = '22px monospace';
      ctx.fillText('The gorillas are defeated!', W / 2, H / 2 + 10);
      ctx.fillStyle = '#aaa'; ctx.font = '18px monospace';
      ctx.fillText('The balloons float free.', W / 2, H / 2 + 44);
      ctx.fillStyle = '#666'; ctx.font = '16px monospace';
      ctx.fillText('ENTER or SPACE to return to menu', W / 2, H / 2 + 82);
      ctx.restore();
    }
  }
}


(function() {
  const canvas = document.getElementById('gameCanvas');
  const game = new Engine.Game(canvas, { gameName: 'clown-brawler' });
  game.setScene(new ClownMenuScene(game));
  game.start();
})();
</script>
