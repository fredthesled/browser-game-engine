Params.prototype.random = function () {

/*** Simpler namespaced functional API ***/

};

sfxr.toWebAudio = function(synthdef, audiocontext) {
  var sfx = new SoundEffect(synthdef);
  var buffer = sfx.getRawBuffer()["normalized"];
  if (audiocontext) {
    var buff = audiocontext.createBuffer(1, buffer.length, sfx.sampleRate);
    var nowBuffering = buff.getChannelData(0);
    for (var i = 0; i < buffer.length; i++) {
      nowBuffering[i] = buffer[i];
    }
    var proc = audiocontext.createBufferSource();
    proc.buffer = buff;
    return proc;
  }

  return (new SoundEffect(synthdef)).generate();
};

    } else {
      var val = (decoded[offset] | (decoded[offset + 1] << 8) | (decoded[offset + 2] << 16) | (decoded[offset + 3] << 24));

sfxr.generate = function(algorithm, options) {

/*** Main entry point ***/

function SoundEffect(ps) {
  if (typeof(ps) == "string") {
    var PARAMS = new Params();
    if (ps.indexOf("#") == 0) {
      ps = ps.slice(1);
    }
    ps = PARAMS.fromB58(ps);
  }
  this.init(ps);
}

SoundEffect.prototype.init = function (ps) {
  this.parameters = ps;
  this.initForRepeat();  // First time through, this is a bit of a misnomer

  // Waveform shape
  this.waveShape = parseInt(ps.wave_type);

  // Filter
  this.fltw = Math.pow(ps.p_lpf_freq, 3) * 0.1;
  this.enableLowPassFilter = (ps.p_lpf_freq != 1);
  this.fltw_d = 1 + ps.p_lpf_ramp * 0.0001;
  this.fltdmp = 5 / (1 + Math.pow(ps.p_lpf_resonance, 2) * 20) *
    (0.01 + this.fltw);
  if (this.fltdmp > 0.8) this.fltdmp=0.8;
  this.flthp = Math.pow(ps.p_hpf_freq, 2) * 0.1;
  this.flthp_d = 1 + ps.p_hpf_ramp * 0.0003;

  // Vibrato
  this.vibratoSpeed = Math.pow(ps.p_vib_speed, 2) * 0.01;
  this.vibratoAmplitude = ps.p_vib_strength * 0.5;

  // Envelope
  this.envelopeLength = [
    Math.floor(ps.p_env_attack * ps.p_env_attack * 100000),
    Math.floor(ps.p_env_sustain * ps.p_env_sustain * 100000),
    Math.floor(ps.p_env_decay * ps.p_env_decay * 100000)
  ];
  this.envelopePunch = ps.p_env_punch;

  // Flanger
  this.flangerOffset = Math.pow(ps.p_pha_offset, 2) * 1020;
  if (ps.p_pha_offset < 0) this.flangerOffset = -this.flangerOffset;
  this.flangerOffsetSlide = Math.pow(ps.p_pha_ramp, 2) * 1;
  if (ps.p_pha_ramp < 0) this.flangerOffsetSlide = -this.flangerOffsetSlide;

  // Repeat
  this.repeatTime = Math.floor(Math.pow(1 - ps.p_repeat_speed, 2) * 20000
                               + 32);
  if (ps.p_repeat_speed === 0)
    this.repeatTime = 0;

  this.gain = Math.exp(ps.sound_vol) - 1;

  this.sampleRate = ps.sample_rate;
  this.bitsPerChannel = ps.sample_size;
}

SoundEffect.prototype.initForRepeat = function() {
  var ps = this.parameters;
  this.elapsedSinceRepeat = 0;

  this.period = 100 / (ps.p_base_freq * ps.p_base_freq + 0.001);
  this.periodMax = 100 / (ps.p_freq_limit * ps.p_freq_limit + 0.001);
  this.enableFrequencyCutoff = (ps.p_freq_limit > 0);
  this.periodMult = 1 - Math.pow(ps.p_freq_ramp, 3) * 0.01;
  this.periodMultSlide = -Math.pow(ps.p_freq_dramp, 3) * 0.000001;

  this.dutyCycle = 0.5 - ps.p_duty * 0.5;
  this.dutyCycleSlide = -ps.p_duty_ramp * 0.00005;

  if (ps.p_arp_mod >= 0)
    this.arpeggioMultiplier = 1 - Math.pow(ps.p_arp_mod, 2) * .9;
  else
    this.arpeggioMultiplier = 1 + Math.pow(ps.p_arp_mod, 2) * 10;
  this.arpeggioTime = Math.floor(Math.pow(1 - ps.p_arp_speed, 2) * 20000 + 32);
  if (ps.p_arp_speed === 1)
    this.arpeggioTime = 0;
}

SoundEffect.prototype.getRawBuffer = function () {
  var fltp = 0;
  var fltdp = 0;
  var fltphp = 0;

  var noise_buffer = Array(32);
  for (var i = 0; i < 32; ++i)
    noise_buffer[i] = Math.random() * 2 - 1;

  var envelopeStage = 0;
  var envelopeElapsed = 0;

  var vibratoPhase = 0;

  var phase = 0;
  var ipp = 0;
  var flanger_buffer = Array(1024);
  for (var i = 0; i < 1024; ++i)
    flanger_buffer[i] = 0;

  var num_clipped = 0;

  var buffer = [];
  var normalized = [];

  var sample_sum = 0;
  var num_summed = 0;
  var summands = Math.floor(44100 / this.sampleRate);

  for(var t = 0; ; ++t) {

    // Repeats
    if (this.repeatTime != 0 && ++this.elapsedSinceRepeat >= this.repeatTime)
      this.initForRepeat();

    // Arpeggio (single)
    if(this.arpeggioTime != 0 && t >= this.arpeggioTime) {
      this.arpeggioTime = 0;
      this.period *= this.arpeggioMultiplier;
    }

    // Frequency slide, and frequency slide slide!
    this.periodMult += this.periodMultSlide;
    this.period *= this.periodMult;
    if(this.period > this.periodMax) {
      this.period = this.periodMax;
      if (this.enableFrequencyCutoff)
        break;
    }

    // Vibrato
    var rfperiod = this.period;
    if (this.vibratoAmplitude > 0) {
      vibratoPhase += this.vibratoSpeed;
      rfperiod = this.period * (1 + Math.sin(vibratoPhase) * this.vibratoAmplitude);
    }
    var iperiod = Math.floor(rfperiod);
    if (iperiod < OVERSAMPLING) iperiod = OVERSAMPLING;

    // Square wave duty cycle
    this.dutyCycle += this.dutyCycleSlide;
    if (this.dutyCycle < 0) this.dutyCycle = 0;
    if (this.dutyCycle > 0.5) this.dutyCycle = 0.5;

    // Volume envelope
    if (++envelopeElapsed > this.envelopeLength[envelopeStage]) {
      envelopeElapsed = 0;
      if (++envelopeStage > 2)
        break;
    }
    var env_vol;
    var envf = envelopeElapsed / this.envelopeLength[envelopeStage];
    if (envelopeStage === 0) {         // Attack
      env_vol = envf;
    } else if (envelopeStage === 1) {  // Sustain
      env_vol = 1 + (1 - envf) * 2 * this.envelopePunch;
    } else {                           // Decay
      env_vol = 1 - envf;
    }

    // Flanger step
    this.flangerOffset += this.flangerOffsetSlide;
    var iphase = Math.abs(Math.floor(this.flangerOffset));
    if (iphase > 1023) iphase = 1023;

    if (this.flthp_d != 0) {
      this.flthp *= this.flthp_d;
      if (this.flthp < 0.00001)
        this.flthp = 0.00001;
      if (this.flthp > 0.1)
        this.flthp = 0.1;
    }

    // 8x oversampling
    var sample = 0;
    for (var si = 0; si < OVERSAMPLING; ++si) {
      var sub_sample = 0;
      phase++;
      if (phase >= iperiod) {
        phase %= iperiod;
        if (this.waveShape === NOISE)
          for(var i = 0; i < 32; ++i)
            noise_buffer[i] = Math.random() * 2 - 1;
      }

      // Base waveform
      var fp = phase / iperiod;
      if (this.waveShape === SQUARE) {
        if (fp < this.dutyCycle)
          sub_sample=0.5;
        else
          sub_sample=-0.5;
      } else if (this.waveShape === SAWTOOTH) {
        if (fp < this.dutyCycle)
          sub_sample = -1 + 2 * fp/this.dutyCycle;
        else
          sub_sample = 1 - 2 * (fp-this.dutyCycle)/(1-this.dutyCycle);
      } else if (this.waveShape === SINE) {
        sub_sample = Math.sin(fp * 2 * Math.PI);
      } else if (this.waveShape === NOISE) {
        sub_sample = noise_buffer[Math.floor(phase * 32 / iperiod)];
      } else {
        throw "ERROR: Bad wave type: " + this.waveShape;
      }

      // Low-pass filter
      var pp = fltp;
      this.fltw *= this.fltw_d;
      if (this.fltw < 0) this.fltw = 0;
      if (this.fltw > 0.1) this.fltw = 0.1;
      if (this.enableLowPassFilter) {
        fltdp += (sub_sample - fltp) * this.fltw;
        fltdp -= fltdp * this.fltdmp;
      } else {
        fltp = sub_sample;
        fltdp = 0;
      }
      fltp += fltdp;

      // High-pass filter
      fltphp += fltp - pp;
      fltphp -= fltphp * this.flthp;
      sub_sample = fltphp;

      // Flanger
      flanger_buffer[ipp & 1023] = sub_sample;
      sub_sample += flanger_buffer[(ipp - iphase + 1024) & 1023];
      ipp = (ipp + 1) & 1023;

      // final accumulation and envelope application
      sample += sub_sample * env_vol;
    }

    // Accumulate samples appropriately for sample rate
    sample_sum += sample;
    if (++num_summed >= summands) {
      num_summed = 0;
      sample = sample_sum / summands;
      sample_sum = 0;
    } else {
      continue;
    }

    sample = sample / OVERSAMPLING * masterVolume;
    sample *= this.gain;

    // store the original normalized floating point sample
    normalized.push(sample);

    if (this.bitsPerChannel === 8) {
      // Rescale [-1, 1) to [0, 256)
      sample = Math.floor((sample + 1) * 128);
      if (sample > 255) {
        sample = 255;
        ++num_clipped;
      } else if (sample < 0) {
        sample = 0;
        ++num_clipped;
      }
      buffer.push(sample);
    } else {
      // Rescale [-1, 1) to [-32768, 32768)
      sample = Math.floor(sample * (1<<15));
      if (sample >= (1<<15)) {
        sample = (1 << 15)-1;
        ++num_clipped;
      } else if (sample < -(1<<15)) {
        sample = -(1 << 15);
        ++num_clipped;
      }
      buffer.push(sample & 0xFF);
      buffer.push((sample >> 8) & 0xFF);
    }
  }
  
  return {
    "buffer": buffer,
    "normalized": normalized,
    "clipped": num_clipped,
  }
}

SoundEffect.prototype.generate = function() {
  var rendered = this.getRawBuffer();
  var wave = new RIFFWAVE();
  wave.header.sampleRate = this.sampleRate;
  wave.header.bitsPerSample = this.bitsPerChannel;
  wave.Make(rendered.buffer);
  wave.clipping = rendered.clipped;
  wave.buffer = rendered.normalized;
  wave.getAudio = _sfxr_getAudioFn(wave);
  return wave;
}

var _actx = null;
var _sfxr_getAudioFn = function(wave) {
  return function() {
    // check for procedural audio
    var actx = null;
    if (!_actx) {
      if ('AudioContext' in window) {
        _actx = new AudioContext();
      } else if ('webkitAudioContext' in window) {
        _actx = new webkitAudioContext();
      }
    }
    actx = _actx;
    
    if (actx) {
      var buff = actx.createBuffer(1, wave.buffer.length, wave.header.sampleRate);
      var nowBuffering = buff.getChannelData(0);
      for (var i=0;i<wave.buffer.length;i++) {
        nowBuffering[i] = wave.buffer[i];
      }
      var volume = 1.0;
      var obj = {
        "channels": [],
        "setVolume": function(v) { volume = v; return obj; },
        "play": function() {
          var proc = actx.createBufferSource();
          proc.buffer = buff;
          var gainNode = actx.createGain()
          gainNode.gain.value = volume;
          gainNode.connect(actx.destination)
          proc.connect(gainNode);
          if (proc["start"]) {
            proc.start();
          } else if (proc["noteOn"]) {
            proc.noteOn(0);
          }
          this.channels.push(proc);
          return proc;
        }
      };
      return obj;
    } else {
      var audio = new Audio();
      audio.src = wave.dataURI;
      return audio;
    }
  };
};

// engine/signal-bus.js
// Global pub/sub for decoupled engine and game events.
// Depends on: nothing.
// Used by: any module that needs to emit or listen for named events.

var Engine = Engine || {};

class SignalBus {
  constructor() {
    this._listeners = new Map();
  }

  /** Fire a named signal with an optional payload. */
  emit(name, payload) {
    const handlers = this._listeners.get(name);
    if (!handlers) return;
    // Snapshot so handlers that unregister during dispatch do not corrupt iteration.
    for (const handler of [...handlers]) {
      handler(payload);
    }
  }

  /** Register a listener for a named signal. Returns an unregister function. */
  on(name, handler) {
    if (!this._listeners.has(name)) {
      this._listeners.set(name, new Set());
    }
    this._listeners.get(name).add(handler);
    return () => this.off(name, handler);
  }

  /** Remove a listener for a named signal. */
  off(name, handler) {
    const handlers = this._listeners.get(name);
    if (!handlers) return;
    handlers.delete(handler);
    if (handlers.size === 0) {
      this._listeners.delete(name);
    }
  }
}

// engine/input.js
// Latched keyboard and mouse state, queried per frame by the active scene.
// Depends on: nothing (uses DOM APIs directly).
// Used by: scripts and scenes that need to read user input. The Game class
// constructs the singleton instance and assigns it to Engine.input.

var Engine = Engine || {};

class Input {
  constructor(canvas = null) {
    this._down = new Set();          // keys currently held down
    this._justPressed = new Set();   // keys pressed this frame
    this._justReleased = new Set();  // keys released this frame
    this._pendingPressed = new Set();
    this._pendingReleased = new Set();

    this.mouse = {
      x: 0,
      y: 0,
      left: false,
      right: false
    };

    this._canvas = canvas;

    window.addEventListener('keydown', (e) => {
      if (!this._down.has(e.key)) {
        this._pendingPressed.add(e.key);
      }
      this._down.add(e.key);
    });

    window.addEventListener('keyup', (e) => {
      if (this._down.has(e.key)) {
        this._pendingReleased.add(e.key);
      }
      this._down.delete(e.key);
    });

    // Mouse coordinates are computed relative to the canvas if one was provided,
    // accounting for any CSS scaling between the canvas's display size and its drawing buffer.
    const moveTarget = canvas || window;
    moveTarget.addEventListener('mousemove', (e) => {
      if (canvas) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        this.mouse.x = (e.clientX - rect.left) * scaleX;
        this.mouse.y = (e.clientY - rect.top) * scaleY;
      } else {
        this.mouse.x = e.clientX;
        this.mouse.y = e.clientY;
      }
    });

    // Mousedown attaches to the canvas (or window fallback). Mouseup attaches to window
    // so a button held outside the canvas still releases properly.
    const downTarget = canvas || window;
    downTarget.addEventListener('mousedown', (e) => {
      if (e.button === 0) this.mouse.left = true;
      if (e.button === 2) this.mouse.right = true;
    });
    window.addEventListener('mouseup', (e) => {
      if (e.button === 0) this.mouse.left = false;
      if (e.button === 2) this.mouse.right = false;
    });
  }

  isDown(key) {
    return this._down.has(key);
  }

  /** True only on the frame the key transitioned from up to down. */
  wasJustPressed(key) {
    return this._justPressed.has(key);
  }

  /** True only on the frame the key transitioned from down to up. */
  wasJustReleased(key) {
    return this._justReleased.has(key);
  }

  /** Called once per frame by Game. Advances "just pressed/released" tracking. */
  update() {
    this._justPressed = this._pendingPressed;
    this._justReleased = this._pendingReleased;
    this._pendingPressed = new Set();
    this._pendingReleased = new Set();
  }
}

// engine/game-object.js
// Transform host. Owns a list of attached Scripts and delegates lifecycle to them.
// Depends on: Script (only as a contract; not a hard import).
// Used by: Scene, which contains GameObjects; game code, which instantiates them.

    this.scripts.push(script);

  update(dt) {
    for (const s of this.scripts) {

// engine/scene.js
// Owns a collection of GameObjects, provides lifecycle hooks, applies per-object
// transforms during draw, and runs a pairwise AABB collision pass after object updates.
// Depends on: GameObject, Collider scripts (only by duck-typing the isCollider marker).
// Used by: Game, which holds the active scene; game code, which subclasses Scene to define each scene.

  constructor() {
    this.objects = [];
  }

  /** Called by Game when this scene becomes active. Subclasses populate the scene here. */
  enter() {}

  /** Called by Game when this scene is being replaced. Subclasses tear down here. */
  exit() {}

  /** Add a GameObject to the scene. Returns the object for chaining. */
  add(obj) {
    this.objects.push(obj);
    return obj;
  }

  /** Remove a GameObject from the scene. */
  remove(obj) {
    const i = this.objects.indexOf(obj);
    if (i !== -1) this.objects.splice(i, 1);
  }

  /** Iterate GameObjects, update each, then run the collision pass.
   *  Subclasses may override but should call super.update(dt). */
  update(dt) {
    // Snapshot so objects added or removed during update do not corrupt iteration.
    for (const obj of [...this.objects]) {
      obj.update(dt);
    }
    this._collisionPass();
  }

  /** Iterate GameObjects, apply each transform, draw each. Subclasses may override but
   * should call super.draw(ctx) to retain default per-object rendering. */
  draw(ctx) {
    for (const obj of this.objects) {
      ctx.save();
      ctx.translate(obj.x, obj.y);
      ctx.rotate(obj.rotation);
      ctx.scale(obj.scale, obj.scale);
      obj.draw(ctx);
      ctx.restore();
    }
  }

  /** Find all Collider scripts (duck-typed via isCollider) and run pairwise AABB checks.
   *  Each colliding pair invokes a.onCollide(b) and b.onCollide(a) once per frame.
   *  Broad-phase is O(N^2). Acceptable for hobby-scale games (N < 20 or so).
   *  When a game outgrows this, spatial partitioning can replace this method. */
  _collisionPass() {
    const colliders = [];
    for (const obj of this.objects) {
      for (const s of obj.scripts) {
        if (s.isCollider) {
          colliders.push(s);
        }
      }
    }
    for (let i = 0; i < colliders.length; i++) {
      const a = colliders[i];
      const aBox = a.getAabb();
      for (let j = i + 1; j < colliders.length; j++) {
        const b = colliders[j];
        const bBox = b.getAabb();
        if (aBox.x < bBox.x + bBox.w && aBox.x + aBox.w > bBox.x &&
            aBox.y < bBox.y + bBox.h && aBox.y + aBox.h > bBox.y) {
          a.onCollide(b);
          b.onCollide(a);
        }
      }
    }
  }
}

      console.warn(`Engine.storage.save: refusing to save undefined for key '${key}'. Use clear(key) instead.`);
      return false;
    }

    try {
      serialized = JSON.stringify(value);
    } catch (e) {
      console.warn(`Engine.storage.save: cannot serialize value for key '${key}':`, e);
      return false;

      this._fallback.set(fk, serialized);
      return true;

      window.localStorage.setItem(fk, serialized);

    } else {
      raw = window.localStorage.getItem(fk);

      if (!this._prefix) { out.push(k); continue; }

    let dt = (now - this._lastFrameTime) / 1000;
    if (dt > 0.1) dt = 0.1; // clamp to avoid huge jumps after tab inactivity or breakpoints
    this._lastFrameTime = now;

    // Apply pending scene transition before any per-frame work.
    if (this._pendingScene) {
      if (this.currentScene) this.currentScene.exit();
      this.currentScene = this._pendingScene;
      this._pendingScene = null;
      this.currentScene.enter();
    }

    // Advance input "just pressed/released" tracking before scene reads it.
    Engine.input.update();

    if (this.currentScene) {
      this.currentScene.update(dt);
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      this.currentScene.draw(this.ctx);
    }

    this._animationHandle = requestAnimationFrame((t) => this._frame(t));
  }
}

Engine.Game = Game;

// ============================================================================
// engine/narrative.js
// ============================================================================
//
// Engine.Narrative is a thin wrapper around an inkjs Story, exposing a small
// JS-side surface for game scenes to drive branching narrative content
// authored in inkle's ink scripting language.
//
// Depends on:
//   inkjs (global). Must be loaded before any Engine.Narrative instance is
//   constructed. Vendored at engine/lib/inkjs.js but, per ADR-0018,
//   intentionally NOT included in engine/engine.bundle.js because it is
//   large (~250 KB) and game-specific. Games that use narrative include the
//   vendored library separately in their build, before the engine bundle.
//
// Depended on by:
//   Per-game encounter scripts and scenes that drive ink content. No other
//   engine module depends on Narrative.
//
// Usage:
//   const n = new Engine.Narrative(inkSourceString);
//   n.bindExternal('start_combat', (enemyId) => { ... });
//   n.observe('scrap', (value) => updateHud(value));
//   n.setVar('hull', ship.hull);
//   const lines = n.continue();        // [{text, tags}, ...]
//   const choices = n.getChoices();    // [{index, text, tags}, ...]
//   n.choose(0);
//   if (n.hasEnded) { ... }
// ============================================================================

var Engine = Engine || {};

class Narrative {
  constructor(source, options = {}) {
    if (typeof inkjs === 'undefined') {
      throw new Error(
        'Engine.Narrative requires inkjs to be loaded. Include ' +
        'engine/lib/inkjs.js before the engine bundle in your build. See ADR-0018.'
      );
    }
    if (options.compiled) {
      this._story = new inkjs.Story(source);
    } else {
      this._story = new inkjs.Compiler(source).Compile();
    }
  }

  // Advance the story, collecting every line emitted until the next choice
  // point or story end. Returns an array of { text, tags } objects.
  continue() {
    const lines = [];
    while (this._story.canContinue) {
      const raw = this._story.Continue();
      const text = (typeof raw === 'string' ? raw : '').replace(/\n$/, '');
      const tags = this._story.currentTags ? [...this._story.currentTags] : [];
      lines.push({ text, tags });
    }
    return lines;
  }

  // Available choices at the current story point, or [] if none.
  getChoices() {
    return this._story.currentChoices.map((c) => ({
      index: c.index,
      text: c.text,
      tags: c.tags ? [...c.tags] : []
    }));
  }

  // Select a choice by its index. After this, the story is ready for another
  // continue() call.
  choose(index) {
    this._story.ChooseChoiceIndex(index);
  }

  // Read an ink variable by name. Returns undefined if not declared.
  getVar(name) {
    return this._story.variablesState[name];
  }

  // Write an ink variable. The variable must be declared in the ink source
  // (with VAR) for the write to have effect.
  setVar(name, value) {
    this._story.variablesState[name] = value;
  }

  // Bind a JS function that ink can invoke via an EXTERNAL declaration.
  // The ink script must declare it as: EXTERNAL fn_name(arg1, arg2)
  bindExternal(name, fn) {
    this._story.BindExternalFunction(name, fn);
  }

  // Register a callback that fires when the named ink variable changes.
  // The callback is invoked with the new value.
  observe(name, fn) {
    this._story.ObserveVariable(name, (_varName, value) => fn(value));
  }

  // Jump to a named knot or stitch. Path is a dot-separated string like
  // 'sector_one' or 'sector_one.shop_intro'.
  goTo(path) {
    this._story.ChoosePathString(path);
  }

  // Serialize narrative state to a JSON string suitable for storing via
  // Engine.storage alongside other game state.
  saveState() {
    return this._story.state.toJson();
  }

  // Restore state from a JSON string previously returned by saveState().
  loadState(json) {
    this._story.state.LoadJson(json);
  }

  // True when the story has nothing more to emit and offers no choices.
  get hasEnded() {
    return !this._story.canContinue && this._story.currentChoices.length === 0;
  }

  // Underlying inkjs Story instance. Exposed for advanced uses where the
  // wrapper methods do not cover the required operation.
  get story() {
    return this._story;
  }
}

Engine.Narrative = Narrative;

// ============================================================================
// engine/balance.js
// ============================================================================
// Tunable balance primitives: parameterized difficulty curves and cost
// scaling. Pure, stateless functions under Engine.Balance. Default constants
// follow the values supported by docs/resources/balance.md (see ADR-0020).
//
// Depends on: nothing (pure math).
// Depended on by: game-specific scripts/scenes that ramp difficulty or price
//   upgrades. NOT used by the engine core; opt-in per game.
// ============================================================================

var Engine = Engine || {};

const Balance = {
  // --- Difficulty curves ----------------------------------------------------
  // difficulty(t, opts): difficulty/intensity as a function of progress t.
  // t is caller-defined (elapsed seconds, wave index, level, etc).
  // opts.type selects the family; default 'logistic' (slow start, steep
  // middle, bounded plateau), the general-purpose pacing curve.
  // For logistic, set opts.t0 to the progress midpoint; the default of 0
  // is structural only (it places you at L/2 at t=0).
  difficulty(t, opts = {}) {
    const type = opts.type || 'logistic';
    switch (type) {
      case 'linear':       // d0 + m*t
        return (opts.d0 ?? 0) + (opts.m ?? 1) * t;
      case 'exponential':  // d0 * r^t
        return (opts.d0 ?? 1) * Math.pow(opts.r ?? 1.1, t);
      case 'logarithmic':  // d0 + k*ln(1+t); rises to a soft max then flattens
        return (opts.d0 ?? 0) + (opts.k ?? 1) * Math.log(1 + t);
      case 'logistic':     // L / (1 + e^(-k*(t - t0)))
        return (opts.L ?? 1) / (1 + Math.exp(-(opts.k ?? 1) * (t - (opts.t0 ?? 0))));
      default:
        throw new Error(`Engine.Balance.difficulty: unknown curve type '${type}'`);
    }
  },

  // --- Cost scaling ---------------------------------------------------------
  // cost(n, opts): price of a purchase when you already own n units, base*rate^n.
  // So the first unit (n=0) costs base. rate in [1.07, 1.15] is the documented
  // band; default 1.10. Use ~1.15 for short sessions, ~1.07 for long-haul games.
  cost(n, opts = {}) {
    return (opts.base ?? 1) * Math.pow(opts.rate ?? 1.1, n);
  },

  // bulkCost(owned, count, opts): closed-form total to buy `count` units from
  // `owned`. Exact for fixed rate; replaces a loop.
  bulkCost(owned, count, opts = {}) {
    const base = opts.base ?? 1;
    const rate = opts.rate ?? 1.1;
    if (count <= 0) return 0;
    if (rate === 1) return base * count;
    return base * (Math.pow(rate, owned) * (Math.pow(rate, count) - 1)) / (rate - 1);
  },

  // maxAffordable(owned, currency, opts): how many units `currency` buys from
  // `owned`. Closed-form inverse of bulkCost.
  maxAffordable(owned, currency, opts = {}) {
    const base = opts.base ?? 1;
    const rate = opts.rate ?? 1.1;
    if (currency <= 0) return 0;
    if (rate === 1) return Math.floor(currency / base);
    const n = Math.log((currency * (rate - 1)) / (base * Math.pow(rate, owned)) + 1) / Math.log(rate);
    return Math.max(0, Math.floor(n));
  }
};

Engine.Balance = Balance;


// ============================================================================
// engine/prng.js
// ============================================================================

// ============================================================================
// engine/prng.js
// ============================================================================
//
// Engine.PRNG: seeded pseudo-random number generator.
//
// Algorithm: SFC32 (Small Fast Counting) by Chris Doty-Humphrey. 128-bit
// state (four 32-bit words); period ≥ 2^64; passes PractRand at 32 TB.
// String seeds are hashed to a 128-bit initial state by cyrb128 (bryc, CC0).
// See ADR-0026.
//
// Depends on: nothing.
// Depended on by: game scripts and scenes that need deterministic randomness
//   (procedural levels, daily seeds, replay systems). Not used by the engine
//   core; opt-in per game.
//
// Usage:
//   const rng = new Engine.PRNG('level-1');
//   rng.float()              // [0, 1), like Math.random()
//   rng.int(1, 6)            // integer in [1, 6] inclusive
//   rng.pick(['a','b','c'])  // random element from array
//   rng.shuffle(array)       // Fisher-Yates in place, returns array
// ============================================================================

var Engine = Engine || {};

class PRNG {
  constructor(seed) {
    let a, b, c, d;
    if (typeof seed === 'string') {
      [a, b, c, d] = PRNG._cyrb128(seed);
    } else {
      // Expand a single 32-bit integer to four words via a LCG.
      a = seed >>> 0;
      b = (a * 1664525 + 1013904223) >>> 0;
      c = (b * 1664525 + 1013904223) >>> 0;
      d = 1;
    }
    this._a = a; this._b = b; this._c = c; this._d = d;
    // Discard first 15 outputs so low-entropy seeds (e.g. 0) reach a
    // well-mixed state before callers draw values.
    for (let i = 0; i < 15; i++) this._step();
  }

  // [0, 1) float, the Math.random() analogue.
  float() {
    return (this._step() >>> 0) / 0x100000000;
  }

  // Integer in [min, max] inclusive.
  int(min, max) {
    return min + (this._step() % (max - min + 1));
  }

  // Random element from array. Throws if array is empty.
  pick(arr) {
    if (!arr.length) throw new Error('Engine.PRNG.pick: empty array');
    return arr[this._step() % arr.length];
  }

  // Fisher-Yates shuffle in place. Returns the same array.
  shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = this._step() % (i + 1);
      const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  // SFC32 step: updates state and returns a 32-bit unsigned integer.
  _step() {
    const t = (this._a + this._b + this._d++) >>> 0;
    this._a = (this._b ^ (this._b >>> 9)) >>> 0;
    this._b = (this._c + (this._c << 3)) >>> 0;
    this._c = ((this._c << 21) | (this._c >>> 11)) >>> 0;
    this._c = (this._c + t) >>> 0;
    return t;
  }

  // cyrb128 by bryc (CC0). Hashes a string to four 32-bit seed words.
  static _cyrb128(str) {
    let h1 = 1779033703, h2 = 3144134277, h3 = 1013904242, h4 = 2773480762;
    for (let i = 0; i < str.length; i++) {
      const k = str.charCodeAt(i);
      h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
      h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
      h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
      h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
    }
    h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
    h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
    h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
    h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
    h1 ^= (h2 ^ h3 ^ h4); h2 ^= h1; h3 ^= h1; h4 ^= h1;
    return [h1 >>> 0, h2 >>> 0, h3 >>> 0, h4 >>> 0];
  }
}

Engine.PRNG = PRNG;

/* ==== scripts/bootstrap.js ==== */
// ============================================================================
// scripts/bootstrap.js
// ============================================================================
//
// bootstrapGame(options) - canonical game bootstrap helper.
//
// Consolidates the boilerplate that every build/<game>.html's <script> tail
// currently repeats: viewport-aware canvas sizing per ADR-0017, touch
// capability detection, optional context-menu suppression (for right-click
// games), Engine.Game construction with optional gameName for namespaced
// storage, initial scene set via a factory, and game start.
//
// Depends on:
//   Engine.Game (engine/game.js). The engine bundle must be loaded before
//   this script in the build concatenation order.
//
// Depended on by:
//   Game build bootstrap snippets. Replaces the inline IIFE that previously
//   appeared at the end of each build/<game>.html. Adoption is per-build:
//   existing builds continue to work with their inline bootstrap until each
//   is naturally regenerated. Drift v1 is the planned first build to adopt
//   the helper from the start; existing games migrate when next touched.
//
// Usage (Minesweeper-style, current inline form for comparison):
//   (function () {
//     const canvas = document.getElementById('game');
//     const preset = { w: 900, h: 600 };
//     canvas.width = preset.w; canvas.height = preset.h;
//     // fitToViewport, resize listener, canvas.oncontextmenu, etc.
//     const game = new Engine.Game(canvas, { gameName: 'minesweeper' });
//     game.setScene(new MinesweeperMenuScene(game));
//     game.start();
//   })();
//
// Equivalent with bootstrapGame:
//   bootstrapGame({
//     gameName: 'minesweeper',
//     presets: { regular: { w: 900, h: 600 } },
//     initialScene: function (game) { return new MinesweeperMenuScene(game); },
//     suppressContextMenu: true,
//   });
//
// Options:
//   canvasId          string. ID of canvas element. Default 'game'.
//   canvas            DOM element. Overrides canvasId if both provided.
//   gameName          string. Passed to Engine.Game for storage namespacing.
//                     Default '' (no namespace).
//   presets           { regular: {w, h}, compact?: {w, h} }. Required.
//                     If compact is omitted, regular is always used (the
//                     intentional letterbox-on-portrait path per ADR-0017).
//   initialScene      (game) => Scene. Factory required because the Game
//                     instance must exist before the initial Scene's
//                     constructor argument can be passed.
//   suppressContextMenu  bool. Default false. true disables the canvas's
//                     right-click context menu (for games that read
//                     Engine.input.mouse.right; see Minesweeper).
//
// Returns:
//   { game, preset, presetName, isTouch }
//     game         the constructed Engine.Game (already started)
//     preset       the chosen preset object { w, h }
//     presetName   'regular' or 'compact'
//     isTouch      bool. true if touch capability detected per ADR-0017.
//                  Scenes can use this to enlarge hit-target minimums.
//
// Throws if the canvas element is not found, presets.regular is missing, or
// initialScene is not a function. Errors are explicit and actionable.
//
// Preset selection:
//   When both regular and compact are defined, picks whichever aspect ratio
//   is closer (in log space) to the current viewport's. This matches the
//   reference snippet in docs/ARCHITECTURE.md "Logical canvas and viewport
//   bootstrap" and ADR-0017.
// ============================================================================

function bootstrapGame(options) {
  const opts = options || {};

  const canvas = opts.canvas || document.getElementById(opts.canvasId || 'game');
  if (!canvas || typeof canvas.getContext !== 'function') {
    throw new Error(
      "bootstrapGame: canvas element not found (looked for id '" +
      (opts.canvasId || 'game') + "'). Pass options.canvas or options.canvasId."
    );
  }

  const presets = opts.presets;
  if (!presets || !presets.regular) {
    throw new Error('bootstrapGame: options.presets.regular is required (e.g. { regular: { w: 900, h: 600 } }).');
  }

  if (typeof opts.initialScene !== 'function') {
    throw new Error('bootstrapGame: options.initialScene must be a factory function (game) => sceneInstance.');
  }

  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  function pickPreset() {
    if (!presets.compact) return { name: 'regular', preset: presets.regular };
    const va = window.innerWidth / window.innerHeight;
    const ra = presets.regular.w / presets.regular.h;
    const ca = presets.compact.w / presets.compact.h;
    const useCompact = Math.abs(Math.log(va / ca)) < Math.abs(Math.log(va / ra));
    return useCompact
      ? { name: 'compact', preset: presets.compact }
      : { name: 'regular', preset: presets.regular };
  }

  const chosen = pickPreset();
  const preset = chosen.preset;
  canvas.width = preset.w;
  canvas.height = preset.h;

  function fitToViewport() {
    const s = Math.min(window.innerWidth / preset.w, window.innerHeight / preset.h);
    canvas.style.width = (preset.w * s) + 'px';
    canvas.style.height = (preset.h * s) + 'px';
  }
  fitToViewport();
  window.addEventListener('resize', fitToViewport);

  if (opts.suppressContextMenu) {
    canvas.oncontextmenu = function (e) { e.preventDefault(); };
  }

  const game = new Engine.Game(canvas, { gameName: opts.gameName || '' });
  game.setScene(opts.initialScene(game));
  game.start();

  return { game: game, preset: preset, presetName: chosen.name, isTouch: isTouch };
}

/* ==== games/factory/scenes/menu.js ==== */
// games/factory/scenes/menu.js
// FactoryMenuScene -- title card, goal preview, and start.
//
// Displays the game title, a one-line description of the first goal,
// and a START prompt. No settings; the game is self-contained.
//
// Depends on: Engine.Scene, Engine.input, FactoryGameScene.

class FactoryMenuScene extends Engine.Scene {
  constructor(game) {
    super();
    this._game = game;
    this._prevMouseLeft = false;
    this._hoverStart = false;
  }

  update(dt) {
    const mouseClicked = !this._prevMouseLeft && Engine.input.mouse.left;
    this._prevMouseLeft = Engine.input.mouse.left;

    const W = this._game.canvas.width;
    const H = this._game.canvas.height;
    const btn = this._startRect(W, H);
    const mx = Engine.input.mouse.x;
    const my = Engine.input.mouse.y;
    this._hoverStart = mx >= btn.x && mx <= btn.x + btn.w && my >= btn.y && my <= btn.y + btn.h;

    if (mouseClicked && this._hoverStart) {
      this._game.setScene(new FactoryGameScene(this._game));
    }

    if (Engine.input.wasJustPressed('Enter') || Engine.input.wasJustPressed(' ')) {
      this._game.setScene(new FactoryGameScene(this._game));
    }
  }

  draw(ctx) {
    const W = ctx.canvas.width;
    const H = ctx.canvas.height;

    ctx.fillStyle = '#1a1a2e';
    ctx.fillRect(0, 0, W, H);

    // Title.
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#e0e0e0';
    ctx.font = 'bold 52px monospace';
    ctx.fillText('FACTORY', W / 2, H / 2 - 100);

    // Tagline.
    ctx.font = '18px monospace';
    ctx.fillStyle = '#9090a0';
    ctx.fillText('Extract. Process. Deliver.', W / 2, H / 2 - 50);

    // Building legend.
    const legend = [
      { color: '#78909c', label: 'Extractor  — pulls resources from the ground' },
      { color: '#ffa726', label: 'Belt       — carries items in a direction' },
      { color: '#ab47bc', label: 'Painter    — dyes items to the target color' },
      { color: '#42a5f5', label: 'Splitter   — alternates output between two exits' },
      { color: '#66bb6a', label: 'Hub        — receives completed deliveries' },
    ];
    const legendY = H / 2 - 10;
    ctx.font = '14px monospace';
    for (let i = 0; i < legend.length; i++) {
      const y = legendY + i * 22;
      ctx.fillStyle = legend[i].color;
      ctx.fillRect(W / 2 - 230, y - 7, 12, 12);
      ctx.fillStyle = '#c0c0c0';
      ctx.textAlign = 'left';
      ctx.fillText(legend[i].label, W / 2 - 212, y);
    }
    ctx.textAlign = 'center';

    // Start button.
    const btn = this._startRect(W, H);
    ctx.fillStyle = this._hoverStart ? '#4caf50' : '#2e7d32';
    ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 20px monospace';
    ctx.fillText('START', W / 2, btn.y + btn.h / 2);

    ctx.fillStyle = '#555';
    ctx.font = '13px monospace';
    ctx.fillText('WASD or middle-drag to pan   R to rotate selected building   ESC to clear selection', W / 2, H - 20);
  }

  _startRect(W, H) {
    return { x: W / 2 - 80, y: H / 2 + 130, w: 160, h: 44 };
  }
}

/* ==== games/factory/scenes/game.js ==== */
// games/factory/scenes/game.js
// FactoryGameScene -- core factory simulation.
//
// Architecture (Option A, scene-owned flat grid):
//   - A 30x30 tile grid stored as a flat array of tile objects.
//   - No GameObjects; all state lives in the scene.
//   - Camera is a (camX, camY) pixel offset into the grid, bounded to grid edges.
//   - Simulation runs a discrete tick every TICK_MS milliseconds, independent of
//     the render frame rate.
//
// Tile schema:
//   { type, dir, item, color, subtype, tickTimer, splitPhase }
//   type:      'empty' | 'resource' | 'extractor' | 'belt' | 'splitter' | 'painter' | 'hub'
//   dir:       0=right 1=down 2=left 3=up  (for directional buildings)
//   item:      null | { shape, color }  -- at most one item per tile
//   color:     painter/resource color ('red'|'green'|'blue')
//   subtype:   resource shape ('circle'|'square'|'triangle')
//   tickTimer: countdown to next produce/process step (machines only)
//   splitPhase:0|1 alternating output side for splitter
//
// Simulation tick order:
//   1. Extractors: if tickTimer expired and output belt accepts, push item.
//   2. Painters:   if tickTimer expired and has item, dye it.
//   3. Belts/Splitters: advance items one tile toward their output.
//   4. Hub:        collect any arriving items, score them.
//
// Goals: five sequential deliveries. Each goal specifies shape + color + count.
// Completing all five transitions to a win screen.
//
// Controls:
//   Left-click:  place selected building / pick up to cycle through placed buildings.
//   Right-click: demolish tile.
//   R:           rotate selected building (before placement).
//   WASD or middle-mouse drag: pan camera.
//   ESC:         clear selection.
//   1-5:         select building type by hotkey.
//
// Depends on: Engine.Scene, Engine.input, Engine.storage, FactoryMenuScene.

const TILE_SIZE  = 36;   // px per grid tile
const GRID_COLS  = 30;
const GRID_ROWS  = 30;
const TICK_MS    = 500;  // ms between simulation ticks
const MACHINE_TICKS = 2; // ticks an extractor/painter takes to produce

const SHAPES = ['circle', 'square', 'triangle'];
const COLORS = ['red', 'green', 'blue'];

// Direction vectors: 0=right 1=down 2=left 3=up
const DIR_DELTA = [
  [1, 0],   // right
  [0, 1],   // down
  [-1, 0],  // left
  [0, -1],  // up
];

const DIR_LABELS = ['>', 'v', '<', '^'];

const SHAPE_COLORS = {
  red:   '#ef5350',
  green: '#66bb6a',
  blue:  '#42a5f5',
};

const BUILDING_DEFS = [
  { type: 'extractor', label: 'Extractor', key: '1', color: '#78909c' },
  { type: 'belt',      label: 'Belt',      key: '2', color: '#ffa726' },
  { type: 'splitter',  label: 'Splitter',  key: '3', color: '#ab47bc' },
  { type: 'painter',   label: 'Painter',   key: '4', color: '#26c6da' },
  { type: 'hub',       label: 'Hub',       key: '5', color: '#66bb6a' },
];

// Goal definitions: [shape, color, count]
const GOAL_SEQUENCE = [
  ['circle',   'red',   10],
  ['square',   'blue',  15],
  ['triangle', 'green', 12],
  ['circle',   'green', 20],
  ['square',   'red',   25],
];

function makeTile() {
  return {
    type:       'empty',
    dir:        0,
    item:       null,
    color:      null,
    subtype:    null,
    tickTimer:  0,
    splitPhase: 0,
  };
}

class FactoryGameScene extends Engine.Scene {
  constructor(game) {
    super();
    this._game = game;

    // Grid.
    this._grid = [];
    for (let i = 0; i < GRID_COLS * GRID_ROWS; i++) this._grid.push(makeTile());

    // Camera: pixel offset of the grid's top-left corner within the canvas.
    this._camX = 0;
    this._camY = 0;

    // Simulation timer.
    this._tickAccum = 0;

    // Building placement state.
    this._selectedType = null;  // string type name
    this._selectedDir  = 0;

    // Middle-mouse pan state.
    this._mmDown  = false;
    this._mmLastX = 0;
    this._mmLastY = 0;

    // Goal state.
    this._goalIdx      = 0;
    this._goalDelivered = 0;
    this._won           = false;

    // Input edge detection.
    this._prevLeft    = false;
    this._prevRight   = false;
    this._prevMiddle  = false;

    // Feedback flash for hub delivery: { shape, color, count, alpha }
    this._flash = null;

    this._placeHub();
    this._placeResources();
    this._centerCamera();
  }

  // ----------------------------------------------------------------- setup

  _idx(c, r) { return r * GRID_COLS + c; }

  _tile(c, r) {
    if (c < 0 || c >= GRID_COLS || r < 0 || r >= GRID_ROWS) return null;
    return this._grid[this._idx(c, r)];
  }

  _placeHub() {
    // Hub at center of grid.
    const hc = Math.floor(GRID_COLS / 2);
    const hr = Math.floor(GRID_ROWS / 2);
    const t = this._tile(hc, hr);
    t.type = 'hub';
  }

  _placeResources() {
    // Scatter resource tiles across the grid, avoiding the hub center and
    // its immediate neighbors. Use a deterministic pattern so the map is
    // reproducible without a seed UI.
    const prng = new Engine.PRNG(42);
    const hubC = Math.floor(GRID_COLS / 2);
    const hubR = Math.floor(GRID_ROWS / 2);
    const safe = (c, r) => Math.abs(c - hubC) <= 3 && Math.abs(r - hubR) <= 3;

    // Aim for roughly 18 resource patches.
    let placed = 0;
    while (placed < 18) {
      const c = prng.int(1, GRID_COLS - 2);
      const r = prng.int(1, GRID_ROWS - 2);
      if (safe(c, r)) continue;
      const t = this._tile(c, r);
      if (t.type !== 'empty') continue;
      t.type    = 'resource';
      t.subtype = prng.pick(SHAPES);
      t.color   = prng.pick(COLORS);
      placed++;
    }
  }

  _centerCamera() {
    const W = this._game.canvas.width;
    const H = this._game.canvas.height;
    const gridPxW = GRID_COLS * TILE_SIZE;
    const gridPxH = GRID_ROWS * TILE_SIZE;
    this._camX = Math.round((W - gridPxW) / 2);
    this._camY = Math.round((H - gridPxH) / 2);
    this._clampCamera();
  }

  _clampCamera() {
    const W = this._game.canvas.width;
    const H = this._game.canvas.height;
    const gridPxW = GRID_COLS * TILE_SIZE;
    const gridPxH = GRID_ROWS * TILE_SIZE;
    // Allow the grid to be panned until the opposite edge hits the canvas edge.
    this._camX = Math.min(0, Math.max(W - gridPxW, this._camX));
    this._camY = Math.min(0, Math.max(H - gridPxH, this._camY));
  }

  // ------------------------------------------------------------ simulation

  _currentGoal() {
    if (this._goalIdx >= GOAL_SEQUENCE.length) return null;
    const g = GOAL_SEQUENCE[this._goalIdx];
    return { shape: g[0], color: g[1], count: g[2] };
  }

  _tick() {
    // Collect pending output from machines into a staging buffer so order of
    // iteration does not create same-tick double-advances.
    const pending = new Map(); // idx -> item

    // 1. Extractors.
    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        const t = this._tile(c, r);
        if (t.type !== 'extractor') continue;
        const [dc, dr] = DIR_DELTA[t.dir];
        const nc = c + dc, nr = r + dr;
        const dest = this._tile(nc, nr);
        if (!dest || dest.item || pending.has(this._idx(nc, nr))) continue;
        t.tickTimer--;
        if (t.tickTimer <= 0) {
          t.tickTimer = MACHINE_TICKS;
          // Find what resource tile this extractor sits on.
          // Extractors must be placed on resource tiles; their subtype/color
          // is copied from the underlying resource at placement time.
          pending.set(this._idx(nc, nr), { shape: t.subtype, color: t.color });
        }
      }
    }

    // 2. Painters (dye in-place; no movement this tick).
    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        const t = this._tile(c, r);
        if (t.type !== 'painter' || !t.item) continue;
        t.tickTimer--;
        if (t.tickTimer <= 0) {
          t.tickTimer = MACHINE_TICKS;
          t.item = { shape: t.item.shape, color: t.color };
        }
      }
    }

    // 3. Flush pending into grid.
    for (const [idx, item] of pending) {
      if (!this._grid[idx].item) this._grid[idx].item = item;
    }

    // 4. Belt movement (iterate from output end toward input end to avoid
    // same-tick double-advance: process tiles in reverse traversal order
    // by running each direction sweep in the direction of flow).
    // Strategy: collect (src, dst, item) moves, then apply atomically.
    const moves = [];
    const occupied = new Set();

    for (let r = 0; r < GRID_ROWS; r++) {
      for (let c = 0; c < GRID_COLS; c++) {
        const t = this._tile(c, r);
        if ((t.type !== 'belt' && t.type !== 'splitter') || !t.item) continue;

        let destCols, destRows;
        if (t.type === 'splitter') {
          // Two possible output directions: primary (t.dir) and secondary (t.dir+1)%4.
          const dirs = [t.dir, (t.dir + 1) % 4];
          const chosen = dirs[t.splitPhase % 2];
          const [dc, dr] = DIR_DELTA[chosen];
          destCols = [c + dc];
          destRows = [r + dr];
        } else {
          const [dc, dr] = DIR_DELTA[t.dir];
          destCols = [c + dc];
          destRows = [r + dr];
        }

        const dc2 = destCols[0], dr2 = destRows[0];
        const dest = this._tile(dc2, dr2);
        if (!dest) continue;

        const destIdx = this._idx(dc2, dr2);
        if (occupied.has(destIdx)) continue;

        // Hub: consume immediately.
        if (dest.type === 'hub') {
          moves.push({ si: this._idx(c, r), di: destIdx, item: t.item, toHub: true });
          occupied.add(destIdx);
          if (t.type === 'splitter') t.splitPhase ^= 1;
          continue;
        }

        // Painter input: accept item if painter has none.
        if (dest.type === 'painter' && !dest.item) {
          dest.item = t.item;
          t.item = null;
          dest.tickTimer = MACHINE_TICKS;
          if (t.type === 'splitter') t.splitPhase ^= 1;
          continue;
        }

        // Normal belt/empty destination.
        if (dest.item || pending.has(destIdx)) continue;
        moves.push({ si: this._idx(c, r), di: destIdx, item: t.item, toHub: false });
        occupied.add(destIdx);
        if (t.type === 'splitter') t.splitPhase ^= 1;
      }
    }

    for (const mv of moves) {
      const src = this._grid[mv.si];
      const dst = this._grid[mv.di];
      if (mv.toHub) {
        src.item = null;
        this._scoreItem(mv.item);
      } else {
        if (!dst.item) {
          dst.item = mv.item;
          src.item = null;
        }
      }
    }
  }

  _scoreItem(item) {
    const goal = this._currentGoal();
    if (!goal) return;
    if (item.shape === goal.shape && item.color === goal.color) {
      this._goalDelivered++;
      this._flash = { shape: item.shape, color: item.color, count: this._goalDelivered, alpha: 1.0 };
      if (this._goalDelivered >= goal.count) {
        this._goalIdx++;
        this._goalDelivered = 0;
        if (this._goalIdx >= GOAL_SEQUENCE.length) {
          this._won = true;
        }
      }
    }
  }

  // ----------------------------------------------------------- input helpers

  _canvasToGrid(px, py) {
    const c = Math.floor((px - this._camX) / TILE_SIZE);
    const r = Math.floor((py - this._camY) / TILE_SIZE);
    return { c, r };
  }

  _inGrid(c, r) {
    return c >= 0 && c < GRID_COLS && r >= 0 && r < GRID_ROWS;
  }

  // ----------------------------------------------------------- update/draw

  update(dt) {
    const mx = Engine.input.mouse.x;
    const my = Engine.input.mouse.y;

    // Edge detection.
    const clickedLeft   = !this._prevLeft   && Engine.input.mouse.left;
    const clickedRight  = !this._prevRight  && Engine.input.mouse.right;
    const clickedMiddle = !this._prevMiddle && Engine.input.mouse.middle;
    this._prevLeft   = Engine.input.mouse.left;
    this._prevRight  = Engine.input.mouse.right;
    this._prevMiddle = Engine.input.mouse.middle;

    // Win-state: only allow returning to menu.
    if (this._won) {
      if (Engine.input.wasJustPressed('Enter') || Engine.input.wasJustPressed(' ') || clickedLeft) {
        this._game.setScene(new FactoryMenuScene(this._game));
      }
      return;
    }

    // --- Hotkeys for building selection.
    for (let i = 0; i < BUILDING_DEFS.length; i++) {
      if (Engine.input.wasJustPressed(BUILDING_DEFS[i].key)) {
        this._selectedType = BUILDING_DEFS[i].type;
      }
    }
    if (Engine.input.wasJustPressed('Escape')) this._selectedType = null;
    if (Engine.input.wasJustPressed('r') || Engine.input.wasJustPressed('R')) {
      this._selectedDir = (this._selectedDir + 1) % 4;
    }

    // --- Camera pan: WASD.
    const PAN_SPEED = 200; // px/s
    if (Engine.input.isDown('w') || Engine.input.isDown('ArrowUp'))    this._camY += PAN_SPEED * dt;
    if (Engine.input.isDown('s') || Engine.input.isDown('ArrowDown'))  this._camY -= PAN_SPEED * dt;
    if (Engine.input.isDown('a') || Engine.input.isDown('ArrowLeft'))  this._camX += PAN_SPEED * dt;
    if (Engine.input.isDown('d') || Engine.input.isDown('ArrowRight')) this._camX -= PAN_SPEED * dt;
    this._clampCamera();

    // --- Middle-mouse pan.
    // Engine.input.mouse.middle is not tracked by the engine, so we listen
    // via a mousedown/mouseup delta approach stored on this scene.
    // (The engine tracks left and right only; middle panning uses a stored
    // position delta updated every frame.)
    // NOTE: middle button is tracked via separate listeners attached in enter().

    // --- Left click: place or pick.
    if (clickedLeft) {
      const { c, r } = this._canvasToGrid(mx, my);
      if (this._inGrid(c, r)) {
        const t = this._tile(c, r);
        if (this._selectedType) {
          this._placeBuildingAt(t, c, r);
        }
      }
    }

    // --- Right click: demolish.
    if (clickedRight) {
      const { c, r } = this._canvasToGrid(mx, my);
      if (this._inGrid(c, r)) {
        const t = this._tile(c, r);
        if (t.type !== 'resource' && t.type !== 'hub') {
          t.type       = 'empty';
          t.item       = null;
          t.dir        = 0;
          t.color      = null;
          t.subtype    = null;
          t.tickTimer  = 0;
          t.splitPhase = 0;
        }
      }
    }

    // --- Simulation tick.
    this._tickAccum += dt * 1000;
    while (this._tickAccum >= TICK_MS) {
      this._tickAccum -= TICK_MS;
      this._tick();
    }

    // --- Flash decay.
    if (this._flash) {
      this._flash.alpha -= dt * 1.5;
      if (this._flash.alpha <= 0) this._flash = null;
    }
  }

  enter() {
    // Attach middle-mouse listeners for panning.
    const canvas = this._game.canvas;
    this._onMmDown = (e) => {
      if (e.button === 1) {
        e.preventDefault();
        this._mmDown  = true;
        this._mmLastX = e.clientX;
        this._mmLastY = e.clientY;
      }
    };
    this._onMmMove = (e) => {
      if (!this._mmDown) return;
      const rect   = canvas.getBoundingClientRect();
      const scaleX = canvas.width  / rect.width;
      const scaleY = canvas.height / rect.height;
      this._camX += (e.clientX - this._mmLastX) * scaleX;
      this._camY += (e.clientY - this._mmLastY) * scaleY;
      this._mmLastX = e.clientX;
      this._mmLastY = e.clientY;
      this._clampCamera();
    };
    this._onMmUp = (e) => {
      if (e.button === 1) this._mmDown = false;
    };
    canvas.addEventListener('mousedown', this._onMmDown);
    window.addEventListener('mousemove', this._onMmMove);
    window.addEventListener('mouseup',   this._onMmUp);
  }

  exit() {
    const canvas = this._game.canvas;
    canvas.removeEventListener('mousedown', this._onMmDown);
    window.removeEventListener('mousemove', this._onMmMove);
    window.removeEventListener('mouseup',   this._onMmUp);
  }

  _placeBuildingAt(t, c, r) {
    const type = this._selectedType;
    // Extractor must go on a resource tile.
    if (type === 'extractor') {
      if (t.type !== 'resource') return;
      t.type      = 'extractor';
      t.dir       = this._selectedDir;
      t.tickTimer = MACHINE_TICKS;
      // subtype and color inherited from resource (already set).
      return;
    }
    // Hub cannot be placed; it is fixed.
    if (type === 'hub') return;
    // Painter gets a color picker -- use the current selectedDir as a color index.
    if (type === 'painter') {
      if (t.type !== 'empty') return;
      t.type      = 'painter';
      t.dir       = this._selectedDir;
      t.color     = COLORS[this._selectedDir % COLORS.length];
      t.tickTimer = 0;
      t.item      = null;
      return;
    }
    // Belt and splitter go on empty tiles.
    if (t.type !== 'empty') return;
    t.type      = type;
    t.dir       = this._selectedDir;
    t.item      = null;
    t.tickTimer = 0;
  }

  // ----------------------------------------------------------- draw

  draw(ctx) {
    const W = ctx.canvas.width;
    const H = ctx.canvas.height;

    // Background.
    ctx.fillStyle = '#0f0f1a';
    ctx.fillRect(0, 0, W, H);

    ctx.save();
    ctx.translate(this._camX, this._camY);
    this._drawGrid(ctx);
    ctx.restore();

    this._drawHUD(ctx);

    if (this._won) this._drawWin(ctx);
  }

  _drawGrid(ctx) {
    const visC0 = Math.max(0, Math.floor(-this._camX / TILE_SIZE));
    const visR0 = Math.max(0, Math.floor(-this._camY / TILE_SIZE));
    const visC1 = Math.min(GRID_COLS - 1, Math.ceil((-this._camX + this._game.canvas.width)  / TILE_SIZE));
    const visR1 = Math.min(GRID_ROWS - 1, Math.ceil((-this._camY + this._game.canvas.height) / TILE_SIZE));

    for (let r = visR0; r <= visR1; r++) {
      for (let c = visC0; c <= visC1; c++) {
        this._drawTile(ctx, c, r);
      }
    }
  }

  _drawTile(ctx, c, r) {
    const t  = this._tile(c, r);
    const x  = c * TILE_SIZE;
    const y  = r * TILE_SIZE;
    const S  = TILE_SIZE;
    const hs = S / 2;

    // Base tile background.
    ctx.fillStyle = '#1e1e2e';
    ctx.fillRect(x, y, S, S);
    // Grid line.
    ctx.strokeStyle = '#2a2a3a';
    ctx.lineWidth = 0.5;
    ctx.strokeRect(x + 0.25, y + 0.25, S - 0.5, S - 0.5);

    // Tile-type rendering.
    switch (t.type) {
      case 'resource':
        ctx.fillStyle = '#2a2a1e';
        ctx.fillRect(x + 1, y + 1, S - 2, S - 2);
        this._drawShape(ctx, x + hs, y + hs, t.subtype, t.color, S * 0.28);
        break;

      case 'extractor':
        ctx.fillStyle = '#263238';
        ctx.fillRect(x + 1, y + 1, S - 2, S - 2);
        // Body.
        ctx.strokeStyle = '#78909c';
        ctx.lineWidth = 2;
        ctx.strokeRect(x + 4, y + 4, S - 8, S - 8);
        // Direction arrow.
        this._drawArrow(ctx, x + hs, y + hs, t.dir, '#78909c', 8);
        break;

      case 'belt':
        ctx.fillStyle = '#1a1200';
        ctx.fillRect(x + 1, y + 1, S - 2, S - 2);
        // Belt track lines.
        ctx.strokeStyle = '#4a3800';
        ctx.lineWidth = 1;
        const [bdx, bdy] = DIR_DELTA[t.dir];
        // Draw two parallel track lines.
        const perp = [-bdy, bdx];
        for (const side of [-1, 1]) {
          const ox = perp[0] * 5;
          const oy = perp[1] * 5;
          ctx.beginPath();
          ctx.moveTo(x + hs + ox - bdx * hs * 0.8, y + hs + oy - bdy * hs * 0.8);
          ctx.lineTo(x + hs + ox + bdx * hs * 0.8, y + hs + oy + bdy * hs * 0.8);
          ctx.stroke();
        }
        this._drawArrow(ctx, x + hs, y + hs, t.dir, '#ffa726', 6);
        break;

      case 'splitter':
        ctx.fillStyle = '#1a0a1a';
        ctx.fillRect(x + 1, y + 1, S - 2, S - 2);
        ctx.strokeStyle = '#ab47bc';
        ctx.lineWidth = 2;
        ctx.strokeRect(x + 3, y + 3, S - 6, S - 6);
        this._drawArrow(ctx, x + hs, y + hs - 4, t.dir, '#ab47bc', 5);
        this._drawArrow(ctx, x + hs, y + hs + 4, (t.dir + 1) % 4, '#ab47bc', 5);
        break;

      case 'painter':
        ctx.fillStyle = '#001a1e';
        ctx.fillRect(x + 1, y + 1, S - 2, S - 2);
        ctx.strokeStyle = '#26c6da';
        ctx.lineWidth = 2;
        ctx.strokeRect(x + 3, y + 3, S - 6, S - 6);
        // Color swatch.
        ctx.fillStyle = SHAPE_COLORS[t.color] || '#fff';
        ctx.beginPath();
        ctx.arc(x + hs, y + hs, 5, 0, Math.PI * 2);
        ctx.fill();
        this._drawArrow(ctx, x + hs, y + hs, t.dir, '#26c6da', 6);
        break;

      case 'hub':
        ctx.fillStyle = '#0a1a0a';
        ctx.fillRect(x + 1, y + 1, S - 2, S - 2);
        ctx.strokeStyle = '#66bb6a';
        ctx.lineWidth = 2.5;
        ctx.strokeRect(x + 3, y + 3, S - 6, S - 6);
        ctx.fillStyle = '#66bb6a';
        ctx.font = 'bold 11px monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('HUB', x + hs, y + hs);
        break;

      default: break;
    }

    // Item on tile (drawn on top of building).
    if (t.item) {
      this._drawShape(ctx, x + hs, y + hs, t.item.shape, t.item.color, S * 0.22);
    }
  }

  _drawArrow(ctx, cx, cy, dir, color, size) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(dir * Math.PI / 2);
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(size, 0);
    ctx.lineTo(-size * 0.6, -size * 0.6);
    ctx.lineTo(-size * 0.6,  size * 0.6);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  _drawShape(ctx, cx, cy, shape, color, r) {
    const col = SHAPE_COLORS[color] || '#ffffff';
    ctx.fillStyle = col;
    ctx.beginPath();
    switch (shape) {
      case 'circle':
        ctx.arc(cx, cy, r, 0, Math.PI * 2);
        break;
      case 'square':
        ctx.rect(cx - r, cy - r, r * 2, r * 2);
        break;
      case 'triangle':
        ctx.moveTo(cx,     cy - r);
        ctx.lineTo(cx + r, cy + r);
        ctx.lineTo(cx - r, cy + r);
        ctx.closePath();
        break;
    }
    ctx.fill();
  }

  _drawHUD(ctx) {
    const W = ctx.canvas.width;
    const hudH = 52;

    // HUD bar background.
    ctx.fillStyle = 'rgba(10,10,20,0.88)';
    ctx.fillRect(0, 0, W, hudH);

    // Goal display.
    const goal = this._currentGoal();
    ctx.textBaseline = 'middle';
    if (goal) {
      ctx.fillStyle = '#9090a0';
      ctx.font = '13px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('GOAL ' + (this._goalIdx + 1) + '/' + GOAL_SEQUENCE.length + ':', 16, 16);

      // Shape icon.
      this._drawShape(ctx, 120, 16, goal.shape, goal.color, 7);

      ctx.fillStyle = '#e0e0e0';
      ctx.font = 'bold 15px monospace';
      ctx.textAlign = 'left';
      ctx.fillText(
        goal.color.toUpperCase() + ' ' + goal.shape.toUpperCase() +
        '  ' + this._goalDelivered + ' / ' + goal.count,
        134, 16
      );

      // Progress bar.
      const barX = 16, barY = 30, barW = 340, barH = 8;
      ctx.fillStyle = '#2a2a3a';
      ctx.fillRect(barX, barY, barW, barH);
      ctx.fillStyle = SHAPE_COLORS[goal.color] || '#fff';
      ctx.fillRect(barX, barY, barW * (this._goalDelivered / goal.count), barH);
    } else {
      ctx.fillStyle = '#66bb6a';
      ctx.font = 'bold 16px monospace';
      ctx.textAlign = 'left';
      ctx.fillText('ALL GOALS COMPLETE', 16, 26);
    }

    // Building palette.
    const paletteX = W - BUILDING_DEFS.length * 70 - 16;
    for (let i = 0; i < BUILDING_DEFS.length; i++) {
      const def = BUILDING_DEFS[i];
      const bx  = paletteX + i * 70;
      const by  = 6;
      const bw  = 64;
      const bh  = 40;
      const sel = this._selectedType === def.type;
      ctx.fillStyle = sel ? def.color : '#1e1e2e';
      ctx.fillRect(bx, by, bw, bh);
      ctx.strokeStyle = def.color;
      ctx.lineWidth = sel ? 2 : 1;
      ctx.strokeRect(bx, by, bw, bh);
      ctx.fillStyle = sel ? '#000' : def.color;
      ctx.font = '10px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('[' + def.key + '] ' + def.label.slice(0, 5), bx + bw / 2, by + 14);
      // Show rotation for directional buildings.
      if (sel && def.type !== 'hub') {
        ctx.fillStyle = sel ? '#000' : '#999';
        ctx.font = '9px monospace';
        ctx.fillText('R: ' + DIR_LABELS[this._selectedDir] + '  (rotate)', bx + bw / 2, by + 28);
      }
    }

    // Delivery flash.
    if (this._flash && this._flash.alpha > 0) {
      ctx.save();
      ctx.globalAlpha = Math.min(1, this._flash.alpha);
      ctx.fillStyle = SHAPE_COLORS[this._flash.color] || '#fff';
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(
        '+1  ' + this._flash.color.toUpperCase() + ' ' + this._flash.shape.toUpperCase() +
        '  (' + this._flash.count + ')',
        ctx.canvas.width / 2,
        hudH + 8
      );
      ctx.restore();
    }

    // Tooltip: painter color note.
    if (this._selectedType === 'painter') {
      ctx.fillStyle = '#aaa';
      ctx.font = '12px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(
        'Painter color: ' + COLORS[this._selectedDir % COLORS.length].toUpperCase() + '  (rotate R to cycle)',
        W / 2, hudH + 8
      );
    }
  }

  _drawWin(ctx) {
    const W = ctx.canvas.width;
    const H = ctx.canvas.height;
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#66bb6a';
    ctx.font = 'bold 48px monospace';
    ctx.fillText('FACTORY COMPLETE', W / 2, H / 2 - 30);
    ctx.fillStyle = '#c0c0c0';
    ctx.font = '20px monospace';
    ctx.fillText('All deliveries made.', W / 2, H / 2 + 20);
    ctx.fillStyle = '#888';
    ctx.font = '15px monospace';
    ctx.fillText('Click or press Enter to return to menu.', W / 2, H / 2 + 60);
  }
}

bootstrapGame({ canvasId: 'game', gameName: 'factory', presets: { regular: { w: 900, h: 600 } }, initialScene: (g) => new FactoryMenuScene(g), suppressContextMenu: true });
</script>
