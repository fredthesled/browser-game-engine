// games/clown-brawler/scripts/clown-player.js
// Player controller for Clown Brawler.
// Handles 2D belt-plane movement (WASD / arrows), punch attacks (Space / Z / X),
// health tracking, and hit i-frames.
//
// Combat contract with ClownMatchScene:
//   - scene calls script.takeHit(damage) when a gorilla attack lands
//   - scene reads script.isAttacking and script.punchHitSet to resolve player attacks
//   - punchHitSet is reset per-punch so each gorilla takes at most one hit per swing
//
// Emits:
//   brawler_player_hurt  { health, maxHealth }  on each hit
//   brawler_player_died  {}                      on death
//
// Depends on: Engine.Script, Engine.input, Engine.signals, Engine.audio
// Used by: ClownMatchScene

class ClownPlayer extends Engine.Script {
  constructor(host, config = {}) {
    super(host);
    this._speed      = 180;
    this._maxHealth  = config.maxHealth  || 5;
    this._health     = this._maxHealth;
    this._floorMin   = config.floorMin   || 310;
    this._floorMax   = config.floorMax   || 460;
    this._stageW     = config.stageW     || 2400;
    this._facing     = 1;      // 1 = right, -1 = left
    this._attackCooldown  = 0.45;
    this._attackDuration  = 0.18;  // active hit window within the cooldown
    this._attackTimer     = 0;
    this._punchHitSet     = new Set(); // enemies hit during current punch; reset per swing
    this._hitIframes      = 0;
    this._dead            = false;
    this._deathTimer      = 0;
  }

  // -- Getters used by ClownMatchScene --

  get health()    { return this._health; }
  get maxHealth() { return this._maxHealth; }
  get facing()    { return this._facing; }
  get dead()      { return this._dead; }

  // True only during the active hit window portion of the current swing.
  get isAttacking() {
    return this._attackTimer > (this._attackCooldown - this._attackDuration);
  }

  // Match scene reads this to know which enemies have already been struck this swing.
  get punchHitSet() { return this._punchHitSet; }

  // -- Called by ClownMatchScene on gorilla attack --

  takeHit(damage) {
    if (this._hitIframes > 0 || this._dead) return;
    this._health = Math.max(0, this._health - damage);
    this._hitIframes = 0.8;
    Engine.audio.play('brawler_player_hit');
    Engine.signals.emit('brawler_player_hurt', { health: this._health, maxHealth: this._maxHealth });
    if (this._health <= 0) {
      this._dead = true;
      Engine.signals.emit('brawler_player_died', {});
    }
  }

  // -- Engine lifecycle --

  update(dt) {
    if (this._dead) {
      this._deathTimer += dt;
      return;
    }

    if (this._hitIframes > 0) this._hitIframes -= dt;
    if (this._attackTimer > 0) this._attackTimer -= dt;

    // Movement: WASD and arrow keys, normalized diagonal.
    const inp   = Engine.input;
    const left  = inp.isDown('ArrowLeft')  || inp.isDown('a') || inp.isDown('A');
    const right = inp.isDown('ArrowRight') || inp.isDown('d') || inp.isDown('D');
    const up    = inp.isDown('ArrowUp')    || inp.isDown('w') || inp.isDown('W');
    const down  = inp.isDown('ArrowDown')  || inp.isDown('s') || inp.isDown('S');

    let dx = (right ? 1 : 0) - (left ? 1 : 0);
    let dy = (down  ? 1 : 0) - (up   ? 1 : 0);
    const mag = Math.hypot(dx, dy);
    if (mag > 0) {
      this.host.x += (dx / mag) * this._speed * dt;
      this.host.y += (dy / mag) * this._speed * dt;
      if (dx !== 0) this._facing = dx > 0 ? 1 : -1;
    }

    // Clamp to stage bounds and floor band.
    this.host.x = Math.max(40,              Math.min(this._stageW - 40, this.host.x));
    this.host.y = Math.max(this._floorMin,  Math.min(this._floorMax,    this.host.y));

    // Attack input: Space, Z, or X.  Only starts if cooldown is clear.
    const wantPunch = inp.wasJustPressed(' ')  || inp.wasJustPressed('z') || inp.wasJustPressed('Z')
                   || inp.wasJustPressed('x')  || inp.wasJustPressed('X');
    if (wantPunch && this._attackTimer <= 0) {
      this._attackTimer = this._attackCooldown;
      this._punchHitSet = new Set();   // fresh swing -- reset hit registry
      Engine.audio.play('brawler_punch');
    }
  }

  draw(ctx) {
    if (this._dead) {
      // Fallen clown: fade out while lying on the ground.
      ctx.globalAlpha = Math.max(0, 1 - this._deathTimer * 0.8);
      ctx.fillStyle = '#e040fb';
      ctx.save();
      ctx.rotate(Math.PI / 2);
      this._drawBody(ctx, false);
      ctx.restore();
      ctx.globalAlpha = 1;
      return;
    }

    // Flicker during i-frames.
    const flash = this._hitIframes > 0 && Math.floor(this._hitIframes * 10) % 2 === 0;
    if (flash) ctx.globalAlpha = 0.35;

    ctx.save();
    if (this._facing === -1) ctx.scale(-1, 1);
    this._drawBody(ctx, this.isAttacking);
    ctx.restore();

    ctx.globalAlpha = 1;
  }

  _drawBody(ctx, punching) {
    // Big shoes (red, oversized).
    ctx.fillStyle = '#e53935';
    ctx.fillRect(-26, -10, 23, 10);   // left shoe
    ctx.fillRect(3,   -10, 23, 10);   // right shoe

    // Baggy legs.
    ctx.fillStyle = '#ce93d8';
    ctx.fillRect(-16, -38, 13, 29);
    ctx.fillRect(3,   -38, 13, 29);

    // Suit body (purple).
    ctx.fillStyle = '#e040fb';
    ctx.fillRect(-19, -76, 38, 39);

    // White polka dots on suit.
    ctx.fillStyle = '#fffde7';
    [[-2, -63], [10, -53], [-11, -49], [7, -42]].forEach(([px, py]) => {
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fill();
    });

    if (punching) {
      // Right arm fully extended with fist.
      ctx.fillStyle = '#e040fb';
      ctx.fillRect(17, -72, 44, 12);      // extended arm
      ctx.fillStyle = '#ffcc80';
      ctx.beginPath(); ctx.arc(64, -66, 9, 0, Math.PI * 2); ctx.fill();  // fist
      // Left arm tucked.
      ctx.fillStyle = '#e040fb';
      ctx.fillRect(-30, -72, 13, 28);
      ctx.fillStyle = '#ffcc80';
      ctx.beginPath(); ctx.arc(-24, -44, 7, 0, Math.PI * 2); ctx.fill();
    } else {
      // Both arms at sides.
      ctx.fillStyle = '#e040fb';
      ctx.fillRect(-30, -72, 13, 30);
      ctx.fillRect(17,  -72, 13, 30);
      ctx.fillStyle = '#ffcc80';
      ctx.beginPath(); ctx.arc(-24, -42, 7, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(24,  -42, 7, 0, Math.PI * 2); ctx.fill();
    }

    // Head.
    ctx.fillStyle = '#ffcc80';
    ctx.beginPath(); ctx.arc(0, -90, 17, 0, Math.PI * 2); ctx.fill();

    // Clown hair: three tufts of yellow.
    ctx.fillStyle = '#ffeb3b';
    ctx.beginPath(); ctx.arc(-19, -101, 11, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(19,  -101, 11, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(0,   -108,  9, 0, Math.PI * 2); ctx.fill();

    // Eyes.
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-6, -92, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(6,  -92, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-6, -92, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(6,  -92, 2, 0, Math.PI * 2); ctx.fill();

    // Red nose.
    ctx.fillStyle = '#f44336';
    ctx.beginPath(); ctx.arc(0, -87, 6, 0, Math.PI * 2); ctx.fill();

    // Smile.
    ctx.strokeStyle = '#5d3b1e';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, -83, 10, 0.25, Math.PI - 0.25);
    ctx.stroke();
  }
}

// games/clown-brawler/scripts/gorilla-enemy.js
// Gorilla enemy AI for Clown Brawler.
//
// States: 'walking' -> 'attacking' -> 'stunned' -> 'dying' -> 'dead'
// The gorilla holds a party balloon which is drawn above its head while alive.
//
// Player reference must be set via setPlayer(playerObj) before the scene starts.
// The match scene calls script.takeHit() when the player's punch connects.
//
// Emits:
//   brawler_gorilla_attack   {}         when the gorilla's attack swing lands
//   brawler_balloon_release  { x, y, color }  just before the gorilla is removed
//   brawler_remove           { obj }     when death animation completes
//
// Depends on: Engine.Script, Engine.signals, Engine.audio
// Used by: ClownMatchScene

// Balloon colors -- one is assigned randomly at construction.
const _GORILLA_BALLOON_COLORS = ['#ff1744', '#2979ff', '#ffea00', '#69f0ae', '#ff6d00', '#e040fb'];

class GorillaEnemy extends Engine.Script {
  constructor(host, config = {}) {
    super(host);
    this._maxHealth        = config.health || 3;
    this._health           = this._maxHealth;
    this._speed            = config.speed  || 72;
    this._balloonColor     = _GORILLA_BALLOON_COLORS[
      Math.floor(Math.random() * _GORILLA_BALLOON_COLORS.length)
    ];
    this._playerObj        = null;  // set via setPlayer()
    this._state            = 'walking';
    this._attackWindup     = 0;
    this._attackWindupTime = 0.65;
    this._attackCooldown   = 0;
    this._stunTimer        = 0;
    this._deathTimer       = 0;
    this._hitFlash         = 0;
    this._walkBob          = 0;    // animation phase for walking bob
  }

  get dead()    { return this._state === 'dead'; }
  get isDying() { return this._state === 'dying'; }

  // Called by ClownMatchScene after spawning the GameObject.
  setPlayer(playerObj) {
    this._playerObj = playerObj;
  }

  // Called by ClownMatchScene when the player's punch connects.
  takeHit() {
    if (this._state === 'dying' || this._state === 'dead') return;
    this._health--;
    this._hitFlash = 0.15;
    Engine.audio.play('brawler_enemy_hit');
    if (this._health <= 0) {
      this._state      = 'dying';
      this._deathTimer = 0;
      Engine.audio.play('brawler_enemy_die');
    } else {
      this._state      = 'stunned';
      this._stunTimer  = 0.28;
    }
  }

  update(dt) {
    if (this._hitFlash > 0) this._hitFlash -= dt;

    switch (this._state) {
      case 'walking':  this._updateWalking(dt);  break;
      case 'attacking':this._updateAttacking(dt);break;
      case 'stunned':
        this._stunTimer -= dt;
        if (this._stunTimer <= 0) this._state = 'walking';
        break;
      case 'dying':
        this._deathTimer += dt;
        if (this._deathTimer >= 0.7) {
          Engine.signals.emit('brawler_balloon_release', {
            x:     this.host.x,
            y:     this.host.y - 120,
            color: this._balloonColor,
          });
          this._state = 'dead';
          Engine.signals.emit('brawler_remove', { obj: this.host });
        }
        break;
      case 'dead': break;
    }
  }

  _updateWalking(dt) {
    if (!this._playerObj) return;
    this._walkBob += dt * 6;

    const dx = this._playerObj.x - this.host.x;
    const dy = this._playerObj.y - this.host.y;

    if (this._attackCooldown > 0) this._attackCooldown -= dt;

    if (Math.abs(dx) < 52 && Math.abs(dy) < 38 && this._attackCooldown <= 0) {
      this._state       = 'attacking';
      this._attackWindup = 0;
      return;
    }

    const dist = Math.hypot(dx, dy);
    if (dist > 4) {
      this.host.x += (dx / dist) * this._speed * dt;
      this.host.y += (dy / dist) * this._speed * dt;
    }
  }

  _updateAttacking(dt) {
    this._attackWindup += dt;
    if (this._attackWindup >= this._attackWindupTime) {
      // Attack lands.  Match scene resolves damage via signal.
      if (this._playerObj) {
        const dx = this._playerObj.x - this.host.x;
        const dy = this._playerObj.y - this.host.y;
        if (Math.abs(dx) < 65 && Math.abs(dy) < 45) {
          Engine.signals.emit('brawler_gorilla_attack', {});
        }
      }
      this._state          = 'walking';
      this._attackCooldown = 1.5;
    }
  }

  draw(ctx) {
    if (this._state === 'dead') return;

    // White flash on hit.
    if (this._hitFlash > 0) {
      ctx.globalAlpha = 0.35;
    }

    if (this._state === 'dying') {
      // Tip over sideways.
      ctx.save();
      const tilt = Math.min(1, this._deathTimer / 0.7) * (Math.PI / 2);
      ctx.rotate(tilt);
      this._drawGorilla(ctx, false);
      ctx.restore();
    } else {
      this._drawGorilla(ctx, this._state === 'attacking');
    }

    ctx.globalAlpha = 1;
  }

  _drawGorilla(ctx, attacking) {
    // Determine which way the gorilla faces (toward player).
    const facing = (this._playerObj && this._playerObj.x > this.host.x) ? 1 : -1;

    ctx.save();
    if (facing === -1) ctx.scale(-1, 1);

    // Walking bob (only applies during walk state, gentle).
    const bob = (this._state === 'walking') ? Math.sin(this._walkBob) * 2 : 0;

    // Legs.
    ctx.fillStyle = '#4e342e';
    ctx.fillRect(-15, -32 + bob, 11, 32);
    ctx.fillRect(4,   -32 + bob, 11, 32);

    // Body (barrel chest).
    ctx.fillStyle = '#5d4037';
    ctx.fillRect(-22, -78 + bob, 44, 48);
    // Chest highlight.
    ctx.fillStyle = '#795548';
    ctx.fillRect(-14, -72 + bob, 28, 28);

    if (attacking) {
      // Right arm lunging forward.
      ctx.fillStyle = '#4e342e';
      ctx.fillRect(20,  -76 + bob, 44, 14);   // extended right arm
      ctx.fillStyle = '#3e2723';
      ctx.beginPath();
      ctx.arc(66, -69 + bob, 10, 0, Math.PI * 2);
      ctx.fill();   // fist
      // Left arm up for balance.
      ctx.fillStyle = '#4e342e';
      ctx.fillRect(-34, -80 + bob, 14, 24);
    } else {
      // Both arms at sides (slightly angled like a gorilla).
      ctx.fillStyle = '#4e342e';
      ctx.fillRect(-34, -78 + bob, 14, 36);
      ctx.fillRect(20,  -78 + bob, 14, 36);
      // Knuckles touching ground when walking (bob creates this illusion).
      ctx.fillStyle = '#3e2723';
      ctx.beginPath(); ctx.arc(-27, -42 + bob, 8, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(27,  -42 + bob, 8, 0, Math.PI * 2); ctx.fill();
    }

    // Head (large, forward-set).
    ctx.fillStyle = '#5d4037';
    ctx.beginPath();
    ctx.arc(0, -91 + bob, 22, 0, Math.PI * 2);
    ctx.fill();

    // Brow ridge (dark bar).
    ctx.fillStyle = '#3e2723';
    ctx.fillRect(-18, -107 + bob, 36, 10);

    // Eyes.
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(-8, -96 + bob, 6, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(8,  -96 + bob, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a0a00';
    ctx.beginPath(); ctx.arc(-8, -96 + bob, 3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(8,  -96 + bob, 3, 0, Math.PI * 2); ctx.fill();

    // Nostrils.
    ctx.fillStyle = '#3e2723';
    ctx.beginPath(); ctx.arc(-5, -83 + bob, 3.5, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(5,  -83 + bob, 3.5, 0, Math.PI * 2); ctx.fill();

    // Mouth / grimace.
    ctx.strokeStyle = '#3e2723';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, -78 + bob, 9, 0.3, Math.PI - 0.3, true);
    ctx.stroke();

    // Balloon (only when not dying).
    if (this._state !== 'dying') {
      this._drawBalloon(ctx, bob);
    }

    ctx.restore();
  }

  _drawBalloon(ctx, bob) {
    const bx = 6, by = -80 + bob;  // string base near gorilla's hand

    // String from hand up to balloon.
    ctx.strokeStyle = '#9e9e9e';
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    // Slight S-curve for a natural string droop.
    ctx.bezierCurveTo(bx + 6, by - 20, bx - 4, by - 38, bx, by - 52);
    ctx.stroke();

    // Balloon body (ellipse).
    const cx = bx, cy = by - 66;
    ctx.fillStyle = this._balloonColor;
    ctx.beginPath();
    ctx.ellipse(cx, cy, 13, 16, 0, 0, Math.PI * 2);
    ctx.fill();

    // Balloon knot at bottom.
    ctx.fillStyle = this._balloonColor;
    ctx.beginPath();
    ctx.arc(cx, cy + 16, 3, 0, Math.PI * 2);
    ctx.fill();

    // Shine highlight.
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.ellipse(cx - 4, cy - 6, 4, 6, -0.5, 0, Math.PI * 2);
    ctx.fill();
  }
}


/* === floating-balloon.js === */
// games/clown-brawler/scripts/floating-balloon.js
// Spawned by ClownMatchScene when a gorilla dies.
// The balloon floats upward with slight lateral drift and fades out over ~2.5 seconds,
// then emits brawler_remove so the match scene can clean up the host object.
//
// The host object lives in world space, so the balloon drifts relative to the stage.
//
// Emits:
//   brawler_remove  { obj }  when alpha reaches zero
//
// Depends on: Engine.Script, Engine.signals
// Used by: ClownMatchScene

class FloatingBalloon extends Engine.Script {
  constructor(host, config = {}) {
    super(host);
    this._color    = config.color || '#ff1744';
    this._vy       = -110;                          // upward velocity (px/s)
    this._vx       = (Math.random() - 0.5) * 55;   // random lateral drift
    this._alpha    = 1.0;
    this._fadeRate = 0.42;                          // alpha lost per second
    this._done     = false;
  }

  update(dt) {
    if (this._done) return;
    this.host.x  += this._vx  * dt;
    this.host.y  += this._vy  * dt;
    this._alpha  -= this._fadeRate * dt;
    if (this._alpha <= 0) {
      this._alpha = 0;
      this._done  = true;
      Engine.signals.emit('brawler_remove', { obj: this.host });
    }
  }

  draw(ctx) {
    if (this._done) return;

    ctx.globalAlpha = this._alpha;

    // Short trailing string.
    ctx.strokeStyle = '#9e9e9e';
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.moveTo(0, 18);
    ctx.bezierCurveTo(4, 4, -3, -10, 0, -22);
    ctx.stroke();

    // Balloon body.
    ctx.fillStyle = this._color;
    ctx.beginPath();
    ctx.ellipse(0, -36, 14, 17, 0, 0, Math.PI * 2);
    ctx.fill();

    // Knot.
    ctx.beginPath();
    ctx.arc(0, -19, 3, 0, Math.PI * 2);
    ctx.fill();

    // Shine.
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.ellipse(-4, -43, 4, 6, -0.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.globalAlpha = 1;
  }
}


/* === clown-menu.js === */
// games/clown-brawler/scenes/clown-menu.js
// Title screen for Clown Brawler.
// Press Enter or Space to start.
//
// Depends on: Engine.Scene, Engine.input, ClownMatchScene
// Used by: Bootstrap, ClownMatchScene (quit path)

class ClownMenuScene extends Engine.Scene {
  constructor(game) {
    super();
    this._game        = game;
    this._fadeIn      = 1.0;
    this._pendingOut  = null;
    this._fadeTimer   = 0;
    this._blinkTimer  = 0;
    this._showPrompt  = true;
    // Decorative balloon animation state.
    this._balloons    = this._makeBalloons();
  }

  _makeBalloons() {
    const colors = ['#ff1744', '#2979ff', '#ffea00', '#69f0ae', '#ff6d00', '#e040fb'];
    return Array.from({ length: 8 }, (_, i) => ({
      x:     80 + i * 90 + Math.random() * 40,
      y:     480 + Math.random() * 60,
      vy:    -(35 + Math.random() * 25),
      vx:    (Math.random() - 0.5) * 18,
      color: colors[i % colors.length],
      r:     12 + Math.random() * 5,
    }));
  }

  enter() {
    this._fadeIn     = 1.0;
    this._pendingOut = null;
    this._fadeTimer  = 0;
  }

  update(dt) {
    if (this._fadeIn > 0) this._fadeIn = Math.max(0, this._fadeIn - 2.5 * dt);

    if (this._pendingOut) {
      this._fadeTimer += dt;
      if (this._fadeTimer >= 0.35) this._game.setScene(this._pendingOut);
      return;
    }

    this._blinkTimer += dt;
    if (this._blinkTimer >= 0.55) { this._blinkTimer = 0; this._showPrompt = !this._showPrompt; }

    // Animate decorative balloons; loop them back when they exit the top.
    for (const b of this._balloons) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      if (b.y < -60) { b.y = 520; b.x = 40 + Math.random() * 720; }
    }

    if (Engine.input.wasJustPressed('Enter') || Engine.input.wasJustPressed(' ')) {
      this._pendingOut = new ClownMatchScene(this._game);
      this._fadeTimer  = 0;
    }
  }

  draw(ctx) {
    const W = 800, H = 500;

    // Deep purple circus background.
    ctx.fillStyle = '#12002f';
    ctx.fillRect(0, 0, W, H);

    // Tent-stripe wedges radiating from the top center.
    const stripeColors = ['#1a0040', '#200050'];
    for (let i = 0; i < 12; i++) {
      ctx.fillStyle = stripeColors[i % 2];
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      const a1 = (i / 12) * Math.PI * 2;
      const a2 = ((i + 1) / 12) * Math.PI * 2;
      ctx.arc(W / 2, 0, W, a1, a2);
      ctx.closePath();
      ctx.fill();
    }

    // Decorative floating balloons.
    for (const b of this._balloons) {
      ctx.globalAlpha = 0.6;
      ctx.fillStyle   = b.color;
      ctx.beginPath();
      ctx.ellipse(b.x, b.y, b.r, b.r * 1.2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#888';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y + b.r * 1.2);
      ctx.lineTo(b.x + 4, b.y + b.r * 1.2 + 20);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Title: two stacked lines.
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    // Shadow pass.
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.font = 'bold 78px monospace';
    ctx.fillText('CLOWN',   W / 2 + 4, 152);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText('BRAWLER', W / 2 + 4, 242);

    // Main title.
    ctx.fillStyle = '#ffeb3b';
    ctx.font = 'bold 78px monospace';
    ctx.fillText('CLOWN',   W / 2, 148);
    ctx.fillStyle = '#ff1744';
    ctx.fillText('BRAWLER', W / 2, 238);

    // Subtitle.
    ctx.fillStyle = '#ce93d8';
    ctx.font = '20px monospace';
    ctx.fillText('vs. The Gorilla Gang', W / 2, 296);

    // Blink prompt.
    if (this._showPrompt) {
      ctx.fillStyle = '#fff';
      ctx.font = '20px monospace';
      ctx.fillText('PRESS ENTER or SPACE', W / 2, 374);
    }

    // Control reminder.
    ctx.fillStyle = '#666';
    ctx.font = '14px monospace';
    ctx.fillText('WASD / Arrows: Move   Space / Z: Punch   ESC: Pause', W / 2, 448);

    // Fade overlays.
    if (this._fadeIn > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this._fadeIn})`;
      ctx.fillRect(0, 0, W, H);
    }
    if (this._pendingOut) {
      ctx.fillStyle = `rgba(0,0,0,${Math.min(1, this._fadeTimer / 0.35)})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
}


/* === clown-match.js === */
// games/clown-brawler/scenes/clown-match.js
// Core gameplay scene for Clown Brawler.
//
// Belt-scrolling model:
//   The stage is STAGE_W x canvas-height.  The camera follows the player on X
//   with smooth lag.  In draw(), a ctx.translate(-camX, 0) wraps super.draw()
//   so all GameObjects render at their world-space coordinates without needing
//   individual offset compensation.  HUD, overlays, and fades are drawn after
//   ctx.restore() in screen space.
//
//   Objects are Z-sorted by Y before super.draw() so characters deeper in the
//   belt (lower Y = further back) render behind characters at the front.
//
// Combat:
//   Player: Space/Z/X to punch.  The active hit window (isAttacking) is checked
//   each frame in _checkPlayerPunch(); each gorilla can only be hit once per swing
//   via a per-punch hit Set on the player script.
//   Gorillas: emit brawler_gorilla_attack when their windup completes and the
//   player is still in range.  This scene routes that to playerScript.takeHit(1).
//
// Wave model:
//   3 waves (4 / 6 / 8 gorillas).  When _enemies is empty a 2.5s wave-clear pause
//   runs before the next wave.  After wave 3, the game transitions to 'victory'.
//   Player health carries between waves.
//
// Signals consumed:
//   brawler_remove           { obj }           remove a world GameObject
//   brawler_balloon_release  { x, y, color }   spawn a FloatingBalloon
//   brawler_gorilla_attack   {}                 player takes 1 damage
//   brawler_player_died      {}                 trigger game-over state
//
// Depends on: Engine.Scene, Engine.GameObject, Engine.signals, Engine.input,
//   PauseOverlay, ClownPlayer, GorillaEnemy, FloatingBalloon, ClownMenuScene
// Used by: ClownMenuScene (start), PauseOverlay quit path (return)

class ClownMatchScene extends Engine.Scene {
  constructor(game) {
    super();
    this._game = game;

    // Canvas and stage dimensions.
    this.W       = 800;
    this.H       = 500;
    this.STAGE_W = 2400;
    this.FLOOR_MIN = 310;   // Y of back edge of belt (furthest from viewer)
    this.FLOOR_MAX = 455;   // Y of front edge (closest to viewer)

    // Camera.
    this._camX = 0;

    // Player.
    this._playerObj    = null;
    this._playerScript = null;

    // Enemy and balloon tracking (parallel to this.objects).
    this._enemies  = [];   // [{ obj, script }]
    this._balloons = [];   // [obj]  floating balloons

    // Wave state.
    this._wave       = 1;
    this.TOTAL_WAVES = 3;
    this._state      = 'fighting';  // 'fighting' | 'wave_clear' | 'game_over' | 'victory'
    this._waveClearTimer = 0;

    // Signal unsubscribers.
    this._unsubs = [];

    // Pause overlay.
    this._pause = null;

    // Fades.
    this._fadeIn     = 1.0;
    this._pendingOut = null;
    this._fadeTimer  = 0;
  }

  // ---- Lifecycle ----

  enter() {
    this._camX           = 0;
    this._enemies        = [];
    this._balloons       = [];
    this._wave           = 1;
    this._state          = 'fighting';
    this._waveClearTimer = 0;
    this._fadeIn         = 1.0;
    this._pendingOut     = null;
    this._fadeTimer      = 0;

    this._spawnPlayer();
    this._spawnWave(1);

    this._pause = new PauseOverlay(this._game, {
      onQuit: () => {
        this._pendingOut = new ClownMenuScene(this._game);
        this._fadeTimer  = 0;
      },
    });

    this._unsubs.push(
      Engine.signals.on('brawler_remove', ({ obj }) => {
        this.remove(obj);
        this._enemies  = this._enemies.filter(e => e.obj !== obj);
        this._balloons = this._balloons.filter(b => b  !== obj);
      }),
      Engine.signals.on('brawler_balloon_release', ({ x, y, color }) => {
        this._spawnBalloon(x, y, color);
      }),
      Engine.signals.on('brawler_gorilla_attack', () => {
        if (this._playerScript) this._playerScript.takeHit(1);
      }),
      Engine.signals.on('brawler_player_died', () => {
        this._state = 'game_over';
      }),
    );

    // Audio registrations.  Presets roll randomized parameters at register time.
    Engine.audio.register('brawler_punch',      'hitHurt');
    Engine.audio.register('brawler_player_hit', 'explosion');
    Engine.audio.register('brawler_enemy_hit',  'hitHurt');
    Engine.audio.register('brawler_enemy_die',  'explosion');
    Engine.audio.register('brawler_wave_clear', 'powerUp');
  }

  exit() {
    for (const u of this._unsubs) u();
    this._unsubs    = [];
    this.objects.length = 0;
    this._enemies   = [];
    this._balloons  = [];
  }

  // ---- Update ----

  update(dt) {
    if (this._fadeIn > 0) this._fadeIn = Math.max(0, this._fadeIn - 2.5 * dt);

    if (this._pendingOut) {
      this._fadeTimer += dt;
      if (this._fadeTimer >= 0.35) this._game.setScene(this._pendingOut);
      return;
    }

    this._pause.update(dt);
    if (this._pause.isPaused()) return;

    if (this._state === 'fighting') {
      super.update(dt);
      this._checkPlayerPunch();
      this._updateCamera(dt);

      if (this._enemies.length === 0 && this._playerScript && !this._playerScript.dead) {
        this._state          = 'wave_clear';
        this._waveClearTimer = 2.5;
        Engine.audio.play('brawler_wave_clear');
      }

    } else if (this._state === 'wave_clear') {
      // Keep balloons and any lingering effects updating.
      super.update(dt);
      this._updateCamera(dt);

      this._waveClearTimer -= dt;
      if (this._waveClearTimer <= 0) {
        this._wave++;
        if (this._wave > this.TOTAL_WAVES) {
          this._state = 'victory';
        } else {
          this._spawnWave(this._wave);
          this._state = 'fighting';
        }
      }

    } else if (this._state === 'game_over' || this._state === 'victory') {
      // Still update balloons and scene so things look alive.
      super.update(dt);
      if (Engine.input.wasJustPressed('Enter') || Engine.input.wasJustPressed(' ')) {
        this._pendingOut = new ClownMenuScene(this._game);
        this._fadeTimer  = 0;
      }
    }
  }

  // -- Combat helpers --

  _checkPlayerPunch() {
    if (!this._playerScript || !this._playerScript.isAttacking) return;
    const hitSet = this._playerScript.punchHitSet;
    const px = this._playerObj.x;
    const py = this._playerObj.y;
    const f  = this._playerScript.facing;

    for (const { obj, script } of this._enemies) {
      if (hitSet.has(obj) || script.dead || script.isDying) continue;
      // dx is signed in facing direction: positive means the enemy is "in front".
      const dx = (obj.x - px) * f;
      const dy = Math.abs(obj.y - py);
      if (dx > -20 && dx < 92 && dy < 55) {
        script.takeHit();
        hitSet.add(obj);
      }
    }
  }

  _updateCamera(dt) {
    if (!this._playerObj) return;
    const target = this._playerObj.x - this.W / 2;
    this._camX  += (target - this._camX) * Math.min(1, 5 * dt);
    this._camX   = Math.max(0, Math.min(this.STAGE_W - this.W, this._camX));
  }

  // ---- Spawning ----

  _spawnPlayer() {
    this._playerObj    = new Engine.GameObject(220, 385);
    this._playerScript = new ClownPlayer(this._playerObj, {
      maxHealth: 5,
      floorMin:  this.FLOOR_MIN,
      floorMax:  this.FLOOR_MAX,
      stageW:    this.STAGE_W,
    });
    this._playerObj.attach(this._playerScript);
    this.add(this._playerObj);
  }

  _spawnWave(waveNum) {
    const configs = this._waveConfigs(waveNum);
    for (const cfg of configs) {
      const obj    = new Engine.GameObject(cfg.x, cfg.y);
      const script = new GorillaEnemy(obj, { health: cfg.health, speed: cfg.speed });
      script.setPlayer(this._playerObj);
      obj.attach(script);
      this.add(obj);
      this._enemies.push({ obj, script });
    }
  }

  _waveConfigs(wave) {
    // Gorilla counts: 4, 6, 8.  Spread across stage X.
    const counts = [4, 6, 8];
    const count  = counts[Math.min(wave - 1, counts.length - 1)];
    const yPool  = [340, 370, 410, 440, 355, 395, 425, 445];
    const health = wave >= 3 ? 4 : 3;
    const configs = [];

    for (let i = 0; i < count; i++) {
      // Spread gorillas evenly with jitter.
      const xBase = 480 + i * (1700 / Math.max(count - 1, 1));
      configs.push({
        x:      xBase + (Math.random() - 0.5) * 100,
        y:      yPool[i % yPool.length],
        health: health,
        speed:  62 + wave * 10 + Math.random() * 18,
      });
    }
    return configs;
  }

  _spawnBalloon(x, y, color) {
    const obj    = new Engine.GameObject(x, y);
    const script = new FloatingBalloon(obj, { color });
    obj.attach(script);
    this.add(obj);
    this._balloons.push(obj);
  }

  // ---- Draw ----

  draw(ctx) {
    // 1. Background (screen space, does not scroll).
    this._drawBackground(ctx);

    // 2. World objects, translated by camera offset.
    //    Z-sort by Y so characters further back render first.
    this.objects.sort((a, b) => a.y - b.y);

    ctx.save();
    ctx.translate(-Math.round(this._camX), 0);
    super.draw(ctx);
    ctx.restore();

    // 3. HUD, overlays, fades (screen space).
    this._drawHUD(ctx);
    this._drawStateOverlay(ctx);
    this._pause.draw(ctx);

    if (this._fadeIn > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this._fadeIn})`;
      ctx.fillRect(0, 0, this.W, this.H);
    }
    if (this._pendingOut) {
      ctx.fillStyle = `rgba(0,0,0,${Math.min(1, this._fadeTimer / 0.35)})`;
      ctx.fillRect(0, 0, this.W, this.H);
    }
  }

  _drawBackground(ctx) {
    const W = this.W, H = this.H;
    const camX = this._camX;

    // --- Sky gradient (no parallax; sky is infinite) ---
    const sky = ctx.createLinearGradient(0, 0, 0, this.FLOOR_MIN);
    sky.addColorStop(0, '#5c9ec7');
    sky.addColorStop(1, '#b8dff5');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, this.FLOOR_MIN);

    // --- Cloud layer (parallax 0.08 -- very distant) ---
    // Defined in a 1600px tile so they wrap seamlessly over the 2400px stage.
    const CLOUD_TILE = 1600;
    const cloudOffset = (camX * 0.08) % CLOUD_TILE;
    const clouds = [
      { x:  80, y: 55,  r: 28 }, { x: 310, y: 40,  r: 22 },
      { x: 560, y: 70,  r: 32 }, { x: 890, y: 38,  r: 20 },
      { x:1150, y: 60,  r: 26 }, { x:1400, y: 45,  r: 24 },
    ];
    ctx.fillStyle = 'rgba(255,255,255,0.72)';
    for (const c of clouds) {
      // Draw at both tile offsets to cover any wrap position.
      for (let tile = 0; tile <= 1; tile++) {
        const cx = c.x - cloudOffset + tile * CLOUD_TILE;
        if (cx + c.r * 3 < 0 || cx - c.r * 3 > W) continue;
        // Three overlapping circles make a convincing puff.
        ctx.beginPath(); ctx.arc(cx,        c.y, c.r,        0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + c.r,  c.y, c.r * 0.78, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx - c.r,  c.y, c.r * 0.65, 0, Math.PI*2); ctx.fill();
      }
    }

    // --- Building layer (parallax 0.28 -- mid distance) ---
    // Tiles every 1100px so buildings loop over the full stage scroll range.
    const BLDG_TILE = 1100;
    const bldgOffset = (camX * 0.28) % BLDG_TILE;
    const BLDG_COLOR_FAR  = '#3d5c73';
    const BLDG_COLOR_MID  = '#2e4a5e';
    const buildings = [
      { x:  40, w: 90,  h:100, dark:false }, { x: 185, w: 55, h:145, dark:true  },
      { x: 290, w:110,  h: 75, dark:false }, { x: 450, w: 70, h:125, dark:true  },
      { x: 570, w: 85,  h: 95, dark:false }, { x: 700, w:100, h:115, dark:true  },
      { x: 850, w: 60,  h:130, dark:false }, { x: 980, w: 80, h: 85, dark:true  },
    ];
    for (const b of buildings) {
      ctx.fillStyle = b.dark ? BLDG_COLOR_MID : BLDG_COLOR_FAR;
      for (let tile = 0; tile <= 1; tile++) {
        const bx = b.x - bldgOffset + tile * BLDG_TILE;
        if (bx + b.w < 0 || bx > W) continue;
        ctx.fillRect(bx, this.FLOOR_MIN - b.h, b.w, b.h);
        // Simple window grid on each building.
        ctx.fillStyle = 'rgba(255,240,160,0.18)';
        for (let wy = this.FLOOR_MIN - b.h + 10; wy < this.FLOOR_MIN - 12; wy += 18) {
          for (let wx = bx + 8; wx < bx + b.w - 8; wx += 16) {
            ctx.fillRect(wx, wy, 8, 10);
          }
        }
        ctx.fillStyle = b.dark ? BLDG_COLOR_MID : BLDG_COLOR_FAR;
      }
    }

    // --- Floor belt ---
    const floor = ctx.createLinearGradient(0, this.FLOOR_MIN, 0, H);
    floor.addColorStop(0, '#7c6242');
    floor.addColorStop(1, '#5c4830');
    ctx.fillStyle = floor;
    ctx.fillRect(0, this.FLOOR_MIN, W, H - this.FLOOR_MIN);

    // Horizon line.
    ctx.fillStyle = '#4a3522';
    ctx.fillRect(0, this.FLOOR_MIN - 3, W, 5);

    // --- Floor tile marks (parallax 1.0 -- fully tied to world) ---
    // Vertical marks every 80px, offset by camX so they scroll at full camera speed.
    // This is the primary horizontal-motion readability cue.
    const TILE_W = 80;
    const tileOffset = camX % TILE_W;
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 1;
    for (let kx = -tileOffset; kx < W + TILE_W; kx += TILE_W) {
      ctx.beginPath();
      ctx.moveTo(Math.round(kx), this.FLOOR_MIN);
      ctx.lineTo(Math.round(kx), H);
      ctx.stroke();
    }

    // Horizontal lane lines (static depth cue).
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    for (let ly = this.FLOOR_MIN + 40; ly < H; ly += 55) {
      ctx.beginPath();
      ctx.moveTo(0, ly);
      ctx.lineTo(W, ly);
      ctx.stroke();
    }
  }

  _drawHUD(ctx) {
    const W = this.W, H = this.H;
    ctx.save();

    // Top bar.
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, 30);

    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = '#ddd';
    ctx.font         = '14px monospace';

    const waveLabel = this._state === 'wave_clear'
      ? 'WAVE ' + this._wave + ' CLEAR!'
      : 'WAVE ' + this._wave + ' / ' + this.TOTAL_WAVES
        + '   ENEMIES: ' + this._enemies.length;
    ctx.fillText(waveLabel, W / 2, 15);

    ctx.textAlign = 'right';
    ctx.fillStyle = '#555';
    ctx.font      = '11px monospace';
    ctx.fillText('ESC: pause', W - 6, 22);

    // Player health bar at the bottom.
    if (this._playerScript) {
      const bw    = 200, bh = 14;
      const bx    = W / 2 - bw / 2, by = H - 22;
      const ratio = Math.max(0, this._playerScript.health / this._playerScript.maxHealth);

      ctx.fillStyle = '#222';
      ctx.fillRect(bx, by, bw, bh);

      ctx.fillStyle = ratio > 0.5 ? '#4caf50' : ratio > 0.25 ? '#ff9800' : '#f44336';
      ctx.fillRect(bx, by, bw * ratio, bh);

      ctx.fillStyle    = '#888';
      ctx.font         = '10px monospace';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(
        this._playerScript.health + ' / ' + this._playerScript.maxHealth,
        W / 2, by + bh / 2,
      );

      // HP label.
      ctx.fillStyle    = '#aaa';
      ctx.textAlign    = 'right';
      ctx.font         = '11px monospace';
      ctx.textBaseline = 'middle';
      ctx.fillText('HP', bx - 4, by + bh / 2);
    }

    ctx.restore();
  }

  _drawStateOverlay(ctx) {
    const W = this.W, H = this.H;

    if (this._state === 'wave_clear') {
      // Brief "WAVE CLEAR" banner.
      ctx.save();
      const alpha = Math.min(1, this._waveClearTimer > 1.5
        ? (2.5 - this._waveClearTimer) / 1.0      // fade in
        : this._waveClearTimer / 1.0);             // fade out near end
      ctx.globalAlpha = alpha;
      ctx.fillStyle   = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, H / 2 - 55, W, 110);
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = '#ffeb3b';
      ctx.font         = 'bold 52px monospace';
      ctx.fillText('WAVE ' + this._wave + ' CLEAR!', W / 2, H / 2 - 14);
      if (this._wave < this.TOTAL_WAVES) {
        ctx.fillStyle = '#ccc';
        ctx.font      = '20px monospace';
        ctx.fillText('Wave ' + (this._wave + 1) + ' incoming...', W / 2, H / 2 + 28);
      }
      ctx.restore();
    }

    if (this._state === 'game_over') {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.72)';
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = '#f44336';
      ctx.font         = 'bold 64px monospace';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
      ctx.fillStyle = '#aaa';
      ctx.font      = '20px monospace';
      ctx.fillText('Wave ' + this._wave + ' of ' + this.TOTAL_WAVES, W / 2, H / 2 + 14);
      ctx.fillStyle = '#666';
      ctx.font      = '16px monospace';
      ctx.fillText('ENTER or SPACE to return to menu', W / 2, H / 2 + 52);
      ctx.restore();
    }

    if (this._state === 'victory') {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = '#ffeb3b';
      ctx.font         = 'bold 64px monospace';
      ctx.fillText('VICTORY!', W / 2, H / 2 - 50);
      ctx.fillStyle = '#ce93d8';
      ctx.font      = '22px monospace';
      ctx.fillText('The gorillas are defeated!', W / 2, H / 2 + 10);
      ctx.fillStyle = '#aaa';
      ctx.font      = '18px monospace';
      ctx.fillText('The balloons float free.', W / 2, H / 2 + 44);
      ctx.fillStyle = '#666';
      ctx.font      = '16px monospace';
      ctx.fillText('ENTER or SPACE to return to menu', W / 2, H / 2 + 82);
      ctx.restore();
    }
  }
}


(function() {
  const canvas = document.getElementById('gameCanvas');
  const game = new Engine.Game(canvas);
  game.setScene(new ClownMenuScene(game));
  game.start();
})();
</script>
