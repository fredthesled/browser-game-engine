// ============================================================================
// engine/balance.js
// ============================================================================
// Tunable balance primitives: parameterized difficulty curves and cost
// scaling. Pure, stateless functions under Engine.Balance. Default constants
// follow the values supported by docs/resources/balance.md (see ADR-0020).
//
// Depends on: nothing (pure math).
// Depended on by: game-specific scripts/scenes that ramp difficulty or price
//   upgrades. NOT used by the engine core; opt-in per game.
// ============================================================================

var Engine = Engine || {};

const Balance = {
  // --- Difficulty curves ----------------------------------------------------
  // difficulty(t, opts): difficulty/intensity as a function of progress t.
  // t is caller-defined (elapsed seconds, wave index, level, etc).
  // opts.type selects the family; default 'logistic' (slow start, steep
  // middle, bounded plateau), the general-purpose pacing curve.
  // For logistic, set opts.t0 to the progress midpoint; the default of 0
  // is structural only (it places you at L/2 at t=0).
  difficulty(t, opts = {}) {
    const type = opts.type || 'logistic';
    switch (type) {
      case 'linear':       // d0 + m*t
        return (opts.d0 ?? 0) + (opts.m ?? 1) * t;
      case 'exponential':  // d0 * r^t
        return (opts.d0 ?? 1) * Math.pow(opts.r ?? 1.1, t);
      case 'logarithmic':  // d0 + k*ln(1+t); rises to a soft max then flattens
        return (opts.d0 ?? 0) + (opts.k ?? 1) * Math.log(1 + t);
      case 'logistic':     // L / (1 + e^(-k*(t - t0)))
        return (opts.L ?? 1) / (1 + Math.exp(-(opts.k ?? 1) * (t - (opts.t0 ?? 0))));
      default:
        throw new Error(`Engine.Balance.difficulty: unknown curve type '${type}'`);
    }
  },

  // --- Cost scaling ---------------------------------------------------------
  // cost(n, opts): price of a purchase when you already own n units, base*rate^n.
  // So the first unit (n=0) costs base. rate in [1.07, 1.15] is the documented
  // band; default 1.10. Use ~1.15 for short sessions, ~1.07 for long-haul games.
  cost(n, opts = {}) {
    return (opts.base ?? 1) * Math.pow(opts.rate ?? 1.1, n);
  },

  // bulkCost(owned, count, opts): closed-form total to buy `count` units from
  // `owned`. Exact for fixed rate; replaces a loop.
  bulkCost(owned, count, opts = {}) {
    const base = opts.base ?? 1;
    const rate = opts.rate ?? 1.1;
    if (count <= 0) return 0;
    if (rate === 1) return base * count;
    return base * (Math.pow(rate, owned) * (Math.pow(rate, count) - 1)) / (rate - 1);
  },

  // maxAffordable(owned, currency, opts): how many units `currency` buys from
  // `owned`. Closed-form inverse of bulkCost.
  maxAffordable(owned, currency, opts = {}) {
    const base = opts.base ?? 1;
    const rate = opts.rate ?? 1.1;
    if (currency <= 0) return 0;
    if (rate === 1) return Math.floor(currency / base);
    const n = Math.log((currency * (rate - 1)) / (base * Math.pow(rate, owned)) + 1) / Math.log(rate);
    return Math.max(0, Math.floor(n));
  }
};

Engine.Balance = Balance;


// ============================================================================
// engine/prng.js
// ============================================================================

// ============================================================================
// engine/prng.js
// ============================================================================
//
// Engine.PRNG: seeded pseudo-random number generator.
//
// Algorithm: SFC32 (Small Fast Counting) by Chris Doty-Humphrey. 128-bit
// state (four 32-bit words); period ≥ 2^64; passes PractRand at 32 TB.
// String seeds are hashed to a 128-bit initial state by cyrb128 (bryc, CC0).
// See ADR-0026.
//
// Depends on: nothing.
// Depended on by: game scripts and scenes that need deterministic randomness
//   (procedural levels, daily seeds, replay systems). Not used by the engine
//   core; opt-in per game.
//
// Usage:
//   const rng = new Engine.PRNG('level-1');
//   rng.float()              // [0, 1), like Math.random()
//   rng.int(1, 6)            // integer in [1, 6] inclusive
//   rng.pick(['a','b','c'])  // random element from array
//   rng.shuffle(array)       // Fisher-Yates in place, returns array
// ============================================================================

var Engine = Engine || {};

class PRNG {
  constructor(seed) {
    let a, b, c, d;
    if (typeof seed === 'string') {
      [a, b, c, d] = PRNG._cyrb128(seed);
    } else {
      // Expand a single 32-bit integer to four words via a LCG.
      a = seed >>> 0;
      b = (a * 1664525 + 1013904223) >>> 0;
      c = (b * 1664525 + 1013904223) >>> 0;
      d = 1;
    }
    this._a = a; this._b = b; this._c = c; this._d = d;
    // Discard first 15 outputs so low-entropy seeds (e.g. 0) reach a
    // well-mixed state before callers draw values.
    for (let i = 0; i < 15; i++) this._step();
  }

  // [0, 1) float, the Math.random() analogue.
  float() {
    return (this._step() >>> 0) / 0x100000000;
  }

  // Integer in [min, max] inclusive.
  int(min, max) {
    return min + (this._step() % (max - min + 1));
  }

  // Random element from array. Throws if array is empty.
  pick(arr) {
    if (!arr.length) throw new Error('Engine.PRNG.pick: empty array');
    return arr[this._step() % arr.length];
  }

  // Fisher-Yates shuffle in place. Returns the same array.
  shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = this._step() % (i + 1);
      const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  // SFC32 step: updates state and returns a 32-bit unsigned integer.
  _step() {
    const t = (this._a + this._b + this._d++) >>> 0;
    this._a = (this._b ^ (this._b >>> 9)) >>> 0;
    this._b = (this._c + (this._c << 3)) >>> 0;
    this._c = ((this._c << 21) | (this._c >>> 11)) >>> 0;
    this._c = (this._c + t) >>> 0;
    return t;
  }

  // cyrb128 by bryc (CC0). Hashes a string to four 32-bit seed words.
  static _cyrb128(str) {
    let h1 = 1779033703, h2 = 3144134277, h3 = 1013904242, h4 = 2773480762;
    for (let i = 0; i < str.length; i++) {
      const k = str.charCodeAt(i);
      h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
      h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
      h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
      h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
    }
    h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
    h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
    h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
    h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
    h1 ^= (h2 ^ h3 ^ h4); h2 ^= h1; h3 ^= h1; h4 ^= h1;
    return [h1 >>> 0, h2 >>> 0, h3 >>> 0, h4 >>> 0];
  }
}

Engine.PRNG = PRNG;

/* ==== scripts/bootstrap.js ==== */
// ============================================================================
// scripts/bootstrap.js
// ============================================================================
//
// bootstrapGame(options) - canonical game bootstrap helper.
//
// Consolidates the boilerplate that every build/<game>.html's <script> tail
// currently repeats: viewport-aware canvas sizing per ADR-0017, touch
// capability detection, optional context-menu suppression (for right-click
// games), Engine.Game construction with optional gameName for namespaced
// storage, initial scene set via a factory, and game start.
//
// Depends on:
//   Engine.Game (engine/game.js). The engine bundle must be loaded before
//   this script in the build concatenation order.
//
// Depended on by:
//   Game build bootstrap snippets. Replaces the inline IIFE that previously
//   appeared at the end of each build/<game>.html. Adoption is per-build:
//   existing builds continue to work with their inline bootstrap until each
//   is naturally regenerated. Drift v1 is the planned first build to adopt
//   the helper from the start; existing games migrate when next touched.
//
// Usage (Minesweeper-style, current inline form for comparison):
//   (function () {
//     const canvas = document.getElementById('game');
//     const preset = { w: 900, h: 600 };
//     canvas.width = preset.w; canvas.height = preset.h;
//     // fitToViewport, resize listener, canvas.oncontextmenu, etc.
//     const game = new Engine.Game(canvas, { gameName: 'minesweeper' });
//     game.setScene(new MinesweeperMenuScene(game));
//     game.start();
//   })();
//
// Equivalent with bootstrapGame:
//   bootstrapGame({
//     gameName: 'minesweeper',
//     presets: { regular: { w: 900, h: 600 } },
//     initialScene: function (game) { return new MinesweeperMenuScene(game); },
//     suppressContextMenu: true,
//   });
//
// Options:
//   canvasId          string. ID of canvas element. Default 'game'.
//   canvas            DOM element. Overrides canvasId if both provided.
//   gameName          string. Passed to Engine.Game for storage namespacing.
//                     Default '' (no namespace).
//   presets           { regular: {w, h}, compact?: {w, h} }. Required.
//                     If compact is omitted, regular is always used (the
//                     intentional letterbox-on-portrait path per ADR-0017).
//   initialScene      (game) => Scene. Factory required because the Game
//                     instance must exist before the initial Scene's
//                     constructor argument can be passed.
//   suppressContextMenu  bool. Default false. true disables the canvas's
//                     right-click context menu (for games that read
//                     Engine.input.mouse.right; see Minesweeper).
//
// Returns:
//   { game, preset, presetName, isTouch }
//     game         the constructed Engine.Game (already started)
//     preset       the chosen preset object { w, h }
//     presetName   'regular' or 'compact'
//     isTouch      bool. true if touch capability detected per ADR-0017.
//                  Scenes can use this to enlarge hit-target minimums.
//
// Throws if the canvas element is not found, presets.regular is missing, or
// initialScene is not a function. Errors are explicit and actionable.
//
// Preset selection:
//   When both regular and compact are defined, picks whichever aspect ratio
//   is closer (in log space) to the current viewport's. This matches the
//   reference snippet in docs/ARCHITECTURE.md "Logical canvas and viewport
//   bootstrap" and ADR-0017.
// ============================================================================

function bootstrapGame(options) {
  const opts = options || {};

  const canvas = opts.canvas || document.getElementById(opts.canvasId || 'game');
  if (!canvas || typeof canvas.getContext !== 'function') {
    throw new Error(
      "bootstrapGame: canvas element not found (looked for id '" +
      (opts.canvasId || 'game') + "'). Pass options.canvas or options.canvasId."
    );
  }

  const presets = opts.presets;
  if (!presets || !presets.regular) {
    throw new Error('bootstrapGame: options.presets.regular is required (e.g. { regular: { w: 900, h: 600 } }).');
  }

  if (typeof opts.initialScene !== 'function') {
    throw new Error('bootstrapGame: options.initialScene must be a factory function (game) => sceneInstance.');
  }

  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  function pickPreset() {
    if (!presets.compact) return { name: 'regular', preset: presets.regular };
    const va = window.innerWidth / window.innerHeight;
    const ra = presets.regular.w / presets.regular.h;
    const ca = presets.compact.w / presets.compact.h;
    const useCompact = Math.abs(Math.log(va / ca)) < Math.abs(Math.log(va / ra));
    return useCompact
      ? { name: 'compact', preset: presets.compact }
      : { name: 'regular', preset: presets.regular };
  }

  const chosen = pickPreset();
  const preset = chosen.preset;
  canvas.width = preset.w;
  canvas.height = preset.h;

  function fitToViewport() {
    const s = Math.min(window.innerWidth / preset.w, window.innerHeight / preset.h);
    canvas.style.width = (preset.w * s) + 'px';
    canvas.style.height = (preset.h * s) + 'px';
  }
  fitToViewport();
  window.addEventListener('resize', fitToViewport);

  if (opts.suppressContextMenu) {
    canvas.oncontextmenu = function (e) { e.preventDefault(); };
  }

  const game = new Engine.Game(canvas, { gameName: opts.gameName || '' });
  game.setScene(opts.initialScene(game));
  game.start();

  return { game: game, preset: preset, presetName: chosen.name, isTouch: isTouch };
}

/* ==== scripts/pause-overlay.js ==== */
// scripts/pause-overlay.js
// Reusable pause overlay utility. Not a Script subclass -- a plain class that
// any scene owns and delegates to. Lives in scripts/ as the closest available
// folder; a utils/ folder may be warranted if more non-Script utilities appear.
//
// Usage in a scene:
//   this._pause = new PauseOverlay(game, {
//     onRestart: () => game.setScene(new MatchScene(game)),  // optional
//     onQuit:    () => game.setScene(new Menu(game)),        // optional
//   });
//   In update(dt): this._pause.update(dt); if (this._pause.isPaused()) return;
//   In draw(ctx): /* game draw */ this._pause.draw(ctx); // last, on top
//
// ESC toggles pause. Row layout (rows present only if their callback is provided):
//   RESUME
//   AUDIO    (volume + mute)
//   RESTART  (only if onRestart)
//   QUIT     (only if onQuit)
//
// Controls when paused:
//   Up/Down       navigate rows
//   Left/Right    adjust volume when on AUDIO row
//   M             toggle mute when on AUDIO row
//   Space/Enter   activate selected row
//   Escape        resume
//
// Depends on: Engine.input, Engine.audio.
// Used by: SurvivorsMatchScene, HTTMatchScene, and any future game scene.

class PauseOverlay {
  constructor(game, options = {}) {
    this._game      = game;
    this._paused    = false;
    this._onRestart = options.onRestart ?? null;
    this._onQuit    = options.onQuit    ?? null;
    this._cursor    = 0;
    this._rows      = this._buildRows();
  }

  /** Build the row layout based on which callbacks were provided. Each row is
   * { kind, label }. The 'volume' row's label is regenerated at draw time. */
  _buildRows() {
    const rows = [
      { kind: 'resume', label: 'RESUME' },
      { kind: 'volume', label: '' }, // regenerated dynamically
    ];
    if (this._onRestart) rows.push({ kind: 'restart', label: 'RESTART' });
    if (this._onQuit)    rows.push({ kind: 'quit',    label: 'QUIT TO MENU' });
    return rows;
  }

  toggle() { this._paused = !this._paused; if (!this._paused) this._cursor = 0; }
  isPaused() { return this._paused; }

  update(dt) {
    if (Engine.input.wasJustPressed('Escape')) { this.toggle(); return; }
    if (!this._paused) return;

    const n = this._rows.length;
    if (Engine.input.wasJustPressed('ArrowUp'))
      this._cursor = (this._cursor - 1 + n) % n;
    if (Engine.input.wasJustPressed('ArrowDown'))
      this._cursor = (this._cursor + 1) % n;

    const row = this._rows[this._cursor];

    if (row.kind === 'volume') {
      if (Engine.input.wasJustPressed('ArrowLeft'))
        Engine.audio.setVolume(+(Math.max(0, Engine.audio.getVolume() - 0.1)).toFixed(1));
      if (Engine.input.wasJustPressed('ArrowRight'))
        Engine.audio.setVolume(+(Math.min(1, Engine.audio.getVolume() + 0.1)).toFixed(1));
      if (Engine.input.wasJustPressed('m') || Engine.input.wasJustPressed('M'))
        Engine.audio.setMuted(!Engine.audio.isMuted());
    }

    if (Engine.input.wasJustPressed('Enter') || Engine.input.wasJustPressed(' ')) {
      if (row.kind === 'resume')  { this.toggle(); }
      else if (row.kind === 'restart' && this._onRestart) { this._paused = false; this._onRestart(); }
      else if (row.kind === 'quit'    && this._onQuit)    { this._paused = false; this._onQuit(); }
    }
  }

  draw(ctx) {
    if (!this._paused) return;
    const W = ctx.canvas.width, H = ctx.canvas.height;
    ctx.save();

    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, W, H);

    // Panel height scales with row count so 4-row layouts don't crowd.
    const n  = this._rows.length;
    const pw = 420;
    const ph = 180 + n * 50;
    const px = W / 2 - pw / 2, py = H / 2 - ph / 2 - 16;
    ctx.fillStyle = '#111827'; ctx.fillRect(px, py, pw, ph);
    ctx.strokeStyle = '#374151'; ctx.lineWidth = 2; ctx.strokeRect(px, py, pw, ph);

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 40px monospace';
    ctx.fillText('PAUSED', W / 2, py + 44);

    ctx.strokeStyle = '#374151'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px + 20, py + 72); ctx.lineTo(px + pw - 20, py + 72); ctx.stroke();

    const muted = Engine.audio.isMuted();
    const vol   = Math.round(Engine.audio.getVolume() * 10);
    const volStr = muted ? 'AUDIO  [MUTED]' : 'AUDIO  [' + '|'.repeat(vol) + ' '.repeat(10 - vol) + '] ' + vol + '/10';

    for (let i = 0; i < n; i++) {
      const row = this._rows[i];
      const ry  = py + 106 + i * 50, sel = i === this._cursor;
      if (sel) { ctx.fillStyle = 'rgba(241,196,15,0.10)'; ctx.fillRect(px + 12, ry - 20, pw - 24, 40); }
      ctx.fillStyle = sel ? '#f1c40f' : '#9ca3af';
      ctx.font      = sel ? 'bold 20px monospace' : '18px monospace';
      const label = row.kind === 'volume' ? volStr : row.label;
      ctx.fillText(label, W / 2, ry);
    }

    ctx.fillStyle = '#4b5563'; ctx.font = '11px monospace';
    ctx.fillText('UP/DOWN navigate   LEFT/RIGHT volume   M mute   ESC resume', W / 2, py + ph - 16);
    ctx.restore();
  }
}

/* ==== scripts/shape-sprite.js ==== */
// scripts/shape-sprite.js
// Procedural sprite renderer. Animation states are JavaScript draw functions
// that receive a normalized time t in [0, 1] and draw into the host-local
// canvas context. The script manages timing, looping, flip, alpha, and
// optional per-animation easing.
//
// Sister to SpriteSheet (which renders raster frames); use ShapeSprite when
// sprite content is procedurally drawn, use SpriteSheet when it is a raster
// image. The two are interchangeable from the host's perspective and share
// the same lifecycle and method surface.
//
// Changes since initial implementation:
//   - play() now returns `this` for fluent chaining.
//   - onDone(fn) registers a one-shot callback invoked when a non-looping
//     animation completes. Cleared automatically on the next play() call.
//     Allows reactive state transitions without polling isDone() each frame:
//       sprite.play('dying').onDone(() => scene.remove(host));
//   - Animation definitions now accept an optional `easing` field:
//     a function (t) => t applied to the raw linear t before the draw call.
//     Accepts the same functions as Tween's easing library (Tween.easeOutElastic
//     etc.), decoupling visual timing curve from animation duration without
//     requiring per-frame easing logic inside the draw function itself.
//
// Depends on: Engine.Script.
// Used by: game scripts that want procedurally drawn animated sprites.
// See ADR-0015 for design rationale.

var Engine = Engine || {};

class ShapeSprite extends Engine.Script {
  /**
   * @param {GameObject} host
   * @param {object} options
   * @param {object} options.animations - Map of animation name to definition:
   *   {
   *     duration: number,      // seconds from t=0 to t=1. Default 1.0.
   *     loop: boolean,         // true loops, false stops at t=1. Default true.
   *     easing: function,      // optional (t) => t applied before draw.
   *                            // Same signature as Tween easing functions.
   *     draw: function(ctx, state)  // called each frame.
   *   }                        // state is { anim, t, flipX }.
   *                            // t is normalized 0..1 (after easing if set).
   *                            // draws in host-local space; (0,0) = host pos.
   * @param {string} [options.initialAnim] - Animation to start in. Defaults to
   *   the first key in options.animations.
   */
  constructor(host, options = {}) {
    super(host);
    this._animations  = options.animations || {};
    const names       = Object.keys(this._animations);
    this._currentAnim = options.initialAnim || names[0] || '';
    this._elapsed     = 0;
    this._flipX       = false;
    this._done        = false;
    this._onDone      = null;
    this.alpha        = 1.0;
  }

  /** Current animation name. */
  get currentAnim() { return this._currentAnim; }

  /**
   * Switch to a different animation. No-op if name is already current unless
   * force is true. Resets elapsed time and clears done state and any pending
   * onDone callback. Returns `this` for fluent chaining:
   *   sprite.play('dying').onDone(() => scene.remove(host));
   */
  play(name, force = false) {
    if (!force && name === this._currentAnim && !this._done) return this;
    if (!this._animations[name]) {
      console.warn(`ShapeSprite.play: unknown animation '${name}'`);
      return this;
    }
    this._currentAnim = name;
    this._elapsed     = 0;
    this._done        = false;
    this._onDone      = null;
    return this;
  }

  /**
   * Register a one-shot callback invoked when the current non-looping
   * animation completes. Cleared automatically on the next play() call,
   * preventing stale callbacks when animations are interrupted mid-way.
   * Ignored if the current animation is looping (a looping anim never fires
   * isDone and never calls this callback).
   * Returns `this` so it chains naturally from play():
   *   sprite.play('dying').onDone(() => this._state = 'dead');
   */
  onDone(fn) {
    this._onDone = fn;
    return this;
  }

  /**
   * True when a non-looping animation has finished. Stays true until play()
   * is called. Scripts may poll this or use onDone() for the callback path;
   * both are supported and may coexist (onDone fires first).
   */
  isDone() { return this._done; }

  /** Mirror horizontally around the host origin. */
  setFlipX(b) { this._flipX = !!b; }

  /** Read current flip state. */
  getFlipX() { return this._flipX; }

  update(dt) {
    if (this._done) return;
    const anim = this._animations[this._currentAnim];
    if (!anim) return;
    const duration = anim.duration > 0 ? anim.duration : 1.0;
    this._elapsed += dt;
    if (this._elapsed >= duration) {
      if (anim.loop === false) {
        this._elapsed = duration;
        this._done    = true;
        if (this._onDone) {
          // Clear before invoking to prevent re-entrancy if the callback
          // calls play() and triggers another animation.
          const cb = this._onDone;
          this._onDone = null;
          cb();
        }
      } else {
        this._elapsed = this._elapsed % duration;
      }
    }
  }

  draw(ctx) {
    const anim = this._animations[this._currentAnim];
    if (!anim || typeof anim.draw !== 'function') return;
    const duration = anim.duration > 0 ? anim.duration : 1.0;
    const rawT = Math.min(1, this._elapsed / duration);
    // Apply per-animation easing if defined. This lets the visual timing
    // curve be specified alongside the animation definition rather than
    // baked into the draw function.
    const t     = anim.easing ? anim.easing(rawT) : rawT;
    const state = { anim: this._currentAnim, t, flipX: this._flipX };

    ctx.save();
    if (this.alpha !== 1) ctx.globalAlpha *= this.alpha;
    if (this._flipX) ctx.scale(-1, 1);
    anim.draw(ctx, state);
    ctx.restore();
  }
}

Engine.ShapeSprite = ShapeSprite;

/* ==== games/clown-brawler/scripts/clown-player.js ==== */
// games/clown-brawler/scripts/clown-player.js
// Player controller for Clown Brawler. Refactored to delegate rendering to an
// internally-owned ShapeSprite (per ADR-0015) while game logic stays here.
//
// Combat contract with ClownMatchScene unchanged:
//   - scene calls script.takeHit(damage) when a gorilla attack lands
//   - scene reads script.isAttacking and script.punchHitSet to resolve player attacks
//   - punchHitSet is reset per-punch so each gorilla takes at most one hit per swing
//
// Emits unchanged:
//   brawler_player_hurt  { health, maxHealth }  on each hit
//   brawler_player_died  {}                      on death
//
// Depends on: Engine.Script, Engine.input, Engine.signals, Engine.audio, Engine.ShapeSprite
// Used by: ClownMatchScene

// --- Drawing helper (module-private) ---

function _drawClownBody(ctx, { punching }) {
  // Big shoes (red, oversized).
  ctx.fillStyle = '#e53935';
  ctx.fillRect(-26, -10, 23, 10);
  ctx.fillRect(3,   -10, 23, 10);

  // Baggy legs.
  ctx.fillStyle = '#ce93d8';
  ctx.fillRect(-16, -38, 13, 29);
  ctx.fillRect(3,   -38, 13, 29);

  // Suit body (purple).
  ctx.fillStyle = '#e040fb';
  ctx.fillRect(-19, -76, 38, 39);

  // White polka dots on suit.
  ctx.fillStyle = '#fffde7';
  const dots = [[-2, -63], [10, -53], [-11, -49], [7, -42]];
  for (const [px, py] of dots) {
    ctx.beginPath();
    ctx.arc(px, py, 4, 0, Math.PI * 2);
    ctx.fill();
  }

  if (punching) {
    // Right arm fully extended with fist.
    ctx.fillStyle = '#e040fb';
    ctx.fillRect(17, -72, 44, 12);
    ctx.fillStyle = '#ffcc80';
    ctx.beginPath(); ctx.arc(64, -66, 9, 0, Math.PI * 2); ctx.fill();
    // Left arm tucked.
    ctx.fillStyle = '#e040fb';
    ctx.fillRect(-30, -72, 13, 28);
    ctx.fillStyle = '#ffcc80';
    ctx.beginPath(); ctx.arc(-24, -44, 7, 0, Math.PI * 2); ctx.fill();
  } else {
    // Both arms at sides.
    ctx.fillStyle = '#e040fb';
    ctx.fillRect(-30, -72, 13, 30);
    ctx.fillRect(17,  -72, 13, 30);
    ctx.fillStyle = '#ffcc80';
    ctx.beginPath(); ctx.arc(-24, -42, 7, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(24,  -42, 7, 0, Math.PI * 2); ctx.fill();
  }

  // Head.
  ctx.fillStyle = '#ffcc80';
  ctx.beginPath(); ctx.arc(0, -90, 17, 0, Math.PI * 2); ctx.fill();

  // Clown hair: three tufts of yellow.
  ctx.fillStyle = '#ffeb3b';
  ctx.beginPath(); ctx.arc(-19, -101, 11, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(19,  -101, 11, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(0,   -108,  9, 0, Math.PI * 2); ctx.fill();

  // Eyes.
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-6, -92, 4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,  -92, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-6, -92, 2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(6,  -92, 2, 0, Math.PI * 2); ctx.fill();

  // Red nose.
  ctx.fillStyle = '#f44336';
  ctx.beginPath(); ctx.arc(0, -87, 6, 0, Math.PI * 2); ctx.fill();

  // Smile.
  ctx.strokeStyle = '#5d3b1e';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, -83, 10, 0.25, Math.PI - 0.25);
  ctx.stroke();
}

// --- Animation definitions ---

const CLOWN_ANIMATIONS = {
  idle: {
    duration: 1.0,
    loop: true,
    draw: (ctx) => _drawClownBody(ctx, { punching: false }),
  },
  // Total swing duration 0.45s matches ClownPlayer's attackCooldown. The
  // punching pose displays during the first 0.18/0.45 of normalized t (active
  // hit window); after that the body returns to idle pose for the recovery
  // phase, mirroring the original draw-based ternary.
  punch: {
    duration: 0.45,
    loop: false,
    draw: (ctx, state) => {
      const punching = state.t < (0.18 / 0.45);
      _drawClownBody(ctx, { punching });
    },
  },
  // Static rotated pose. The original code applied a fixed PI/2 rotation
  // (not animated over time); we preserve that exactly. Fade is driven
  // externally by ClownPlayer setting sprite.alpha based on _deathTimer.
  dying: {
    duration: 1.0,
    loop: true,
    draw: (ctx) => {
      ctx.save();
      ctx.rotate(Math.PI / 2);
      _drawClownBody(ctx, { punching: false });
      ctx.restore();
    },
  },
};

// --- Script class ---

class ClownPlayer extends Engine.Script {
  constructor(host, config = {}) {
    super(host);
    this._speed          = 180;
    this._maxHealth      = config.maxHealth || 5;
    this._health         = this._maxHealth;
    this._floorMin       = config.floorMin  || 310;
    this._floorMax       = config.floorMax  || 460;
    this._stageW         = config.stageW    || 2400;
    this._facing         = 1;
    this._attackCooldown = 0.45;
    this._attackDuration = 0.18;
    this._attackTimer    = 0;
    this._punchHitSet    = new Set();
    this._hitIframes     = 0;
    this._dead           = false;
    this._deathTimer     = 0;

    // Internally owned sprite. NOT attached to host.scripts; ClownPlayer drives
    // its lifecycle (update/draw) so we can layer effects (alpha flicker, death
    // fade) around the sprite draw call without ordering issues.
    this._sprite = new Engine.ShapeSprite(host, {
      animations:  CLOWN_ANIMATIONS,
      initialAnim: 'idle',
    });
  }

  // -- Getters used by ClownMatchScene --

  get health()    { return this._health; }
  get maxHealth() { return this._maxHealth; }
  get facing()    { return this._facing; }
  get dead()      { return this._dead; }

  // True only during the active hit window portion of the current swing.
  get isAttacking() {
    return this._attackTimer > (this._attackCooldown - this._attackDuration);
  }

  // Match scene reads this to know which enemies have already been struck this swing.
  get punchHitSet() { return this._punchHitSet; }

  // -- Called by ClownMatchScene on gorilla attack --

  takeHit(damage) {
    if (this._hitIframes > 0 || this._dead) return;
    this._health = Math.max(0, this._health - damage);
    this._hitIframes = 0.8;
    Engine.audio.play('brawler_player_hit');
    Engine.signals.emit('brawler_player_hurt', { health: this._health, maxHealth: this._maxHealth });
    if (this._health <= 0) {
      this._dead = true;
      this._sprite.play('dying');
      Engine.signals.emit('brawler_player_died', {});
    }
  }

  // -- Engine lifecycle --

  update(dt) {
    if (this._dead) {
      this._deathTimer += dt;
      this._sprite.update(dt);
      return;
    }

    if (this._hitIframes > 0) this._hitIframes -= dt;
    if (this._attackTimer > 0) this._attackTimer -= dt;

    // Movement: WASD and arrow keys, normalized diagonal.
    const inp   = Engine.input;
    const left  = inp.isDown('ArrowLeft')  || inp.isDown('a') || inp.isDown('A');
    const right = inp.isDown('ArrowRight') || inp.isDown('d') || inp.isDown('D');
    const up    = inp.isDown('ArrowUp')    || inp.isDown('w') || inp.isDown('W');
    const down  = inp.isDown('ArrowDown')  || inp.isDown('s') || inp.isDown('S');

    let dx = (right ? 1 : 0) - (left ? 1 : 0);
    let dy = (down  ? 1 : 0) - (up   ? 1 : 0);
    const mag = Math.hypot(dx, dy);
    if (mag > 0) {
      this.host.x += (dx / mag) * this._speed * dt;
      this.host.y += (dy / mag) * this._speed * dt;
      if (dx !== 0) this._facing = dx > 0 ? 1 : -1;
    }

    // Clamp to stage bounds and floor band.
    this.host.x = Math.max(40,             Math.min(this._stageW - 40, this.host.x));
    this.host.y = Math.max(this._floorMin, Math.min(this._floorMax,    this.host.y));

    // Attack input: Space, Z, or X. Only starts if cooldown is clear.
    const wantPunch = inp.wasJustPressed(' ')  || inp.wasJustPressed('z') || inp.wasJustPressed('Z')
                   || inp.wasJustPressed('x')  || inp.wasJustPressed('X');
    if (wantPunch && this._attackTimer <= 0) {
      this._attackTimer = this._attackCooldown;
      this._punchHitSet = new Set();
      Engine.audio.play('brawler_punch');
      this._sprite.play('punch');
    }

    // Return to idle once the punch's full duration elapses.
    if (this._attackTimer <= 0 && this._sprite.currentAnim !== 'idle') {
      this._sprite.play('idle');
    }

    this._sprite.setFlipX(this._facing === -1);
    this._sprite.update(dt);
  }

  draw(ctx) {
    if (this._dead) {
      this._sprite.alpha = Math.max(0, 1 - this._deathTimer * 0.8);
      this._sprite.draw(ctx);
      return;
    }
    // Flicker during i-frames.
    const flash = this._hitIframes > 0 && Math.floor(this._hitIframes * 10) % 2 === 0;
    this._sprite.alpha = flash ? 0.35 : 1.0;
    this._sprite.draw(ctx);
  }
}

/* ==== games/clown-brawler/scripts/gorilla-enemy.js ==== */
// games/clown-brawler/scripts/gorilla-enemy.js
// Gorilla enemy AI for Clown Brawler. Refactored to delegate rendering to an
// internally-owned ShapeSprite (per ADR-0015) while game logic stays here.
//
// States: 'walking' -> 'attacking' -> 'stunned' -> 'dying' -> 'dead'
// The gorilla holds a party balloon, drawn above its head while alive.
// Player reference must be set via setPlayer(playerObj) before the scene starts.
//
// Death transition uses ShapeSprite.onDone so the dying animation timer is the
// single source of truth; no separate _deathTimer needed.
//
// Emits unchanged:
//   brawler_gorilla_attack   {}                       when an attack swing lands
//   brawler_balloon_release  { x, y, color }          just before removal
//   brawler_remove           { obj }                  when death anim completes
//
// Depends on: Engine.Script, Engine.signals, Engine.audio, Engine.ShapeSprite
// Used by: ClownMatchScene

const _GORILLA_BALLOON_COLORS = ['#ff1744', '#2979ff', '#ffea00', '#69f0ae', '#ff6d00', '#e040fb'];

// --- Drawing helpers (module-private) ---

function _drawBalloon(ctx, bob, color) {
  const bx = 6, by = -80 + bob;

  // String from hand up to balloon (S-curve).
  ctx.strokeStyle = '#9e9e9e';
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.moveTo(bx, by);
  ctx.bezierCurveTo(bx + 6, by - 20, bx - 4, by - 38, bx, by - 52);
  ctx.stroke();

  // Balloon body.
  const cx = bx, cy = by - 66;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(cx, cy, 13, 16, 0, 0, Math.PI * 2);
  ctx.fill();

  // Knot.
  ctx.beginPath();
  ctx.arc(cx, cy + 16, 3, 0, Math.PI * 2);
  ctx.fill();

  // Shine.
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.ellipse(cx - 4, cy - 6, 4, 6, -0.5, 0, Math.PI * 2);
  ctx.fill();
}

function _drawGorillaBody(ctx, { bob, attacking, showBalloon, balloonColor }) {
  // Legs.
  ctx.fillStyle = '#4e342e';
  ctx.fillRect(-15, -32 + bob, 11, 32);
  ctx.fillRect(4,   -32 + bob, 11, 32);

  // Body (barrel chest).
  ctx.fillStyle = '#5d4037';
  ctx.fillRect(-22, -78 + bob, 44, 48);
  // Chest highlight.
  ctx.fillStyle = '#795548';
  ctx.fillRect(-14, -72 + bob, 28, 28);

  if (attacking) {
    // Right arm lunging forward.
    ctx.fillStyle = '#4e342e';
    ctx.fillRect(20, -76 + bob, 44, 14);
    ctx.fillStyle = '#3e2723';
    ctx.beginPath();
    ctx.arc(66, -69 + bob, 10, 0, Math.PI * 2);
    ctx.fill();
    // Left arm up for balance.
    ctx.fillStyle = '#4e342e';
    ctx.fillRect(-34, -80 + bob, 14, 24);
  } else {
    // Both arms at sides, slightly angled.
    ctx.fillStyle = '#4e342e';
    ctx.fillRect(-34, -78 + bob, 14, 36);
    ctx.fillRect(20,  -78 + bob, 14, 36);
    // Knuckles touching ground when walking (bob creates this illusion).
    ctx.fillStyle = '#3e2723';
    ctx.beginPath(); ctx.arc(-27, -42 + bob, 8, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(27,  -42 + bob, 8, 0, Math.PI * 2); ctx.fill();
  }

  // Head (large, forward-set).
  ctx.fillStyle = '#5d4037';
  ctx.beginPath();
  ctx.arc(0, -91 + bob, 22, 0, Math.PI * 2);
  ctx.fill();

  // Brow ridge.
  ctx.fillStyle = '#3e2723';
  ctx.fillRect(-18, -107 + bob, 36, 10);

  // Eyes.
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-8, -96 + bob, 6, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(8,  -96 + bob, 6, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#1a0a00';
  ctx.beginPath(); ctx.arc(-8, -96 + bob, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(8,  -96 + bob, 3, 0, Math.PI * 2); ctx.fill();

  // Nostrils.
  ctx.fillStyle = '#3e2723';
  ctx.beginPath(); ctx.arc(-5, -83 + bob, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(5,  -83 + bob, 3.5, 0, Math.PI * 2); ctx.fill();

  // Mouth / grimace.
  ctx.strokeStyle = '#3e2723';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, -78 + bob, 9, 0.3, Math.PI - 0.3, true);
  ctx.stroke();

  // Balloon (only when alive and not dying).
  if (showBalloon) {
    _drawBalloon(ctx, bob, balloonColor);
  }
}

// --- Animation factory (balloon color is per-instance) ---

function _gorillaAnimations(balloonColor) {
  return {
    // Walking duration ~1.047s gives one bob cycle per loop, matching the
    // original walkBob frequency of 6 rad/sec.
    walking: {
      duration: 2 * Math.PI / 6,
      loop: true,
      draw: (ctx, state) => {
        const bob = Math.sin(state.t * 2 * Math.PI) * 2;
        _drawGorillaBody(ctx, { bob, attacking: false, showBalloon: true, balloonColor });
      },
    },
    // Attack windup. Duration matches GorillaEnemy._attackWindupTime.
    attacking: {
      duration: 0.65,
      loop: false,
      draw: (ctx) => {
        _drawGorillaBody(ctx, { bob: 0, attacking: true, showBalloon: true, balloonColor });
      },
    },
    // Stunned holds the standing pose without bob. Duration matches the
    // stun timer (0.28s); GorillaEnemy transitions back to walking when
    // its own timer expires.
    stunned: {
      duration: 0.28,
      loop: true,
      draw: (ctx) => {
        _drawGorillaBody(ctx, { bob: 0, attacking: false, showBalloon: true, balloonColor });
      },
    },
    // Tip over animated from 0 to PI/2 over the duration. Balloon is hidden
    // since the gorilla is collapsing.
    dying: {
      duration: 0.7,
      loop: false,
      draw: (ctx, state) => {
        ctx.save();
        ctx.rotate(state.t * (Math.PI / 2));
        _drawGorillaBody(ctx, { bob: 0, attacking: false, showBalloon: false, balloonColor });
        ctx.restore();
      },
    },
  };
}

// --- Script class ---

class GorillaEnemy extends Engine.Script {
  constructor(host, config = {}) {
    super(host);
    this._maxHealth        = config.health || 3;
    this._health           = this._maxHealth;
    this._speed            = config.speed  || 72;
    this._balloonColor     = _GORILLA_BALLOON_COLORS[
      Math.floor(Math.random() * _GORILLA_BALLOON_COLORS.length)
    ];
    this._playerObj        = null;
    this._state            = 'walking';
    this._attackWindup     = 0;
    this._attackWindupTime = 0.65;
    this._attackCooldown   = 0;
    this._stunTimer        = 0;
    this._hitFlash         = 0;

    this._sprite = new Engine.ShapeSprite(host, {
      animations:  _gorillaAnimations(this._balloonColor),
      initialAnim: 'walking',
    });
  }

  get dead()    { return this._state === 'dead'; }
  get isDying() { return this._state === 'dying'; }

  setPlayer(playerObj) {
    this._playerObj = playerObj;
  }

  takeHit() {
    if (this._state === 'dying' || this._state === 'dead') return;
    this._health--;
    this._hitFlash = 0.15;
    Engine.audio.play('brawler_enemy_hit');
    if (this._health <= 0) {
      this._state = 'dying';
      this._sprite.play('dying').onDone(() => {
        Engine.signals.emit('brawler_balloon_release', {
          x:     this.host.x,
          y:     this.host.y - 120,
          color: this._balloonColor,
        });
        this._state = 'dead';
        Engine.signals.emit('brawler_remove', { obj: this.host });
      });
      Engine.audio.play('brawler_enemy_die');
    } else {
      this._state     = 'stunned';
      this._stunTimer = 0.28;
      this._sprite.play('stunned');
    }
  }

  update(dt) {
    if (this._hitFlash > 0) this._hitFlash -= dt;

    switch (this._state) {
      case 'walking':   this._updateWalking(dt);   break;
      case 'attacking': this._updateAttacking(dt); break;
      case 'stunned':
        this._stunTimer -= dt;
        if (this._stunTimer <= 0) {
          this._state = 'walking';
          this._sprite.play('walking');
        }
        break;
      case 'dying': break; // onDone callback on the sprite handles the transition
      case 'dead': break;
    }

    // Track facing toward the player. Set every frame; setFlipX is idempotent.
    if (this._playerObj) {
      const facing = this._playerObj.x > this.host.x ? 1 : -1;
      this._sprite.setFlipX(facing === -1);
    }

    // Apply hit-flash by lowering sprite alpha for the flash duration.
    this._sprite.alpha = this._hitFlash > 0 ? 0.35 : 1.0;

    this._sprite.update(dt);
  }

  _updateWalking(dt) {
    if (!this._playerObj) return;
    if (this._attackCooldown > 0) this._attackCooldown -= dt;

    const dx = this._playerObj.x - this.host.x;
    const dy = this._playerObj.y - this.host.y;

    if (Math.abs(dx) < 52 && Math.abs(dy) < 38 && this._attackCooldown <= 0) {
      this._state       = 'attacking';
      this._attackWindup = 0;
      this._sprite.play('attacking');
      return;
    }

    const dist = Math.hypot(dx, dy);
    if (dist > 4) {
      this.host.x += (dx / dist) * this._speed * dt;
      this.host.y += (dy / dist) * this._speed * dt;
    }
  }

  _updateAttacking(dt) {
    this._attackWindup += dt;
    if (this._attackWindup >= this._attackWindupTime) {
      // Attack lands. Match scene resolves damage via the signal.
      if (this._playerObj) {
        const dx = this._playerObj.x - this.host.x;
        const dy = this._playerObj.y - this.host.y;
        if (Math.abs(dx) < 65 && Math.abs(dy) < 45) {
          Engine.signals.emit('brawler_gorilla_attack', {});
        }
      }
      this._state          = 'walking';
      this._attackCooldown = 1.5;
      this._sprite.play('walking');
    }
  }

  draw(ctx) {
    if (this._state === 'dead') return;
    this._sprite.draw(ctx);
  }
}

/* ==== games/clown-brawler/scripts/floating-balloon.js ==== */
// games/clown-brawler/scripts/floating-balloon.js
// Spawned by ClownMatchScene when a gorilla dies. The balloon floats upward
// with slight lateral drift and fades out over ~2.4 seconds, then emits
// brawler_remove so the match scene can clean up the host object.
//
// Refactored to use ShapeSprite for the visual (per ADR-0015). The balloon
// has a single static animation; position is driven manually, alpha is driven
// by a Tween on the sprite so no separate fade counter is needed.
//
// Emits unchanged:
//   brawler_remove  { obj }  when alpha reaches zero
//
// Depends on: Engine.Script, Engine.signals, Engine.ShapeSprite, Tween
// Used by: ClownMatchScene

function _balloonAnimations(color) {
  return {
    drift: {
      duration: 1.0,  // unused; the visual is static, position/alpha are external
      loop: true,
      draw: (ctx) => {
        // Short trailing string.
        ctx.strokeStyle = '#9e9e9e';
        ctx.lineWidth   = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, 18);
        ctx.bezierCurveTo(4, 4, -3, -10, 0, -22);
        ctx.stroke();

        // Balloon body.
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.ellipse(0, -36, 14, 17, 0, 0, Math.PI * 2);
        ctx.fill();

        // Knot.
        ctx.beginPath();
        ctx.arc(0, -19, 3, 0, Math.PI * 2);
        ctx.fill();

        // Shine.
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.beginPath();
        ctx.ellipse(-4, -43, 4, 6, -0.5, 0, Math.PI * 2);
        ctx.fill();
      },
    },
  };
}

class FloatingBalloon extends Engine.Script {
  constructor(host, config = {}) {
    super(host);
    this._color = config.color || '#ff1744';
    this._vy    = -110;
    this._vx    = (Math.random() - 0.5) * 55;
    this._done  = false;

    this._sprite = new Engine.ShapeSprite(host, {
      animations:  _balloonAnimations(this._color),
      initialAnim: 'drift',
    });

    // Fade alpha from 1 to 0 over 2.38s (equivalent to the previous 0.42/s rate).
    this._tween = new Tween(this._sprite, { alpha: 0 }, 2.38, Tween.linear)
      .onComplete(() => {
        this._done = true;
        Engine.signals.emit('brawler_remove', { obj: this.host });
      });
  }

  update(dt) {
    if (this._done) return;
    this.host.x += this._vx * dt;
    this.host.y += this._vy * dt;
    this._tween.update(dt);
    this._sprite.update(dt);
  }

  draw(ctx) {
    if (this._done) return;
    this._sprite.draw(ctx);
  }
}

/* ==== games/clown-brawler/scenes/clown-menu.js ==== */
// games/clown-brawler/scenes/clown-menu.js
// Title screen for Clown Brawler.
// Press Enter or Space to start.
//
// Depends on: Engine.Scene, Engine.input, ClownMatchScene
// Used by: Bootstrap, ClownMatchScene (quit path)

class ClownMenuScene extends Engine.Scene {
  constructor(game) {
    super();
    this._game        = game;
    this._fadeIn      = 1.0;
    this._pendingOut  = null;
    this._fadeTimer   = 0;
    this._blinkTimer  = 0;
    this._showPrompt  = true;
    // Decorative balloon animation state.
    this._balloons    = this._makeBalloons();
  }

  _makeBalloons() {
    const colors = ['#ff1744', '#2979ff', '#ffea00', '#69f0ae', '#ff6d00', '#e040fb'];
    return Array.from({ length: 8 }, (_, i) => ({
      x:     80 + i * 90 + Math.random() * 40,
      y:     480 + Math.random() * 60,
      vy:    -(35 + Math.random() * 25),
      vx:    (Math.random() - 0.5) * 18,
      color: colors[i % colors.length],
      r:     12 + Math.random() * 5,
    }));
  }

  enter() {
    this._fadeIn     = 1.0;
    this._pendingOut = null;
    this._fadeTimer  = 0;
  }

  update(dt) {
    if (this._fadeIn > 0) this._fadeIn = Math.max(0, this._fadeIn - 2.5 * dt);

    if (this._pendingOut) {
      this._fadeTimer += dt;
      if (this._fadeTimer >= 0.35) this._game.setScene(this._pendingOut);
      return;
    }

    this._blinkTimer += dt;
    if (this._blinkTimer >= 0.55) { this._blinkTimer = 0; this._showPrompt = !this._showPrompt; }

    // Animate decorative balloons; loop them back when they exit the top.
    for (const b of this._balloons) {
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      if (b.y < -60) { b.y = 520; b.x = 40 + Math.random() * 720; }
    }

    if (Engine.input.wasJustPressed('Enter') || Engine.input.wasJustPressed(' ')) {
      this._pendingOut = new ClownMatchScene(this._game);
      this._fadeTimer  = 0;
    }
  }

  draw(ctx) {
    const W = 800, H = 500;

    // Deep purple circus background.
    ctx.fillStyle = '#12002f';
    ctx.fillRect(0, 0, W, H);

    // Tent-stripe wedges radiating from the top center.
    const stripeColors = ['#1a0040', '#200050'];
    for (let i = 0; i < 12; i++) {
      ctx.fillStyle = stripeColors[i % 2];
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      const a1 = (i / 12) * Math.PI * 2;
      const a2 = ((i + 1) / 12) * Math.PI * 2;
      ctx.arc(W / 2, 0, W, a1, a2);
      ctx.closePath();
      ctx.fill();
    }

    // Decorative floating balloons.
    for (const b of this._balloons) {
      ctx.globalAlpha = 0.6;
      ctx.fillStyle   = b.color;
      ctx.beginPath();
      ctx.ellipse(b.x, b.y, b.r, b.r * 1.2, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#888';
      ctx.lineWidth   = 1;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y + b.r * 1.2);
      ctx.lineTo(b.x + 4, b.y + b.r * 1.2 + 20);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Title: two stacked lines.
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';

    // Shadow pass.
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.font = 'bold 78px monospace';
    ctx.fillText('CLOWN',   W / 2 + 4, 152);
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillText('BRAWLER', W / 2 + 4, 242);

    // Main title.
    ctx.fillStyle = '#ffeb3b';
    ctx.font = 'bold 78px monospace';
    ctx.fillText('CLOWN',   W / 2, 148);
    ctx.fillStyle = '#ff1744';
    ctx.fillText('BRAWLER', W / 2, 238);

    // Subtitle.
    ctx.fillStyle = '#ce93d8';
    ctx.font = '20px monospace';
    ctx.fillText('vs. The Gorilla Gang', W / 2, 296);

    // Blink prompt.
    if (this._showPrompt) {
      ctx.fillStyle = '#fff';
      ctx.font = '20px monospace';
      ctx.fillText('PRESS ENTER or SPACE', W / 2, 374);
    }

    // Control reminder.
    ctx.fillStyle = '#666';
    ctx.font = '14px monospace';
    ctx.fillText('WASD / Arrows: Move   Space / Z: Punch   ESC: Pause', W / 2, 448);

    // Fade overlays.
    if (this._fadeIn > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this._fadeIn})`;
      ctx.fillRect(0, 0, W, H);
    }
    if (this._pendingOut) {
      ctx.fillStyle = `rgba(0,0,0,${Math.min(1, this._fadeTimer / 0.35)})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
}

/* ==== games/clown-brawler/scenes/clown-match.js ==== */
// games/clown-brawler/scenes/clown-match.js
// Core gameplay scene for Clown Brawler.
//
// Belt-scrolling model:
//   The stage is STAGE_W x canvas-height.  The camera follows the player on X
//   with smooth lag.  In draw(), a ctx.translate(-camX, 0) wraps super.draw()
//   so all GameObjects render at their world-space coordinates without needing
//   individual offset compensation.  HUD, overlays, and fades are drawn after
//   ctx.restore() in screen space.
//
//   Objects are Z-sorted by Y before super.draw() so characters deeper in the
//   belt (lower Y = further back) render behind characters at the front.
//
// Background parallax layers:
//   Clouds    (parallax 0.08): very slow drift, 1600px tile with seamless wrap.
//   Buildings (parallax 0.28): mid-speed, 1100px tile with window grids.
//   Floor     (parallax 1.00): vertical tile marks every 80px offset by camX,
//                               the primary horizontal-motion readability cue.
//
// Combat:
//   Player: Space/Z/X to punch.  The active hit window (isAttacking) is checked
//   each frame in _checkPlayerPunch(); each gorilla can only be hit once per swing
//   via a per-punch hit Set on the player script.
//   Gorillas: emit brawler_gorilla_attack when their windup completes and the
//   player is still in range.  This scene routes that to playerScript.takeHit(1).
//
// Wave model:
//   3 waves (4 / 6 / 8 gorillas).  When _enemies is empty a 2.5s wave-clear pause
//   runs before the next wave.  After wave 3, the game transitions to 'victory'.
//   Player health carries between waves.
//
// Signals consumed:
//   brawler_remove           { obj }           remove a world GameObject
//   brawler_balloon_release  { x, y, color }   spawn a FloatingBalloon
//   brawler_gorilla_attack   {}                 player takes 1 damage
//   brawler_player_died      {}                 trigger game-over state
//
// Depends on: Engine.Scene, Engine.GameObject, Engine.signals, Engine.input,
//   PauseOverlay, ClownPlayer, GorillaEnemy, FloatingBalloon, ClownMenuScene
// Used by: ClownMenuScene (start), PauseOverlay quit path (return)

class ClownMatchScene extends Engine.Scene {
  constructor(game) {
    super();
    this._game = game;

    // Canvas and stage dimensions.
    this.W       = 800;
    this.H       = 500;
    this.STAGE_W = 2400;
    this.FLOOR_MIN = 310;   // Y of back edge of belt (furthest from viewer)
    this.FLOOR_MAX = 455;   // Y of front edge (closest to viewer)

    // Camera.
    this._camX = 0;

    // Player.
    this._playerObj    = null;
    this._playerScript = null;

    // Enemy and balloon tracking (parallel to this.objects).
    this._enemies  = [];   // [{ obj, script }]
    this._balloons = [];   // [obj]  floating balloons

    // Wave state.
    this._wave       = 1;
    this.TOTAL_WAVES = 3;
    this._state      = 'fighting';  // 'fighting' | 'wave_clear' | 'game_over' | 'victory'
    this._waveClearTimer = 0;

    // Signal unsubscribers.
    this._unsubs = [];

    // Pause overlay.
    this._pause = null;

    // Fades.
    this._fadeIn     = 1.0;
    this._pendingOut = null;
    this._fadeTimer  = 0;
  }

  // ---- Lifecycle ----

  enter() {
    this._camX           = 0;
    this._enemies        = [];
    this._balloons       = [];
    this._wave           = 1;
    this._state          = 'fighting';
    this._waveClearTimer = 0;
    this._fadeIn         = 1.0;
    this._pendingOut     = null;
    this._fadeTimer      = 0;

    this._spawnPlayer();
    this._spawnWave(1);

    this._pause = new PauseOverlay(this._game, {
      onQuit: () => {
        this._pendingOut = new ClownMenuScene(this._game);
        this._fadeTimer  = 0;
      },
    });

    this._unsubs.push(
      Engine.signals.on('brawler_remove', ({ obj }) => {
        this.remove(obj);
        this._enemies  = this._enemies.filter(e => e.obj !== obj);
        this._balloons = this._balloons.filter(b => b  !== obj);
      }),
      Engine.signals.on('brawler_balloon_release', ({ x, y, color }) => {
        this._spawnBalloon(x, y, color);
      }),
      Engine.signals.on('brawler_gorilla_attack', () => {
        if (this._playerScript) this._playerScript.takeHit(1);
      }),
      Engine.signals.on('brawler_player_died', () => {
        this._state = 'game_over';
      }),
    );

    // Audio registrations.  Presets roll randomized parameters at register time.
    Engine.audio.register('brawler_punch',      'hitHurt');
    Engine.audio.register('brawler_player_hit', 'explosion');
    Engine.audio.register('brawler_enemy_hit',  'hitHurt');
    Engine.audio.register('brawler_enemy_die',  'explosion');
    Engine.audio.register('brawler_wave_clear', 'powerUp');
  }

  exit() {
    for (const u of this._unsubs) u();
    this._unsubs    = [];
    this.objects.length = 0;
    this._enemies   = [];
    this._balloons  = [];
  }

  // ---- Update ----

  update(dt) {
    if (this._fadeIn > 0) this._fadeIn = Math.max(0, this._fadeIn - 2.5 * dt);

    if (this._pendingOut) {
      this._fadeTimer += dt;
      if (this._fadeTimer >= 0.35) this._game.setScene(this._pendingOut);
      return;
    }

    this._pause.update(dt);
    if (this._pause.isPaused()) return;

    if (this._state === 'fighting') {
      super.update(dt);
      this._checkPlayerPunch();
      this._updateCamera(dt);

      if (this._enemies.length === 0 && this._playerScript && !this._playerScript.dead) {
        this._state          = 'wave_clear';
        this._waveClearTimer = 2.5;
        Engine.audio.play('brawler_wave_clear');
      }

    } else if (this._state === 'wave_clear') {
      // Keep balloons and any lingering effects updating.
      super.update(dt);
      this._updateCamera(dt);

      this._waveClearTimer -= dt;
      if (this._waveClearTimer <= 0) {
        this._wave++;
        if (this._wave > this.TOTAL_WAVES) {
          this._state = 'victory';
        } else {
          this._spawnWave(this._wave);
          this._state = 'fighting';
        }
      }

    } else if (this._state === 'game_over' || this._state === 'victory') {
      // Still update balloons and scene so things look alive.
      super.update(dt);
      if (Engine.input.wasJustPressed('Enter') || Engine.input.wasJustPressed(' ')) {
        this._pendingOut = new ClownMenuScene(this._game);
        this._fadeTimer  = 0;
      }
    }
  }

  // -- Combat helpers --

  _checkPlayerPunch() {
    if (!this._playerScript || !this._playerScript.isAttacking) return;
    const hitSet = this._playerScript.punchHitSet;
    const px = this._playerObj.x;
    const py = this._playerObj.y;
    const f  = this._playerScript.facing;

    for (const { obj, script } of this._enemies) {
      if (hitSet.has(obj) || script.dead || script.isDying) continue;
      // dx is signed in facing direction: positive means the enemy is "in front".
      const dx = (obj.x - px) * f;
      const dy = Math.abs(obj.y - py);
      if (dx > -20 && dx < 92 && dy < 55) {
        script.takeHit();
        hitSet.add(obj);
      }
    }
  }

  _updateCamera(dt) {
    if (!this._playerObj) return;
    const target = this._playerObj.x - this.W / 2;
    this._camX  += (target - this._camX) * Math.min(1, 5 * dt);
    this._camX   = Math.max(0, Math.min(this.STAGE_W - this.W, this._camX));
  }

  // ---- Spawning ----

  _spawnPlayer() {
    this._playerObj    = new Engine.GameObject(220, 385);
    this._playerScript = new ClownPlayer(this._playerObj, {
      maxHealth: 5,
      floorMin:  this.FLOOR_MIN,
      floorMax:  this.FLOOR_MAX,
      stageW:    this.STAGE_W,
    });
    this._playerObj.attach(this._playerScript);
    this.add(this._playerObj);
  }

  _spawnWave(waveNum) {
    const configs = this._waveConfigs(waveNum);
    for (const cfg of configs) {
      const obj    = new Engine.GameObject(cfg.x, cfg.y);
      const script = new GorillaEnemy(obj, { health: cfg.health, speed: cfg.speed });
      script.setPlayer(this._playerObj);
      obj.attach(script);
      this.add(obj);
      this._enemies.push({ obj, script });
    }
  }

  _waveConfigs(wave) {
    // Gorilla counts: 4, 6, 8.  Spread across stage X.
    const counts = [4, 6, 8];
    const count  = counts[Math.min(wave - 1, counts.length - 1)];
    const yPool  = [340, 370, 410, 440, 355, 395, 425, 445];
    const health = wave >= 3 ? 4 : 3;
    const configs = [];

    for (let i = 0; i < count; i++) {
      // Spread gorillas evenly with jitter.
      const xBase = 480 + i * (1700 / Math.max(count - 1, 1));
      configs.push({
        x:      xBase + (Math.random() - 0.5) * 100,
        y:      yPool[i % yPool.length],
        health: health,
        speed:  62 + wave * 10 + Math.random() * 18,
      });
    }
    return configs;
  }

  _spawnBalloon(x, y, color) {
    const obj    = new Engine.GameObject(x, y);
    const script = new FloatingBalloon(obj, { color });
    obj.attach(script);
    this.add(obj);
    this._balloons.push(obj);
  }

  // ---- Draw ----

  draw(ctx) {
    // 1. Background (screen space, does not scroll).
    this._drawBackground(ctx);

    // 2. World objects, translated by camera offset.
    //    Z-sort by Y so characters further back render first.
    this.objects.sort((a, b) => a.y - b.y);

    ctx.save();
    ctx.translate(-Math.round(this._camX), 0);
    super.draw(ctx);
    ctx.restore();

    // 3. HUD, overlays, fades (screen space).
    this._drawHUD(ctx);
    this._drawStateOverlay(ctx);
    this._pause.draw(ctx);

    if (this._fadeIn > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this._fadeIn})`;
      ctx.fillRect(0, 0, this.W, this.H);
    }
    if (this._pendingOut) {
      ctx.fillStyle = `rgba(0,0,0,${Math.min(1, this._fadeTimer / 0.35)})`;
      ctx.fillRect(0, 0, this.W, this.H);
    }
  }

  _drawBackground(ctx) {
    const W = this.W, H = this.H;
    const camX = this._camX;

    // --- Sky gradient (no parallax; sky is infinite) ---
    const sky = ctx.createLinearGradient(0, 0, 0, this.FLOOR_MIN);
    sky.addColorStop(0, '#5c9ec7');
    sky.addColorStop(1, '#b8dff5');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, this.FLOOR_MIN);

    // --- Cloud layer (parallax 0.08 -- very distant) ---
    // Defined in a 1600px tile so they wrap seamlessly over the 2400px stage.
    const CLOUD_TILE = 1600;
    const cloudOffset = (camX * 0.08) % CLOUD_TILE;
    const clouds = [
      { x:  80, y: 55,  r: 28 }, { x: 310, y: 40,  r: 22 },
      { x: 560, y: 70,  r: 32 }, { x: 890, y: 38,  r: 20 },
      { x:1150, y: 60,  r: 26 }, { x:1400, y: 45,  r: 24 },
    ];
    ctx.fillStyle = 'rgba(255,255,255,0.72)';
    for (const c of clouds) {
      // Draw at both tile offsets to cover any wrap position.
      for (let tile = 0; tile <= 1; tile++) {
        const cx = c.x - cloudOffset + tile * CLOUD_TILE;
        if (cx + c.r * 3 < 0 || cx - c.r * 3 > W) continue;
        // Three overlapping circles make a convincing puff.
        ctx.beginPath(); ctx.arc(cx,        c.y, c.r,        0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx + c.r,  c.y, c.r * 0.78, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx - c.r,  c.y, c.r * 0.65, 0, Math.PI*2); ctx.fill();
      }
    }

    // --- Building layer (parallax 0.28 -- mid distance) ---
    // Tiles every 1100px so buildings loop over the full stage scroll range.
    const BLDG_TILE = 1100;
    const bldgOffset = (camX * 0.28) % BLDG_TILE;
    const BLDG_COLOR_FAR  = '#3d5c73';
    const BLDG_COLOR_MID  = '#2e4a5e';
    const buildings = [
      { x:  40, w: 90,  h:100, dark:false }, { x: 185, w: 55, h:145, dark:true  },
      { x: 290, w:110,  h: 75, dark:false }, { x: 450, w: 70, h:125, dark:true  },
      { x: 570, w: 85,  h: 95, dark:false }, { x: 700, w:100, h:115, dark:true  },
      { x: 850, w: 60,  h:130, dark:false }, { x: 980, w: 80, h: 85, dark:true  },
    ];
    for (const b of buildings) {
      ctx.fillStyle = b.dark ? BLDG_COLOR_MID : BLDG_COLOR_FAR;
      for (let tile = 0; tile <= 1; tile++) {
        const bx = b.x - bldgOffset + tile * BLDG_TILE;
        if (bx + b.w < 0 || bx > W) continue;
        ctx.fillRect(bx, this.FLOOR_MIN - b.h, b.w, b.h);
        // Simple window grid on each building.
        ctx.fillStyle = 'rgba(255,240,160,0.18)';
        for (let wy = this.FLOOR_MIN - b.h + 10; wy < this.FLOOR_MIN - 12; wy += 18) {
          for (let wx = bx + 8; wx < bx + b.w - 8; wx += 16) {
            ctx.fillRect(wx, wy, 8, 10);
          }
        }
        ctx.fillStyle = b.dark ? BLDG_COLOR_MID : BLDG_COLOR_FAR;
      }
    }

    // --- Floor belt ---
    const floor = ctx.createLinearGradient(0, this.FLOOR_MIN, 0, H);
    floor.addColorStop(0, '#7c6242');
    floor.addColorStop(1, '#5c4830');
    ctx.fillStyle = floor;
    ctx.fillRect(0, this.FLOOR_MIN, W, H - this.FLOOR_MIN);

    // Horizon line.
    ctx.fillStyle = '#4a3522';
    ctx.fillRect(0, this.FLOOR_MIN - 3, W, 5);

    // --- Floor tile marks (parallax 1.0 -- fully tied to world) ---
    // Vertical marks every 80px, offset by camX so they scroll at full camera speed.
    // This is the primary horizontal-motion readability cue.
    const TILE_W = 80;
    const tileOffset = camX % TILE_W;
    ctx.strokeStyle = 'rgba(255,255,255,0.10)';
    ctx.lineWidth = 1;
    for (let kx = -tileOffset; kx < W + TILE_W; kx += TILE_W) {
      ctx.beginPath();
      ctx.moveTo(Math.round(kx), this.FLOOR_MIN);
      ctx.lineTo(Math.round(kx), H);
      ctx.stroke();
    }

    // Horizontal lane lines (static depth cue).
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    for (let ly = this.FLOOR_MIN + 40; ly < H; ly += 55) {
      ctx.beginPath();
      ctx.moveTo(0, ly);
      ctx.lineTo(W, ly);
      ctx.stroke();
    }
  }

  _drawHUD(ctx) {
    const W = this.W, H = this.H;
    ctx.save();

    // Top bar.
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, 30);

    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle    = '#ddd';
    ctx.font         = '14px monospace';

    const waveLabel = this._state === 'wave_clear'
      ? 'WAVE ' + this._wave + ' CLEAR!'
      : 'WAVE ' + this._wave + ' / ' + this.TOTAL_WAVES
        + '   ENEMIES: ' + this._enemies.length;
    ctx.fillText(waveLabel, W / 2, 15);

    ctx.textAlign = 'right';
    ctx.fillStyle = '#555';
    ctx.font      = '11px monospace';
    ctx.fillText('ESC: pause', W - 6, 22);

    // Player health bar at the bottom.
    if (this._playerScript) {
      const bw    = 200, bh = 14;
      const bx    = W / 2 - bw / 2, by = H - 22;
      const ratio = Math.max(0, this._playerScript.health / this._playerScript.maxHealth);

      ctx.fillStyle = '#222';
      ctx.fillRect(bx, by, bw, bh);

      ctx.fillStyle = ratio > 0.5 ? '#4caf50' : ratio > 0.25 ? '#ff9800' : '#f44336';
      ctx.fillRect(bx, by, bw * ratio, bh);

      ctx.fillStyle    = '#888';
      ctx.font         = '10px monospace';
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(
        this._playerScript.health + ' / ' + this._playerScript.maxHealth,
        W / 2, by + bh / 2,
      );

      // HP label.
      ctx.fillStyle    = '#aaa';
      ctx.textAlign    = 'right';
      ctx.font         = '11px monospace';
      ctx.textBaseline = 'middle';
      ctx.fillText('HP', bx - 4, by + bh / 2);
    }

    ctx.restore();
  }

  _drawStateOverlay(ctx) {
    const W = this.W, H = this.H;

    if (this._state === 'wave_clear') {
      // Brief "WAVE CLEAR" banner.
      ctx.save();
      const alpha = Math.min(1, this._waveClearTimer > 1.5
        ? (2.5 - this._waveClearTimer) / 1.0      // fade in
        : this._waveClearTimer / 1.0);             // fade out near end
      ctx.globalAlpha = alpha;
      ctx.fillStyle   = 'rgba(0,0,0,0.55)';
      ctx.fillRect(0, H / 2 - 55, W, 110);
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = '#ffeb3b';
      ctx.font         = 'bold 52px monospace';
      ctx.fillText('WAVE ' + this._wave + ' CLEAR!', W / 2, H / 2 - 14);
      if (this._wave < this.TOTAL_WAVES) {
        ctx.fillStyle = '#ccc';
        ctx.font      = '20px monospace';
        ctx.fillText('Wave ' + (this._wave + 1) + ' incoming...', W / 2, H / 2 + 28);
      }
      ctx.restore();
    }

    if (this._state === 'game_over') {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.72)';
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = '#f44336';
      ctx.font         = 'bold 64px monospace';
      ctx.fillText('GAME OVER', W / 2, H / 2 - 40);
      ctx.fillStyle = '#aaa';
      ctx.font      = '20px monospace';
      ctx.fillText('Wave ' + this._wave + ' of ' + this.TOTAL_WAVES, W / 2, H / 2 + 14);
      ctx.fillStyle = '#666';
      ctx.font      = '16px monospace';
      ctx.fillText('ENTER or SPACE to return to menu', W / 2, H / 2 + 52);
      ctx.restore();
    }

    if (this._state === 'victory') {
      ctx.save();
      ctx.fillStyle = 'rgba(0,0,0,0.65)';
      ctx.fillRect(0, 0, W, H);
      ctx.textAlign    = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle    = '#ffeb3b';
      ctx.font         = 'bold 64px monospace';
      ctx.fillText('VICTORY!', W / 2, H / 2 - 50);
      ctx.fillStyle = '#ce93d8';
      ctx.font      = '22px monospace';
      ctx.fillText('The gorillas are defeated!', W / 2, H / 2 + 10);
      ctx.fillStyle = '#aaa';
      ctx.font      = '18px monospace';
      ctx.fillText('The balloons float free.', W / 2, H / 2 + 44);
      ctx.fillStyle = '#666';
      ctx.font      = '16px monospace';
      ctx.fillText('ENTER or SPACE to return to menu', W / 2, H / 2 + 82);
      ctx.restore();
    }
  }
}

bootstrapGame({ canvasId: 'game', gameName: 'clown-brawler', presets: { regular: { w: 800, h: 500 } }, initialScene: (g) => new ClownMenuScene(g), suppressContextMenu: false });
</script>
