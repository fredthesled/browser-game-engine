/* scripts/pause-overlay.js */
class PauseOverlay {
  constructor(game, options = {}) {
    this._game      = game;
    this._paused    = false;
    this._onRestart = options.onRestart ?? null;
    this._onQuit    = options.onQuit    ?? null;
    this._cursor    = 0;
    this._rows      = this._buildRows();
  }
  _buildRows() {
    const rows = [
      { kind: 'resume', label: 'RESUME' },
      { kind: 'volume', label: '' },
    ];
    if (this._onRestart) rows.push({ kind: 'restart', label: 'RESTART' });
    if (this._onQuit)    rows.push({ kind: 'quit',    label: 'QUIT TO MENU' });
    return rows;
  }
  toggle() { this._paused = !this._paused; if (!this._paused) this._cursor = 0; }
  isPaused() { return this._paused; }
  update(dt) {
    if (Engine.input.wasJustPressed('Escape')) { this.toggle(); return; }
    if (!this._paused) return;
    const n = this._rows.length;
    if (Engine.input.wasJustPressed('ArrowUp'))   this._cursor = (this._cursor - 1 + n) % n;
    if (Engine.input.wasJustPressed('ArrowDown')) this._cursor = (this._cursor + 1) % n;
    const row = this._rows[this._cursor];
    if (row.kind === 'volume') {
      if (Engine.input.wasJustPressed('ArrowLeft'))  Engine.audio.setVolume(+(Math.max(0, Engine.audio.getVolume() - 0.1)).toFixed(1));
      if (Engine.input.wasJustPressed('ArrowRight')) Engine.audio.setVolume(+(Math.min(1, Engine.audio.getVolume() + 0.1)).toFixed(1));
      if (Engine.input.wasJustPressed('m') || Engine.input.wasJustPressed('M')) Engine.audio.setMuted(!Engine.audio.isMuted());
    }
    if (Engine.input.wasJustPressed('Enter') || Engine.input.wasJustPressed(' ')) {
      if (row.kind === 'resume')  { this.toggle(); }
      else if (row.kind === 'restart' && this._onRestart) { this._paused = false; this._onRestart(); }
      else if (row.kind === 'quit'    && this._onQuit)    { this._paused = false; this._onQuit(); }
    }
  }
  draw(ctx) {
    if (!this._paused) return;
    const W = ctx.canvas.width, H = ctx.canvas.height;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, W, H);
    const n  = this._rows.length;
    const pw = 420;
    const ph = 180 + n * 50;
    const px = W / 2 - pw / 2, py = H / 2 - ph / 2 - 16;
    ctx.fillStyle = '#111827'; ctx.fillRect(px, py, pw, ph);
    ctx.strokeStyle = '#374151'; ctx.lineWidth = 2; ctx.strokeRect(px, py, pw, ph);
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 40px monospace';
    ctx.fillText('PAUSED', W / 2, py + 44);
    ctx.strokeStyle = '#374151'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px + 20, py + 72); ctx.lineTo(px + pw - 20, py + 72); ctx.stroke();
    const muted = Engine.audio.isMuted();
    const vol   = Math.round(Engine.audio.getVolume() * 10);
    const volStr = muted ? 'AUDIO  [MUTED]' : 'AUDIO  [' + '|'.repeat(vol) + ' '.repeat(10 - vol) + '] ' + vol + '/10';
    for (let i = 0; i < n; i++) {
      const row = this._rows[i];
      const ry  = py + 106 + i * 50, sel = i === this._cursor;
      if (sel) { ctx.fillStyle = 'rgba(241,196,15,0.10)'; ctx.fillRect(px + 12, ry - 20, pw - 24, 40); }
      ctx.fillStyle = sel ? '#f1c40f' : '#9ca3af';
      ctx.font      = sel ? 'bold 20px monospace' : '18px monospace';
      const label = row.kind === 'volume' ? volStr : row.label;
      ctx.fillText(label, W / 2, ry);
    }
    ctx.fillStyle = '#4b5563'; ctx.font = '11px monospace';
    ctx.fillText('UP/DOWN navigate   LEFT/RIGHT volume   M mute   ESC resume', W / 2, py + ph - 16);
    ctx.restore();
  }
}

/* games/horses-teach-typing/scripts/rhythm-letter.js */
class RhythmLetter extends Engine.Script {
  constructor(host, options = {}) {
    super(host);
    this.letter     = (options.letter || 'a').toLowerCase();
    this.spawnTime  = options.spawnTime  ?? 0;
    this.targetTime = options.targetTime ?? 0;
    this.spawnX     = options.spawnX     ?? 780;
    this.hitZoneX   = options.hitZoneX   ?? 240;
    this._scene     = options.scene      ?? null;
    this.state      = 'alive';
    this.judgement  = null;
    this._feedbackT = 0;
    this._feedbackDuration = 0.5;
    this._signalled = false;
  }
  positionAt(now) {
    const lead = this.targetTime - this.spawnTime;
    if (lead <= 0) return this.hitZoneX;
    const progress = (now - this.spawnTime) / lead;
    return this.spawnX + (this.hitZoneX - this.spawnX) * progress;
  }
  judge(j) {
    if (this.state !== 'alive') return;
    this.state = 'judged';
    this.judgement = j;
    this._feedbackT = 0;
  }
  update(dt) {
    if (this.state === 'alive') {
      const now = this._scene ? this._scene.conductorTime : 0;
      this.host.x = this.positionAt(now);
    } else if (this.state === 'judged') {
      this._feedbackT += dt;
      this.host.y -= 40 * dt;
      if (this._feedbackT >= this._feedbackDuration) {
        this.state = 'dead';
        if (!this._signalled) {
          this._signalled = true;
          Engine.signals.emit('htt_letter_dead', { obj: this.host });
        }
      }
    }
  }
  draw(ctx) {
    if (this.state === 'dead') return;
    ctx.save();
    if (this.state === 'judged') {
      const a = 1 - (this._feedbackT / this._feedbackDuration);
      ctx.globalAlpha = Math.max(0, a);
      let label;
      if      (this.judgement === 'perfect') label = 'PERFECT';
      else if (this.judgement === 'great')   label = 'GREAT';
      else if (this.judgement === 'good')    label = 'GOOD';
      else                                   label = 'MISS';
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, 0, 0);
    } else {
      const size = 30;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.strokeRect(-size / 2, -size / 2, size, size);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 26px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(this.letter.toUpperCase(), 0, 2);
    }
    ctx.restore();
  }
}

/* games/horses-teach-typing/scenes/htt-menu.js */
class HTTMenuScene extends Engine.Scene {
  constructor(game) {
    super();
    this._game = game;
    this._t = 0;
    this._fadeIn = 1.0;
    this._pendingOut = null;
    this._fadeOutTimer = 0;
    this._demoT = 0;
  }
  enter() {
    this._t = 0;
    this._fadeIn = 1.0;
    this._pendingOut = null;
    this._fadeOutTimer = 0;
    this._demoT = 0;
  }
  exit() {}
  update(dt) {
    this._t += dt;
    this._demoT += dt;
    if (this._pendingOut) {
      this._fadeOutTimer += dt;
      if (this._fadeOutTimer >= 0.35) this._game.setScene(this._pendingOut);
      return;
    }
    if (this._fadeIn > 0) this._fadeIn = Math.max(0, this._fadeIn - dt * 2.5);
    if (Engine.input.wasJustPressed(' ') || Engine.input.wasJustPressed('Enter')) {
      this._pendingOut = new HTTMatchScene(this._game);
    }
  }
  draw(ctx) {
    const W = ctx.canvas.width, H = ctx.canvas.height;
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);
    this._drawMountains(ctx, W);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, H - 90);
    ctx.lineTo(W, H - 90);
    ctx.stroke();
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 40px monospace';
    ctx.fillText('HORSES TEACH TYPING', W / 2, 70);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W / 2 - 240, 96);
    ctx.lineTo(W / 2 + 240, 96);
    ctx.stroke();
    ctx.restore();
    this._drawHorse(ctx, 150, H - 90, this._t);
    this._drawDemo(ctx, W, H);
    this._drawSpaceBar(ctx, W, H);
    if (this._fadeIn > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this._fadeIn})`;
      ctx.fillRect(0, 0, W, H);
    }
    if (this._pendingOut) {
      const a = Math.min(1, this._fadeOutTimer / 0.35);
      ctx.fillStyle = `rgba(0,0,0,${a})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
  _drawMountains(ctx, W) {
    ctx.save();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const peaks = [
      [0, 200], [60, 170], [120, 195], [180, 145], [240, 180], [320, 155],
      [400, 190], [480, 140], [560, 175], [640, 160], [720, 195], [800, 175],
    ];
    ctx.moveTo(peaks[0][0], peaks[0][1]);
    for (let i = 1; i < peaks.length; i++) ctx.lineTo(peaks[i][0], peaks[i][1]);
    ctx.stroke();
    ctx.restore();
  }
  _drawHorse(ctx, cx, groundY, t) {
    ctx.save();
    ctx.translate(cx, groundY);
    const bob = Math.sin(t * 1.8) * 1.5;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(0, -40 + bob * 0.3, 42, 22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(28, -50 + bob * 0.3);
    ctx.lineTo(48, -72 + bob);
    ctx.lineTo(56, -65 + bob);
    ctx.lineTo(34, -42 + bob * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(56, -78 + bob, 14, 9, -0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(50, -88 + bob);
    ctx.lineTo(54, -96 + bob);
    ctx.lineTo(58, -86 + bob);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(46, -71 + bob);
    ctx.lineTo(40, -78 + bob);
    ctx.lineTo(34, -68 + bob);
    ctx.lineTo(28, -75 + bob);
    ctx.lineTo(22, -62 + bob);
    ctx.lineTo(28, -56 + bob * 0.6);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-38, -42);
    ctx.lineTo(-58, -36);
    ctx.lineTo(-56, -22);
    ctx.lineTo(-40, -32);
    ctx.closePath();
    ctx.fill();
    ctx.fillRect(-30, -22, 6, 22);
    ctx.fillRect(-14, -22, 6, 22);
    ctx.fillRect(10,  -22, 6, 22);
    ctx.fillRect(26,  -22, 6, 22);
    ctx.fillStyle = '#000000';
    ctx.beginPath();
    ctx.arc(60, -79 + bob, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  _drawDemo(ctx, W, H) {
    ctx.save();
    const cy = H / 2 + 10;
    const hitX = W / 2 - 110;
    const period = 2.4;
    const tphase = (this._demoT % period) / period;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    const bracketSize = 22;
    ctx.beginPath();
    ctx.moveTo(hitX - 18, cy - bracketSize);
    ctx.lineTo(hitX - 26, cy - bracketSize);
    ctx.lineTo(hitX - 26, cy + bracketSize);
    ctx.lineTo(hitX - 18, cy + bracketSize);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(hitX + 18, cy - bracketSize);
    ctx.lineTo(hitX + 26, cy - bracketSize);
    ctx.lineTo(hitX + 26, cy + bracketSize);
    ctx.lineTo(hitX + 18, cy + bracketSize);
    ctx.stroke();
    const letters = ['A', 'S', 'D'];
    const spawnX = W / 2 + 180;
    const range  = spawnX - hitX + 90;
    for (let i = 0; i < 3; i++) {
      const p = ((tphase + i * 0.33) % 1);
      const x = spawnX - p * range;
      ctx.save();
      ctx.translate(x, cy);
      const size = 28;
      const inHit = Math.abs(x - hitX) < 4;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = inHit ? 3 : 2;
      ctx.strokeRect(-size / 2, -size / 2, size, size);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(letters[i], 0, 2);
      ctx.restore();
    }
    ctx.restore();
  }
  _drawSpaceBar(ctx, W, H) {
    ctx.save();
    const cx = W / 2;
    const cy = H - 50;
    const bw = 240, bh = 32;
    const blink = (Math.floor(this._t * 2) % 2) === 0;
    ctx.strokeStyle = blink ? '#ffffff' : '#666666';
    ctx.lineWidth = 2;
    ctx.strokeRect(cx - bw / 2, cy - bh / 2, bw, bh);
    ctx.fillStyle = blink ? '#ffffff' : '#666666';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('SPACE', cx, cy + 1);
    ctx.restore();
  }
}

/* games/horses-teach-typing/scenes/htt-match.js */
class HTTMatchScene extends Engine.Scene {
  constructor(game, options = {}) {
    super();
    this._game = game;
    this._bpm           = options.bpm ?? 90;
    this._beatInterval  = 60 / this._bpm;
    this._leadTime      = 2.0;
    this._beatsPerLetter = 1;
    this._spawnX   = 780;
    this._hitZoneX = 240;
    this._laneY    = 250;
    this.conductorTime = 0;
    this._nextSpawnBeat = 0;
    this._score      = 0;
    this._combo      = 0;
    this._bestCombo  = 0;
    this._totalHits  = 0;
    this._totalNotes = 0;
    this._lastJudgement  = null;
    this._lastJudgementT = 0;
    this._windows = { perfect: 0.060, great: 0.120, good: 0.180 };
    this._pause = null;
    this._unsubs = [];
    this._fadeIn = 1.0;
    this._pendingOut = null;
    this._fadeOutTimer = 0;
    this._alphabet = 'abcdefghijklmnopqrstuvwxyz';
  }
  enter() {
    this.conductorTime  = 0;
    this._nextSpawnBeat = 0;
    this._score         = 0;
    this._combo         = 0;
    this._bestCombo     = 0;
    this._totalHits     = 0;
    this._totalNotes    = 0;
    this._lastJudgement = null;
    this._fadeIn        = 1.0;
    this._pendingOut    = null;
    this._fadeOutTimer  = 0;
    Engine.audio.register('htt-perfect', 'laserShoot');
    Engine.audio.register('htt-good',    'pickupCoin');
    Engine.audio.register('htt-miss',    'hitHurt');
    this._pause = new PauseOverlay(this._game, {
      onRestart: () => { this._pendingOut = new HTTMatchScene(this._game); this._fadeOutTimer = 0; },
      onQuit:    () => { this._pendingOut = new HTTMenuScene(this._game);  this._fadeOutTimer = 0; },
    });
    this._unsubs.push(
      Engine.signals.on('htt_letter_dead', ({ obj }) => { this.remove(obj); }),
    );
  }
  exit() {
    for (const u of this._unsubs) u();
    this._unsubs = [];
    this.objects.length = 0;
  }
  update(dt) {
    if (this._fadeIn > 0) this._fadeIn = Math.max(0, this._fadeIn - dt * 2.5);
    if (this._pendingOut) {
      this._fadeOutTimer += dt;
      if (this._fadeOutTimer >= 0.35) this._game.setScene(this._pendingOut);
      return;
    }
    this._pause.update(dt);
    if (this._pause.isPaused()) return;
    this.conductorTime += dt;
    while (true) {
      const targetTime = this._nextSpawnBeat * this._beatInterval * this._beatsPerLetter + this._leadTime;
      if (this.conductorTime + this._leadTime >= targetTime) {
        this._spawnLetter(targetTime);
        this._nextSpawnBeat++;
      } else break;
    }
    super.update(dt);
    this._handleInput();
    this._autoMissCheck();
    if (this._lastJudgement) {
      this._lastJudgementT += dt;
      if (this._lastJudgementT > 0.6) this._lastJudgement = null;
    }
  }
  _spawnLetter(targetTime) {
    const idx = Math.floor(Math.random() * this._alphabet.length);
    const ch  = this._alphabet.charAt(idx);
    const spawnTime = targetTime - this._leadTime;
    const obj = new Engine.GameObject(this._spawnX, this._laneY);
    obj.attach(new RhythmLetter(obj, {
      letter: ch, spawnTime, targetTime,
      spawnX: this._spawnX, hitZoneX: this._hitZoneX, scene: this,
    }));
    this.add(obj);
    this._totalNotes++;
  }
  _handleInput() {
    for (const ch of this._alphabet) {
      if (!Engine.input.wasJustPressed(ch)) continue;
      this._attemptHit(ch);
    }
  }
  _attemptHit(ch) {
    let best = null;
    let bestDiff = Infinity;
    for (const obj of this.objects) {
      for (const s of obj.scripts) {
        if (s instanceof RhythmLetter && s.state === 'alive' && s.letter === ch) {
          const diff = Math.abs(this.conductorTime - s.targetTime);
          if (diff < bestDiff) { bestDiff = diff; best = s; }
        }
      }
    }
    if (!best) return;
    let judgement;
    if      (bestDiff <= this._windows.perfect) judgement = 'perfect';
    else if (bestDiff <= this._windows.great)   judgement = 'great';
    else if (bestDiff <= this._windows.good)    judgement = 'good';
    else return;
    best.judge(judgement);
    this._onJudgement(judgement);
  }
  _autoMissCheck() {
    const cutoff = this._windows.good + 0.05;
    for (const obj of this.objects) {
      for (const s of obj.scripts) {
        if (s instanceof RhythmLetter && s.state === 'alive') {
          if (this.conductorTime > s.targetTime + cutoff) {
            s.judge('miss');
            this._onJudgement('miss');
          }
        }
      }
    }
  }
  _onJudgement(j) {
    const points = { perfect: 300, great: 200, good: 100, miss: 0 };
    this._score += points[j];
    if (j === 'miss') {
      this._combo = 0;
      Engine.audio.play('htt-miss');
    } else {
      this._combo++;
      this._bestCombo = Math.max(this._bestCombo, this._combo);
      this._totalHits++;
      Engine.audio.play(j === 'perfect' ? 'htt-perfect' : 'htt-good');
    }
    this._lastJudgement  = j;
    this._lastJudgementT = 0;
  }
  draw(ctx) {
    const W = ctx.canvas.width, H = ctx.canvas.height;
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);
    this._drawMountains(ctx, W);
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, H - 90);
    ctx.lineTo(W, H - 90);
    ctx.stroke();
    this._drawHitZone(ctx);
    super.draw(ctx);
    this._drawHorse(ctx, 150, H - 90, this.conductorTime);
    this._drawHUD(ctx, W, H);
    this._pause.draw(ctx);
    if (this._fadeIn > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this._fadeIn})`;
      ctx.fillRect(0, 0, W, H);
    }
    if (this._pendingOut) {
      const a = Math.min(1, this._fadeOutTimer / 0.35);
      ctx.fillStyle = `rgba(0,0,0,${a})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
  _drawMountains(ctx, W) {
    ctx.save();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const peaks = [
      [0, 200], [60, 170], [120, 195], [180, 145], [240, 180], [320, 155],
      [400, 190], [480, 140], [560, 175], [640, 160], [720, 195], [800, 175],
    ];
    ctx.moveTo(peaks[0][0], peaks[0][1]);
    for (let i = 1; i < peaks.length; i++) ctx.lineTo(peaks[i][0], peaks[i][1]);
    ctx.stroke();
    ctx.restore();
  }
  _drawHitZone(ctx) {
    ctx.save();
    const x = this._hitZoneX;
    const cy = this._laneY;
    const half = 26;
    const beatPhase = (this.conductorTime % this._beatInterval) / this._beatInterval;
    const pulse = Math.max(0, 1 - beatPhase * 1.8);
    const alpha = 0.55 + 0.45 * pulse;
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x - 18, cy - half);
    ctx.lineTo(x - 26, cy - half);
    ctx.lineTo(x - 26, cy + half);
    ctx.lineTo(x - 18, cy + half);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x + 18, cy - half);
    ctx.lineTo(x + 26, cy - half);
    ctx.lineTo(x + 26, cy + half);
    ctx.lineTo(x + 18, cy + half);
    ctx.stroke();
    ctx.restore();
  }
  _drawHorse(ctx, cx, groundY, t) {
    ctx.save();
    ctx.translate(cx, groundY);
    const bob = Math.sin(t * 1.8) * 1.5;
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.ellipse(0, -40 + bob * 0.3, 42, 22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(28, -50 + bob * 0.3);
    ctx.lineTo(48, -72 + bob);
    ctx.lineTo(56, -65 + bob);
    ctx.lineTo(34, -42 + bob * 0.3);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(56, -78 + bob, 14, 9, -0.25, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(50, -88 + bob);
    ctx.lineTo(54, -96 + bob);
    ctx.lineTo(58, -86 + bob);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(46, -71 + bob);
    ctx.lineTo(40, -78 + bob);
    ctx.lineTo(34, -68 + bob);
    ctx.lineTo(28, -75 + bob);
    ctx.lineTo(22, -62 + bob);
    ctx.lineTo(28, -56 + bob * 0.6);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-38, -42);
    ctx.lineTo(-58, -36);
    ctx.lineTo(-56, -22);
    ctx.lineTo(-40, -32);
    ctx.closePath();
    ctx.fill();
    ctx.fillRect(-30, -22, 6, 22);
    ctx.fillRect(-14, -22, 6, 22);
    ctx.fillRect(10,  -22, 6, 22);
    ctx.fillRect(26,  -22, 6, 22);
    ctx.fillStyle = '#000000';
    ctx.beginPath();
    ctx.arc(60, -79 + bob, 1.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  _drawHUD(ctx, W, H) {
    ctx.save();
    ctx.textBaseline = 'top';
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(0, 0, W, 28);
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SCORE  ' + String(this._score).padStart(6, '0'), 12, 8);
    const comboStr = this._combo > 0 ? 'COMBO  x' + this._combo : 'COMBO  --';
    ctx.textAlign = 'right';
    ctx.fillText(comboStr, W - 12, 8);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#888888';
    ctx.font = '12px monospace';
    ctx.fillText(this._bpm + ' BPM', W / 2, 9);
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = '#888888';
    ctx.font = '11px monospace';
    ctx.fillText('ESC: pause', W - 6, H - 4);
    if (this._lastJudgement) {
      const alpha = Math.max(0, 1 - this._lastJudgementT / 0.6);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 22px monospace';
      let label;
      if      (this._lastJudgement === 'perfect') label = 'PERFECT';
      else if (this._lastJudgement === 'great')   label = 'GREAT';
      else if (this._lastJudgement === 'good')    label = 'GOOD';
      else                                        label = 'MISS';
      ctx.fillText(label, this._hitZoneX, this._laneY - 60);
      ctx.restore();
    }
    ctx.restore();
  }
}

/* Bootstrap */
(function(){
  const canvas = document.getElementById('game');
  const game = new Engine.Game(canvas, { gameName: 'horses-teach-typing' });
  game.setScene(new HTTMenuScene(game));
  game.start();
}());
</script>
