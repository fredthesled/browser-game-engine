Params.prototype.random = function () {

/*** Simpler namespaced functional API ***/

};

sfxr.toWebAudio = function(synthdef, audiocontext) {
  var sfx = new SoundEffect(synthdef);
  var buffer = sfx.getRawBuffer()["normalized"];
  if (audiocontext) {
    var buff = audiocontext.createBuffer(1, buffer.length, sfx.sampleRate);
    var nowBuffering = buff.getChannelData(0);
    for (var i = 0; i < buffer.length; i++) {
      nowBuffering[i] = buffer[i];
    }
    var proc = audiocontext.createBufferSource();
    proc.buffer = buff;
    return proc;
  }

  return (new SoundEffect(synthdef)).generate();
};

    } else {
      var val = (decoded[offset] | (decoded[offset + 1] << 8) | (decoded[offset + 2] << 16) | (decoded[offset + 3] << 24));

sfxr.generate = function(algorithm, options) {

/*** Main entry point ***/

function SoundEffect(ps) {
  if (typeof(ps) == "string") {
    var PARAMS = new Params();
    if (ps.indexOf("#") == 0) {
      ps = ps.slice(1);
    }
    ps = PARAMS.fromB58(ps);
  }
  this.init(ps);
}

SoundEffect.prototype.init = function (ps) {
  this.parameters = ps;
  this.initForRepeat();  // First time through, this is a bit of a misnomer

  // Waveform shape
  this.waveShape = parseInt(ps.wave_type);

  // Filter
  this.fltw = Math.pow(ps.p_lpf_freq, 3) * 0.1;
  this.enableLowPassFilter = (ps.p_lpf_freq != 1);
  this.fltw_d = 1 + ps.p_lpf_ramp * 0.0001;
  this.fltdmp = 5 / (1 + Math.pow(ps.p_lpf_resonance, 2) * 20) *
    (0.01 + this.fltw);
  if (this.fltdmp > 0.8) this.fltdmp=0.8;
  this.flthp = Math.pow(ps.p_hpf_freq, 2) * 0.1;
  this.flthp_d = 1 + ps.p_hpf_ramp * 0.0003;

  // Vibrato
  this.vibratoSpeed = Math.pow(ps.p_vib_speed, 2) * 0.01;
  this.vibratoAmplitude = ps.p_vib_strength * 0.5;

  // Envelope
  this.envelopeLength = [
    Math.floor(ps.p_env_attack * ps.p_env_attack * 100000),
    Math.floor(ps.p_env_sustain * ps.p_env_sustain * 100000),
    Math.floor(ps.p_env_decay * ps.p_env_decay * 100000)
  ];
  this.envelopePunch = ps.p_env_punch;

  // Flanger
  this.flangerOffset = Math.pow(ps.p_pha_offset, 2) * 1020;
  if (ps.p_pha_offset < 0) this.flangerOffset = -this.flangerOffset;
  this.flangerOffsetSlide = Math.pow(ps.p_pha_ramp, 2) * 1;
  if (ps.p_pha_ramp < 0) this.flangerOffsetSlide = -this.flangerOffsetSlide;

  // Repeat
  this.repeatTime = Math.floor(Math.pow(1 - ps.p_repeat_speed, 2) * 20000
                               + 32);
  if (ps.p_repeat_speed === 0)
    this.repeatTime = 0;

  this.gain = Math.exp(ps.sound_vol) - 1;

  this.sampleRate = ps.sample_rate;
  this.bitsPerChannel = ps.sample_size;
}

SoundEffect.prototype.initForRepeat = function() {
  var ps = this.parameters;
  this.elapsedSinceRepeat = 0;

  this.period = 100 / (ps.p_base_freq * ps.p_base_freq + 0.001);
  this.periodMax = 100 / (ps.p_freq_limit * ps.p_freq_limit + 0.001);
  this.enableFrequencyCutoff = (ps.p_freq_limit > 0);
  this.periodMult = 1 - Math.pow(ps.p_freq_ramp, 3) * 0.01;
  this.periodMultSlide = -Math.pow(ps.p_freq_dramp, 3) * 0.000001;

  this.dutyCycle = 0.5 - ps.p_duty * 0.5;
  this.dutyCycleSlide = -ps.p_duty_ramp * 0.00005;

  if (ps.p_arp_mod >= 0)
    this.arpeggioMultiplier = 1 - Math.pow(ps.p_arp_mod, 2) * .9;
  else
    this.arpeggioMultiplier = 1 + Math.pow(ps.p_arp_mod, 2) * 10;
  this.arpeggioTime = Math.floor(Math.pow(1 - ps.p_arp_speed, 2) * 20000 + 32);
  if (ps.p_arp_speed === 1)
    this.arpeggioTime = 0;
}

SoundEffect.prototype.getRawBuffer = function () {
  var fltp = 0;
  var fltdp = 0;
  var fltphp = 0;

  var noise_buffer = Array(32);
  for (var i = 0; i < 32; ++i)
    noise_buffer[i] = Math.random() * 2 - 1;

  var envelopeStage = 0;
  var envelopeElapsed = 0;

  var vibratoPhase = 0;

  var phase = 0;
  var ipp = 0;
  var flanger_buffer = Array(1024);
  for (var i = 0; i < 1024; ++i)
    flanger_buffer[i] = 0;

  var num_clipped = 0;

  var buffer = [];
  var normalized = [];

  var sample_sum = 0;
  var num_summed = 0;
  var summands = Math.floor(44100 / this.sampleRate);

  for(var t = 0; ; ++t) {

    // Repeats
    if (this.repeatTime != 0 && ++this.elapsedSinceRepeat >= this.repeatTime)
      this.initForRepeat();

    // Arpeggio (single)
    if(this.arpeggioTime != 0 && t >= this.arpeggioTime) {
      this.arpeggioTime = 0;
      this.period *= this.arpeggioMultiplier;
    }

    // Frequency slide, and frequency slide slide!
    this.periodMult += this.periodMultSlide;
    this.period *= this.periodMult;
    if(this.period > this.periodMax) {
      this.period = this.periodMax;
      if (this.enableFrequencyCutoff)
        break;
    }

    // Vibrato
    var rfperiod = this.period;
    if (this.vibratoAmplitude > 0) {
      vibratoPhase += this.vibratoSpeed;
      rfperiod = this.period * (1 + Math.sin(vibratoPhase) * this.vibratoAmplitude);
    }
    var iperiod = Math.floor(rfperiod);
    if (iperiod < OVERSAMPLING) iperiod = OVERSAMPLING;

    // Square wave duty cycle
    this.dutyCycle += this.dutyCycleSlide;
    if (this.dutyCycle < 0) this.dutyCycle = 0;
    if (this.dutyCycle > 0.5) this.dutyCycle = 0.5;

    // Volume envelope
    if (++envelopeElapsed > this.envelopeLength[envelopeStage]) {
      envelopeElapsed = 0;
      if (++envelopeStage > 2)
        break;
    }
    var env_vol;
    var envf = envelopeElapsed / this.envelopeLength[envelopeStage];
    if (envelopeStage === 0) {         // Attack
      env_vol = envf;
    } else if (envelopeStage === 1) {  // Sustain
      env_vol = 1 + (1 - envf) * 2 * this.envelopePunch;
    } else {                           // Decay
      env_vol = 1 - envf;
    }

    // Flanger step
    this.flangerOffset += this.flangerOffsetSlide;
    var iphase = Math.abs(Math.floor(this.flangerOffset));
    if (iphase > 1023) iphase = 1023;

    if (this.flthp_d != 0) {
      this.flthp *= this.flthp_d;
      if (this.flthp < 0.00001)
        this.flthp = 0.00001;
      if (this.flthp > 0.1)
        this.flthp = 0.1;
    }

    // 8x oversampling
    var sample = 0;
    for (var si = 0; si < OVERSAMPLING; ++si) {
      var sub_sample = 0;
      phase++;
      if (phase >= iperiod) {
        phase %= iperiod;
        if (this.waveShape === NOISE)
          for(var i = 0; i < 32; ++i)
            noise_buffer[i] = Math.random() * 2 - 1;
      }

      // Base waveform
      var fp = phase / iperiod;
      if (this.waveShape === SQUARE) {
        if (fp < this.dutyCycle)
          sub_sample=0.5;
        else
          sub_sample=-0.5;
      } else if (this.waveShape === SAWTOOTH) {
        if (fp < this.dutyCycle)
          sub_sample = -1 + 2 * fp/this.dutyCycle;
        else
          sub_sample = 1 - 2 * (fp-this.dutyCycle)/(1-this.dutyCycle);
      } else if (this.waveShape === SINE) {
        sub_sample = Math.sin(fp * 2 * Math.PI);
      } else if (this.waveShape === NOISE) {
        sub_sample = noise_buffer[Math.floor(phase * 32 / iperiod)];
      } else {
        throw "ERROR: Bad wave type: " + this.waveShape;
      }

      // Low-pass filter
      var pp = fltp;
      this.fltw *= this.fltw_d;
      if (this.fltw < 0) this.fltw = 0;
      if (this.fltw > 0.1) this.fltw = 0.1;
      if (this.enableLowPassFilter) {
        fltdp += (sub_sample - fltp) * this.fltw;
        fltdp -= fltdp * this.fltdmp;
      } else {
        fltp = sub_sample;
        fltdp = 0;
      }
      fltp += fltdp;

      // High-pass filter
      fltphp += fltp - pp;
      fltphp -= fltphp * this.flthp;
      sub_sample = fltphp;

      // Flanger
      flanger_buffer[ipp & 1023] = sub_sample;
      sub_sample += flanger_buffer[(ipp - iphase + 1024) & 1023];
      ipp = (ipp + 1) & 1023;

      // final accumulation and envelope application
      sample += sub_sample * env_vol;
    }

    // Accumulate samples appropriately for sample rate
    sample_sum += sample;
    if (++num_summed >= summands) {
      num_summed = 0;
      sample = sample_sum / summands;
      sample_sum = 0;
    } else {
      continue;
    }

    sample = sample / OVERSAMPLING * masterVolume;
    sample *= this.gain;

    // store the original normalized floating point sample
    normalized.push(sample);

    if (this.bitsPerChannel === 8) {
      // Rescale [-1, 1) to [0, 256)
      sample = Math.floor((sample + 1) * 128);
      if (sample > 255) {
        sample = 255;
        ++num_clipped;
      } else if (sample < 0) {
        sample = 0;
        ++num_clipped;
      }
      buffer.push(sample);
    } else {
      // Rescale [-1, 1) to [-32768, 32768)
      sample = Math.floor(sample * (1<<15));
      if (sample >= (1<<15)) {
        sample = (1 << 15)-1;
        ++num_clipped;
      } else if (sample < -(1<<15)) {
        sample = -(1 << 15);
        ++num_clipped;
      }
      buffer.push(sample & 0xFF);
      buffer.push((sample >> 8) & 0xFF);
    }
  }
  
  return {
    "buffer": buffer,
    "normalized": normalized,
    "clipped": num_clipped,
  }
}

SoundEffect.prototype.generate = function() {
  var rendered = this.getRawBuffer();
  var wave = new RIFFWAVE();
  wave.header.sampleRate = this.sampleRate;
  wave.header.bitsPerSample = this.bitsPerChannel;
  wave.Make(rendered.buffer);
  wave.clipping = rendered.clipped;
  wave.buffer = rendered.normalized;
  wave.getAudio = _sfxr_getAudioFn(wave);
  return wave;
}

var _actx = null;
var _sfxr_getAudioFn = function(wave) {
  return function() {
    // check for procedural audio
    var actx = null;
    if (!_actx) {
      if ('AudioContext' in window) {
        _actx = new AudioContext();
      } else if ('webkitAudioContext' in window) {
        _actx = new webkitAudioContext();
      }
    }
    actx = _actx;
    
    if (actx) {
      var buff = actx.createBuffer(1, wave.buffer.length, wave.header.sampleRate);
      var nowBuffering = buff.getChannelData(0);
      for (var i=0;i<wave.buffer.length;i++) {
        nowBuffering[i] = wave.buffer[i];
      }
      var volume = 1.0;
      var obj = {
        "channels": [],
        "setVolume": function(v) { volume = v; return obj; },
        "play": function() {
          var proc = actx.createBufferSource();
          proc.buffer = buff;
          var gainNode = actx.createGain()
          gainNode.gain.value = volume;
          gainNode.connect(actx.destination)
          proc.connect(gainNode);
          if (proc["start"]) {
            proc.start();
          } else if (proc["noteOn"]) {
            proc.noteOn(0);
          }
          this.channels.push(proc);
          return proc;
        }
      };
      return obj;
    } else {
      var audio = new Audio();
      audio.src = wave.dataURI;
      return audio;
    }
  };
};

// engine/signal-bus.js
// Global pub/sub for decoupled engine and game events.
// Depends on: nothing.
// Used by: any module that needs to emit or listen for named events.

var Engine = Engine || {};

class SignalBus {
  constructor() {
    this._listeners = new Map();
  }

  /** Fire a named signal with an optional payload. */
  emit(name, payload) {
    const handlers = this._listeners.get(name);
    if (!handlers) return;
    // Snapshot so handlers that unregister during dispatch do not corrupt iteration.
    for (const handler of [...handlers]) {
      handler(payload);
    }
  }

  /** Register a listener for a named signal. Returns an unregister function. */
  on(name, handler) {
    if (!this._listeners.has(name)) {
      this._listeners.set(name, new Set());
    }
    this._listeners.get(name).add(handler);
    return () => this.off(name, handler);
  }

  /** Remove a listener for a named signal. */
  off(name, handler) {
    const handlers = this._listeners.get(name);
    if (!handlers) return;
    handlers.delete(handler);
    if (handlers.size === 0) {
      this._listeners.delete(name);
    }
  }
}

// engine/input.js
// Latched keyboard and mouse state, queried per frame by the active scene.
// Depends on: nothing (uses DOM APIs directly).
// Used by: scripts and scenes that need to read user input. The Game class
// constructs the singleton instance and assigns it to Engine.input.

var Engine = Engine || {};

class Input {
  constructor(canvas = null) {
    this._down = new Set();          // keys currently held down
    this._justPressed = new Set();   // keys pressed this frame
    this._justReleased = new Set();  // keys released this frame
    this._pendingPressed = new Set();
    this._pendingReleased = new Set();

    this.mouse = {
      x: 0,
      y: 0,
      left: false,
      right: false
    };

    this._canvas = canvas;

    window.addEventListener('keydown', (e) => {
      if (!this._down.has(e.key)) {
        this._pendingPressed.add(e.key);
      }
      this._down.add(e.key);
    });

    window.addEventListener('keyup', (e) => {
      if (this._down.has(e.key)) {
        this._pendingReleased.add(e.key);
      }
      this._down.delete(e.key);
    });

    // Mouse coordinates are computed relative to the canvas if one was provided,
    // accounting for any CSS scaling between the canvas's display size and its drawing buffer.
    const moveTarget = canvas || window;
    moveTarget.addEventListener('mousemove', (e) => {
      if (canvas) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        this.mouse.x = (e.clientX - rect.left) * scaleX;
        this.mouse.y = (e.clientY - rect.top) * scaleY;
      } else {
        this.mouse.x = e.clientX;
        this.mouse.y = e.clientY;
      }
    });

    // Mousedown attaches to the canvas (or window fallback). Mouseup attaches to window
    // so a button held outside the canvas still releases properly.
    const downTarget = canvas || window;
    downTarget.addEventListener('mousedown', (e) => {
      if (e.button === 0) this.mouse.left = true;
      if (e.button === 2) this.mouse.right = true;
    });
    window.addEventListener('mouseup', (e) => {
      if (e.button === 0) this.mouse.left = false;
      if (e.button === 2) this.mouse.right = false;
    });
  }

  isDown(key) {
    return this._down.has(key);
  }

  /** True only on the frame the key transitioned from up to down. */
  wasJustPressed(key) {
    return this._justPressed.has(key);
  }

  /** True only on the frame the key transitioned from down to up. */
  wasJustReleased(key) {
    return this._justReleased.has(key);
  }

  /** Called once per frame by Game. Advances "just pressed/released" tracking. */
  update() {
    this._justPressed = this._pendingPressed;
    this._justReleased = this._pendingReleased;
    this._pendingPressed = new Set();
    this._pendingReleased = new Set();
  }
}

// engine/game-object.js
// Transform host. Owns a list of attached Scripts and delegates lifecycle to them.
// Depends on: Script (only as a contract; not a hard import).
// Used by: Scene, which contains GameObjects; game code, which instantiates them.

    this.scripts.push(script);

  update(dt) {
    for (const s of this.scripts) {

// engine/scene.js
// Owns a collection of GameObjects, provides lifecycle hooks, applies per-object
// transforms during draw, and runs a pairwise AABB collision pass after object updates.
// Depends on: GameObject, Collider scripts (only by duck-typing the isCollider marker).
// Used by: Game, which holds the active scene; game code, which subclasses Scene to define each scene.

  constructor() {
    this.objects = [];
  }

  /** Called by Game when this scene becomes active. Subclasses populate the scene here. */
  enter() {}

  /** Called by Game when this scene is being replaced. Subclasses tear down here. */
  exit() {}

  /** Add a GameObject to the scene. Returns the object for chaining. */
  add(obj) {
    this.objects.push(obj);
    return obj;
  }

  /** Remove a GameObject from the scene. */
  remove(obj) {
    const i = this.objects.indexOf(obj);
    if (i !== -1) this.objects.splice(i, 1);
  }

  /** Iterate GameObjects, update each, then run the collision pass.
   *  Subclasses may override but should call super.update(dt). */
  update(dt) {
    // Snapshot so objects added or removed during update do not corrupt iteration.
    for (const obj of [...this.objects]) {
      obj.update(dt);
    }
    this._collisionPass();
  }

  /** Iterate GameObjects, apply each transform, draw each. Subclasses may override but
   * should call super.draw(ctx) to retain default per-object rendering. */
  draw(ctx) {
    for (const obj of this.objects) {
      ctx.save();
      ctx.translate(obj.x, obj.y);
      ctx.rotate(obj.rotation);
      ctx.scale(obj.scale, obj.scale);
      obj.draw(ctx);
      ctx.restore();
    }
  }

  /** Find all Collider scripts (duck-typed via isCollider) and run pairwise AABB checks.
   *  Each colliding pair invokes a.onCollide(b) and b.onCollide(a) once per frame.
   *  Broad-phase is O(N^2). Acceptable for hobby-scale games (N < 20 or so).
   *  When a game outgrows this, spatial partitioning can replace this method. */
  _collisionPass() {
    const colliders = [];
    for (const obj of this.objects) {
      for (const s of obj.scripts) {
        if (s.isCollider) {
          colliders.push(s);
        }
      }
    }
    for (let i = 0; i < colliders.length; i++) {
      const a = colliders[i];
      const aBox = a.getAabb();
      for (let j = i + 1; j < colliders.length; j++) {
        const b = colliders[j];
        const bBox = b.getAabb();
        if (aBox.x < bBox.x + bBox.w && aBox.x + aBox.w > bBox.x &&
            aBox.y < bBox.y + bBox.h && aBox.y + aBox.h > bBox.y) {
          a.onCollide(b);
          b.onCollide(a);
        }
      }
    }
  }
}

      console.warn(`Engine.storage.save: refusing to save undefined for key '${key}'. Use clear(key) instead.`);
      return false;
    }

    try {
      serialized = JSON.stringify(value);
    } catch (e) {
      console.warn(`Engine.storage.save: cannot serialize value for key '${key}':`, e);
      return false;

      this._fallback.set(fk, serialized);
      return true;

      window.localStorage.setItem(fk, serialized);

    } else {
      raw = window.localStorage.getItem(fk);

      if (!this._prefix) { out.push(k); continue; }

    let dt = (now - this._lastFrameTime) / 1000;
    if (dt > 0.1) dt = 0.1; // clamp to avoid huge jumps after tab inactivity or breakpoints
    this._lastFrameTime = now;

    // Apply pending scene transition before any per-frame work.
    if (this._pendingScene) {
      if (this.currentScene) this.currentScene.exit();
      this.currentScene = this._pendingScene;
      this._pendingScene = null;
      this.currentScene.enter();
    }

    // Advance input "just pressed/released" tracking before scene reads it.
    Engine.input.update();

    if (this.currentScene) {
      this.currentScene.update(dt);
      this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
      this.currentScene.draw(this.ctx);
    }

    this._animationHandle = requestAnimationFrame((t) => this._frame(t));
  }
}

Engine.Game = Game;

// engine/narrative.js
// ============================================================================

// ============================================================================
// engine/narrative.js
// ============================================================================
//
// Engine.Narrative is a thin wrapper around an inkjs Story, exposing a small
// JS-side surface for game scenes to drive branching narrative content
// authored in inkle's ink scripting language.
//
// Depends on:
//   inkjs (global). Must be loaded before any Engine.Narrative instance is
//   constructed. Vendored at engine/lib/inkjs.js but, per ADR-0018,
//   intentionally NOT included in engine/engine.bundle.js because it is
//   large (~250 KB) and game-specific. Games that use narrative include the
//   vendored library separately in their build, before the engine bundle.
//
// Depended on by:
//   Per-game encounter scripts and scenes that drive ink content. No other
//   engine module depends on Narrative.
//
// Usage:
//   const n = new Engine.Narrative(inkSourceString);
//   n.bindExternal('start_combat', (enemyId) => { ... });
//   n.observe('scrap', (value) => updateHud(value));
//   n.setVar('hull', ship.hull);
//   const lines = n.continue();        // [{text, tags}, ...]
//   const choices = n.getChoices();    // [{index, text, tags}, ...]
//   n.choose(0);
//   if (n.hasEnded) { ... }
// ============================================================================

var Engine = Engine || {};

class Narrative {
  constructor(source, options = {}) {
    if (typeof inkjs === 'undefined') {
      throw new Error(
        'Engine.Narrative requires inkjs to be loaded. Include ' +
        'engine/lib/inkjs.js before the engine bundle in your build. See ADR-0018.'
      );
    }
    if (options.compiled) {
      this._story = new inkjs.Story(source);
    } else {
      this._story = new inkjs.Compiler(source).Compile();
    }
  }

  // Advance the story, collecting every line emitted until the next choice
  // point or story end. Returns an array of { text, tags } objects.
  continue() {
    const lines = [];
    while (this._story.canContinue) {
      const raw = this._story.Continue();
      const text = (typeof raw === 'string' ? raw : '').replace(/\n$/, '');
      const tags = this._story.currentTags ? [...this._story.currentTags] : [];
      lines.push({ text, tags });
    }
    return lines;
  }

  // Available choices at the current story point, or [] if none.
  getChoices() {
    return this._story.currentChoices.map((c) => ({
      index: c.index,
      text: c.text,
      tags: c.tags ? [...c.tags] : []
    }));
  }

  // Select a choice by its index. After this, the story is ready for another
  // continue() call.
  choose(index) {
    this._story.ChooseChoiceIndex(index);
  }

  // Read an ink variable by name. Returns undefined if not declared.
  getVar(name) {
    return this._story.variablesState[name];
  }

  // Write an ink variable. The variable must be declared in the ink source
  // (with VAR) for the write to have effect.
  setVar(name, value) {
    this._story.variablesState[name] = value;
  }

  // Bind a JS function that ink can invoke via an EXTERNAL declaration.
  // The ink script must declare it as: EXTERNAL fn_name(arg1, arg2)
  bindExternal(name, fn) {
    this._story.BindExternalFunction(name, fn);
  }

  // Register a callback that fires when the named ink variable changes.
  // The callback is invoked with the new value.
  observe(name, fn) {
    this._story.ObserveVariable(name, (_varName, value) => fn(value));
  }

  // Jump to a named knot or stitch. Path is a dot-separated string like
  // 'sector_one' or 'sector_one.shop_intro'.
  goTo(path) {
    this._story.ChoosePathString(path);
  }

  // Serialize narrative state to a JSON string suitable for storing via
  // Engine.storage alongside other game state.
  saveState() {
    return this._story.state.toJson();
  }

  // Restore state from a JSON string previously returned by saveState().
  loadState(json) {
    this._story.state.LoadJson(json);
  }

  // True when the story has nothing more to emit and offers no choices.
  get hasEnded() {
    return !this._story.canContinue && this._story.currentChoices.length === 0;
  }

  // Underlying inkjs Story instance. Exposed for advanced uses where the
  // wrapper methods do not cover the required operation.
  get story() {
    return this._story;
  }
}

Engine.Narrative = Narrative;

// ============================================================================
// engine/balance.js
// ============================================================================
// Tunable balance primitives: parameterized difficulty curves and cost
// scaling. Pure, stateless functions under Engine.Balance. Default constants
// follow the values supported by docs/resources/balance.md (see ADR-0020).
//
// Depends on: nothing (pure math).
// Depended on by: game-specific scripts/scenes that ramp difficulty or price
//   upgrades. NOT used by the engine core; opt-in per game.
// ============================================================================

var Engine = Engine || {};

const Balance = {
  // --- Difficulty curves ----------------------------------------------------
  // difficulty(t, opts): difficulty/intensity as a function of progress t.
  // t is caller-defined (elapsed seconds, wave index, level, etc).
  // opts.type selects the family; default 'logistic' (slow start, steep
  // middle, bounded plateau), the general-purpose pacing curve.
  // For logistic, set opts.t0 to the progress midpoint; the default of 0
  // is structural only (it places you at L/2 at t=0).
  difficulty(t, opts = {}) {
    const type = opts.type || 'logistic';
    switch (type) {
      case 'linear':       // d0 + m*t
        return (opts.d0 ?? 0) + (opts.m ?? 1) * t;
      case 'exponential':  // d0 * r^t
        return (opts.d0 ?? 1) * Math.pow(opts.r ?? 1.1, t);
      case 'logarithmic':  // d0 + k*ln(1+t); rises to a soft max then flattens
        return (opts.d0 ?? 0) + (opts.k ?? 1) * Math.log(1 + t);
      case 'logistic':     // L / (1 + e^(-k*(t - t0)))
        return (opts.L ?? 1) / (1 + Math.exp(-(opts.k ?? 1) * (t - (opts.t0 ?? 0))));
      default:
        throw new Error(`Engine.Balance.difficulty: unknown curve type '${type}'`);
    }
  },

  // --- Cost scaling ---------------------------------------------------------
  // cost(n, opts): price of a purchase when you already own n units, base*rate^n.
  // So the first unit (n=0) costs base. rate in [1.07, 1.15] is the documented
  // band; default 1.10. Use ~1.15 for short sessions, ~1.07 for long-haul games.
  cost(n, opts = {}) {
    return (opts.base ?? 1) * Math.pow(opts.rate ?? 1.1, n);
  },

  // bulkCost(owned, count, opts): closed-form total to buy `count` units from
  // `owned`. Exact for fixed rate; replaces a loop.
  bulkCost(owned, count, opts = {}) {
    const base = opts.base ?? 1;
    const rate = opts.rate ?? 1.1;
    if (count <= 0) return 0;
    if (rate === 1) return base * count;
    return base * (Math.pow(rate, owned) * (Math.pow(rate, count) - 1)) / (rate - 1);
  },

  // maxAffordable(owned, currency, opts): how many units `currency` buys from
  // `owned`. Closed-form inverse of bulkCost.
  maxAffordable(owned, currency, opts = {}) {
    const base = opts.base ?? 1;
    const rate = opts.rate ?? 1.1;
    if (currency <= 0) return 0;
    if (rate === 1) return Math.floor(currency / base);
    const n = Math.log((currency * (rate - 1)) / (base * Math.pow(rate, owned)) + 1) / Math.log(rate);
    return Math.max(0, Math.floor(n));
  }
};

Engine.Balance = Balance;


// ============================================================================
// engine/prng.js
// ============================================================================

// ============================================================================
// engine/prng.js
// ============================================================================
//
// Engine.PRNG: seeded pseudo-random number generator.
//
// Algorithm: SFC32 (Small Fast Counting) by Chris Doty-Humphrey. 128-bit
// state (four 32-bit words); period ≥ 2^64; passes PractRand at 32 TB.
// String seeds are hashed to a 128-bit initial state by cyrb128 (bryc, CC0).
// See ADR-0026.
//
// Depends on: nothing.
// Depended on by: game scripts and scenes that need deterministic randomness
//   (procedural levels, daily seeds, replay systems). Not used by the engine
//   core; opt-in per game.
//
// Usage:
//   const rng = new Engine.PRNG('level-1');
//   rng.float()              // [0, 1), like Math.random()
//   rng.int(1, 6)            // integer in [1, 6] inclusive
//   rng.pick(['a','b','c'])  // random element from array
//   rng.shuffle(array)       // Fisher-Yates in place, returns array
// ============================================================================

var Engine = Engine || {};

class PRNG {
  constructor(seed) {
    let a, b, c, d;
    if (typeof seed === 'string') {
      [a, b, c, d] = PRNG._cyrb128(seed);
    } else {
      // Expand a single 32-bit integer to four words via a LCG.
      a = seed >>> 0;
      b = (a * 1664525 + 1013904223) >>> 0;
      c = (b * 1664525 + 1013904223) >>> 0;
      d = 1;
    }
    this._a = a; this._b = b; this._c = c; this._d = d;
    // Discard first 15 outputs so low-entropy seeds (e.g. 0) reach a
    // well-mixed state before callers draw values.
    for (let i = 0; i < 15; i++) this._step();
  }

  // [0, 1) float, the Math.random() analogue.
  float() {
    return (this._step() >>> 0) / 0x100000000;
  }

  // Integer in [min, max] inclusive.
  int(min, max) {
    return min + (this._step() % (max - min + 1));
  }

  // Random element from array. Throws if array is empty.
  pick(arr) {
    if (!arr.length) throw new Error('Engine.PRNG.pick: empty array');
    return arr[this._step() % arr.length];
  }

  // Fisher-Yates shuffle in place. Returns the same array.
  shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      const j = this._step() % (i + 1);
      const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  // SFC32 step: updates state and returns a 32-bit unsigned integer.
  _step() {
    const t = (this._a + this._b + this._d++) >>> 0;
    this._a = (this._b ^ (this._b >>> 9)) >>> 0;
    this._b = (this._c + (this._c << 3)) >>> 0;
    this._c = ((this._c << 21) | (this._c >>> 11)) >>> 0;
    this._c = (this._c + t) >>> 0;
    return t;
  }

  // cyrb128 by bryc (CC0). Hashes a string to four 32-bit seed words.
  static _cyrb128(str) {
    let h1 = 1779033703, h2 = 3144134277, h3 = 1013904242, h4 = 2773480762;
    for (let i = 0; i < str.length; i++) {
      const k = str.charCodeAt(i);
      h1 = h2 ^ Math.imul(h1 ^ k, 597399067);
      h2 = h3 ^ Math.imul(h2 ^ k, 2869860233);
      h3 = h4 ^ Math.imul(h3 ^ k, 951274213);
      h4 = h1 ^ Math.imul(h4 ^ k, 2716044179);
    }
    h1 = Math.imul(h3 ^ (h1 >>> 18), 597399067);
    h2 = Math.imul(h4 ^ (h2 >>> 22), 2869860233);
    h3 = Math.imul(h1 ^ (h3 >>> 17), 951274213);
    h4 = Math.imul(h2 ^ (h4 >>> 19), 2716044179);
    h1 ^= (h2 ^ h3 ^ h4); h2 ^= h1; h3 ^= h1; h4 ^= h1;
    return [h1 >>> 0, h2 >>> 0, h3 >>> 0, h4 >>> 0];
  }
}

Engine.PRNG = PRNG;

/* ==== scripts/bootstrap.js ==== */
// ============================================================================
// scripts/bootstrap.js
// ============================================================================
//
// bootstrapGame(options) - canonical game bootstrap helper.
//
// Consolidates the boilerplate that every build/<game>.html's <script> tail
// currently repeats: viewport-aware canvas sizing per ADR-0017, touch
// capability detection, optional context-menu suppression (for right-click
// games), Engine.Game construction with optional gameName for namespaced
// storage, initial scene set via a factory, and game start.
//
// Depends on:
//   Engine.Game (engine/game.js). The engine bundle must be loaded before
//   this script in the build concatenation order.
//
// Depended on by:
//   Game build bootstrap snippets. Replaces the inline IIFE that previously
//   appeared at the end of each build/<game>.html. Adoption is per-build:
//   existing builds continue to work with their inline bootstrap until each
//   is naturally regenerated. Drift v1 is the planned first build to adopt
//   the helper from the start; existing games migrate when next touched.
//
// Usage (Minesweeper-style, current inline form for comparison):
//   (function () {
//     const canvas = document.getElementById('game');
//     const preset = { w: 900, h: 600 };
//     canvas.width = preset.w; canvas.height = preset.h;
//     // fitToViewport, resize listener, canvas.oncontextmenu, etc.
//     const game = new Engine.Game(canvas, { gameName: 'minesweeper' });
//     game.setScene(new MinesweeperMenuScene(game));
//     game.start();
//   })();
//
// Equivalent with bootstrapGame:
//   bootstrapGame({
//     gameName: 'minesweeper',
//     presets: { regular: { w: 900, h: 600 } },
//     initialScene: function (game) { return new MinesweeperMenuScene(game); },
//     suppressContextMenu: true,
//   });
//
// Options:
//   canvasId          string. ID of canvas element. Default 'game'.
//   canvas            DOM element. Overrides canvasId if both provided.
//   gameName          string. Passed to Engine.Game for storage namespacing.
//                     Default '' (no namespace).
//   presets           { regular: {w, h}, compact?: {w, h} }. Required.
//                     If compact is omitted, regular is always used (the
//                     intentional letterbox-on-portrait path per ADR-0017).
//   initialScene      (game) => Scene. Factory required because the Game
//                     instance must exist before the initial Scene's
//                     constructor argument can be passed.
//   suppressContextMenu  bool. Default false. true disables the canvas's
//                     right-click context menu (for games that read
//                     Engine.input.mouse.right; see Minesweeper).
//
// Returns:
//   { game, preset, presetName, isTouch }
//     game         the constructed Engine.Game (already started)
//     preset       the chosen preset object { w, h }
//     presetName   'regular' or 'compact'
//     isTouch      bool. true if touch capability detected per ADR-0017.
//                  Scenes can use this to enlarge hit-target minimums.
//
// Throws if the canvas element is not found, presets.regular is missing, or
// initialScene is not a function. Errors are explicit and actionable.
//
// Preset selection:
//   When both regular and compact are defined, picks whichever aspect ratio
//   is closer (in log space) to the current viewport's. This matches the
//   reference snippet in docs/ARCHITECTURE.md "Logical canvas and viewport
//   bootstrap" and ADR-0017.
// ============================================================================

function bootstrapGame(options) {
  const opts = options || {};

  const canvas = opts.canvas || document.getElementById(opts.canvasId || 'game');
  if (!canvas || typeof canvas.getContext !== 'function') {
    throw new Error(
      "bootstrapGame: canvas element not found (looked for id '" +
      (opts.canvasId || 'game') + "'). Pass options.canvas or options.canvasId."
    );
  }

  const presets = opts.presets;
  if (!presets || !presets.regular) {
    throw new Error('bootstrapGame: options.presets.regular is required (e.g. { regular: { w: 900, h: 600 } }).');
  }

  if (typeof opts.initialScene !== 'function') {
    throw new Error('bootstrapGame: options.initialScene must be a factory function (game) => sceneInstance.');
  }

  const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

  function pickPreset() {
    if (!presets.compact) return { name: 'regular', preset: presets.regular };
    const va = window.innerWidth / window.innerHeight;
    const ra = presets.regular.w / presets.regular.h;
    const ca = presets.compact.w / presets.compact.h;
    const useCompact = Math.abs(Math.log(va / ca)) < Math.abs(Math.log(va / ra));
    return useCompact
      ? { name: 'compact', preset: presets.compact }
      : { name: 'regular', preset: presets.regular };
  }

  const chosen = pickPreset();
  const preset = chosen.preset;
  canvas.width = preset.w;
  canvas.height = preset.h;

  function fitToViewport() {
    const s = Math.min(window.innerWidth / preset.w, window.innerHeight / preset.h);
    canvas.style.width = (preset.w * s) + 'px';
    canvas.style.height = (preset.h * s) + 'px';
  }
  fitToViewport();
  window.addEventListener('resize', fitToViewport);

  if (opts.suppressContextMenu) {
    canvas.oncontextmenu = function (e) { e.preventDefault(); };
  }

  const game = new Engine.Game(canvas, { gameName: opts.gameName || '' });
  game.setScene(opts.initialScene(game));
  game.start();

  return { game: game, preset: preset, presetName: chosen.name, isTouch: isTouch };
}

/* ==== scripts/pause-overlay.js ==== */
// scripts/pause-overlay.js
// Reusable pause overlay utility. Not a Script subclass -- a plain class that
// any scene owns and delegates to. Lives in scripts/ as the closest available
// folder; a utils/ folder may be warranted if more non-Script utilities appear.
//
// Usage in a scene:
//   this._pause = new PauseOverlay(game, {
//     onRestart: () => game.setScene(new MatchScene(game)),  // optional
//     onQuit:    () => game.setScene(new Menu(game)),        // optional
//   });
//   In update(dt): this._pause.update(dt); if (this._pause.isPaused()) return;
//   In draw(ctx): /* game draw */ this._pause.draw(ctx); // last, on top
//
// ESC toggles pause. Row layout (rows present only if their callback is provided):
//   RESUME
//   AUDIO    (volume + mute)
//   RESTART  (only if onRestart)
//   QUIT     (only if onQuit)
//
// Controls when paused:
//   Up/Down       navigate rows
//   Left/Right    adjust volume when on AUDIO row
//   M             toggle mute when on AUDIO row
//   Space/Enter   activate selected row
//   Escape        resume
//
// Depends on: Engine.input, Engine.audio.
// Used by: SurvivorsMatchScene, HTTMatchScene, and any future game scene.

class PauseOverlay {
  constructor(game, options = {}) {
    this._game      = game;
    this._paused    = false;
    this._onRestart = options.onRestart ?? null;
    this._onQuit    = options.onQuit    ?? null;
    this._cursor    = 0;
    this._rows      = this._buildRows();
  }

  /** Build the row layout based on which callbacks were provided. Each row is
   * { kind, label }. The 'volume' row's label is regenerated at draw time. */
  _buildRows() {
    const rows = [
      { kind: 'resume', label: 'RESUME' },
      { kind: 'volume', label: '' }, // regenerated dynamically
    ];
    if (this._onRestart) rows.push({ kind: 'restart', label: 'RESTART' });
    if (this._onQuit)    rows.push({ kind: 'quit',    label: 'QUIT TO MENU' });
    return rows;
  }

  toggle() { this._paused = !this._paused; if (!this._paused) this._cursor = 0; }
  isPaused() { return this._paused; }

  update(dt) {
    if (Engine.input.wasJustPressed('Escape')) { this.toggle(); return; }
    if (!this._paused) return;

    const n = this._rows.length;
    if (Engine.input.wasJustPressed('ArrowUp'))
      this._cursor = (this._cursor - 1 + n) % n;
    if (Engine.input.wasJustPressed('ArrowDown'))
      this._cursor = (this._cursor + 1) % n;

    const row = this._rows[this._cursor];

    if (row.kind === 'volume') {
      if (Engine.input.wasJustPressed('ArrowLeft'))
        Engine.audio.setVolume(+(Math.max(0, Engine.audio.getVolume() - 0.1)).toFixed(1));
      if (Engine.input.wasJustPressed('ArrowRight'))
        Engine.audio.setVolume(+(Math.min(1, Engine.audio.getVolume() + 0.1)).toFixed(1));
      if (Engine.input.wasJustPressed('m') || Engine.input.wasJustPressed('M'))
        Engine.audio.setMuted(!Engine.audio.isMuted());
    }

    if (Engine.input.wasJustPressed('Enter') || Engine.input.wasJustPressed(' ')) {
      if (row.kind === 'resume')  { this.toggle(); }
      else if (row.kind === 'restart' && this._onRestart) { this._paused = false; this._onRestart(); }
      else if (row.kind === 'quit'    && this._onQuit)    { this._paused = false; this._onQuit(); }
    }
  }

  draw(ctx) {
    if (!this._paused) return;
    const W = ctx.canvas.width, H = ctx.canvas.height;
    ctx.save();

    ctx.fillStyle = 'rgba(0,0,0,0.72)';
    ctx.fillRect(0, 0, W, H);

    // Panel height scales with row count so 4-row layouts don't crowd.
    const n  = this._rows.length;
    const pw = 420;
    const ph = 180 + n * 50;
    const px = W / 2 - pw / 2, py = H / 2 - ph / 2 - 16;
    ctx.fillStyle = '#111827'; ctx.fillRect(px, py, pw, ph);
    ctx.strokeStyle = '#374151'; ctx.lineWidth = 2; ctx.strokeRect(px, py, pw, ph);

    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff'; ctx.font = 'bold 40px monospace';
    ctx.fillText('PAUSED', W / 2, py + 44);

    ctx.strokeStyle = '#374151'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(px + 20, py + 72); ctx.lineTo(px + pw - 20, py + 72); ctx.stroke();

    const muted = Engine.audio.isMuted();
    const vol   = Math.round(Engine.audio.getVolume() * 10);
    const volStr = muted ? 'AUDIO  [MUTED]' : 'AUDIO  [' + '|'.repeat(vol) + ' '.repeat(10 - vol) + '] ' + vol + '/10';

    for (let i = 0; i < n; i++) {
      const row = this._rows[i];
      const ry  = py + 106 + i * 50, sel = i === this._cursor;
      if (sel) { ctx.fillStyle = 'rgba(241,196,15,0.10)'; ctx.fillRect(px + 12, ry - 20, pw - 24, 40); }
      ctx.fillStyle = sel ? '#f1c40f' : '#9ca3af';
      ctx.font      = sel ? 'bold 20px monospace' : '18px monospace';
      const label = row.kind === 'volume' ? volStr : row.label;
      ctx.fillText(label, W / 2, ry);
    }

    ctx.fillStyle = '#4b5563'; ctx.font = '11px monospace';
    ctx.fillText('UP/DOWN navigate   LEFT/RIGHT volume   M mute   ESC resume', W / 2, py + ph - 16);
    ctx.restore();
  }
}

/* ==== games/horses-teach-typing/scripts/rhythm-letter.js ==== */
// games/horses-teach-typing/scripts/rhythm-letter.js
// A single rhythm-game letter. Holds a target character, a target hit time, and
// a state machine: alive -> judged -> dead.
//
// Position is time-driven, not dt-driven. While alive, the letter's X is
// computed from the conductor time so that x === hitZoneX exactly when
// conductor.time === targetTime. This makes the game deterministic regardless
// of frame-rate jitter or skipped frames.
//
// When judged (either by player keypress or by auto-miss when conductor time
// passes target + window), the letter enters a brief feedback animation
// (floats upward, fades out), then signals removal via 'htt_letter_dead'.
//
// Signals emitted:
//   htt_letter_dead   { obj }   when feedback animation completes
//
// Depends on: Engine.Script, Engine.signals
// Used by: HTTMatchScene

class RhythmLetter extends Engine.Script {
  constructor(host, options = {}) {
    super(host);
    this.letter     = (options.letter || 'a').toLowerCase();
    this.spawnTime  = options.spawnTime  ?? 0;
    this.targetTime = options.targetTime ?? 0;
    this.spawnX     = options.spawnX     ?? 780;
    this.hitZoneX   = options.hitZoneX   ?? 240;
    this._scene     = options.scene      ?? null;

    this.state      = 'alive';   // alive | judged | dead
    this.judgement  = null;      // 'perfect' | 'great' | 'good' | 'miss'
    this._feedbackT = 0;
    this._feedbackDuration = 0.5;
    this._signalled = false;     // guard so we emit dead exactly once
  }

  /** Position-time function. x === hitZoneX exactly when now === targetTime. */
  positionAt(now) {
    const lead = this.targetTime - this.spawnTime;
    if (lead <= 0) return this.hitZoneX;
    const progress = (now - this.spawnTime) / lead; // 0 at spawn, 1 at target
    return this.spawnX + (this.hitZoneX - this.spawnX) * progress;
  }

  /** Mark this letter as judged. Caller picks one of perfect/great/good/miss. */
  judge(j) {
    if (this.state !== 'alive') return;
    this.state = 'judged';
    this.judgement = j;
    this._feedbackT = 0;
  }

  update(dt) {
    if (this.state === 'alive') {
      const now = this._scene ? this._scene.conductorTime : 0;
      this.host.x = this.positionAt(now);
    } else if (this.state === 'judged') {
      this._feedbackT += dt;
      this.host.y -= 40 * dt;
      if (this._feedbackT >= this._feedbackDuration) {
        this.state = 'dead';
        if (!this._signalled) {
          this._signalled = true;
          Engine.signals.emit('htt_letter_dead', { obj: this.host });
        }
      }
    }
  }

  draw(ctx) {
    if (this.state === 'dead') return;
    ctx.save();

    if (this.state === 'judged') {
      const a = 1 - (this._feedbackT / this._feedbackDuration);
      ctx.globalAlpha = Math.max(0, a);
      let label;
      if      (this.judgement === 'perfect') label = 'PERFECT';
      else if (this.judgement === 'great')   label = 'GREAT';
      else if (this.judgement === 'good')    label = 'GOOD';
      else                                   label = 'MISS';
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 14px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(label, 0, 0);
    } else {
      // Alive: blocky white letter with a thin outline box to read as a card.
      const size = 30;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = 2;
      ctx.strokeRect(-size / 2, -size / 2, size, size);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 26px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      // Tiny vertical offset so the glyph sits visually centered in the box.
      ctx.fillText(this.letter.toUpperCase(), 0, 2);
    }

    ctx.restore();
  }
}

/* ==== games/horses-teach-typing/scenes/htt-match.js ==== */
// games/horses-teach-typing/scenes/htt-match.js
// Core gameplay scene. Drives a conductor clock, spawns letters at beat-locked
// times, judges player keypresses against the closest matching letter's
// targetTime, and renders the Oregon Trail style monochrome scene.
//
// Conductor model:
//   conductorTime starts at 0 on enter() and advances by dt each non-paused
//   frame. Letters are scheduled to be HIT at integer multiples of
//   beatInterval (one letter per beat at BPM). A letter spawned at time
//   targetTime - leadTime travels right-to-left, reaching the hit zone X
//   exactly at targetTime.
//
// Judgement windows (absolute |conductorTime - targetTime|):
//   perfect  <= 0.060s
//   great    <= 0.120s
//   good     <= 0.180s
//   miss     > 0.180s (or letter auto-missed by passing the hit zone)
//
// Scoring:
//   perfect 300, great 200, good 100, miss 0.
//   Combo increments on any non-miss, resets on miss.
//
// Input handling:
//   Each frame, for each alphabet key just-pressed, find the closest alive
//   letter with that character. If within any judgement window, mark it
//   judged with the appropriate label. Wrong-key or no-match keypresses are
//   ignored (lenient policy; the rhythm itself penalizes misses).
//
// Pause overlay:
//   Provides RESUME / AUDIO / RESTART / QUIT. Restart re-enters this scene.
//
// Signals:
//   htt_letter_dead { obj }  emitted by RhythmLetter when feedback ends;
//                            the scene removes the host GameObject.
//
// Depends on: Engine.Scene, Engine.GameObject, Engine.input, Engine.audio,
//   Engine.signals, RhythmLetter, PauseOverlay, HTTMenuScene.
// Used by: HTTMenuScene, bootstrap.

class HTTMatchScene extends Engine.Scene {
  constructor(game, options = {}) {
    super();
    this._game = game;

    // Rhythm parameters.
    this._bpm           = options.bpm ?? 90;
    this._beatInterval  = 60 / this._bpm;
    this._leadTime      = 2.0;       // seconds from spawn to hit-zone arrival
    this._beatsPerLetter = 1;        // one letter per beat for v1

    // Lane geometry.
    this._spawnX   = 780;
    this._hitZoneX = 240;
    this._laneY    = 250;

    // Conductor clock and spawn cursor.
    this.conductorTime = 0;
    this._nextSpawnBeat = 0;

    // Scoring state.
    this._score      = 0;
    this._combo      = 0;
    this._bestCombo  = 0;
    this._totalHits  = 0;
    this._totalNotes = 0;

    // Recent judgement banner.
    this._lastJudgement  = null;
    this._lastJudgementT = 0;

    // Judgement windows in seconds.
    this._windows = { perfect: 0.060, great: 0.120, good: 0.180 };

    // Scene infra.
    this._pause = null;
    this._unsubs = [];
    this._fadeIn = 1.0;
    this._pendingOut = null;
    this._fadeOutTimer = 0;

    // For the alphabet keypress loop in _handleInput.
    this._alphabet = 'abcdefghijklmnopqrstuvwxyz';
  }

  enter() {
    this.conductorTime  = 0;
    this._nextSpawnBeat = 0;
    this._score         = 0;
    this._combo         = 0;
    this._bestCombo     = 0;
    this._totalHits     = 0;
    this._totalNotes    = 0;
    this._lastJudgement = null;
    this._fadeIn        = 1.0;
    this._pendingOut    = null;
    this._fadeOutTimer  = 0;

    // Register SFX. Each call regenerates the procedural params, so sounds
    // vary slightly per match. That's acceptable; cheaper than chosen seeds.
    Engine.audio.register('htt-perfect', 'laserShoot');
    Engine.audio.register('htt-good',    'pickupCoin');
    Engine.audio.register('htt-miss',    'hitHurt');

    this._pause = new PauseOverlay(this._game, {
      onRestart: () => {
        this._pendingOut   = new HTTMatchScene(this._game);
        this._fadeOutTimer = 0;
      },
      onQuit: () => {
        this._pendingOut   = new HTTMenuScene(this._game);
        this._fadeOutTimer = 0;
      },
    });

    this._unsubs.push(
      Engine.signals.on('htt_letter_dead', ({ obj }) => {
        this.remove(obj);
      }),
    );
  }

  exit() {
    for (const u of this._unsubs) u();
    this._unsubs = [];
    this.objects.length = 0;
  }

  update(dt) {
    if (this._fadeIn > 0) this._fadeIn = Math.max(0, this._fadeIn - dt * 2.5);

    if (this._pendingOut) {
      this._fadeOutTimer += dt;
      if (this._fadeOutTimer >= 0.35) this._game.setScene(this._pendingOut);
      return;
    }

    this._pause.update(dt);
    if (this._pause.isPaused()) return;

    // Advance conductor.
    this.conductorTime += dt;

    // Spawn any letters whose spawnTime (= targetTime - leadTime) has now arrived.
    // Spawn-cursor walks beats; spawn when conductorTime + leadTime >= targetTime.
    while (true) {
      const targetTime = this._nextSpawnBeat * this._beatInterval * this._beatsPerLetter
                      + this._leadTime; // first letter targets at leadTime
      if (this.conductorTime + this._leadTime >= targetTime) {
        this._spawnLetter(targetTime);
        this._nextSpawnBeat++;
      } else break;
    }

    // Letter movement (handled by each RhythmLetter via scene.conductorTime).
    super.update(dt);

    // Player input.
    this._handleInput();

    // Auto-miss any letters that have passed the hit zone outside the good window.
    this._autoMissCheck();

    // Decay the recent-judgement banner.
    if (this._lastJudgement) {
      this._lastJudgementT += dt;
      if (this._lastJudgementT > 0.6) this._lastJudgement = null;
    }
  }

  _spawnLetter(targetTime) {
    const idx = Math.floor(Math.random() * this._alphabet.length);
    const ch  = this._alphabet.charAt(idx);
    const spawnTime = targetTime - this._leadTime;
    const obj = new Engine.GameObject(this._spawnX, this._laneY);
    obj.attach(new RhythmLetter(obj, {
      letter:    ch,
      spawnTime,
      targetTime,
      spawnX:    this._spawnX,
      hitZoneX:  this._hitZoneX,
      scene:     this,
    }));
    this.add(obj);
    this._totalNotes++;
  }

  _handleInput() {
    for (const ch of this._alphabet) {
      if (!Engine.input.wasJustPressed(ch)) continue;
      this._attemptHit(ch);
    }
  }

  /** Find the alive letter with this character closest to current conductor time.
   *  If within any judgement window, judge it. Out-of-window or no-match: ignore. */
  _attemptHit(ch) {
    let best = null;
    let bestDiff = Infinity;
    for (const obj of this.objects) {
      for (const s of obj.scripts) {
        if (s instanceof RhythmLetter && s.state === 'alive' && s.letter === ch) {
          const diff = Math.abs(this.conductorTime - s.targetTime);
          if (diff < bestDiff) { bestDiff = diff; best = s; }
        }
      }
    }
    if (!best) return;

    let judgement;
    if      (bestDiff <= this._windows.perfect) judgement = 'perfect';
    else if (bestDiff <= this._windows.great)   judgement = 'great';
    else if (bestDiff <= this._windows.good)    judgement = 'good';
    else return; // outside the lenient window: ignore (will auto-miss later)

    best.judge(judgement);
    this._onJudgement(judgement);
  }

  _autoMissCheck() {
    const cutoff = this._windows.good + 0.05;
    for (const obj of this.objects) {
      for (const s of obj.scripts) {
        if (s instanceof RhythmLetter && s.state === 'alive') {
          if (this.conductorTime > s.targetTime + cutoff) {
            s.judge('miss');
            this._onJudgement('miss');
          }
        }
      }
    }
  }

  _onJudgement(j) {
    const points = { perfect: 300, great: 200, good: 100, miss: 0 };
    this._score += points[j];
    if (j === 'miss') {
      this._combo = 0;
      Engine.audio.play('htt-miss');
    } else {
      this._combo++;
      this._bestCombo = Math.max(this._bestCombo, this._combo);
      this._totalHits++;
      Engine.audio.play(j === 'perfect' ? 'htt-perfect' : 'htt-good');
    }
    this._lastJudgement  = j;
    this._lastJudgementT = 0;
  }

  draw(ctx) {
    const W = ctx.canvas.width, H = ctx.canvas.height;

    // Background: solid black (Apple II monochrome).
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);

    // Distant mountains (decorative).
    this._drawMountains(ctx, W);

    // Trail / ground line.
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, H - 90);
    ctx.lineTo(W, H - 90);
    ctx.stroke();

    // Hit zone (vertical brackets, pulsing on each beat).
    this._drawHitZone(ctx);

    // Letters (delegated to scene base draw).
    super.draw(ctx);

    // Horse silhouette on the left, in front of the trail.
    this._drawHorse(ctx, 150, H - 90, this.conductorTime);

    // HUD: score, combo, last-judgement banner.
    this._drawHUD(ctx, W, H);

    // Pause overlay on top.
    this._pause.draw(ctx);

    // Fade overlays.
    if (this._fadeIn > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this._fadeIn})`;
      ctx.fillRect(0, 0, W, H);
    }
    if (this._pendingOut) {
      const a = Math.min(1, this._fadeOutTimer / 0.35);
      ctx.fillStyle = `rgba(0,0,0,${a})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  _drawMountains(ctx, W) {
    ctx.save();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const peaks = [
      [0, 200], [60, 170], [120, 195], [180, 145], [240, 180], [320, 155],
      [400, 190], [480, 140], [560, 175], [640, 160], [720, 195], [800, 175],
    ];
    ctx.moveTo(peaks[0][0], peaks[0][1]);
    for (let i = 1; i < peaks.length; i++) ctx.lineTo(peaks[i][0], peaks[i][1]);
    ctx.stroke();
    ctx.restore();
  }

  _drawHitZone(ctx) {
    ctx.save();
    const x = this._hitZoneX;
    const cy = this._laneY;
    const half = 26;

    // Beat pulse: brighter on the beat, faded between beats.
    const beatPhase = (this.conductorTime % this._beatInterval) / this._beatInterval;
    const pulse = Math.max(0, 1 - beatPhase * 1.8); // peaks just after each beat
    const alpha = 0.55 + 0.45 * pulse;
    ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
    ctx.lineWidth = 2;

    // Left bracket
    ctx.beginPath();
    ctx.moveTo(x - 18, cy - half);
    ctx.lineTo(x - 26, cy - half);
    ctx.lineTo(x - 26, cy + half);
    ctx.lineTo(x - 18, cy + half);
    ctx.stroke();
    // Right bracket
    ctx.beginPath();
    ctx.moveTo(x + 18, cy - half);
    ctx.lineTo(x + 26, cy - half);
    ctx.lineTo(x + 26, cy + half);
    ctx.lineTo(x + 18, cy + half);
    ctx.stroke();

    ctx.restore();
  }

  _drawHorse(ctx, cx, groundY, t) {
    ctx.save();
    ctx.translate(cx, groundY);
    const bob = Math.sin(t * 1.8) * 1.5;
    ctx.fillStyle = '#ffffff';

    // Body
    ctx.beginPath();
    ctx.ellipse(0, -40 + bob * 0.3, 42, 22, 0, 0, Math.PI * 2);
    ctx.fill();

    // Neck (trapezoid via polygon)
    ctx.beginPath();
    ctx.moveTo(28, -50 + bob * 0.3);
    ctx.lineTo(48, -72 + bob);
    ctx.lineTo(56, -65 + bob);
    ctx.lineTo(34, -42 + bob * 0.3);
    ctx.closePath();
    ctx.fill();

    // Head
    ctx.beginPath();
    ctx.ellipse(56, -78 + bob, 14, 9, -0.25, 0, Math.PI * 2);
    ctx.fill();
    // Ear
    ctx.beginPath();
    ctx.moveTo(50, -88 + bob);
    ctx.lineTo(54, -96 + bob);
    ctx.lineTo(58, -86 + bob);
    ctx.closePath();
    ctx.fill();

    // Mane
    ctx.beginPath();
    ctx.moveTo(46, -71 + bob);
    ctx.lineTo(40, -78 + bob);
    ctx.lineTo(34, -68 + bob);
    ctx.lineTo(28, -75 + bob);
    ctx.lineTo(22, -62 + bob);
    ctx.lineTo(28, -56 + bob * 0.6);
    ctx.closePath();
    ctx.fill();

    // Tail
    ctx.beginPath();
    ctx.moveTo(-38, -42);
    ctx.lineTo(-58, -36);
    ctx.lineTo(-56, -22);
    ctx.lineTo(-40, -32);
    ctx.closePath();
    ctx.fill();

    // Legs
    ctx.fillRect(-30, -22, 6, 22);
    ctx.fillRect(-14, -22, 6, 22);
    ctx.fillRect(10,  -22, 6, 22);
    ctx.fillRect(26,  -22, 6, 22);

    // Eye
    ctx.fillStyle = '#000000';
    ctx.beginPath();
    ctx.arc(60, -79 + bob, 1.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  _drawHUD(ctx, W, H) {
    ctx.save();
    ctx.textBaseline = 'top';

    // Top thin bar to ground HUD against background.
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fillRect(0, 0, W, 28);

    // Score (left).
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SCORE  ' + String(this._score).padStart(6, '0'), 12, 8);

    // Combo (right).
    const comboStr = this._combo > 0
      ? 'COMBO  x' + this._combo
      : 'COMBO  --';
    ctx.textAlign = 'right';
    ctx.fillText(comboStr, W - 12, 8);

    // Center: BPM.
    ctx.textAlign = 'center';
    ctx.fillStyle = '#888888';
    ctx.font = '12px monospace';
    ctx.fillText(this._bpm + ' BPM', W / 2, 9);

    // Bottom: pause hint.
    ctx.textAlign = 'right';
    ctx.textBaseline = 'bottom';
    ctx.fillStyle = '#888888';
    ctx.font = '11px monospace';
    ctx.fillText('ESC: pause', W - 6, H - 4);

    // Last judgement banner just above the hit zone.
    if (this._lastJudgement) {
      const alpha = Math.max(0, 1 - this._lastJudgementT / 0.6);
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 22px monospace';
      let label;
      if      (this._lastJudgement === 'perfect') label = 'PERFECT';
      else if (this._lastJudgement === 'great')   label = 'GREAT';
      else if (this._lastJudgement === 'good')    label = 'GOOD';
      else                                        label = 'MISS';
      ctx.fillText(label, this._hitZoneX, this._laneY - 60);
      ctx.restore();
    }

    ctx.restore();
  }
}

/* ==== games/horses-teach-typing/scenes/htt-menu.js ==== */
// games/horses-teach-typing/scenes/htt-menu.js
// Title screen for Horses Teach Typing. Pictographic-first layout: minimal
// English beyond the title. A horse silhouette anchors the left, a
// demonstrative mini-diagram shows letters moving toward a hit zone, and a
// blinking SPACE pictograph at the bottom communicates "press space to begin".
//
// SPACE or ENTER advances to HTTMatchScene with a brief fade-out.
//
// Depends on: Engine.Scene, Engine.input.
//   HTTMatchScene must be defined in the build (transition target).
// Used by: bootstrap; HTTMatchScene (back via pause -> quit).

class HTTMenuScene extends Engine.Scene {
  constructor(game) {
    super();
    this._game = game;
    this._t = 0;
    this._fadeIn = 1.0;
    this._pendingOut = null;
    this._fadeOutTimer = 0;
    this._demoT = 0;
  }

  enter() {
    this._t = 0;
    this._fadeIn = 1.0;
    this._pendingOut = null;
    this._fadeOutTimer = 0;
    this._demoT = 0;
  }
  exit() {}

  update(dt) {
    this._t += dt;
    this._demoT += dt;

    if (this._pendingOut) {
      this._fadeOutTimer += dt;
      if (this._fadeOutTimer >= 0.35) this._game.setScene(this._pendingOut);
      return;
    }
    if (this._fadeIn > 0) this._fadeIn = Math.max(0, this._fadeIn - dt * 2.5);

    if (Engine.input.wasJustPressed(' ') || Engine.input.wasJustPressed('Enter')) {
      this._pendingOut = new HTTMatchScene(this._game);
    }
  }

  draw(ctx) {
    const W = ctx.canvas.width, H = ctx.canvas.height;

    // Black background (Apple II Oregon Trail palette: white on black).
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, W, H);

    // Distant mountain silhouette across top half (decorative).
    this._drawMountains(ctx, W);

    // Trail / ground line.
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, H - 90);
    ctx.lineTo(W, H - 90);
    ctx.stroke();

    // Title text.
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 40px monospace';
    ctx.fillText('HORSES TEACH TYPING', W / 2, 70);
    // Subtle horizontal rule under title.
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(W / 2 - 240, 96);
    ctx.lineTo(W / 2 + 240, 96);
    ctx.stroke();
    ctx.restore();

    // Horse silhouette on the left, in front of the trail.
    this._drawHorse(ctx, 150, H - 90, this._t);

    // Mini mechanic demo: letters approaching a hit zone.
    this._drawDemo(ctx, W, H);

    // Blinking SPACE pictograph (bottom-center).
    this._drawSpaceBar(ctx, W, H);

    // Fade overlays.
    if (this._fadeIn > 0) {
      ctx.fillStyle = `rgba(0,0,0,${this._fadeIn})`;
      ctx.fillRect(0, 0, W, H);
    }
    if (this._pendingOut) {
      const a = Math.min(1, this._fadeOutTimer / 0.35);
      ctx.fillStyle = `rgba(0,0,0,${a})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  /** Distant jagged mountain silhouette, drawn as a single stroked polyline.
   *  Apple II vibe: 1-bit lines, no shading. */
  _drawMountains(ctx, W) {
    ctx.save();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    const peaks = [
      [0, 200], [60, 170], [120, 195], [180, 145], [240, 180], [320, 155],
      [400, 190], [480, 140], [560, 175], [640, 160], [720, 195], [800, 175],
    ];
    ctx.moveTo(peaks[0][0], peaks[0][1]);
    for (let i = 1; i < peaks.length; i++) ctx.lineTo(peaks[i][0], peaks[i][1]);
    ctx.stroke();
    ctx.restore();
  }

  /** Horse silhouette, side profile facing right. Drawn as filled white shapes
   *  centered on (cx, groundY). Slight head-bob on time t for life. */
  _drawHorse(ctx, cx, groundY, t) {
    ctx.save();
    ctx.translate(cx, groundY);
    const bob = Math.sin(t * 1.8) * 1.5;
    ctx.fillStyle = '#ffffff';

    // Body (rounded rectangle approximated with ellipse).
    ctx.beginPath();
    ctx.ellipse(0, -40 + bob * 0.3, 42, 22, 0, 0, Math.PI * 2);
    ctx.fill();

    // Neck (trapezoid via polygon).
    ctx.beginPath();
    ctx.moveTo(28, -50 + bob * 0.3);
    ctx.lineTo(48, -72 + bob);
    ctx.lineTo(56, -65 + bob);
    ctx.lineTo(34, -42 + bob * 0.3);
    ctx.closePath();
    ctx.fill();

    // Head (rounded shape).
    ctx.beginPath();
    ctx.ellipse(56, -78 + bob, 14, 9, -0.25, 0, Math.PI * 2);
    ctx.fill();
    // Ear.
    ctx.beginPath();
    ctx.moveTo(50, -88 + bob);
    ctx.lineTo(54, -96 + bob);
    ctx.lineTo(58, -86 + bob);
    ctx.closePath();
    ctx.fill();

    // Mane (small jagged shape from neck top backward).
    ctx.beginPath();
    ctx.moveTo(46, -71 + bob);
    ctx.lineTo(40, -78 + bob);
    ctx.lineTo(34, -68 + bob);
    ctx.lineTo(28, -75 + bob);
    ctx.lineTo(22, -62 + bob);
    ctx.lineTo(28, -56 + bob * 0.6);
    ctx.closePath();
    ctx.fill();

    // Tail (curved triangle).
    ctx.beginPath();
    ctx.moveTo(-38, -42);
    ctx.lineTo(-58, -36);
    ctx.lineTo(-56, -22);
    ctx.lineTo(-40, -32);
    ctx.closePath();
    ctx.fill();

    // Legs (four rectangles to the ground).
    ctx.fillRect(-30, -22, 6, 22);
    ctx.fillRect(-14, -22, 6, 22);
    ctx.fillRect(10,  -22, 6, 22);
    ctx.fillRect(26,  -22, 6, 22);

    // Eye (black dot on the white head).
    ctx.fillStyle = '#000000';
    ctx.beginPath();
    ctx.arc(60, -79 + bob, 1.5, 0, Math.PI * 2);
    ctx.fill();

    ctx.restore();
  }

  /** Mini demonstration of the core mechanic: three letters approaching a hit
   *  zone, with a bracket pictograph indicating where to press. Continuously
   *  animates so the player can read the rule visually. */
  _drawDemo(ctx, W, H) {
    ctx.save();
    const cy = H / 2 + 10;
    const hitX = W / 2 - 110;
    const period = 2.4;
    const tphase = (this._demoT % period) / period; // 0..1

    // Brackets at the hit zone.
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    const bracketSize = 22;
    // Left bracket
    ctx.beginPath();
    ctx.moveTo(hitX - 18, cy - bracketSize);
    ctx.lineTo(hitX - 26, cy - bracketSize);
    ctx.lineTo(hitX - 26, cy + bracketSize);
    ctx.lineTo(hitX - 18, cy + bracketSize);
    ctx.stroke();
    // Right bracket
    ctx.beginPath();
    ctx.moveTo(hitX + 18, cy - bracketSize);
    ctx.lineTo(hitX + 26, cy - bracketSize);
    ctx.lineTo(hitX + 26, cy + bracketSize);
    ctx.lineTo(hitX + 18, cy + bracketSize);
    ctx.stroke();

    // Three trailing letters moving right-to-left. Spaced one phase apart.
    const letters = ['A', 'S', 'D'];
    const spawnX = W / 2 + 180;
    const range  = spawnX - hitX + 90; // a bit past so they exit smoothly
    for (let i = 0; i < 3; i++) {
      const p = ((tphase + i * 0.33) % 1);
      const x = spawnX - p * range;
      ctx.save();
      ctx.translate(x, cy);
      const size = 28;
      const inHit = Math.abs(x - hitX) < 4;
      ctx.strokeStyle = '#ffffff';
      ctx.lineWidth = inHit ? 3 : 2;
      ctx.strokeRect(-size / 2, -size / 2, size, size);
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 22px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(letters[i], 0, 2);
      ctx.restore();
    }
    ctx.restore();
  }

  /** Blinking SPACE pictograph: a wide outlined rectangle with "SPACE" label.
   *  Blinks once per second to signal "press this". */
  _drawSpaceBar(ctx, W, H) {
    ctx.save();
    const cx = W / 2;
    const cy = H - 50;
    const bw = 240, bh = 32;
    const blink = (Math.floor(this._t * 2) % 2) === 0;
    ctx.strokeStyle = blink ? '#ffffff' : '#666666';
    ctx.lineWidth = 2;
    ctx.strokeRect(cx - bw / 2, cy - bh / 2, bw, bh);
    ctx.fillStyle = blink ? '#ffffff' : '#666666';
    ctx.font = 'bold 14px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('SPACE', cx, cy + 1);
    ctx.restore();
  }
}

bootstrapGame({ canvasId: 'game', gameName: 'horses-teach-typing', presets: { regular: { w: 800, h: 500 } }, initialScene: (g) => new HTTMenuScene(g), suppressContextMenu: false });
</script>
